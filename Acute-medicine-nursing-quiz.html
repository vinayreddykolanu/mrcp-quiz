<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acute Medicine Nursing — Team Quiz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.1/dist/msal-browser.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --paper:#F7F3EA;
  --paper-warm:#EFE9DA;
  --paper-soft:#FBF8F1;
  --ink:#0F1F2E;
  --ink-soft:#2C3E50;
  --ink-muted:#5A6B7E;
  --rule:#D6CFBF;
  --rule-soft:#E5DECC;
  --accent:#4A6E5D;
  --accent-deep:#2F4A3D;
  --accent-soft:#E8E4D6;
  --warm:#B45309;
  --warm-soft:#FAEBC8;
  --ok:#4A6E5D;
  --ok-soft:#DDE5DE;
  --bad:#8A1C2B;
  --bad-soft:#F1DCDD;
  --shadow:0 1px 2px rgba(15,31,46,0.04),0 8px 24px rgba(15,31,46,0.06);
  --shadow-lift:0 4px 12px rgba(15,31,46,0.08),0 16px 40px rgba(15,31,46,0.10);
  --serif:'Fraunces','Times New Roman',Georgia,serif;
  --sans:'DM Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);
  font-size:16px;line-height:1.6;color:var(--ink);
  background:var(--paper);
  background-image:
    radial-gradient(ellipse 80% 40% at 50% 0%,rgba(74,110,93,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 100% 100%,rgba(180,83,9,0.04) 0%,transparent 50%);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;
}
::selection{background:var(--accent);color:var(--paper)}
.wrap{max-width:1100px;margin:0 auto;padding:32px 28px 64px;position:relative;z-index:2}

/* TYPOGRAPHY */
h1{font-family:var(--serif);font-weight:500;font-size:28px;line-height:1.15;letter-spacing:-0.01em;color:var(--ink)}
h2{font-family:var(--serif);font-weight:500;font-size:20px;line-height:1.2;color:var(--ink);margin-bottom:14px;letter-spacing:-0.005em}
.muted{color:var(--ink-muted);font-size:13px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-muted)}
.serif-em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--accent-deep)}

/* BRAND / MASTHEAD */
.brand{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding-bottom:18px;margin-bottom:28px;
  border-bottom:1px solid var(--rule);gap:18px;flex-wrap:wrap;
}
.brand .mast-l{display:flex;align-items:flex-end;gap:14px}
.brand .num{
  font-family:var(--mono);font-size:11px;letter-spacing:0.14em;color:var(--ink-muted);
  text-transform:uppercase;padding-bottom:4px;
}
.brand .title{font-family:var(--serif);font-weight:500;font-size:22px;letter-spacing:-0.005em;color:var(--ink);line-height:1.1}
.brand .sub{font-size:12px;color:var(--ink-muted);margin-top:3px;letter-spacing:0.02em}
.brand .mast-r{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;text-align:right}

/* CARDS */
.card{
  background:var(--paper-soft);
  border:1px solid var(--rule);
  border-radius:0;
  padding:28px 30px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
  position:relative;
}
.card.feature{
  background:linear-gradient(180deg,var(--paper-warm) 0%,var(--paper-soft) 100%);
  border-left:3px solid var(--accent);
}
.flex{display:flex}.aic{align-items:center}.jb{justify-content:space-between}
.gap8{gap:8px}.gap12{gap:12px}.wrap-flex{flex-wrap:wrap}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.grid2{display:grid;grid-template-columns:1fr 320px;gap:18px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}.wrap{padding:20px 18px 48px}h1{font-size:22px}}

/* INPUTS */
input[type=text]{
  width:100%;padding:12px 14px;
  border:1px solid var(--rule);
  border-radius:0;background:var(--paper-soft);
  font-size:15px;font-family:var(--sans);color:var(--ink);
  margin-bottom:10px;transition:border-color .15s,box-shadow .15s;
}
input[type=text]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

/* BUTTONS */
.btn{
  background:var(--paper-soft);color:var(--ink);
  border:1px solid var(--rule);
  padding:11px 18px;border-radius:0;
  font-size:13.5px;font-weight:500;font-family:var(--sans);
  letter-spacing:0.02em;
  cursor:pointer;transition:background .15s,border-color .15s,transform .15s;
}
.btn:hover{background:var(--paper-warm);border-color:var(--ink-muted)}
.btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn.primary:hover{background:var(--accent);border-color:var(--accent)}
.btn.danger{background:var(--bad);color:#fff;border-color:var(--bad)}
.btn.danger:hover{background:#6e1622;border-color:#6e1622}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.full{width:100%}
.btn.sm{padding:8px 14px;font-size:12.5px}
.btn.lg{padding:14px 24px;font-size:14px;letter-spacing:0.04em}

/* BADGES */
.badge{display:inline-block;padding:4px 11px;border-radius:0;font-size:11px;font-weight:500;
  letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono)}
.b-blue{background:var(--accent-soft);color:var(--accent-deep)}
.b-green{background:var(--ok-soft);color:var(--accent-deep)}
.b-amber{background:var(--warm-soft);color:var(--warm)}
.b-grey{background:var(--paper-warm);color:var(--ink-muted)}

/* BANNERS */
.banner{padding:12px 16px;border-radius:0;font-size:14px;border-left:3px solid;background:var(--paper-soft)}
.banner.warn{background:var(--warm-soft);border-color:var(--warm);color:#7a4509}
.banner.ok{background:var(--ok-soft);border-color:var(--accent);color:var(--accent-deep)}
.banner.bad{background:var(--bad-soft);border-color:var(--bad);color:#5a121b}
.code{font-family:var(--mono);background:var(--paper-warm);padding:1px 7px;border-radius:0;font-size:.88em;color:var(--ink-soft)}
pre{background:var(--paper-warm);padding:14px 16px;border-radius:0;border-left:2px solid var(--rule);overflow-x:auto;
  font-family:var(--mono);font-size:12.5px;margin:10px 0;line-height:1.55}
.setup-steps{margin:0;padding-left:24px}
.setup-steps li{margin-bottom:10px;font-size:14px;line-height:1.55}

.fb-status{display:inline-flex;align-items:center;gap:7px;font-size:11px;padding:5px 11px;
  border-radius:0;border:1px solid;font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase}
.fb-status.ok{background:var(--ok-soft);color:var(--accent-deep);border-color:var(--accent)}
.fb-status.bad{background:var(--bad-soft);color:var(--bad);border-color:var(--bad)}
.fb-status .dot{width:7px;height:7px;border-radius:50%;background:currentColor}

/* QUESTION CARD */
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.timer-bar{height:3px;background:var(--rule-soft);overflow:hidden;margin:14px 0 18px;position:relative}
.timer-fill{height:100%;background:var(--accent);transition:width 1s linear}
.timer-fill.warn{background:var(--warm)}
.timer-fill.danger{background:var(--bad)}
.stem{font-size:15.5px;line-height:1.65;margin-bottom:18px;white-space:pre-wrap;color:var(--ink-soft)}
.lead-q{font-family:var(--serif);font-weight:500;font-size:17px;margin:10px 0 14px;color:var(--ink);letter-spacing:-0.005em}
.qimg{max-width:100%;max-height:300px;border:1px solid var(--rule);display:block;margin:14px 0;
  background:var(--paper-soft);box-shadow:var(--shadow)}

/* OPTIONS */
.opts{list-style:none;padding:0;margin:0}
.opt{
  border:1px solid var(--rule);border-radius:0;padding:13px 16px;margin-bottom:8px;
  cursor:pointer;display:flex;gap:12px;align-items:flex-start;
  background:var(--paper-soft);transition:background .15s,border-color .15s;
  font-size:14.5px;line-height:1.5;
}
.opt:hover{border-color:var(--accent);background:var(--paper-warm)}
.opt.sel{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
.opt.ok{border-color:var(--accent);background:var(--ok-soft);box-shadow:inset 3px 0 0 var(--accent)}
.opt.bad{border-color:var(--bad);background:var(--bad-soft);box-shadow:inset 3px 0 0 var(--bad)}
.opt.disabled{cursor:default}
.opt .ltr{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  background:transparent;border:1px solid var(--rule);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:500;font-size:13px;color:var(--ink-muted);
}
.opt.sel .ltr{background:var(--accent);color:var(--paper);border-color:var(--accent)}
.opt.ok .ltr{background:var(--accent);color:var(--paper);border-color:var(--accent)}
.opt.bad .ltr{background:var(--bad);color:var(--paper);border-color:var(--bad)}

/* EXPLANATION & REFERENCES */
.explanation{
  margin-top:18px;padding:16px 20px;
  background:var(--paper-warm);border-left:3px solid var(--accent);
  font-size:14px;line-height:1.65;color:var(--ink-soft);
}
.explanation strong{display:block;margin-bottom:8px;font-family:var(--serif);font-size:15px;
  font-weight:600;color:var(--ink);letter-spacing:0.01em}
.references{
  margin-top:12px;padding:14px 18px;background:var(--paper-soft);
  border:1px solid var(--rule);border-style:dashed;font-size:13px;
}
.references strong{display:block;margin-bottom:8px;font-family:var(--mono);font-size:10.5px;
  font-weight:500;color:var(--ink-muted);letter-spacing:0.14em;text-transform:uppercase}
.references ul{margin:0;padding-left:18px;list-style:none}
.references li{margin-bottom:5px;position:relative;padding-left:14px}
.references li::before{content:'→';position:absolute;left:0;color:var(--accent);font-weight:500}
.references a{color:var(--accent-deep);text-decoration:none;border-bottom:1px solid var(--accent-soft);
  transition:border-color .15s}
.references a:hover{border-color:var(--accent)}

/* DISTRACTORS — why each wrong answer is wrong */
.distractors{
  margin-top:14px;padding:14px 18px;
  background:var(--paper-soft);border:1px solid var(--rule);
  font-size:13.5px;line-height:1.6;color:var(--ink-soft);
}
.distractors strong.label{display:block;margin-bottom:8px;font-family:var(--mono);
  font-size:10.5px;font-weight:500;color:var(--ink-muted);
  letter-spacing:0.14em;text-transform:uppercase}
.distractors ul{margin:0;padding:0;list-style:none}
.distractors li{margin-bottom:6px;padding-left:30px;position:relative}
.distractors li:last-child{margin-bottom:0}
.distractors li .ltr-tag{
  position:absolute;left:0;top:1px;
  font-family:var(--serif);font-style:italic;font-weight:500;font-size:13px;
  color:var(--bad);width:22px;text-align:center;
  border-bottom:1px solid var(--bad-soft);
}

/* PEARL — clinical take-home */
.pearl{
  margin-top:12px;padding:14px 18px;
  background:linear-gradient(180deg,var(--warm-soft) 0%,var(--paper-warm) 100%);
  border-left:3px solid var(--warm);
  font-size:14px;line-height:1.6;color:#5a4309;
  display:flex;gap:12px;align-items:flex-start;
}
.pearl .pearl-icon{font-size:18px;flex-shrink:0;line-height:1.4}
.pearl strong.label{font-family:var(--mono);font-size:10.5px;font-weight:500;
  color:var(--warm);letter-spacing:0.14em;text-transform:uppercase;
  margin-right:8px}

/* DISTRIBUTION */
.dist-row{display:flex;align-items:center;gap:12px;margin:8px 0;font-size:13px}
.dist-row .ltr{
  width:24px;height:24px;border-radius:50%;background:transparent;border:1px solid var(--rule);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:500;font-size:12px;color:var(--ink-muted);flex-shrink:0;
}
.dist-row.right .ltr{background:var(--accent);color:var(--paper);border-color:var(--accent)}
.dist-bar{flex:1;height:14px;background:var(--rule-soft);overflow:hidden;position:relative;border:1px solid var(--rule)}
.dist-bar-fill{height:100%;background:var(--ink-muted);transition:width .8s ease}
.dist-row.right .dist-bar-fill{background:var(--accent)}
.dist-count{min-width:54px;text-align:right;font-size:11.5px;color:var(--ink-muted);font-family:var(--mono)}

/* LEADERBOARD */
.lb-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;
  border-bottom:1px solid var(--rule-soft);font-size:13.5px}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:28px;color:var(--ink-muted);font-family:var(--mono);font-size:12px;letter-spacing:0.04em}
.lb-name{flex:1;margin-left:8px;color:var(--ink-soft)}
.lb-score{font-family:var(--mono);font-weight:500;color:var(--accent-deep);font-size:14px}
.lb-row.you{background:var(--accent-soft);margin:0 -14px;padding:10px 14px;border-bottom-color:var(--accent-soft)}
.lb-row.you .lb-name{color:var(--ink);font-weight:500}

/* BLUEPRINT GRID */
.bp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin:14px 0 18px}
.bp-chip{
  padding:10px 14px;background:var(--paper-soft);
  border:1px solid var(--rule);border-radius:0;
  cursor:pointer;font-size:13px;user-select:none;
  transition:.15s;display:flex;justify-content:space-between;gap:10px;
  font-family:var(--sans);color:var(--ink-soft);
}
.bp-chip:hover{border-color:var(--accent);background:var(--paper-warm)}
.bp-chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-deep);font-weight:500}
.bp-chip .ct{
  font-family:var(--mono);font-size:10.5px;color:var(--ink-muted);
  background:var(--paper-warm);padding:2px 8px;border-radius:0;
  letter-spacing:0.04em;
}
.bp-chip.active .ct{background:var(--accent);color:var(--paper)}

/* QR / WAITING */
.qr-box{
  display:flex;flex-direction:column;align-items:center;
  padding:24px;background:var(--paper-soft);
  border:1px solid var(--rule);
}
#qrcode{margin:14px 0;padding:8px;background:#fff;border:1px solid var(--rule)}
.room-code{
  font-family:var(--mono);font-size:26px;font-weight:500;letter-spacing:6px;
  color:var(--accent-deep);
  padding:10px 20px;background:var(--accent-soft);border:1px solid var(--accent);
  display:inline-block;margin-top:6px;
}
.wait-box{
  text-align:center;padding:36px 24px;
  background:var(--paper-warm);border:1px solid var(--rule);
}
.wait-box p{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--ink);
  letter-spacing:-0.005em;margin-bottom:6px}
.distribution-countdown{
  position:absolute;top:8px;right:10px;
  background:var(--paper-warm);border:1px solid var(--rule);
  padding:3px 10px;font-size:11px;font-weight:500;color:var(--ink-muted);
  font-family:var(--mono);letter-spacing:0.06em;text-transform:uppercase;
}

/* COLOPHON / FOOTER */
.colophon{
  margin-top:48px;padding-top:18px;border-top:1px solid var(--rule);
  display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--ink-muted);
}
.colophon em{font-family:var(--serif);font-style:italic;text-transform:none;letter-spacing:0;
  font-size:12px;color:var(--ink-soft)}
</style>
</head>

let DB = null, READY = false, FB_ERR = null;
const LISTENERS = {};

try {
  if (!FB_CONFIG.apiKey || FB_CONFIG.apiKey === "YOUR_API_KEY") {
    FB_ERR = "Firebase not configured — edit FB_CONFIG at the top of this HTML file.";

  listen(path, cb) {

    LISTENERS[path] = unsub;
    return unsub;
  },
  unlisten(path) {
    if (LISTENERS[path]) { LISTENERS[path](); delete LISTENERS[path]; }
  }
};

<script>
// ════════════════════════════════════════════════════════════════════
// QUESTION BANK — Acute Medicine Nursing (100 SBAs)
// Schema: { section, specialty, topic, stem, options[5], correct (A-E),
//           explanation, references:[{label,url}, ...] }
// Sections map to BLUEPRINT keys below.
// ════════════════════════════════════════════════════════════════════

const BLUEPRINT = {
  sepsis:      'Sepsis & Deterioration',
  abcde:       'ABCDE & Resuscitation',
  cardio:      'Cardiology',
  resp:        'Respiratory',
  endo:        'Endocrine',
  neuro:       'Neurology',
  anaphylaxis: 'Anaphylaxis & Allergy',
  renal:       'Renal & Fluids',
  gastro:      'Gastroenterology',
  poisoning:   'Poisoning & Overdose',
  transfusion: 'Transfusion',
  medsafe:     'Medication Safety',
  falls:       'Falls, Frailty & Skin',
  infection:   'Infection Control',
  mca:         'Mental Capacity & Communication'
};

const QBANK = [
// ─── SEPSIS & DETERIORATION (10) ───────────────────────────────────
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Sepsis 6 escalation',
stem:'A 72-year-old man on AMU has a 6-hour history of cough and confusion. Observations: HR 118, RR 26, BP 92/54, SpO2 91% on air, temp 38.7°C, AVPU = V. He has not passed urine for 4 hours.',
options:[
'Repeat the observations in 30 minutes',
'Initiate the Sepsis 6 bundle and escalate urgently to the medical team',
'Encourage oral fluids and continue routine monitoring',
'Give regular paracetamol and reassess in 1 hour',
'Perform a 12-lead ECG and await the doctor\'s review'
],correct:'B',
explanation:'This patient meets criteria for septic shock (NEWS2 ≥7, SBP <100, altered mental state, possible source). The Sepsis 6 — high-flow oxygen, blood cultures, IV broad-spectrum antibiotics within 1 hour, IV fluid resuscitation, lactate, and accurate urine output — must be commenced and the patient escalated immediately. Time-to-antibiotics is the key driver of mortality and should not be delayed by paracetamol, ECG or repeat observations.',
distractors:{
  A:'Repeating observations delays definitive treatment when shock is already evident',
  C:'Oral fluids are inadequate for septic shock; IV crystalloid is required',
  D:'Paracetamol treats fever, not the underlying source — and delays antibiotics',
  E:'A 12-lead ECG can wait; door-to-antibiotic time within 1 hour is the priority'
},
pearl:'Time-to-antibiotics is the single strongest modifiable predictor of survival in sepsis — initiate the Sepsis 6 within the Golden Hour.',
references:[
{label:'NICE NG51 — Sepsis: recognition, diagnosis and early management',url:'https://www.nice.org.uk/guidance/ng51'},
{label:'UK Sepsis Trust — Sepsis 6 bundle',url:'https://sepsistrust.org/professional-resources/clinical/'}
]
},
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Lactate interpretation',
stem:'A 56-year-old woman is admitted with suspected urosepsis. Her venous blood gas returns with a lactate of 4.2 mmol/L.',
options:[
'It indicates adequate tissue perfusion',
'It suggests sample contamination',
'It indicates severe tissue hypoperfusion needing urgent fluid resuscitation',
'It is a normal stress response requiring no specific action',
'It is an indication for immediate intubation'
],correct:'C',
explanation:'A lactate >2 mmol/L in suspected sepsis indicates tissue hypoperfusion; >4 mmol/L is associated with significantly higher mortality and mandates urgent IV crystalloid resuscitation (typically 30 mL/kg) and prompt critical care input. Lactate guides response to resuscitation — repeat measurement after fluid bolus is recommended. It does not, of itself, indicate the need for intubation.',
distractors:{
  A:'A raised lactate indicates poor tissue perfusion, not adequate perfusion',
  B:'Sample contamination causes spurious low or normal results, not high values',
  D:'Stress lactate is typically <2 mmol/L; 4.2 is pathological',
  E:'Lactate alone is not an indication for intubation — assess airway, breathing, conscious level'
},
pearl:'Lactate >2 in suspected sepsis = hypoperfusion; >4 = doubled hospital mortality. Always re-check after fluid resuscitation.',
references:[
{label:'Surviving Sepsis Campaign 2021',url:'https://www.sccm.org/SurvivingSepsisCampaign'},
{label:'NICE NG51',url:'https://www.nice.org.uk/guidance/ng51'}
]
},
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'NEWS2 calculation',
stem:'You are calculating the NEWS2 for a 68-year-old patient: RR 22, SpO2 93% on air (target 94–98%), HR 115, BP 110/70, temp 38.2°C, alert.',
options:['4','5','6','7','8'],correct:'D',
explanation:'NEWS2 components: RR 22 = 2; SpO2 93% on Scale 1 = 2; on air = 0; HR 115 = 2; SBP 110 = 0; temp 38.2 = 1; alert = 0. Total = 7. A score ≥7 triggers an emergency response, including continuous monitoring and urgent review by a critical care–competent clinician. Knowing the components is essential to detect deterioration early.',
distractors:{
  A:'Score of 4 misses several abnormal vital signs',
  B:'Score of 5 omits one component when added precisely',
  C:'Score of 6 underweights the combination of vital sign derangements',
  E:'Score of 8 over-counts; the correct sum is 7'
},
pearl:'A NEWS2 ≥7 mandates emergency response and continuous monitoring — calculate every component (RR, SpO₂, oxygen, BP, HR, AVPU, temp).',
references:[
{label:'RCP — National Early Warning Score (NEWS) 2',url:'https://www.rcp.ac.uk/improving-care/resources/national-early-warning-score-news-2/'}
]
},
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Escalation timeframes',
stem:'A patient\'s NEWS2 has risen from 2 to 6 within an hour. According to the standard escalation protocol, in what timeframe should they be reviewed by a competent clinical decision-maker?',
options:['Within 4 hours','Within 2 hours','Within 1 hour','Within 30 minutes','At the next ward round'],correct:'C',
explanation:'A NEWS2 of 5–6 is "key threshold for urgent response": review by a clinician competent in acute illness assessment within 1 hour, with a minimum monitoring frequency of hourly. A score ≥7 demands emergency response with continuous monitoring and consideration of critical care.',
distractors:{
  A:'4 hours is too long when score has risen rapidly to 6',
  B:'2 hours fails the urgent threshold for NEWS2 5–6',
  D:'30 minutes is required for NEWS2 ≥7, not 5–6',
  E:'Routine ward rounds cannot accommodate acute deterioration'
},
pearl:'NEWS2 escalation: 0 → 12-hourly; 1–4 → 4–6 hourly; 5–6 → 1 hour by competent decision-maker; ≥7 → emergency response, continuous monitoring.',
references:[
{label:'RCP NEWS2 thresholds and triggers',url:'https://www.rcp.ac.uk/improving-care/resources/national-early-warning-score-news-2/'}
]
},
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Neutropenic sepsis',
stem:'A 60-year-old man on AMU 10 days post-chemotherapy spikes a temperature of 38.5°C. He looks unwell, HR 110, BP 105/65. His latest FBC shows neutrophils 0.3 ×10⁹/L.',
options:[
'Wait for blood culture results before giving antibiotics',
'Give oral co-amoxiclav and review in 4 hours',
'Treat as neutropenic sepsis: isolate, take cultures, give IV piperacillin–tazobactam (or local equivalent) within 1 hour',
'Give paracetamol and observe',
'Transfuse platelets'
],correct:'C',
explanation:'Neutropenic sepsis (neutrophils <0.5 ×10⁹/L plus temperature ≥38°C or other signs of significant sepsis) is a haemato-oncology emergency. Empirical broad-spectrum IV antibiotics — most commonly piperacillin–tazobactam — must be given within 1 hour (the "Golden Hour"), alongside cultures, full septic screen, and side-room isolation. Don\'t wait for cultures, and don\'t use oral antibiotics in this setting.',
distractors:{
  A:'Cultures must not delay antibiotics in neutropenic sepsis — the Golden Hour applies',
  B:'Oral co-amoxiclav inadequately covers Pseudomonas and is too narrow-spectrum',
  D:'Paracetamol masks fever without treating the underlying infection',
  E:'Platelet transfusion does not address infection and may not be indicated'
},
pearl:'Neutropenic sepsis is a haemato-oncology emergency: empirical IV piperacillin–tazobactam within 1 hour, before culture results.',
references:[
{label:'NICE CG151 — Neutropenic sepsis',url:'https://www.nice.org.uk/guidance/cg151'}
]
},
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Source identification',
stem:'A patient meeting sepsis criteria is having the Sepsis 6 commenced. Which of the following best describes "source control"?',
options:[
'Giving the broadest possible antibiotic to cover everything',
'Identifying and managing the focus of infection (e.g. removing infected line, draining abscess, surgical management of perforation)',
'Isolating the patient in a side-room',
'Ensuring strict hand hygiene at the bedside',
'Sending repeat blood cultures'
],correct:'B',
explanation:'Source control is the physical removal or drainage of the infective focus and is essential alongside antibiotics in sepsis: removing an infected line, draining a collection, debriding necrotic tissue, surgical management of perforation, or relieving urinary obstruction. Without source control, antibiotics alone may fail. Nurses play a key role in identifying the likely source and ensuring rapid imaging or surgical referral happens.',
distractors:{
  A:'Broader-spectrum antibiotics do not substitute for source control',
  C:'Side-room isolation is infection prevention, not source control',
  D:'Hand hygiene prevents cross-contamination but is not source control',
  E:'Repeat cultures monitor response but do not constitute source control'
},
pearl:'Antibiotics fail without source control — drain the abscess, remove the line, debride necrotic tissue, relieve obstruction.',
references:[
{label:'Surviving Sepsis Campaign',url:'https://www.sccm.org/SurvivingSepsisCampaign'}
]
},
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'qSOFA',
stem:'A patient with suspected infection has the following: RR 24, SBP 96 mmHg, GCS 14 (mildly drowsy). What is their qSOFA score, and what does it indicate?',
options:[
'qSOFA 1 — low concern',
'qSOFA 2 — no further action needed',
'qSOFA 3 — high risk of poor outcome from sepsis; escalate urgently',
'qSOFA 0 — sepsis excluded',
'qSOFA cannot be calculated without a lactate'
],correct:'C',
explanation:'qSOFA scores 1 point each for: RR ≥22, SBP ≤100, altered mentation (any GCS reduction). Score = 3. A qSOFA ≥2 in a patient with suspected infection identifies those at higher risk of in-hospital mortality and prolonged ICU stay, and should trigger urgent senior review and consideration of critical care. NEWS2 has greater sensitivity than qSOFA in UK practice and is the primary screening tool, but qSOFA remains a useful red-flag check.',
distractors:{
  A:'Score of 1 underestimates the actual qSOFA components present',
  B:'Score of 2 still warrants action — and this patient scores 3',
  D:'Score of 0 is incorrect; the patient meets all three criteria',
  E:'qSOFA is calculated from RR, SBP, and mentation alone — no lactate needed'
},
pearl:'qSOFA ≥2 in suspected infection identifies high mortality risk — UK practice uses NEWS2 first-line but qSOFA is a useful red-flag check.',
references:[
{label:'Sepsis-3 consensus definitions',url:'https://jamanetwork.com/journals/jama/fullarticle/2492881'}
]
},
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'AKI in sepsis',
stem:'Following the Sepsis 6, a septic patient has received 30 mL/kg of crystalloid. Their urine output is 18 mL/hour (they weigh 70 kg). Which is the most appropriate next step?',
options:[
'Continue current fluids and monitor',
'Stop all IV fluids',
'Send U&Es, document AKI, escalate for senior review and consideration of further fluids vs vasopressors',
'Give a single 500 mL bolus then stop',
'Catheterise without escalation'
],correct:'C',
explanation:'Urine output <0.5 mL/kg/hr (here 35 mL/hr threshold) over the resuscitation period in a septic patient meets KDIGO criteria for AKI. After initial 30 mL/kg fluids, persistent oliguria signals possible refractory shock — escalate for senior review, repeat bloods, lactate, and consideration of vasopressors and HDU/ICU admission. Fluid challenge may still be appropriate but only as part of a senior-led plan to avoid fluid overload.',
distractors:{
  A:'Persistent oliguria after fluid resuscitation requires escalation, not continued observation',
  B:'Stopping all IV fluids in shock is dangerous and inappropriate',
  D:'A single 500 mL bolus is inadequate for ongoing septic shock',
  E:'Catheterising without escalation misses the AKI diagnosis'
},
pearl:'Urine output <0.5 mL/kg/hr for 6 hours = AKI Stage 1 (KDIGO) — escalate, reassess fluid status, consider vasopressors and HDU.',
references:[
{label:'KDIGO 2012 AKI Guideline',url:'https://kdigo.org/guidelines/acute-kidney-injury/'}
]
},
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Septic shock recognition',
stem:'Which combination most strongly suggests septic shock?',
options:[
'NEWS2 of 4 with normal lactate',
'Persistent hypotension requiring vasopressors to maintain MAP ≥65 mmHg AND lactate >2 mmol/L despite adequate fluid resuscitation',
'Tachycardia alone',
'Single high temperature with normal blood pressure',
'WCC of 14 with normal observations'
],correct:'B',
explanation:'Sepsis-3 defines septic shock as sepsis with persisting hypotension requiring vasopressors to maintain MAP ≥65 mmHg AND a serum lactate >2 mmol/L despite adequate volume resuscitation. Hospital mortality is >40%. Recognition triggers immediate critical care involvement.',
distractors:{
  A:'NEWS2 of 4 with normal lactate does not meet septic shock criteria',
  C:'Tachycardia alone is non-specific',
  D:'A high temperature without hypotension is not shock',
  E:'Raised WCC without haemodynamic compromise is not shock'
},
pearl:'Septic shock = persisting hypotension requiring vasopressors AND lactate >2 despite resuscitation. Mortality >40%.',
references:[
{label:'Sepsis-3 (JAMA, 2016)',url:'https://jamanetwork.com/journals/jama/fullarticle/2492881'}
]
},
{
section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Frequency of observations',
stem:'A patient with a NEWS2 of 7 is being managed with the Sepsis 6 in progress. What minimum frequency of observations does the RCP NEWS2 protocol recommend?',
options:[
'Every 4 hours','Every 2 hours','Every hour','Continuous monitoring','Once a shift'
],correct:'D',
explanation:'A NEWS2 ≥7 mandates continuous monitoring of vital signs (or as a minimum, very frequent — usually every 15 minutes — observations) and emergency review by a clinical team competent in critical care. Score 5–6 → at least hourly; 1–4 → 4–6 hourly; 0 → 12-hourly minimum.',
distractors:{
  A:'4-hourly is appropriate for NEWS2 1–4, not ≥7',
  B:'2-hourly is inadequate for the highest-risk threshold',
  C:'Hourly is the minimum for NEWS2 5–6',
  E:'Once-a-shift observations miss rapid deterioration'
},
pearl:'NEWS2 ≥7 demands continuous monitoring (or as a minimum, every 15 min) plus emergency review by critical care–competent clinicians.',
references:[
{label:'RCP NEWS2 monitoring frequencies',url:'https://www.rcp.ac.uk/improving-care/resources/national-early-warning-score-news-2/'}
]
},

// ─── ABCDE & RESUSCITATION (8) ────────────────────────────────────
{
section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Collapsed patient sequence',
stem:'You walk into a side-room and find a 60-year-old patient unresponsive on the floor. You have already shouted for help.',
options:[
'Move the patient back to bed first',
'Open the airway with a head-tilt/chin-lift and check for normal breathing for up to 10 seconds',
'Begin chest compressions immediately without checking for breathing',
'Check a pulse for 1 minute',
'Place the patient in the recovery position and wait for help'
],correct:'B',
explanation:'Resuscitation Council UK in-hospital algorithm: ensure safety, check for response, shout for help, open airway, look-listen-feel for normal breathing for no more than 10 seconds. Agonal/abnormal breathing must be treated as cardiac arrest. If not breathing normally, call the resus team (2222) and start chest compressions at a rate of 100–120/min. Pulse-checking alone by ward staff is unreliable and adds delay.',
distractors:{
  A:'Moving the patient delays airway and breathing assessment',
  C:'Compressions before checking breathing risk being inappropriate if the patient is breathing',
  D:'Pulse-checking by ward staff is unreliable and delays CPR if needed',
  E:'Recovery position is for breathing patients, not those with abnormal breathing'
},
pearl:'Look-listen-feel for normal breathing for ≤10 seconds. Agonal breathing = cardiac arrest — start CPR immediately.',
references:[
{label:'Resus Council UK — In-hospital resuscitation guidelines',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-advanced-life-support-guidelines'}
]
},
{
section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Stridor',
stem:'A 45-year-old man post-extubation has a high-pitched inspiratory noise, anxious facies, and falling SpO2.',
options:[
'Wheeze indicating bronchospasm',
'Pleural rub','Stridor — partial upper airway obstruction; this is an A-problem and a peri-arrest emergency',
'Crackles consistent with pulmonary oedema',
'Bowel sounds in the chest'
],correct:'C',
explanation:'Stridor is a high-pitched, mainly inspiratory sound caused by partial upper airway obstruction (laryngeal oedema, foreign body, epiglottitis, anaphylaxis, post-extubation oedema). It is an immediate "A" problem in ABCDE and a peri-arrest emergency: call 2222 and anaesthetics, give high-flow oxygen, sit the patient upright, and prepare for nebulised adrenaline if anaphylaxis is suspected. Wheeze is the lower-airway counterpart.',
distractors:{
  A:'Wheeze is expiratory and indicates lower airway obstruction',
  B:'Pleural rub is a creaking sound, not high-pitched inspiratory',
  D:'Crackles are fine sounds heard with pulmonary oedema, not obstruction',
  E:'Bowel sounds in the chest suggest diaphragmatic hernia, not airway obstruction'
},
pearl:'Stridor = upper airway obstruction = peri-arrest emergency. Call 2222 and anaesthetics, sit upright, high-flow oxygen.',
references:[
{label:'Resus Council UK — Adult ALS, Airway',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'}
]
},
{
section:'abcde',specialty:'ABCDE & Resuscitation',topic:'CPR ratio adult',
stem:'In adult basic life support during in-hospital cardiac arrest, what is the recommended chest compression to ventilation ratio when no advanced airway is in place?',
options:['15:2','30:2','5:1','10:2','Continuous compressions only'],correct:'B',
explanation:'In adult BLS without an advanced airway, the ratio is 30 compressions to 2 ventilations, at a depth of 5–6 cm and a rate of 100–120/min. Once a supraglottic device or ETT is in place, compressions are continuous (≥100/min) and ventilations are at 10/min. Allowing full chest recoil and minimising pauses are critical to outcomes.',
distractors:{
  A:'15:2 is the paediatric ratio when two rescuers are present',
  C:'5:1 is a historical paediatric infant ratio, not adult',
  D:'10:2 is not a recognised UK ratio',
  E:'Continuous compressions apply only after an advanced airway is in place'
},
pearl:'Adult BLS without advanced airway: 30:2 at 100–120/min, depth 5–6 cm, full chest recoil, minimal pauses.',
references:[
{label:'Resus Council UK — Adult BLS',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-basic-life-support-guidelines'}
]
},
{
section:'abcde',specialty:'ABCDE & Resuscitation',topic:'AED rhythm shockable',
stem:'During a witnessed in-hospital cardiac arrest you attach an AED, which advises "shock advised". Which two rhythms is this most likely to represent?',
options:[
'Asystole or PEA',
'Ventricular fibrillation or pulseless ventricular tachycardia',
'Sinus bradycardia or AV block',
'Atrial fibrillation or atrial flutter',
'Wenckebach or Mobitz type II'
],correct:'B',
explanation:'Shockable rhythms in cardiac arrest are VF and pulseless VT. Defibrillation is the only definitive treatment and the chance of ROSC falls ~10% with every minute of delay. Asystole and PEA are non-shockable: focus on high-quality CPR, IV adrenaline 1 mg every 3–5 min, and reversible cause assessment (4Hs and 4Ts).',
distractors:{
  A:'Asystole and PEA are non-shockable rhythms',
  C:'Sinus bradycardia and AV block are managed with atropine/pacing, not defibrillation',
  D:'AF and atrial flutter are usually rate-controlled, not shocked emergently',
  E:'Wenckebach and Mobitz II are heart blocks, treated by pacing not defibrillation'
},
pearl:'Shockable rhythms = VF + pulseless VT. Every minute of delay reduces ROSC by ~10%.',
references:[
{label:'Resus Council UK ALS algorithm',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'}
]
},
{
section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Choking adult',
stem:'A 60-year-old man at the dinner table grabs his neck, cannot speak or cough effectively, and is going blue.',
options:[
'Reassure and observe',
'Give 5 firm back-blows between the scapulae; if unsuccessful, give 5 abdominal thrusts',
'Lay him flat and check airway with a finger sweep first',
'Start chest compressions immediately',
'Give him a glass of water'
],correct:'B',
explanation:'Severe (effective cough absent) choking in a conscious adult: 5 back-blows between the scapulae, then 5 abdominal thrusts (Heimlich), alternating until the obstruction clears or the person becomes unresponsive. If unconscious, lower carefully, call resus team and start CPR — chest compressions can dislodge the obstruction. Blind finger-sweeps are not recommended.',
distractors:{
  A:'Reassurance and observation in severe choking risks death',
  C:'Lying flat impairs the cough mechanism; finger sweeps may push obstruction further',
  D:'Compressions are reserved for the unconscious choking adult',
  E:'Drinking water in airway obstruction risks aspiration and worsens hypoxia'
},
pearl:'Severe conscious choking: 5 back blows → 5 abdominal thrusts, alternating. If unconscious → CPR (compressions can dislodge obstruction).',
references:[
{label:'Resus Council UK — Choking',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-basic-life-support-guidelines'}
]
},
{
section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Recovery position',
stem:'An unresponsive patient is breathing normally with no spinal injury concerns. Which is the most appropriate immediate action?',
options:[
'Leave supine and wait for the medical team',
'Place in the recovery position, monitor airway and breathing, and call the resus team',
'Start CPR',
'Sit them up to 90°',
'Give high-flow oxygen and leave alone'
],correct:'B',
explanation:'An unresponsive but normally breathing patient is at risk of airway compromise (tongue, secretions, vomit). The recovery position maintains an open airway and allows secretions to drain. Continuous airway and breathing monitoring is required, and the resus or critical care team must still be called as the underlying cause needs urgent assessment. Spinal precautions are added if any concern.',
distractors:{
  A:'Supine position risks aspiration and airway obstruction by the tongue',
  C:'CPR is for absent or abnormal breathing, not normal breathing',
  D:'Sitting upright is inappropriate for unresponsive patients',
  E:'Oxygen alone without airway protection is insufficient'
},
pearl:'Unresponsive but breathing normally = recovery position + monitor + escalate. Cause still needs urgent assessment.',
references:[
{label:'Resus Council UK — Adult BLS',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'}
]
},
{
section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Reversible causes',
stem:'During an in-hospital cardiac arrest the team is reviewing reversible causes. Which list correctly summarises the "4 Hs"?',
options:[
'Hypoxia, Hypovolaemia, Hyper/hypokalaemia (and metabolic), Hypothermia',
'Hypotension, Hypoglycaemia, Hypercapnia, Hypothermia',
'Hyperthermia, Hypoglycaemia, Hyperkalaemia, Heart attack',
'Hypoxia, Heart failure, Hyperkalaemia, Hypotension',
'Hypovolaemia, Heart attack, Hyperkalaemia, Hypotension'
],correct:'A',
explanation:'The 4 Hs: Hypoxia, Hypovolaemia, Hyper/hypokalaemia (and other metabolic — calcium, acidosis), Hypothermia. The 4 Ts: Thrombosis (coronary or pulmonary), Tension pneumothorax, Tamponade, Toxins. These should be actively considered and corrected during ALS.',
distractors:{
  B:'Hypotension is a sign, not a cause; hypoglycaemia and hypercapnia are not in the 4Hs',
  C:'Hyperthermia is in the 4Hs but heart attack belongs in the 4Ts',
  D:'Heart failure is not in the standard 4Hs',
  E:'Hypotension is not in the 4Hs; heart attack belongs to 4Ts'
},
pearl:'4Hs: Hypoxia, Hypovolaemia, Hyper/hypokalaemia (and metabolic), Hypothermia. 4Ts: Thrombosis, Tamponade, Tension pneumothorax, Toxins.',
references:[
{label:'Resus Council UK — ALS reversible causes',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'}
]
},
{
section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Post-ROSC care',
stem:'Following return of spontaneous circulation (ROSC) after a witnessed cardiac arrest, which initial management priority is most appropriate?',
options:[
'Discharge the patient to a general bed',
'12-lead ECG, ABG, ABCDE re-assessment, controlled oxygenation (target SpO2 94–98%), avoid hyperthermia, and urgent critical care transfer',
'Give 100% oxygen indefinitely',
'Cool aggressively to 28°C',
'Give a further 1 mg adrenaline routinely'
],correct:'B',
explanation:'Post-ROSC priorities: protect the airway, achieve normoxia (avoid both hypoxia and hyperoxia — target SpO2 94–98%), get a 12-lead ECG looking for STEMI, ABG for ventilation/acid-base, ABCDE reassessment, transfer to critical care, targeted temperature management (32–36°C, avoiding hyperthermia), and address the underlying cause. Hyperoxia worsens neurological outcomes.',
distractors:{
  A:'Discharging post-ROSC patients to a general bed misses ongoing critical care needs',
  C:'100% oxygen indefinitely causes hyperoxia and worsens neurological outcomes',
  D:'Aggressive cooling to 28°C exceeds the targeted 32–36°C window',
  E:'Routine adrenaline post-ROSC is not indicated'
},
pearl:'Post-ROSC: target SpO₂ 94–98%, 12-lead ECG, ABG, TTM 32–36°C avoiding hyperthermia, urgent ICU and PCI if STEMI.',
references:[
{label:'Resus Council UK — Post-resuscitation care',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/post-resuscitation-care-guidelines'}
]
},

// ─── CARDIOLOGY (10) ──────────────────────────────────────────────
{
section:'cardio',specialty:'Cardiology',topic:'Suspected ACS',
stem:'A 64-year-old man on AMU complains of central crushing chest pain radiating to the jaw, with nausea and sweating. Observations are stable but he looks unwell.',
options:[
'Give paracetamol and reassure him',
'Sit him up; oxygen only if SpO2 <94%; 12-lead ECG within 10 minutes; aspirin 300 mg if no contraindication; analgesia; urgent medical review',
'Lay him flat and give 15 L/min oxygen',
'Send urgent troponin and review in 1 hour',
'Give GTN and continue routine monitoring'
],correct:'B',
explanation:'Suspected ACS pathway: 12-lead ECG within 10 minutes is the priority to identify STEMI. Position upright, target oxygen only if SpO2 <94% (routine high-flow O2 worsens outcomes — DETO2X-AMI), aspirin 300 mg chewable, GTN if SBP allows, opioid analgesia (e.g. morphine + antiemetic), and urgent senior review. Troponin alone delays treatment.',
distractors:{
  A:'Paracetamol does not treat ischaemia; reassurance delays time-critical management',
  C:'Routine high-flow oxygen worsens outcomes (DETO2X-AMI) unless SpO₂ <94%',
  D:'Troponin alone delays the time-critical 12-lead ECG',
  E:'GTN without ECG misses STEMI; routine monitoring delays primary PCI activation'
},
pearl:'Suspected ACS: 12-lead ECG within 10 minutes is the priority. Aspirin 300 mg, GTN if BP allows, opioid analgesia.',
references:[
{label:'NICE NG185 — Acute coronary syndromes',url:'https://www.nice.org.uk/guidance/ng185'},
{label:'BTS oxygen guideline 2017',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/emergency-oxygen/'}
]
},
{
section:'cardio',specialty:'Cardiology',topic:'New-onset AF',
imageUrl:'https://upload.wikimedia.org/wikipedia/commons/4/47/Afib_ecg_(CardioNetworks_ECGpedia).jpg',
imageAlt:'12-lead ECG showing atrial fibrillation: irregularly irregular ventricular response with absent P waves',
stem:'A 78-year-old woman has new-onset AF, HR 145 bpm. She is alert, BP 135/80, no chest pain, no signs of heart failure. The 12-lead ECG is shown.',
options:[
'Prepare for immediate DC cardioversion',
'Start CPR',
'Perform a 12-lead ECG and escalate to the medical team for rate control assessment',
'Give IV adenosine',
'Reassure and re-check in 4 hours'
],correct:'C',
explanation:'Stable new-onset AF without adverse features (shock, syncope, chest pain, severe heart failure) requires confirmation with a 12-lead ECG and prompt medical review for rate control (beta-blocker or rate-limiting CCB), assessment of duration (governs cardioversion choice), and decision on anticoagulation using CHA2DS2-VASc. Adenosine is for SVT, not AF. Immediate DC cardioversion is reserved for haemodynamic instability.',
distractors:{
  A:'DC cardioversion is reserved for haemodynamically unstable AF',
  B:'CPR is inappropriate in a stable, alert patient',
  D:'Adenosine is for SVT, not AF; it briefly unmasks underlying rhythm',
  E:'Rechecking in 4 hours delays rate control and stroke risk assessment'
},
pearl:'Stable new-onset AF: 12-lead ECG → rate control (β-blocker or rate-limiting CCB) → anticoagulation per CHA₂DS₂-VASc.',
references:[
{label:'NICE NG196 — Atrial fibrillation: diagnosis and management',url:'https://www.nice.org.uk/guidance/ng196'}
]
},
{
section:'cardio',specialty:'Cardiology',topic:'Bradycardia with adverse features',
stem:'A patient has HR 38 bpm, SBP 78 mmHg, and complains of feeling faint. Which is the appropriate first-line drug?',
options:[
'IV amiodarone 300 mg',
'IV atropine 500 micrograms (repeat to a maximum of 3 mg) and call the resus team',
'IV adenosine 6 mg',
'IV adrenaline 1 mg',
'Oral metoprolol'
],correct:'B',
explanation:'Bradycardia with adverse features (shock, syncope, myocardial ischaemia, heart failure) per Resus Council UK adult bradycardia algorithm: IV atropine 500 micrograms, repeated to a max of 3 mg total. If atropine fails, consider transcutaneous pacing or an isoprenaline/adrenaline infusion, and arrange transvenous pacing. Recognise this is a peri-arrest emergency.',
distractors:{
  A:'Amiodarone is for tachyarrhythmias, not symptomatic bradycardia',
  C:'Adenosine is for SVT, not bradycardia',

{
section:'cardio',specialty:'Cardiology',topic:'SVT vagal manoeuvres',
stem:'A 30-year-old presents with palpitations and a regular narrow-complex tachycardia at 180 bpm; she is haemodynamically stable. Which is the appropriate first-line manoeuvre?',
options:[

'Carotid sinus massage in any patient',
'Modified Valsalva manoeuvre (semi-recumbent then supine with leg-raise)',
'IV amiodarone',
'Oral bisoprolol'
],correct:'C',
explanation:'In stable SVT, vagal manoeuvres are first-line. The modified (REVERT-trial) Valsalva — exhale against a closed glottis at 40 mmHg for 15 s while semi-recumbent, then immediately laid flat with passive leg-raise — converts ~43% of cases vs 17% with the standard manoeuvre. If unsuccessful, IV adenosine 6 mg → 12 mg → 18 mg via a large-bore antecubital line, with continuous ECG, is next. Carotid massage is avoided in elderly patients and those with bruits.',

},

{
section:'cardio',specialty:'Cardiology',topic:'Acute pulmonary oedema',
imageUrl:'https://upload.wikimedia.org/wikipedia/commons/5/5f/Chest_radiograph_with_signs_of_congestive_heart_failure_-_annotated.jpg',

{
section:'cardio',specialty:'Cardiology',topic:'GTN administration',
stem:'A patient with chest pain has SBP 92 mmHg. The doctor prescribes sublingual GTN. Which is the most appropriate nursing action?',

explanation:'GTN is generally avoided when SBP <90 mmHg because of the risk of severe hypotension; it is also contraindicated in suspected RV infarction (inferior STEMI with RV involvement) and recent phosphodiesterase-5 inhibitor use (sildenafil within 24 h, tadalafil within 48 h). Always check BP before administration and reassess afterwards.',

},
{
section:'cardio',specialty:'Cardiology',topic:'STEMI vs NSTEMI',
imageUrl:'https://upload.wikimedia.org/wikipedia/commons/c/c8/De-Anteroseptal_Myokardinfarkt.png',
imageAlt:'12-lead ECG showing anteroseptal ST-elevation myocardial infarction: marked ST elevation in V1-V4',
stem:'Which ECG finding (such as the example shown) indicates a STEMI requiring primary PCI activation?',
options:[

],correct:'B',
explanation:'STEMI criteria: ST elevation ≥1 mm in two contiguous limb leads (or ≥2 mm in V2–V3, ≥1.5 mm in women), new LBBB with clinical features of MI, or true posterior MI (ST depression V1–V3 with ST elevation in posterior leads). Activation of the primary PCI pathway should be immediate — door-to-balloon target <90 minutes. NSTEMIs lack ST elevation but show troponin rise + ischaemic changes (T-inversion, ST depression).',

  D:'RBBB alone is not a STEMI equivalent',
  E:'PR prolongation (1° heart block) is not ischaemic'
},

{label:'Fourth Universal Definition of MI (2018)',url:'https://academic.oup.com/eurheartj/article/40/3/237/5079081'}
]
},
{
section:'cardio',specialty:'Cardiology',topic:'AF anticoagulation',
stem:'A 76-year-old woman with AF, hypertension, and previous TIA is being considered for anticoagulation. Her CHA2DS2-VASc is 5.',

explanation:'AF with CHA2DS2-VASc ≥2 in women (or ≥1 in men) → anticoagulation indicated to reduce stroke risk. NICE NG196 recommends a DOAC first line (apixaban, rivaroxaban, edoxaban, dabigatran) unless contraindicated. Aspirin is not effective AF stroke prophylaxis. Bleeding risk should be assessed using ORBIT (replacing HAS-BLED in NICE 2021 guidance) but is not, on its own, a reason to avoid anticoagulation.',

{label:'NICE NG196',url:'https://www.nice.org.uk/guidance/ng196'}
]
},
{

stem:'A patient becomes unresponsive on the monitor; the rhythm strip shows a wide-complex tachycardia at 220 bpm with no carotid pulse.',

'Vagal manoeuvres'

explanation:'Pulseless VT is a shockable cardiac arrest rhythm. Start CPR immediately, call the resus team, and defibrillate (unsynchronised, 150–200 J biphasic) as soon as possible. IV adrenaline 1 mg every 3–5 min, amiodarone 300 mg after the third shock, and active reversible-cause assessment (4Hs and 4Ts) follow. Synchronised cardioversion is for unstable but pulse-present tachyarrhythmias.',

},
pearl:'Pulseless VT = shockable cardiac arrest. CPR, unsynchronised defibrillation, adrenaline 1 mg q3–5 min, amiodarone 300 mg after 3rd shock.',

]
},
{
section:'cardio',specialty:'Cardiology',topic:'Hypertensive emergency',
stem:'A patient has BP 220/130 mmHg, headache, and new visual disturbance. What is this best described as?',
options:[

'White-coat hypertension',
'Anxiety-related — give diazepam'
],correct:'B',
explanation:'Hypertensive emergency = severely raised BP (typically >180/120) with end-organ damage (encephalopathy, AKI, retinal haemorrhage, papilloedema, pulmonary oedema, aortic dissection, acute MI/stroke). Needs immediate controlled BP reduction with IV agent (labetalol, GTN, sodium nitroprusside) in a monitored area; aim for ~25% reduction in MAP over the first hour. Hypertensive urgency = high BP without end-organ damage and is managed orally.',
distractors:{
  A:'Outpatient management is for hypertensive urgency without end-organ damage',

},
pearl:'Hypertensive emergency = severely raised BP + end-organ damage. Aim ~25% MAP reduction in the first hour with IV labetalol/GTN.',
references:[
{label:'NICE NG136 — Hypertension',url:'https://www.nice.org.uk/guidance/ng136'}
]
},

{

},
{

stem:'A 24-year-old woman with asthma has RR 32, HR 122, SpO2 90% on air, PEF 35% predicted, unable to complete sentences.',

],correct:'C',
explanation:'BTS/SIGN: acute severe asthma = any of PEF 33–50% predicted, RR ≥25, HR ≥110, inability to complete sentences in one breath. Life-threatening features: PEF <33%, SpO2 <92%, silent chest, cyanosis, exhaustion, altered consciousness, arrhythmia, hypotension. Near-fatal = raised PaCO2 and/or need for ventilation. Treatment: oxygen to target, back-to-back salbutamol nebs (5 mg) with ipratropium 0.5 mg, oral or IV steroid, and senior review with consideration of IV magnesium sulphate.',

]
},
{
section:'resp',specialty:'Respiratory',topic:'Pulmonary embolism',
stem:'A 30-year-old woman presents with sudden pleuritic chest pain and breathlessness 5 days after a long-haul flight. HR 118, RR 24, SpO2 92%, BP 115/70.',
options:['Pneumothorax','Pulmonary embolism','Pneumonia','MSK pain','Pericarditis'],correct:'B',
explanation:'Sudden pleuritic pain, breathlessness, tachycardia and hypoxia with a clear risk factor (immobility on a long-haul flight) are classic for PE. Initial nursing actions: oxygen if SpO2 <94%, IV access, ECG (sinus tachycardia commonest; S1Q3T3 in <15%), bloods, calculate Wells/Geneva score, and arrange CTPA. Empirical anticoagulation (LMWH or DOAC) should not be delayed if clinical probability is high.',

  C:'Pneumonia typically presents with fever, productive cough, focal crackles',

  E:'Pericarditis causes positional pleuritic pain with diffuse ST changes'
},

{
section:'resp',specialty:'Respiratory',topic:'Tension pneumothorax',
imageUrl:'https://upload.wikimedia.org/wikipedia/commons/e/ea/Pneumothorax_hemothorax_pneumomediastinum_contusion.JPG',
imageAlt:'Chest radiograph showing a large right-sided pneumothorax with absent lung markings and visible visceral pleural edge',

explanation:'Tension pneumothorax is a clinical diagnosis — not radiological — and is immediately life-threatening because intrathoracic pressure compresses the great vessels and contralateral lung. Treatment is immediate needle thoracocentesis followed by formal chest drain. The 4th–5th ICS in the anterior axillary line ("safe triangle") is now preferred over the classic 2nd ICS site as adult chest walls are thicker than the standard cannula length.',

},

},
{
section:'resp',specialty:'Respiratory',topic:'NIV indications',
stem:'A patient with COPD has an ABG showing pH 7.28, PaCO2 9.2, PaO2 7.1 on 28% Venturi, having been on optimum medical therapy for 1 hour.',

explanation:'Persistent acute hypercapnic respiratory failure (pH <7.35, PaCO2 >6.5) in COPD despite optimal medical therapy and controlled oxygen for 1 hour is a clear indication for NIV (BiPAP). Initial settings often EPAP 5, IPAP 10–15. Critical care should be involved early in case of NIV failure (no improvement in pH/PaCO2 after 1–2 hours = consider intubation). Increasing FiO2 alone risks worsening hypercapnia.',

]

section:'resp',specialty:'Respiratory',topic:'Type 1 vs Type 2 RF',
stem:'Which ABG pattern best fits Type 2 (hypercapnic) respiratory failure?',

'PaO2 11, PaCO2 6.4, pH 7.42'

pearl:'T1 RF: PaO₂ <8, PaCO₂ normal/low (V/Q mismatch). T2 RF: PaO₂ <8 AND PaCO₂ >6 (ventilatory failure).',

]
},
{
section:'resp',specialty:'Respiratory',topic:'Pneumonia severity',
imageUrl:'https://upload.wikimedia.org/wikipedia/commons/3/30/Pneumonia_of_Right_Lung_Middle_Lobe.jpg',
imageAlt:'Chest radiograph showing right middle lobe pneumonia with consolidation',

explanation:'CURB-65 awards 1 point each for: Confusion, Urea >7, RR ≥30, low BP (SBP <90 or DBP ≤60), age ≥65. This patient scores 5 (all features). 0–1 home if appropriate; 2 short-stay; 3+ severe with consideration of ICU especially when ≥4. 30-day mortality rises from <1% (0) to >40% (5). Combine with clinical judgement — older or frail patients warrant more cautious admission decisions.',

{
section:'resp',specialty:'Respiratory',topic:'Suctioning',
stem:'A patient with reduced consciousness has copious oral secretions causing gurgling. Which is the safest first nursing action?',
options:[

{

stem:'When prescribing oxygen for a patient who is not at risk of hypercapnic respiratory failure, what is the correct target SpO2 range?',

explanation:'For most acutely unwell adults not at risk of T2 RF, target SpO2 94–98% per BTS. Hyperoxia is harmful — increased mortality post-MI, post-stroke, and in critically ill patients. Patients at risk of hypercapnia (COPD, OSA, NMD, morbid obesity, kyphoscoliosis, cystic fibrosis) → target 88–92% with controlled delivery (Venturi 24–28%) and early ABG.',

{

stem:'A patient with asthma has a personal best PEF of 500 L/min. Today\'s PEF is 200 L/min. What does this represent and how is severity classified?',

{
section:'endo',specialty:'Endocrine',topic:'DKA priorities',
stem:'A 19-year-old with T1DM is admitted vomiting. Capillary glucose 28, blood ketones 4.8 mmol/L, venous pH 7.18, HCO3 12.',
options:[
'Start fixed-rate insulin before any fluids',
'Give 1 L 0.9% sodium chloride IV over 1 hour',
'Give IV potassium replacement immediately as a bolus',
'Give IV bicarbonate',
'Start oral rehydration'
],correct:'B',
explanation:'JBDS DKA pathway: Step 1 is rapid IV crystalloid (1 L 0.9% NaCl over the first hour, faster if shocked). Fixed-rate IV insulin (FRIII) at 0.1 units/kg/hr starts shortly after, with K+ added once known and <5.5 (K+ falls rapidly with insulin). Routine bicarbonate is not recommended. 10% glucose is added once capillary glucose <14 to allow continued insulin to clear ketones.',
distractors:{
  A:'Insulin without prior fluid resuscitation worsens shock and risks hypokalaemia',

{
section:'endo',specialty:'Endocrine',topic:'Hypoglycaemia conscious',
stem:'A patient on insulin is alert, sweating, with capillary glucose 3.0 mmol/L. They can swallow safely.',

'Wait until next mealtime',
'Stop all insulin permanently'
],correct:'A',
explanation:'JBDS hypoglycaemia pathway, conscious adult who can swallow: 15–20 g fast-acting CHO (e.g. 150 mL fruit juice, 4–5 GlucoTabs, 5–7 dextrose tablets, 1 small glass of Lucozade Energy). Recheck capillary glucose at 15 min and repeat up to 3 times if still <4. Once >4, give long-acting CHO (sandwich, biscuits) to prevent recurrence. Don\'t omit prescribed insulin — review the regimen and identify the cause.',

{
section:'endo',specialty:'Endocrine',topic:'Hypoglycaemia unconscious',
stem:'A patient on a sulfonylurea is found unconscious with capillary glucose 2.1 mmol/L. They cannot safely swallow. IV access is in place.',
options:[

'50 mL of 50% glucose IV',
'IM hydrocortisone',

explanation:'JBDS guidance, severe hypoglycaemia in an unconscious adult or one unable to swallow: 100–200 mL 10% glucose IV over 10–15 min, OR 75–100 mL 20%. 50% glucose is no longer recommended (extravasation/tissue damage risk). IM glucagon is an alternative without IV access but is less effective in malnourished, alcohol-dependent, or sulfonylurea-poisoned patients. Recheck glucose at 10 min and review cause; sulfonylurea hypoglycaemia is prolonged and may require glucose infusion or octreotide.',

]
},
{
section:'endo',specialty:'Endocrine',topic:'HHS recognition',
stem:'A 78-year-old with newly diagnosed T2DM is admitted dehydrated, drowsy, with glucose 48 mmol/L, osmolality 340 mosmol/kg, pH 7.36, ketones 0.8 mmol/L.',
options:[
'DKA','Hyperosmolar Hyperglycaemic State (HHS)','Stroke','Sepsis without hyperglycaemia','Lactic acidosis'
],correct:'B',
explanation:'HHS: marked hyperglycaemia (often >30), serum osmolality ≥320, severe hypovolaemia, and the absence of significant ketosis/acidosis (distinguishing it from DKA). Develops over days. Management is slower and gentler than DKA — gradual fluid replacement (target volume restoration over 24–48 h), low-dose insulin only after fluids are running and glucose is no longer falling on saline alone, careful K+ replacement, VTE prophylaxis (high thrombotic risk), and treat the precipitant.',
distractors:{
  A:'DKA has significant ketosis (>3) and acidosis (pH <7.3); this patient has neither',
  C:'Stroke is unlikely with this metabolic picture',
  D:'Sepsis without hyperglycaemia does not explain the osmolality',
  E:'Lactic acidosis would show pH abnormality and raised lactate'
},
pearl:'HHS: glucose >30, osmolality ≥320, no significant ketosis/acidosis. Slower fluids than DKA, low-dose insulin only after fluids, high VTE risk.',
references:[
{label:'JBDS — Management of HHS in adults',url:'https://abcd.care/jbds-guidelines'}
]
},
{
section:'endo',specialty:'Endocrine',topic:'Adrenal crisis',
stem:'A patient with known Addison\'s disease is admitted with vomiting, hypotension (BP 78/40), hyponatraemia and hyperkalaemia.',
options:[

'IV bicarbonate'

explanation:'Adrenal crisis is a medical emergency. Treatment is immediate IV hydrocortisone 100 mg, IV 0.9% saline 1 L over 1 hour (further fluids guided by haemodynamics), glucose if hypoglycaemic, and identification/treatment of the precipitant (commonly infection, missed steroid dose, surgery). Don\'t delay treatment for cortisol/ACTH measurement — take samples but treat empirically.',

{
section:'endo',specialty:'Endocrine',topic:'Sliding scale insulin (VRIII)',
stem:'A patient on a Variable Rate IV Insulin Infusion (VRIII) has a capillary glucose of 3.8 mmol/L. What is the most appropriate nursing action?',
options:[
'Continue the VRIII unchanged',
'Stop only the long-acting subcutaneous insulin',
'Follow trust hypoglycaemia protocol; check infusion fluid (should be 0.9% NaCl + 10% glucose if glucose <14 or per local), and adjust insulin per the prescribed sliding scale; recheck glucose in 15 min',
'Increase the insulin infusion',
'Stop all fluids'
],correct:'C',
explanation:'On a VRIII, glucose <4 should never be tolerated. Follow the local hypoglycaemia algorithm, ensure the substrate fluid is appropriate (often 0.9% NaCl with KCl, plus 10% glucose if glucose <14), reduce/pause the insulin per the sliding scale rules, recheck capillary glucose at 15 min, and document. Importantly, basal subcutaneous insulin should usually be continued alongside VRIII to prevent rebound DKA when stopping.',

{label:'JBDS — Use of VRIII in hospital',url:'https://abcd.care/jbds-guidelines'}
]
},
{
section:'endo',specialty:'Endocrine',topic:'Capillary glucose accuracy',
stem:'Which factor is MOST likely to give a falsely low capillary blood glucose reading?',
options:[
'Recently eating',
'Severe peripheral hypoperfusion (e.g. shock, very cold hands)',
'Sterile finger before testing',
'Adequate sample volume',
'Calibrated meter'
],correct:'B',
explanation:'Severe peripheral hypoperfusion (shock, hypothermia, peripheral vasoconstriction) causes capillary readings to diverge significantly from arterial/venous values, often falsely low. Always confirm low or unexpected values with a venous lab glucose, and never rely on a peripheral capillary glucose alone in a critically unwell patient. Other sources of error: contamination with sugary substances on skin, expired strips, inadequate sample volume (usually flagged as error), inappropriate site.',
distractors:{
  A:'Recent eating raises glucose, not falsely low',
  C:'Sterile finger does not affect reading',
  D:'Adequate sample volume gives accurate readings',
  E:'A calibrated meter is more, not less, accurate'
},
pearl:'Severe hypoperfusion → unreliable capillary glucose. Always confirm with venous lab in critically ill.',
references:[
{label:'MHRA — Glucose monitoring devices safety',url:'https://www.gov.uk/government/publications/devices-in-practice-checklists-for-using-medical-devices'}
]
},
{
section:'endo',specialty:'Endocrine',topic:'Thyroid storm',
stem:'A patient with known hyperthyroidism is admitted febrile (39.6°C), AF with HR 165, agitated, with vomiting and diarrhoea, after stopping carbimazole 2 weeks ago.',
options:[
'Reassure and discharge',
'Treat as thyroid storm: ABCDE, IV fluids, propranolol (or rate-control alternative), high-dose propylthiouracil/carbimazole, Lugol\'s iodine (after antithyroid drug), hydrocortisone, treat precipitant; admit to HDU/ICU',
'Give thyroxine',
'IV adrenaline',
'IV insulin'
],correct:'B',
explanation:'Thyroid storm has a high mortality. Triggers: stopping antithyroid drugs, infection, surgery, iodine load, trauma, parturition. Multi-pronged treatment: beta-blockade (propranolol IV or PO) for adrenergic features, antithyroid drug (PTU or carbimazole) to block synthesis, iodine (after antithyroid drug, Lugol\'s solution) to block release, hydrocortisone (blocks T4→T3 conversion and treats co-existing adrenal insufficiency), supportive care (cooling, fluids, treat AF), and identify/treat precipitant. Critical care input mandatory.',
distractors:{
  A:'Discharge in thyroid storm misses high mortality',
  C:'Thyroxine worsens hyperthyroidism',
  D:'IV adrenaline exacerbates adrenergic features',
  E:'Insulin does not address hyperthyroidism'
},
pearl:'Thyroid storm: β-blocker + antithyroid (PTU/carbimazole) + iodine (after antithyroid) + hydrocortisone + supportive care. ICU mandatory.',
references:[
{label:'BTA — Hyperthyroidism guideline',url:'https://www.british-thyroid-association.org/'}
]
},

{

],correct:'B',
explanation:'Acute stroke within the thrombolysis window (≤4.5 hours; up to 24 h for selected thrombectomy candidates) is time-critical. Immediate priorities: NBM until swallow assessment, urgent CT head, stroke team activation, capillary glucose, ECG, IV access. Aspirin 300 mg is given only AFTER haemorrhagic stroke is excluded on imaging. Position with head 30° unless reduced GCS or shock.',

},
{
section:'neuro',specialty:'Neurology',topic:'GCS calculation',
stem:'A patient opens eyes to voice, makes incomprehensible sounds, and localises to pain. What is the GCS?',
options:['8','9','10','13','15'],correct:'C',
explanation:'Eye opening to voice = E3. Verbal: incomprehensible sounds = V2. Motor: localises to pain = M5. Total = E3 + V2 + M5 = 10. Always document the components (E?V?M?) — a "GCS of 10" is less informative than "E3V2M5". A drop of 2 points or any drop in the motor score should prompt urgent reassessment. GCS ≤8 mandates immediate airway protection consideration.',
distractors:{
  A:'Score of 8 underweights motor response',
  B:'Score of 9 misses motor scoring',
  D:'Score of 13 over-counts; verbal score is only 2',
  E:'Score of 15 is full GCS — clearly not the case'
},

},
{
section:'neuro',specialty:'Neurology',topic:'Status epilepticus',
stem:'A patient has been seizing continuously for 6 minutes. What is the most appropriate next pharmacological step?',
options:[
'Wait 30 minutes before treating',
'Give IV/PR/buccal/IM benzodiazepine (e.g. lorazepam 4 mg IV, diazepam 10 mg PR/IV, or midazolam 10 mg buccal); ABCDE, glucose check, escalate',
'Give oral phenytoin',
'Give paracetamol',
'Restrain the patient'
],correct:'B',
explanation:'Status epilepticus = seizure ≥5 min, or recurrent seizures without recovery. Step 1: ABCDE, oxygen, capillary glucose, IV access. First-line: IV lorazepam 4 mg (or buccal midazolam 10 mg / diazepam 10 mg PR/IV if no IV access). If still seizing at 10 min: repeat benzodiazepine and call anaesthetics. Second-line: IV levetiracetam, phenytoin, or sodium valproate. Third-line: ICU and general anaesthesia (propofol/thiopentone). Don\'t restrain — protect from injury.',
distractors:{

  C:'Oral phenytoin is too slow; status needs IV second-line if benzo fails',

},

{label:'NICE NG217 — Epilepsies guideline',url:'https://www.nice.org.uk/guidance/ng217'}
]
},
{
section:'neuro',specialty:'Neurology',topic:'Delirium screening',
stem:'A 75-year-old admitted with pneumonia is now agitated, fluctuating attention, and disoriented (previously well-oriented). Which screening tool is most appropriate?',
options:[
'CHADS2','GCS','4AT (or CAM)','Wells','MEWS'
],correct:'C',
explanation:'4AT is recommended by NICE for rapid bedside delirium screening: Alertness, AMT4 (age, DOB, place, current year), Attention (months in reverse), Acute change/fluctuating course. Score ≥4 = possible delirium. CAM (Confusion Assessment Method) is an alternative. Once identified, manage TIME-DOC (Triggers/causes, Investigate, Manage symptoms, Engage and explore, Document/Communicate). Look for sepsis, drugs, urinary retention, constipation, pain, hypoxia, hypoglycaemia, electrolyte disturbance.',
distractors:{
  A:'CHADS₂ assesses AF stroke risk',
  B:'GCS measures conscious level, not delirium specifically',
  D:'Wells assesses VTE risk',
  E:'MEWS is an early-warning vital-signs score, not a delirium tool'
},
pearl:'4AT (Alertness, AMT4, Attention, Acute change/fluctuation) is the NICE-recommended bedside delirium screen. Score ≥4 = possible delirium.',
references:[
{label:'NICE CG103 — Delirium',url:'https://www.nice.org.uk/guidance/cg103'},
{label:'4AT — Rapid clinical test for delirium',url:'https://www.the4at.com/'}
]
},
{
section:'neuro',specialty:'Neurology',topic:'TIA',
stem:'A 65-year-old developed left-sided arm weakness lasting 30 minutes, now fully resolved. He has hypertension and atrial fibrillation.',
options:[
'Reassure and discharge with no follow-up',
'Give 300 mg aspirin (unless contraindicated) and refer to TIA clinic for assessment within 24 hours',
'Admit indefinitely',
'Give thrombolysis',
'Tell him to wait for symptoms to recur'
],correct:'B',
explanation:'TIA is a medical emergency: 10% of patients have a stroke within 7 days. NICE: 300 mg aspirin immediately (unless contraindicated), specialist TIA clinic assessment within 24 hours, secondary prevention (antiplatelet, statin, BP control, anticoagulation if AF). Patients with crescendo TIAs, AF (consider anticoagulation directly), or TIA on anticoagulant warrant admission. Don\'t delay aspirin pending imaging unless suspicion of haemorrhage is high.',
distractors:{
  A:'Discharge without follow-up misses high early stroke risk (10% in 7 days)',
  C:'Routine admission is unnecessary for resolved single TIA without crescendo',
  D:'Thrombolysis is for active stroke, not resolved TIA',
  E:'Waiting for recurrence risks completed stroke'
},
pearl:'TIA: 300 mg aspirin (unless contraindicated) + specialist review within 24 h + secondary prevention. Crescendo or AF → admit.',

{label:'NICE NG128 — Stroke and TIA',url:'https://www.nice.org.uk/guidance/ng128'}
]
},
{
section:'neuro',specialty:'Neurology',topic:'Subarachnoid haemorrhage',
imageUrl:'https://upload.wikimedia.org/wikipedia/commons/f/f3/CT_scan_-_subarachnoid_hemorrhage.jpg',
imageAlt:'Non-contrast CT head showing hyperdense (white) blood in the subarachnoid space — typical appearance of subarachnoid haemorrhage',
stem:'A 40-year-old presents with sudden-onset "worst headache of my life", maximal at onset (thunderclap), with neck stiffness and photophobia. The non-contrast CT head is shown.',
options:[

'Suspected subarachnoid haemorrhage — urgent CT head; if negative and within 6 hours, may need LP at 12 h post-onset',
'Give amitriptyline',
'Send home'
],correct:'C',
explanation:'Sudden, severe (thunderclap, maximal at onset) headache is SAH until proven otherwise. CT head within 6 hours of onset is highly sensitive (>98%) for SAH. If negative and clinical suspicion remains, LP at ≥12 hours post-onset to detect xanthochromia by spectrophotometry. Confirmed SAH needs urgent neurosurgical input, BP control (target SBP <160), nimodipine to prevent vasospasm, bed rest, neuro obs.',
distractors:{
  A:'Triptans worsen SAH (vasoconstriction near a leaking aneurysm)',
  B:'Tension headaches do not present as thunderclap',
  D:'Amitriptyline is for chronic prophylaxis, not acute SAH',
  E:'Discharge without imaging in suspected SAH is negligent'
},
pearl:'Thunderclap headache = SAH until proven otherwise. CT <6 h is highly sensitive. Negative + ongoing suspicion → LP at 12 h for xanthochromia.',
references:[
{label:'BMJ Best Practice — Subarachnoid haemorrhage',url:'https://bestpractice.bmj.com/topics/en-gb/170'}
]
},
{
section:'neuro',specialty:'Neurology',topic:'Head injury anticoagulant',
stem:'A patient on warfarin has fallen and hit her head; GCS 15, no neurological deficit, no other concerning features. INR 2.5.',
options:[

'Observe overnight without imaging',

'CT head only if symptoms develop',
'Give vitamin K prophylactically'
],correct:'C',
explanation:'NICE CG176: any patient on anticoagulation who has sustained a head injury (irrespective of other features) should have CT head within 8 hours. Falls on warfarin/DOAC carry a higher risk of intracranial bleeding which may evolve over hours. Document neurological observations and escalate any deterioration. Reversal (e.g. PCC for warfarin, andexanet alfa or PCC for DOAC) is considered if intracranial haemorrhage confirmed.',
distractors:{
  A:'Discharge without imaging on anticoagulant misses delayed bleeds',

  E:'Prophylactic vitamin K does not screen for or prevent bleeding'
},
pearl:'NICE NG232: any head injury on anticoagulant → CT head within 8 h, regardless of GCS. Reverse if bleed found (PCC for warfarin/DOAC).',

{label:'NICE NG232 — Head injury (replaces CG176)',url:'https://www.nice.org.uk/guidance/ng232'}
]
},
{
section:'neuro',specialty:'Neurology',topic:'Bacterial meningitis',
stem:'A 22-year-old presents with high fever, severe headache, neck stiffness, photophobia, and a non-blanching purpuric rash on the legs. BP 95/55, HR 120.',
options:[

'Give oral amoxicillin',
'Give NSAID and observe'

explanation:'Suspected meningococcal sepsis with septic shock features and non-blanching rash: do not delay antibiotics. Empirical IV ceftriaxone 2 g in hospital (community-administered benzylpenicillin if delay before transfer). Take cultures only if it doesn\'t delay antibiotics. CT head before LP if reduced GCS, focal neurology, papilloedema, or seizures. Notify Public Health England promptly (notifiable disease) and consider chemoprophylaxis for close contacts.',

},

]
},

{
section:'anaphylaxis',specialty:'Anaphylaxis & Allergy',topic:'First-line drug',
stem:'A patient develops widespread urticaria, lip swelling, audible wheeze, and BP 80/50 within 10 minutes of starting IV co-amoxiclav.',
options:[
'IV chlorphenamine 10 mg',
'IV hydrocortisone 200 mg',
'IM adrenaline 500 micrograms (0.5 mL of 1:1000)',
'Nebulised salbutamol 5 mg',
'IV adrenaline 1 mg'
],correct:'C',
explanation:'Anaphylaxis: stop the trigger, call for help, IM adrenaline 500 micrograms (0.5 mL of 1:1000) into the anterolateral mid-thigh — repeat after 5 minutes if no improvement. Lay flat with legs raised (or sit up if breathing difficulty). High-flow oxygen, IV fluid challenge (500–1000 mL crystalloid). IV adrenaline is reserved for those trained in critical care due to arrhythmia risk. Antihistamines and steroids are no longer first-line per Resus Council 2021.',
distractors:{
  A:'Antihistamines are not first-line for anaphylaxis (Resus Council 2021)',
  B:'Steroids are not first-line for anaphylaxis (Resus Council 2021)',
  D:'Nebulised salbutamol does not address airway/circulatory collapse',
  E:'IV adrenaline 1 mg is the cardiac arrest dose; IM is for anaphylaxis'
},
pearl:'Anaphylaxis first-line: IM adrenaline 500 mcg into anterolateral thigh. Repeat at 5 min. Lay flat with legs raised + high-flow O₂ + IV fluids.',

{label:'Resus Council UK — Anaphylaxis Guidelines 2021',url:'https://www.resus.org.uk/library/additional-guidance/guidance-anaphylaxis'}
]
},
{
section:'anaphylaxis',specialty:'Anaphylaxis & Allergy',topic:'Biphasic reaction',
stem:'After successful initial treatment of anaphylaxis, what is the recommended observation period?',
options:[
'Discharge immediately','2 hours','At least 6 hours observation in a clinical area for low-risk; up to 12 hours for high-risk (severe/refractory, prior biphasic, β-blocker, asthmatic, evening presentation)','24 hours','72 hours regardless'
],correct:'C',
explanation:'Biphasic reactions occur in ~5% of anaphylaxis cases, typically within 6–12 h. Resus Council UK 2021 risk-stratifies observation: minimum 2 h after symptom resolution if low-risk (single dose adrenaline, complete resolution, mild reaction, no asthma); 6 h for moderate-risk; up to 12 h for high-risk (>1 dose adrenaline, severe/asthma, β-blocker, prior biphasic, late evening presentation, remote area). Discharge with self-injectable adrenaline, written advice, and allergy clinic referral.',
distractors:{
  A:'Immediate discharge after anaphylaxis risks fatal biphasic reactions',

  D:'24 hours blanket policy is excessive; risk-stratified observation is now used',

},
pearl:'Resus Council 2021: 2 h low-risk · 6 h moderate · 12 h high-risk (severe, β-blocker, asthma, late presentation, prior biphasic). Always allergy clinic referral.',
references:[
{label:'Resus Council UK — Anaphylaxis Guidelines 2021',url:'https://www.resus.org.uk/library/additional-guidance/guidance-anaphylaxis'}
]
},
{
section:'anaphylaxis',specialty:'Anaphylaxis & Allergy',topic:'Refractory anaphylaxis',
stem:'A patient remains hypotensive with poor response after two IM adrenaline doses and 1 L of IV fluids during anaphylaxis. What is the next step?',
options:[
'Continue observing',
'Call peri-arrest team (2222) and start an IV adrenaline infusion in a critical care environment; consider a glucagon bolus if on beta-blocker',
'Stop adrenaline',
'Give oral antihistamine',
'Give IV bicarbonate'
],correct:'B',
explanation:'Refractory anaphylaxis = symptoms not improving after 2 IM adrenaline doses. Activate peri-arrest team, escalate to critical care, start a low-dose IV adrenaline infusion under ECG monitoring. Continue fluids (up to 30 mL/kg). In patients on β-blockers, IV/IM glucagon (1–2 mg) may overcome receptor blockade. Consider IV vasopressors (noradrenaline). Look for ongoing trigger exposure (e.g. infusion still running).',
distractors:{
  A:'Continued observation in refractory shock is fatal',
  C:'Stopping adrenaline removes the vasoconstrictor stabilising perfusion',
  D:'Oral antihistamines are inadequate in refractory shock',
  E:'Bicarbonate does not address adrenergic refractoriness'
},
pearl:'Refractory anaphylaxis (>2 IM doses): peri-arrest team, IV adrenaline infusion in critical care, glucagon if on β-blocker, continue fluids ≤30 mL/kg.',
references:[
{label:'Resus Council UK — Anaphylaxis Guidelines 2021',url:'https://www.resus.org.uk/library/additional-guidance/guidance-anaphylaxis'}
]
},
{
section:'anaphylaxis',specialty:'Anaphylaxis & Allergy',topic:'Adrenaline auto-injector',
stem:'A patient who has had anaphylaxis is being discharged with an EpiPen (300 micrograms). What is the most important advice?',
options:[
'Carry one device at all times',
'Carry two adrenaline auto-injectors at all times, technique-train them and a relative, dial 999 immediately after use, and wait until ambulance arrival even if symptoms resolve',
'Use only when symptoms are severe',
'Practice with the device on real skin',
'Store in the fridge'
],correct:'B',
explanation:'MHRA recommends carrying TWO adrenaline auto-injectors at all times (one device may fail or a second dose may be needed). Always 999 after use. Technique training (including use of the trainer device) is essential, ideally for the patient and a relative. Don\'t self-discharge after auto-injector use — biphasic reactions occur. Allergy clinic referral and a personalised emergency action plan are required.',
distractors:{
  A:'A single device may fail or a second dose may be needed before ambulance arrival',
  C:'Waiting until severe risks irreversible airway oedema',
  D:'Practising on real skin risks injury and is unnecessary — use trainer device',

{
section:'renal',specialty:'Renal & Fluids',topic:'Hyperkalaemia ECG',
