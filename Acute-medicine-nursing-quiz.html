  {section:'resp',specialty:'Toxicology',topic:'Smoke inhalation injury',stem:'A patient from a house fire has facial burns, singed nasal hair, hoarse voice, soot in oropharynx, SpO₂ 96% but lactate 7.5.',options:['Oxygen 4 L nasal cannula','100% high-flow oxygen, early intubation if airway oedema risk, treat possible cyanide (hydroxocobalamin) and CO toxicity (oxygen reduces CO half-life), critical care','Oral analgesia','Wait and see','Discharge'],correct:'B',explanation:'Smoke inhalation: airway oedema risk → early intubation before oedema makes intubation impossible. 100% O₂ for CO. High lactate suggests cyanide; treat with hydroxocobalamin.',distractors:{A:'Standard oxygen inadequate',C:'Analgesia alone misses airway/toxicity',D:'Airway oedema progresses rapidly',E:'Discharge fatal'},pearl:'Airway burn signs: facial burns, singed hair, soot, hoarseness, stridor. Window of safe intubation closes quickly. SpO₂ unreliable in CO/cyanide — use clinical signs and lactate.',references:[{label:'British Burn Association',url:'https://www.britishburnassociation.org/'}]},
  {section:'resp',specialty:'Respiratory',topic:'Massive haemoptysis IR',stem:'A patient coughs up >250 mL fresh blood in 1 hour. SpO₂ 88%, BP 110/70.',options:['Reassure','Lay patient lateral with bleeding side DOWN, oxygen, IV access, group/crossmatch, urgent CT thorax + bronchoscopy + interventional radiology for bronchial artery embolisation, ICU','Sit upright','Cough suppressant','Discharge'],correct:'B',explanation:'Massive haemoptysis (>200 mL/h or compromise): protect airway, lateral with bleeding side down (prevents contralateral aspiration), urgent investigation, bronchial artery embolisation often definitive.',distractors:{A:'Reassurance fatal',C:'Sitting may aspirate to non-bleeding lung',D:'Suppression risks retention/infection',E:'Discharge fatal'},pearl:'Massive haemoptysis often from bronchial circulation (high pressure). Bronchial artery embolisation by IR is definitive in many cases. Mortality high (>50%) without intervention.',references:[{label:'BTS Pulmonary Guidelines',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/'}]},
  {section:'resp',specialty:'Respiratory',topic:'Silent chest in asthma',stem:'A patient with severe asthma who was previously wheezy has now become quiet on auscultation, exhausted, drowsy, SpO₂ 87%, PaCO₂ 6.4 (rising).',options:['Reassuring sign','Life-threatening (silent chest = no airflow); call peri-arrest/ICU; prepare for intubation; continue back-to-back nebs, IV magnesium, hydrocortisone','Reduce treatment','Discharge','Pursed-lip breathing'],correct:'B',explanation:'Silent chest = no airflow = peri-arrest. Exhaustion, drowsiness, rising PaCO₂ all life-threatening. Imminent intubation needed; call ICU immediately.',distractors:{A:'Catastrophic misinterpretation',C:'Reducing treatment lethal',D:'Discharge fatal',E:'Inadequate'},pearl:'Asthma life-threatening features: silent chest, cyanosis, exhaustion, hypotension, drowsy/confused, SpO₂ <92%, PEF <33%, normal/raised PaCO₂. Near-fatal: PaCO₂ rising, ventilation needed.',references:[{label:'BTS/SIGN Asthma Guidelines',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/asthma/'}]},
  {section:'resp',specialty:'Respiratory',topic:'Tracheostomy decannulation',stem:'A patient post-prolonged ventilation has tracheostomy, now ready for decannulation assessment. Most appropriate?',options:['Decannulate immediately','Multidisciplinary assessment: cuff deflation tolerance, swallow safe (SLT), cough effective, secretions manageable, downsize and cap trial; remove only when all met; emergency airway plan','Test swallow only','Cap trial alone','Patient request'],correct:'B',explanation:'Tracheostomy decannulation: MDT assessment (medical, SLT, physio, nursing). Cuff deflation, downsizing, capping trials, swallow assessment, cough/secretion competence. Emergency airway plan post-decannulation.',distractors:{A:'Premature decannulation risks airway compromise',C:'Single test inadequate',D:'Cap trial one component',E:'Patient request alone insufficient'},pearl:'Successful decannulation: tolerated cuff deflation, finger occlusion, capped tube, effective cough, manageable secretions, swallow assessed. Have re-cannulation plan in case of failure.',references:[{label:'National Tracheostomy Safety Project',url:'https://www.tracheostomy.org.uk/'}]},

  // ENDOCRINE (5)
  {section:'endo',specialty:'Endocrine',topic:'Glucagon for severe hypoglycaemia',stem:'A T1DM patient at home is found unconscious by family. CBG 1.8. No IV access available.',options:['Wait for ambulance','IM glucagon 1 mg if available; place in recovery position; call 999; once conscious, give long-acting carbs and seek hospital review','Oral glucose gel','Sugar in cheek','Insulin'],correct:'B',explanation:'Severe hypoglycaemia, no IV: IM glucagon 1 mg by trained person/family. Effect within 10–15 min. Once conscious, oral carbs, then medical assessment (especially if cause unclear).',distractors:{A:'Waiting allows brain injury',C:'Oral gel risks aspiration in unconscious',D:'Cheek absorption unreliable in unconscious',E:'Insulin worsens'},pearl:'Glucagon: works only if hepatic glycogen present (fails in starvation, alcoholics, prolonged hypo). Mobilises glycogen — give carbs once conscious to refill stores.',references:[{label:'Diabetes UK Hypoglycaemia',url:'https://www.diabetes.org.uk/guide-to-diabetes/complications/hypos'}]},
  {section:'endo',specialty:'Endocrine',topic:'Insulin pump failure',stem:'A T1DM patient on insulin pump has BG 22, ketones 2.1, nausea. Pump appears to be working. Most appropriate immediate action?',options:['Continue pump','Replace pump set + cartridge + insertion site (suspect occlusion/site issue); give corrective bolus by syringe/pen if very high; check ketones; sick day rules; if ketones ≥3 hospital','Stop insulin','Drink water only','Eat carbs'],correct:'B',explanation:'Pump-treated DKA risk: assume site/cannula failure when unexplained hyperglycaemia + ketones. Replace cartridge, set, insertion site. Give correction bolus by alternative route. Hospital if ketones ≥3 or vomiting.',distractors:{A:'Continuing failed delivery worsens',C:'Stopping insulin causes DKA',D:'Water alone insufficient',E:'Eating carbs worsens hyperglycaemia'},pearl:'Pump occlusion/site failure: leading cause of DKA in pump users. "Pump rules": ketones with hyperglycaemia → change site, correction bolus, hospital if not improving rapidly.',references:[{label:'JBDS Insulin Pump Guidelines',url:'https://abcd.care/jbds'}]},
  {section:'endo',specialty:'Endocrine',topic:'New T2DM hospital initiation',stem:'A T2DM patient admitted with HbA1c 92 mmol/mol (severely uncontrolled), BG persistently 18–25 despite oral therapy, no DKA/HHS. Most appropriate?',options:['Increase oral metformin','Initiate basal insulin (NPH or analogue) ± correction insulin per local protocol; involve diabetes specialist nurse for education and discharge planning; review at discharge','Stop all medications','IV insulin pump','Sliding scale insulin permanently'],correct:'B',explanation:'Severely uncontrolled T2DM in hospital: insulin (basal ± mealtime) preferred; rapid stabilisation. DSN involvement essential for transition planning. May or may not need long-term insulin.',distractors:{A:'Metformin alone insufficient',C:'Stopping causes worsening',D:'IV insulin for emergencies',E:'Sliding scale alone is reactive, suboptimal'},pearl:'Avoid relying on sliding scale alone in stable hospital patient — reactive, glucose toxicity continues. Add basal insulin. DSN review for education and post-discharge plan critical.',references:[{label:'JBDS Hospital Inpatient Guidelines',url:'https://abcd.care/jbds'}]},
  {section:'endo',specialty:'Endocrine',topic:'Diabetic foot infection',stem:'A T2DM patient has a non-healing foot ulcer, surrounding cellulitis, malodorous, fever 38.2°C. CRP 165. X-ray shows lytic changes in metatarsal head.',options:['Topical antibiotic','Admit, IV broad-spectrum antibiotics covering anaerobes (e.g. piperacillin–tazobactam), MRI to assess osteomyelitis, multidisciplinary diabetic foot team review','Oral flucloxacillin','Discharge','Amputation immediately'],correct:'B',explanation:'Diabetic foot with osteomyelitis features: admit, IV broad-spectrum antibiotics (anaerobic cover), MRI to confirm osteomyelitis extent, multidisciplinary foot team. Surgical debridement often needed.',distractors:{A:'Topical inadequate',C:'Oral inadequate for osteomyelitis with sepsis',D:'Discharge fatal/limb-threatening',E:'Amputation only after multidisciplinary review'},pearl:'NICE NG19: diabetic foot needs MDT (diabetes, vascular, ortho, microbiology, podiatry, nursing) within 24 h of presentation. Probe-to-bone test highly suggestive of osteomyelitis.',references:[{label:'NICE NG19 Diabetic foot',url:'https://www.nice.org.uk/guidance/ng19'}]},
  {section:'endo',specialty:'Endocrine',topic:'Hypothyroid acute presentation',stem:'A 60-year-old has lethargy, weight gain, constipation, bradycardia 48, T 35.6°C, hypothermia, slow ankle jerks. TSH 92, T4 undetectable.',options:['Start full-dose thyroxine','Start low-dose levothyroxine 25–50 mcg/day (start low go slow especially in elderly/cardiac history); rule out coexistent adrenal insufficiency before T4; specialist input','High-dose IV T4','No treatment','Triiodothyronine high dose'],correct:'B',explanation:'Severe hypothyroidism: start low-dose levothyroxine (25–50 mcg in elderly/IHD; 50–100 mcg if young/healthy) — too rapid replacement risks cardiac ischaemia, arrhythmia. Always rule out adrenal insufficiency first.',distractors:{A:'Full dose risks ischaemia',C:'IV T4 for myxoedema coma only',D:'Untreated worsens',E:'T3 not first-line'},pearl:'Start low go slow with thyroxine in elderly/cardiac patients. Rapid replacement → angina, arrhythmia, MI. Always check cortisol — adding T4 to untreated adrenal insufficiency precipitates crisis.',references:[{label:'British Thyroid Foundation',url:'https://www.btf-thyroid.org/'}]},

  // NEUROLOGY (5)
  {section:'neuro',specialty:'Neurology',topic:'Subdural haematoma elderly',stem:'A 78-year-old on warfarin has 2-week progressive headache, drowsiness, mild left hemiparesis after a minor fall 3 weeks ago.',options:['Reassure','Urgent CT head; if subdural confirmed → reverse anticoagulation (PCC + IV vit K), neurosurgical referral; consider for evacuation depending on size, mass effect, GCS','Outpatient referral','Increase warfarin','Discharge'],correct:'B',explanation:'Elderly chronic subdural after minor head injury — classic. Anticoagulation increases risk. Reverse anticoagulation, urgent CT, neurosurgery for evacuation if appropriate. Most respond well to burr hole drainage.',distractors:{A:'Reassurance fatal',C:'Outpatient delay risks deterioration',D:'Worsens',E:'Discharge fatal'},pearl:'Chronic subdural in elderly: forgotten/minor trauma, alcoholic, anticoagulated. Crescent-shaped, hyperdense early then mixed/hypodense. Burr hole drainage usually effective.',references:[{label:'NICE NG232 Head injury',url:'https://www.nice.org.uk/guidance/ng232'}]},
  {section:'neuro',specialty:'Neurology',topic:'Migraine acute treatment',stem:'A patient has acute severe migraine, vomiting, photophobia, no red flag features. NICE first-line acute treatment options?',options:['IM pethidine','Combination triptan (e.g. sumatriptan) + NSAID (or paracetamol) + antiemetic; avoid opioids; consider IV fluids, dark quiet room','Strong opioids','Steroids','Antibiotics'],correct:'B',explanation:'NICE migraine: triptan + NSAID/paracetamol + antiemetic (metoclopramide/prochlorperazine). Opioids avoided (perpetuate medication-overuse headache, less effective). IV fluids if vomiting/dehydrated.',distractors:{A:'Opioids avoided in migraine',C:'Opioids cause MOH, not first-line',D:'Steroids occasionally adjunct, not first-line',E:'Antibiotics irrelevant unless infection cause'},pearl:'Opioids are inferior in migraine, can cause medication-overuse headache and worsen frequency. Triptans contraindicated in IHD/uncontrolled HTN. Status migrainosus = >72 h, may need admission.',references:[{label:'NICE NG150 Headaches',url:'https://www.nice.org.uk/guidance/cg150'}]},
  {section:'neuro',specialty:'Neurology',topic:'Vertebral artery dissection',stem:'A 35-year-old has acute neck pain, vertigo, ataxia, dysphagia, after recent chiropractic manipulation.',options:['Reassure','Urgent CT/MRI angiography neck — suspect vertebral artery dissection causing posterior circulation stroke; antiplatelet/anticoagulation per stroke team; vascular review','Manipulation again','Discharge','Antibiotics'],correct:'B',explanation:'Vertebral artery dissection: young patients, neck trauma/manipulation, posterior circulation symptoms. Imaging confirms; antiplatelet or anticoagulation per stroke team. Risk of recurrent stroke without treatment.',distractors:{A:'Reassurance fatal',C:'Manipulation worsens',D:'Discharge fatal',E:'Antibiotics irrelevant'},pearl:'Cervical artery dissection (CAD): commonest stroke cause in young adults. Posterior circulation = vertebral; anterior = carotid. Antithrombotic 3–6 months. Avoid neck manipulation in suspected.',references:[{label:'Stroke Association',url:'https://www.stroke.org.uk/professionals/clinical-resources'}]},
  {section:'neuro',specialty:'Neurology',topic:'Concussion discharge advice',stem:'A patient with minor head injury (GCS 15, no LOC, normal CT) is being discharged. Most important advice?',options:['Bed rest 1 week','Written head injury advice card; supervision for 24 h by responsible adult; return if worsening headache, vomiting, drowsiness, weakness, seizure, fluid from ear/nose; no driving until cleared','Discharge alone','No advice needed','Antibiotics'],correct:'B',explanation:'Minor head injury discharge: written advice (NICE template), supervision 24 h, red flag list (worsening headache, vomiting, neuro signs, drowsiness), no driving until cleared, follow-up if persistent symptoms.',distractors:{A:'Bed rest not evidence-based',C:'Lone discharge after head injury inappropriate',D:'Written advice mandatory per NICE',E:'Antibiotics irrelevant'},pearl:'Post-concussion: most resolve within 7–10 days. Persistent symptoms (>2 weeks) → specialist referral. Athletes need graduated return-to-play protocol. Driving advice per DVLA.',references:[{label:'NICE NG232 Head injury',url:'https://www.nice.org.uk/guidance/ng232'}]},
  {section:'neuro',specialty:'Neurology',topic:'Tetanus prophylaxis',stem:'A patient has a deep penetrating wound contaminated with soil. Last tetanus booster was 12 years ago.',options:['No action','Tetanus toxoid booster + tetanus immunoglobulin (TIG) for tetanus-prone wounds in incomplete or unknown immunisation','Antibiotics alone','Wound dressing only','Tetanus toxoid alone'],correct:'B',explanation:'Tetanus-prone wound (deep, contaminated, devitalised): if last dose >10 years or unknown — tetanus toxoid booster + TIG. UK schedule needs 5 doses for full immunity. UKHSA Green Book details.',distractors:{A:'High-risk wound needs prophylaxis',C:'Antibiotics may be adjunct, not replacement',D:'Wound care alone insufficient',E:'TIG also needed in high-risk + incomplete schedule'},pearl:'UK Green Book: tetanus-prone wound + complete schedule, last <10 years = no action; >10 years = booster only; incomplete = booster + TIG. High-risk wound + incomplete = TIG always.',references:[{label:'UKHSA Green Book Tetanus',url:'https://www.gov.uk/government/publications/tetanus-the-green-book-chapter-30'}]},

  // ANAPHYLAXIS (2)
  {section:'anaphylaxis',specialty:'Allergy',topic:'Adrenaline injection site',stem:'In treating anaphylaxis, the most appropriate IM injection site for adrenaline is:',options:['Deltoid','Anterolateral mid-thigh (vastus lateralis) — better absorption, fewer needle-related complications, reaches blood faster','Subcutaneous abdomen','IV bolus','Buttock'],correct:'B',explanation:'Anterolateral thigh (vastus lateralis) preferred for IM adrenaline — faster absorption, deeper muscle, easier in clothed patient, lower risk of inadvertent intravascular. Through clothing if needed.',distractors:{A:'Deltoid acceptable but not first choice',C:'Subcutaneous slower absorption',D:'IV bolus is arrest dose',E:'Buttock fat-thick, slower absorption'},pearl:'Auto-injectors are designed for thigh use even through clothing. Hold 3–10 seconds. After: massage briefly. Repeat at 5 min if needed.',references:[{label:'Resus Council UK Anaphylaxis 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/emergency-treatment-anaphylaxis'}]},
  {section:'anaphylaxis',specialty:'Allergy',topic:'Tryptase measurement',stem:'A patient with suspected anaphylaxis is treated and stabilised. Most appropriate investigation to confirm mast cell activation?',options:['Total IgE','Serum tryptase at baseline (asymptomatic, ≥24 h post-event) AND ideally ≥3 samples acutely (1–2 h, 4 h post-event) — rise from baseline confirms anaphylaxis','Skin prick test now','C-reactive protein','Eosinophil count'],correct:'B',explanation:'Serial mast cell tryptase: ideally 3 samples — at presentation, 1–2 h, 24 h baseline. Rise from baseline confirms mast cell degranulation. Specific to allergy clinic referral.',distractors:{A:'IgE not specific to acute event',C:'Skin testing during reaction unsafe; allergy clinic later',D:'CRP non-specific',E:'Eosinophils not specific to anaphylaxis acutely'},pearl:'Mast cell tryptase rises within 30 min, peaks 1–2 h, returns to baseline by 24 h. Sample at presentation, 1–2 h, and 24 h baseline. Document timing relative to reaction onset.',references:[{label:'Resus Council UK Anaphylaxis 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/emergency-treatment-anaphylaxis'}]},

  // RENAL & FLUIDS (6)
  {section:'renal',specialty:'Oncology',topic:'Tumour lysis post-chemo',stem:'A patient with high-grade lymphoma is started on chemotherapy. 24 h later: K 6.5, urate 670, phosphate 2.5, calcium 1.8, creatinine 220.',options:['Continue chemotherapy','Recognise tumour lysis syndrome (TLS); stop chemo per oncology, aggressive IV fluids, rasburicase or allopurinol, treat hyperK, monitor cardiac, dialysis if severe','Reduce IV fluids','Calcium replacement only','Discharge'],correct:'B',explanation:'TLS: hyperK + hyperphos + hyperurate + hypocalcaemia + AKI from cell lysis. Aggressive IV fluids, rasburicase (urate oxidase) better than allopurinol for established TLS. Treat hyperK; dialysis if refractory.',distractors:{A:'Continuing without correcting TLS catastrophic',C:'Fluids essential',D:'Calcium correction (avoid in hyperphosphatemia unless symptomatic) part of management',E:'Discharge fatal'},pearl:'Cairo-Bishop criteria: 2+ of urate↑, K↑, phos↑, Ca↓ within 3 days of treatment. High-risk: high-grade lymphoma, leukaemia, bulky disease. Prophylaxis with hydration + rasburicase reduces TLS.',references:[{label:'BSH TLS Guidelines',url:'https://b-s-h.org.uk/guidelines/'}]},
  {section:'renal',specialty:'Nephrology',topic:'Hyperkalaemia treatment ladder',stem:'A patient has K 7.4 with peaked T waves on ECG. Most appropriate sequence?',options:['Insulin/glucose first','IV calcium gluconate 10 mL 10% over 10 min FIRST (cardioprotection) → insulin 10 units actrapid + 50 mL 50% glucose (or 250 mL 10%) → salbutamol nebs → address cause; consider dialysis','Salbutamol first','Bicarbonate alone','Furosemide alone'],correct:'B',explanation:'Severe hyperK with ECG changes: calcium gluconate FIRST (membrane stabilisation, no K shift), then insulin + glucose (intracellular shift), salbutamol nebs (additional shift). Address cause and consider RRT.',distractors:{A:'Calcium first for cardioprotection',C:'Calcium first',D:'Bicarbonate only if severe acidosis',E:'Furosemide only useful if not anuric and not in shock'},pearl:'Hyperkalaemia ladder: stabilise (Ca), shift (insulin/glucose, salbutamol, bicarbonate), eliminate (loop diuretic if not oliguric, dialysis, oral cation exchanger). Repeat ECG and K post-treatment.',references:[{label:'UK Renal Association Hyperkalaemia',url:'https://renal.org/health-professionals/guidelines/'}]},
  {section:'renal',specialty:'Electrolytes',topic:'Hypomagnesaemia',stem:'A patient on long-term PPI has Mg 0.42, with refractory hypokalaemia (K 3.0 despite IV K replacement) and hypocalcaemia.',options:['Continue K replacement alone','IV magnesium sulfate (e.g. 4 g over 4–8 h depending on severity), then K and Ca correction; review precipitating drug (PPI)','Stop all electrolytes','Increase PPI','Oral Mg only acutely'],correct:'B',explanation:'Hypomagnesaemia causes refractory hypoK (renal K wasting) and hypoCa (functional hypoparathyroidism). IV Mg corrects all three. PPI is recognised cause of long-term hypoMg.',distractors:{A:'K alone fails — must correct Mg',C:'Stopping inappropriate',D:'PPI may need to be reviewed if refractory',E:'Oral too slow for severe symptomatic'},pearl:'Refractory hypoK or hypoCa = check Mg. Long-term PPI + diuretics + alcohol common causes. Replace IV for severe/symptomatic; oral OK for mild.',references:[{label:'BMJ Best Practice Hypomagnesaemia',url:'https://bestpractice.bmj.com/topics/en-gb/142'}]},
  {section:'renal',specialty:'Nephrology',topic:'AKI on CKD',stem:'A patient with stable CKD stage 4 (eGFR 22) has acute creatinine rise from 280 to 410 over 5 days after starting NSAIDs for gout.',options:['Continue NSAIDs','Stop nephrotoxics (NSAIDs), hydrate, treat gout with alternative (colchicine/steroid), monitor U&E and urine output, refer renal team','Increase ACEi','Discharge','High-protein diet'],correct:'B',explanation:'AKI on CKD from NSAID: stop nephrotoxic drug, optimise hydration, alternative gout therapy (colchicine, steroid). NSAIDs particularly dangerous in CKD — even short courses precipitate AKI.',distractors:{A:'Continuing NSAIDs worsens',C:'ACEi/ARB may need to be held in AKI',D:'Discharge dangerous if AKI evolving',E:'Diet not the issue'},pearl:'NSAIDs in CKD = avoid. PGE2 inhibition reduces afferent arteriole vasodilation → reduced GFR. Recovery after withdrawal often slow or incomplete.',references:[{label:'NICE NG148 AKI',url:'https://www.nice.org.uk/guidance/ng148'}]},
  {section:'renal',specialty:'Nephrology',topic:'Citrate hypocalcaemia',stem:'A patient receiving 6 units of FFP for major haemorrhage develops perioral tingling, carpopedal spasm. Mechanism?',options:['Allergic reaction','Citrate (anticoagulant in blood products) chelates calcium → ionised hypocalcaemia; treat with IV calcium gluconate','Volume overload','Sepsis','Hypothermia'],correct:'B',explanation:'Citrate hypocalcaemia: especially with FFP, platelets, and rapid massive transfusion. Citrate (anticoagulant) binds Ca2+. Treat with IV calcium gluconate. Less issue with packed red cells.',distractors:{A:'Allergic features different',C:'Overload features different',D:'Sepsis unrelated',E:'Hypothermia separate concern'},pearl:'Massive transfusion: monitor ionised Ca, replace as needed (especially with FFP/platelets). Massive transfusion protocol bundles often include calcium replacement after first round.',references:[{label:'BSH Major Haemorrhage Guidelines',url:'https://b-s-h.org.uk/guidelines/'}]},
  {section:'renal',specialty:'Nephrology',topic:'Glomerulonephritis presentation',stem:'A 25-year-old has tea-coloured urine, hypertension 165/95, periorbital oedema, ASO titre raised, 1 week post sore throat.',options:['Reassure','Suspect post-streptococcal glomerulonephritis: monitor BP, urine output, U&E; supportive (BP control, salt restrict); biopsy if atypical or worsening; nephrology referral','Diuresis alone','Antibiotics','Discharge'],correct:'B',explanation:'Post-strep GN: nephritic syndrome (haematuria, HTN, oedema, mild renal impairment) 1–2 weeks post-strep infection. Supportive care; most resolve in adults; nephrology referral.',distractors:{A:'Reassurance miss progressive disease',C:'Diuresis adjunct',D:'Antibiotics if active strep, but late',E:'Discharge inappropriate'},pearl:'Nephritic syndrome (haematuria + HTN + AKI + oedema) vs nephrotic (proteinuria >3.5 g/day + hypoalbuminaemia + oedema). Different causes, both need nephrology workup.',references:[{label:'NICE NG203 CKD',url:'https://www.nice.org.uk/guidance/ng203'}]},

  // GASTRO (4)
  {section:'gastro',specialty:'Hepatobiliary',topic:'Acute cholangitis',stem:'A patient has RUQ pain, fever 39.2°C, jaundice (Charcot triad). Plus confusion and BP 86/52 (Reynolds pentad). USS shows dilated CBD with stones.',options:['Outpatient ERCP','Admit + IV antibiotics + resuscitate + URGENT biliary drainage (ERCP within 24 h, or PTC if not feasible) — cholangitis without drainage has high mortality','Oral antibiotics','Discharge','NSAID'],correct:'B',explanation:'Acute cholangitis: time-critical biliary drainage (ERCP within 24 h ideally). Resuscitate, IV antibiotics, urgent decompression. Reynolds pentad = severe (Charcot triad + shock + altered mental status).',distractors:{A:'Outpatient delay fatal',C:'Oral inadequate for severe sepsis',D:'Discharge fatal',E:'NSAID inadequate'},pearl:'Cholangitis = biliary obstruction + infection. Without drainage, antibiotics alone fail. ERCP within 24 h optimal; PTC alternative. Mortality 5–10% with prompt drainage; up to 50% delayed.',references:[{label:'BSG Biliary Guidelines',url:'https://www.bsg.org.uk/'}]},
  {section:'gastro',specialty:'Gastroenterology',topic:'Lower GI bleed',stem:'A 70-year-old has fresh PR bleeding ~1 L, BP 100/65, HR 105, Hb 78.',options:['Outpatient colonoscopy','Resuscitate (crystalloid + blood), restrictive transfusion (Hb target 70), CT angiography or urgent colonoscopy if stable; surgical/IR backup; consider Oakland score for risk-stratification','Outpatient gastroscopy','PPI alone','Stool test'],correct:'B',explanation:'Major lower GI bleed: resuscitate, transfuse to Hb 70 (restrictive), CT angiography in unstable, colonoscopy in stable. IR for embolisation, surgery for refractory.',distractors:{A:'Outpatient delay risks death',C:'Wrong location for lower GI bleed',D:'PPI alone insufficient',E:'Stool test inadequate'},pearl:'Oakland score for lower GI bleed: ≤8 may suit ambulatory care. >8 admit. CT angiography first-line for haemodynamically unstable lower GI bleed.',references:[{label:'BSG Lower GI Bleed Guidelines',url:'https://www.bsg.org.uk/'}]},
  {section:'gastro',specialty:'Gastroenterology',topic:'Faecal impaction overflow',stem:'An 88-year-old in care has had liquid diarrhoea for 1 week. PR exam reveals hard stool throughout the rectum.',options:['Antidiarrhoeal','Treat as faecal impaction with overflow: glycerin suppositories or enemas, oral macrogol/laxatives once cleared, address underlying cause (immobility, opioids, dehydration); avoid stopping all stimulant laxatives','Oral antibiotics','Stop all laxatives','Discharge'],correct:'B',explanation:'Faecal impaction with overflow: liquid stool around hard impacted stool. Manual disimpaction or enemas first, oral laxatives after, address underlying cause. Stopping laxatives worsens.',distractors:{A:'Antidiarrhoeal worsens impaction',C:'Antibiotics for infection if confirmed; impaction not infection',D:'Stopping laxatives worsens',E:'Discharge inappropriate'},pearl:'Overflow diarrhoea in the elderly is constipation until proven otherwise. Always do PR exam. Treat opioid bowel dysfunction with prophylactic laxatives. Naloxegol for opioid-induced constipation.',references:[{label:'NICE CG99 Constipation',url:'https://www.nice.org.uk/guidance/cg99'}]},
  {section:'gastro',specialty:'General surgery',topic:'Peptic ulcer perforation',stem:'A patient with known PUD has sudden severe epigastric pain, now generalised. Rigid abdomen, BP 100/70, HR 115, T 38.0°C.',options:['Antacids','Resuscitate, NBM, NG tube, IV broad-spectrum antibiotics, urgent erect CXR (look for free air) or CT, urgent surgical review for laparotomy/laparoscopic repair','Discharge','Continue oral PPI','Endoscopy'],correct:'B',explanation:'Suspected perforated PUD: surgical emergency. Resuscitate, NBM, NG decompression, IV broad-spectrum antibiotics, IV PPI, urgent imaging (CXR or CT), surgical repair.',distractors:{A:'Antacids inadequate for perforation',C:'Discharge fatal',D:'Oral PPI insufficient',E:'Endoscopy contraindicated in perforation'},pearl:'Erect CXR shows free subdiaphragmatic gas in 75% of perforations. CT abdomen more sensitive. Mortality high — early surgery improves outcomes. Helicobacter pylori test once stable.',references:[{label:'ASGBI Acute Abdomen Guidelines',url:'https://www.asgbi.org.uk/'}]},

  // POISONING (4)
  {section:'poisoning',specialty:'Toxicology',topic:'Benzodiazepine overdose',stem:'A patient took an unknown quantity of diazepam. GCS 12, RR 14, SpO₂ 96%, BP 110/70.',options:['Routine flumazenil','Supportive care + airway monitoring (most recover with observation); flumazenil only if pure benzo OD without seizure/TCA risk and severe respiratory depression — risk of seizure','Antibiotic','Charcoal alone','Discharge'],correct:'B',explanation:'Benzo OD usually requires only supportive care. Flumazenil rarely indicated — risks precipitating withdrawal seizures, especially in mixed OD or chronic benzo use. Avoid in TCA co-ingestion.',distractors:{A:'Flumazenil routine use risks seizure',C:'Antibiotic irrelevant',D:'Charcoal alone insufficient if symptoms',E:'Discharge fatal in severe'},pearl:'Flumazenil reserved for: known pure benzo OD, severe respiratory depression, no chronic benzo use, no TCA/proconvulsant co-ingestion. UK practice avoids flumazenil in most acute OD presentations.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'Insulin overdose deliberate',stem:'A diabetic patient deliberately injected 200 units of long-acting insulin. CBG 1.4, drowsy.',options:['Single bag of glucose','Continuous IV 10–20% glucose infusion + frequent CBG checks; admit for monitoring 24+ hours due to long-acting insulin duration; psychiatric referral','Glucagon alone','Restrict carbs','Discharge once awake'],correct:'B',explanation:'Long-acting insulin OD: prolonged hypoglycaemia 24+ hours. Continuous high-concentration glucose infusion, intensive monitoring. Glucagon limited (depletes glycogen quickly). Psychiatric referral for deliberate self-harm.',distractors:{A:'Single bag inadequate for long-acting effect',C:'Glucagon depletes after 1–2 doses',D:'Carb restriction worsens',E:'Discharge dangerous in long-acting insulin OD'},pearl:'Long-acting insulin (glargine, detemir) overdose can cause hypoglycaemia for 24–36 hours. ICU/HDU monitoring essential. Don\'t rely on glucagon alone — limited supply of hepatic glycogen.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'CCB overdose',stem:'A patient took 60× amlodipine tablets. BP 70/40, HR 50, drowsy. No response to fluids or 3 mg atropine.',options:['Repeat atropine alone','High-dose IV calcium + vasopressors + high-dose insulin–euglycaemic therapy (HIET) + lipid emulsion + ICU; consider methylene blue for refractory shock','Activated charcoal alone','Antibiotics','Discharge'],correct:'B',explanation:'CCB OD with shock: atropine often ineffective. IV calcium (gluconate or chloride), HIET (1 unit/kg bolus then 0.5–1 unit/kg/h with glucose), vasopressors, lipid emulsion (lipophilic CCBs), methylene blue for refractory.',distractors:{A:'Atropine often ineffective in CCB OD',C:'Charcoal early helpful but inadequate alone',D:'Antibiotics irrelevant',E:'Discharge fatal'},pearl:'CCB and β-blocker OD: similar approach. Calcium ineffective in β-blocker OD (uses glucagon instead). Both benefit from HIET. Severe cases need ECMO/cardiac pacing.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'Stimulant toxicity methamphetamine',stem:'A patient took methamphetamine. Severe agitation, hyperthermia 40.2°C, HTN 200/110, HR 140, hyperreflexic.',options:['IV β-blocker','IV benzodiazepine (diazepam/lorazepam) for agitation/HTN; cooling; IV fluids; treat rhabdomyolysis; antipsychotics for severe agitation; ICU','Restraint alone','Cold water immersion','Naloxone'],correct:'B',explanation:'Sympathomimetic toxicity: benzodiazepines first-line (reduces BP, HR, agitation, hyperthermia). Active cooling. Avoid β-blockers (unopposed α). Treat rhabdomyolysis aggressively.',distractors:{A:'β-blockers can worsen hypertension via unopposed α',C:'Restraint alone causes rhabdo and metabolic acidosis',D:'Cold water immersion not standard',E:'Naloxone for opioids'},pearl:'Sympathomimetic toxidrome: agitation, mydriasis, diaphoresis, hyperthermia, HTN, tachy. Benzos titrate to calm. Hyperthermia >41°C → aggressive cooling, dantrolene if MH-like.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},

  // TRANSFUSION (2)
  {section:'transfusion',specialty:'Haematology',topic:'Platelet transfusion thresholds',stem:'Most appropriate platelet transfusion threshold for prophylaxis in a stable haemato-oncology patient (no bleeding, no procedure planned)?',options:['<50','<10 ×10⁹/L for stable, <20 if sepsis/risk factors, <50 for procedures, <100 for CNS surgery','<100','<150','Routine daily transfusion'],correct:'B',explanation:'Platelet thresholds: <10 prophylactic stable; <20 if sepsis, fever, antibiotics, fall risk; <50 for invasive procedure; <100 for neurosurgery/eye surgery. Never transfuse if functional but low (ITP without bleed).',distractors:{A:'<50 only for procedures',C:'<100 only for high-risk surgery',D:'<150 over-transfusion',E:'Routine daily inappropriate'},pearl:'Platelet transfusion: 1 unit pool typically raises platelets by 20–40 ×10⁹/L. ABO-compatible preferred. Never transfuse functional thrombocytopenia (TTP) — can worsen. ITP only for life-threatening bleed.',references:[{label:'BSH Platelet Transfusion Guidelines',url:'https://b-s-h.org.uk/guidelines/'}]},
  {section:'transfusion',specialty:'Haematology',topic:'Cryoprecipitate indications',stem:'A patient with major haemorrhage has fibrinogen 0.8 g/L (<1.5 threshold). Most appropriate transfusion?',options:['FFP only','Cryoprecipitate (concentrated fibrinogen, factor VIII, vWF, factor XIII, fibronectin) for low fibrinogen <1.5 in bleeding (or <2.0 in obstetric); typical dose 2 pools (10 units)','Platelets','Red cells alone','Albumin'],correct:'B',explanation:'Cryoprecipitate for bleeding patient with fibrinogen <1.5 (<2.0 in obstetric haemorrhage). 2 pools (10 units) typically raises fibrinogen by ~1 g/L. FFP alone too dilute for fibrinogen replacement.',distractors:{A:'FFP volume needed too large for fibrinogen alone',C:'Platelets if low, but not for fibrinogen',D:'RBC for haemoglobin',E:'Albumin for volume, not coagulation'},pearl:'Fibrinogen <1.5–2 in major haemorrhage = cryoprecipitate. Fibrinogen concentrate alternative where available. Higher threshold for obstetric haemorrhage (2.0 g/L).',references:[{label:'BSH Major Haemorrhage Guidelines',url:'https://b-s-h.org.uk/guidelines/'}]},

  // MEDICATION SAFETY (4)
  {section:'medsafe',specialty:'Pharmacology',topic:'Renal dose adjustment',stem:'A patient with eGFR 28 needs gabapentin started. Most appropriate?',options:['Standard dose','Reduce dose per renal impairment guidance (e.g. 200–700 mg/day in 2 divided doses for eGFR 15–29) — gabapentin renally cleared, accumulates in CKD','Increase dose','Discharge with usual dose','Stop all medications'],correct:'B',explanation:'Renally cleared drugs accumulate in CKD. Gabapentin: dose-reduce per eGFR. Many drugs need adjustment (LMWH, opioids, antibiotics). Use BNF/Renal Drug Database for guidance.',distractors:{A:'Standard dose causes accumulation, sedation, falls',C:'Increasing worsens',D:'Standard dose dangerous',E:'Stopping all inappropriate'},pearl:'Renally adjust: gabapentin, opioids, LMWH, ACEi/ARB, metformin, allopurinol, many antibiotics. UK Renal Drug Database invaluable for community/hospital practice.',references:[{label:'UK Renal Drug Database',url:'https://renaldrugdatabase.com/'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Anticoagulation in renal impairment',stem:'A patient with AF and eGFR 18 needs anticoagulation. Most appropriate choice?',options:['Standard dose DOAC','Apixaban dose-reduced per criteria (eGFR + age + weight) — preferred DOAC in CKD; warfarin alternative; avoid dabigatran in eGFR <30; LMWH not licensed for AF stroke prevention','Standard dose dabigatran','LMWH for AF','Aspirin'],correct:'B',explanation:'Severe CKD + AF: apixaban (preferred per CrCl) or warfarin. Dabigatran contraindicated <30. Edoxaban dose-reduced. Rivaroxaban dose-reduced or warfarin. LMWH not licensed for stroke prevention in AF.',distractors:{A:'Standard dose risks bleed in CKD',C:'Dabigatran contraindicated',D:'LMWH not for AF stroke prevention',E:'Aspirin ineffective for AF stroke prevention'},pearl:'CKD + AF: apixaban dose-reduced (5 mg BD or 2.5 mg BD per criteria) or warfarin. CKD stage 5 / dialysis: warfarin or no anticoagulation per multidisciplinary discussion.',references:[{label:'NICE NG196 AF',url:'https://www.nice.org.uk/guidance/ng196'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Polypharmacy STOPP/START',stem:'An 85-year-old has 14 medications. Most appropriate review framework?',options:['Continue all','Apply STOPP/START criteria — STOPP (potentially inappropriate prescriptions) + START (potentially indicated prescriptions); deprescribe where appropriate; involve pharmacist + patient','Stop all','Halve all doses','Add more medications'],correct:'B',explanation:'Polypharmacy review: STOPP/START criteria identify inappropriate prescriptions to stop and indicated medicines to start. Pharmacist-led review reduces falls, admissions, mortality. Patient and family involved.',distractors:{A:'Continuing without review propagates harm',C:'Stopping all dangerous',D:'Halving may not be evidence-based',E:'Adding without review worsens'},pearl:'STOPP/START version 3 (2023): more comprehensive list. Common STOPPs: long-term BZDs, anticholinergics, NSAIDs in CKD, theophylline, sliding scale insulin alone. Always discuss with patient.',references:[{label:'STOPP/START Criteria v3 (2023)',url:'https://academic.oup.com/ageing/article/52/12/afad198/7480721'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Warfarin antibiotic interaction',stem:'A patient on warfarin (stable INR 2.4) is started on clarithromycin for chest infection. Most appropriate?',options:['No action','Recognise major interaction (CYP3A4 inhibition) — increases warfarin level/INR; check INR within 3–5 days; consider dose reduction; alternative antibiotic if possible (doxycycline less interactive)','Increase warfarin','Stop antibiotic','Stop warfarin'],correct:'B',explanation:'Macrolides (clarithromycin, erythromycin) inhibit warfarin metabolism → INR rises, bleeding risk. Check INR 3–5 days after starting/stopping. Alternative: doxycycline less interactive. BNF interactions warning.',distractors:{A:'Major interaction needs monitoring',C:'Increase causes bleed',D:'Treatment may be needed',E:'Stopping warfarin if alternative cover possible'},pearl:'Drugs that potentiate warfarin: macrolides, metronidazole, fluconazole, amiodarone, NSAIDs, omeprazole. Drugs that reduce: rifampicin, carbamazepine, vit K-rich foods (consistent intake fine).',references:[{label:'BNF Interactions',url:'https://bnf.nice.org.uk/interactions/'}]},

  // FALLS / FRAILTY / SKIN (3)
  {section:'falls',specialty:'Geriatrics',topic:'Postural hypotension assessment',stem:'A patient has had 3 falls in 6 months. Standing BP technique for postural hypotension assessment is:',options:['Single standing measurement','Lying for 5 min, then BP and pulse; stand and measure at 1 min and 3 min; PH = SBP drop ≥20 OR DBP drop ≥10 OR symptoms','BP only when symptomatic','Sitting BP','BP every shift'],correct:'B',explanation:'Postural hypotension assessment: lie 5 min, BP/HR; stand and repeat at 1 and 3 min. PH if SBP drops ≥20 mmHg or DBP ≥10 mmHg, or symptoms despite normal BP fall.',distractors:{A:'Single measure misses delayed PH',C:'Symptoms may be absent',D:'Sitting alone insufficient',E:'Routine without standardisation low-yield'},pearl:'Postural symptoms (dizziness, lightheadedness, falls) may occur without absolute drop meeting criteria. Symptoms count even with smaller drops. Causes: drugs, dehydration, autonomic, anaemia.',references:[{label:'NICE CG161 Falls in older people',url:'https://www.nice.org.uk/guidance/cg161'}]},
  {section:'falls',specialty:'Geriatrics',topic:'Vision and hearing in falls',stem:'In falls assessment, which sensory factor independently increases falls risk?',options:['Eye colour','Visual impairment (cataract, macular degeneration, multifocal lenses): increase falls; address through optician review, cataract surgery, single-vision walking lenses; hearing impairment also increases risk via balance and orientation','Hair length','Age alone','Skin colour'],correct:'B',explanation:'Visual and hearing impairment independently increase falls. Cataract surgery and updated glasses reduce falls. Multifocal lenses increase outdoor falls (suggest single-vision for walking).',distractors:{A:'Not a risk factor',C:'Not relevant',D:'Age contributes via combined factors, not alone',E:'Not relevant'},pearl:'Cataract surgery in elderly reduces falls 30–40%. Multifocal lenses increase outdoor falls — single-vision distance glasses for walking. Hearing aids improve balance via orientation.',references:[{label:'NICE CG161 Falls',url:'https://www.nice.org.uk/guidance/cg161'}]},
  {section:'falls',specialty:'Geriatrics',topic:'Continence falls',stem:'A patient with urge incontinence has frequent night-time falls trying to reach the toilet quickly. Most appropriate?',options:['Restrict fluids','Comprehensive continence assessment + treatment (bladder retraining, anticholinergic if appropriate, mirabegron in elderly; commode at bedside; night light; non-slip floor; assess underlying cause)','Catheterisation','Bed rest','Restrict night-time fluids only'],correct:'B',explanation:'Continence + falls: address both. Bladder retraining, treat reversible causes (UTI, drugs, faecal impaction), environmental aids (commode, night light), medications cautiously (anticholinergics worsen falls; mirabegron preferred in elderly).',distractors:{A:'Severe restriction worsens dehydration',C:'Long-term catheter increases CAUTI',D:'Bed rest worsens function',E:'Sensible night-time fluid management ok, but not the only intervention'},pearl:'Anticholinergics for urge incontinence (oxybutynin, solifenacin) increase falls/cognitive risk in elderly — STOPP. Mirabegron (β3 agonist) better tolerated. Bladder retraining first-line.',references:[{label:'NICE NG123 Urinary incontinence',url:'https://www.nice.org.uk/guidance/ng123'}]},

// NAMESPACE — keeps this quiz's rooms separate from other quizzes
// sharing the same Firebase project (e.g. sce-acute, pharmacy).
// All Firebase paths read/write under: rooms/nursing/{roomId}/...
// ════════════════════════════════════════════════════════════════════
const NAMESPACE = 'nursing';
const RP = (...parts) => ['rooms', NAMESPACE, ...parts].join('/');

const $ = id => document.getElementById(id);
const escapeHtml = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const KAZ = 'amn_az_cfg_v1';
const KHOSP = 'amnQuizHospital';     // hospital/team name persistence
const lsGet = k => { try { return JSON.parse(localStorage.getItem(k) || 'null'); } catch { return null; } };
const lsSet = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const lsGetStr = k => { try { return localStorage.getItem(k) || ''; } catch { return ''; } };
const lsSetStr = (k,v) => { try { localStorage.setItem(k,v); } catch {} };
const QUESTION_TIME = 60;
const DISTRIBUTION_TIME = 5;

// ─── State ───
const S = {
  view: 'landing',     // landing | host | participant | config | setup | solo-question | solo-reveal
  roomId: null,
  playerName: null,
  isHost: false,
  rs: null,            // room state
  msalApp: null,
  msalAcc: null,
  azCfg: null,
  importedQ: [],
  selectedSections: null,  // null = all
  myAnswer: null,
  timerInterval: null,
  qrShown: false,
  // Solo mode (no Firebase, no room) — single user studying alone
  soloQ: null,         // current question object
  soloMode: null,      // 'daily' | 'random' | 'random-specialty'
  soloChoice: null,    // letter A-E they picked
  soloAnswered: false  // have they revealed yet?
};

// ════════════════════════════════════════════════════════════════════
// DAILY & RANDOM QUESTION HELPERS
// One question per day, deterministically mapped via day-of-year.
// Team and solo use different seeds so the streams differ — a clinician
// can do their team's question at handover and their personal one over
// coffee without seeing the same vignette twice.
// ════════════════════════════════════════════════════════════════════
function dayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  return Math.floor((date - start) / 86400000);
}
function seededShuffle(arr, seedInit) {
  const a = [...arr];
  let seed = seedInit ^ a.length;
  const rand = () => {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  };
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function teamTodaysQuestion() {  // seed 42 — for the team daily mode
  const shuffled = seededShuffle(QBANK, 42);
  return shuffled[(dayOfYear(new Date()) - 1) % shuffled.length];
}
function soloTodaysQuestion() {  // seed 1006 — verified 0 collisions vs team seed 42 across 366 days
  const shuffled = seededShuffle(QBANK, 1006);
  return shuffled[(dayOfYear(new Date()) - 1) % shuffled.length];
}
function randomQuestion(specialty) {
  const pool = specialty ? QBANK.filter(q => q.specialty === specialty) : QBANK;
  if (!pool.length) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

// ─── MSAL (optional MS Forms) ───
async function loadAzCfg() { return lsGet(KAZ); }
async function initMsal() {
  if (!S.azCfg?.clientId || !window.msal) return;
  try {
    S.msalApp = new msal.PublicClientApplication({
      auth: {
        clientId: S.azCfg.clientId,
        authority: 'https://login.microsoftonline.com/' + (S.azCfg.tenantId || 'common'),
        redirectUri: window.location.origin + window.location.pathname
      },
      cache: { cacheLocation: 'localStorage' }
    });
    await S.msalApp.initialize();
    const accs = S.msalApp.getAllAccounts();
    if (accs.length) S.msalAcc = accs[0];
  } catch(e) { console.warn('MSAL init failed', e); }
}
async function importForms() {
  const formId = prompt('Enter MS Forms ID:');
  if (!formId) return;
  if (!S.msalApp) { alert('Configure Azure AD in M365 settings first.'); return; }
  try {
    const login = await S.msalApp.loginPopup({ scopes: ['Forms.Read', 'User.Read'] });
    const t = await S.msalApp.acquireTokenSilent({
      account: login.account, scopes: ['Forms.Read']
    });
    const resp = await fetch(
      `https://graph.microsoft.com/beta/me/forms/${formId}/questions`,
      { headers: { Authorization: `Bearer ${t.accessToken}` } }
    );
    if (!resp.ok) throw new Error('Graph API error: ' + resp.status);
    const data = await resp.json();
    const qs = (data.value || [])
      .filter(q => q.questionType === 'choice' && q.choices?.length >= 2)
      .map(q => ({
        section: 'other', specialty: 'Imported (MS Forms)', topic: q.title || '',
        stem: q.title || q.questionText || '',
        options: q.choices.map(c => c.displayName || c.text || ''),
        correct: 'ABCDE'[Math.max(0, q.choices.findIndex(c => c.isAnswer))] || 'A',
        explanation: q.explanation || '', references: []
      }));
    S.importedQ = qs;
    alert(`Imported ${qs.length} question(s).`);
    render();
  } catch (e) { alert('Import failed: ' + e.message); }
}

// ─── Question selection ───
function getActiveBank() {
  const all = [...S.importedQ, ...QBANK];
  if (!S.selectedSections || S.selectedSections.length === 0) return all;
  const set = new Set(S.selectedSections);
  return all.filter(q => set.has(q.section));
}
function shuffle(a) { const b = [...a]; for (let i = b.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }

// ─── Room logic ───
function genRoomCode() {
  const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ', N = '23456789';
  return [...Array(2)].map(()=>A[Math.floor(Math.random()*A.length)]).join('') +
         [...Array(2)].map(()=>N[Math.floor(Math.random()*N.length)]).join('') +
         [...Array(2)].map(()=>A[Math.floor(Math.random()*A.length)]).join('');
}
async function createRoom(name) {
  const bank = getActiveBank();
  if (bank.length === 0) { alert('No questions selected. Pick at least one section.'); return; }
  const code = genRoomCode();
  const deck = shuffle(bank);
  const initial = {
    host: name,
    createdAt: Date.now(),
    deck,
    qIdx: 0,
    cq: null,
    phase: 'waiting',  // waiting | active | distribution | reveal
    startAt: 0,
    distAt: 0,
    revealAt: 0,
    players: { [name]: { name, score: 0, joinedAt: Date.now() } }
  };
  await window.fb.set(RP(code, 'state'), initial);
  S.roomId = code;
  S.playerName = name;
  S.isHost = true;
  S.view = 'host';
  listenRoom(code);
  render();
}
async function joinRoom(code, name) {
  code = code.trim().toUpperCase();
  const existing = await window.fb.get(RP(code, 'state'));
  if (!existing) { alert('Room not found.'); return; }
  let pname = name;
  // ensure unique name
  if (existing.players?.[pname]) pname = pname + '-' + Math.floor(Math.random()*100);
  await window.fb.set(RP(code, 'state', 'players', pname),
    { name: pname, score: 0, joinedAt: Date.now() });
  S.roomId = code;
  S.playerName = pname;
  S.isHost = false;
  S.view = 'participant';
  listenRoom(code);
  render();
}
function listenRoom(code) {
  window.fb.listen(RP(code, 'state'), rs => {
    if (!rs) {
      alert('Room closed.');
      cleanupRoom();
      S.view = 'landing';
      render();
      return;
    }
    const prevPhase = S.rs?.phase;
    const prevQIdx = S.rs?.qIdx;
    S.rs = rs;
    if (prevQIdx !== rs.qIdx) S.myAnswer = null;
    render();
    // host phase transitions
    if (S.isHost && rs.phase === 'active') {
      // schedule auto-transition to distribution at end of timer
      const elapsed = (Date.now() - rs.startAt) / 1000;
      const remaining = QUESTION_TIME - elapsed;
      if (remaining > 0 && prevPhase !== 'active') {
        setTimeout(() => hostMaybeAdvanceToDistribution(), Math.ceil(remaining * 1000));
      }
    }
    if (S.isHost && rs.phase === 'distribution' && prevPhase !== 'distribution') {
      setTimeout(() => hostAdvanceToReveal(), DISTRIBUTION_TIME * 1000);
    }
  });
}
function cleanupRoom() {
  if (S.roomId) window.fb.unlisten(RP(S.roomId, 'state'));
  S.roomId = null; S.rs = null; S.playerName = null; S.isHost = false; S.myAnswer = null;
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
}
async function leaveRoom() {
  if (S.isHost && S.roomId) {
    if (!confirm('You are the host. Closing the room ends the session for everyone. Continue?')) return;
    await window.fb.remove(RP(S.roomId));
  } else if (S.roomId && S.playerName) {
    await window.fb.set(RP(S.roomId, 'state', 'players', S.playerName), null);
  }
  cleanupRoom();
  S.view = 'landing';
  render();
}

// ─── Question / Phase logic ───
async function hostStart() {
  const rs = S.rs;
  if (!rs || rs.qIdx >= rs.deck.length) {
    if (rs && rs.qIdx >= rs.deck.length) {
      // reshuffle
      await window.fb.set(RP(S.roomId, 'state', 'deck'), shuffle(rs.deck));
      await window.fb.set(RP(S.roomId, 'state', 'qIdx'), 0);
    }
    return hostStart();
  }
  const cq = rs.deck[rs.qIdx];
  const startAt = Date.now();
  await window.fb.set(RP(S.roomId, 'state', 'cq'), cq);
  await window.fb.set(RP(S.roomId, 'state', 'startAt'), startAt);
  await window.fb.set(RP(S.roomId, 'state', 'phase'), 'active');
  // clear previous answers
  await window.fb.remove(RP(S.roomId, 'answers'));
}
async function hostMaybeAdvanceToDistribution() {
  if (!S.rs || S.rs.phase !== 'active') return;
  const elapsed = (Date.now() - S.rs.startAt) / 1000;
  if (elapsed < QUESTION_TIME - 0.5) return;
  await hostAdvanceToDistribution();
}
async function hostAdvanceToDistribution() {
  if (!S.rs || S.rs.phase !== 'active') return;
  await window.fb.set(RP(S.roomId, 'state', 'phase'), 'distribution');
  await window.fb.set(RP(S.roomId, 'state', 'distAt'), Date.now());
}
async function hostAdvanceToReveal() {
  if (!S.rs || S.rs.phase !== 'distribution') return;
  // tally scores
  const ans = await window.fb.get(RP(S.roomId, 'answers'));
  const cq = S.rs.cq;
  if (ans && cq) {
    const players = { ...(S.rs.players || {}) };
    const elapsed = pAns => Math.max(0, (pAns.at - S.rs.startAt) / 1000);
    Object.entries(ans).forEach(([pname, a]) => {
      if (!players[pname]) return;
      if (a.choice === cq.correct) {
        // base 100 + speed bonus up to 50
        const t = elapsed(a);
        const speedBonus = Math.max(0, Math.round(50 * (1 - t / QUESTION_TIME)));
        const newScore = (players[pname].score || 0) + 100 + speedBonus;
        players[pname] = { ...players[pname], score: newScore };
      }
    });
    await window.fb.set(RP(S.roomId, 'state', 'players'), players);
  }
  await window.fb.set(RP(S.roomId, 'state', 'phase'), 'reveal');
  await window.fb.set(RP(S.roomId, 'state', 'revealAt'), Date.now());
}
async function hostNext() {
  await window.fb.set(RP(S.roomId, 'state', 'qIdx'), (S.rs.qIdx || 0) + 1);
  await window.fb.set(RP(S.roomId, 'state', 'phase'), 'waiting');
  await window.fb.set(RP(S.roomId, 'state', 'cq'), null);
  await window.fb.remove(RP(S.roomId, 'answers'));
}
async function submitAnswer(letter) {
  if (S.myAnswer) return;
  if (!S.rs || S.rs.phase !== 'active') return;
  S.myAnswer = letter;
  await window.fb.set(RP(S.roomId, 'answers', S.playerName),
    { choice: letter, at: Date.now() });
  render();
}

// ─── Timer ───
function clearTimer() { if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; } }
function startTimer() {
  clearTimer();
  S.timerInterval = setInterval(() => {
    const fill = $('timer-fill');
    const lbl = $('timer-lbl');
    if (!fill || !S.rs) { clearTimer(); return; }
    if (S.rs.phase !== 'active') { clearTimer(); return; }
    const elapsed = (Date.now() - S.rs.startAt) / 1000;
    const remain = Math.max(0, QUESTION_TIME - elapsed);
    fill.style.width = (remain / QUESTION_TIME * 100) + '%';
    fill.classList.toggle('warn', remain < 20);
    fill.classList.toggle('danger', remain < 10);
    if (lbl) lbl.textContent = Math.ceil(remain) + 's';
    if (remain <= 0) clearTimer();
  }, 250);
}

// ─── QR ───
function makeQR() {
  const el = $('qrcode');
  if (!el || !S.roomId || S.qrShown) return;
  el.innerHTML = '';
  const url = window.location.origin + window.location.pathname + '?room=' + S.roomId;
  new QRCode(el, { text: url, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M });
  S.qrShown = true;
}

function qCard(q, phase, rs, isHost) {
  if (!q) return '<div class="card">Loading…</div>';
  const elapsed = rs?.startAt ? (Date.now() - rs.startAt) / 1000 : 0;
  const remain = Math.max(0, QUESTION_TIME - elapsed);
  const optsHtml = (q.options || []).map((opt, i) => {
    const ltr = 'ABCDE'[i];
    const sel = S.myAnswer === ltr ? 'sel' : '';
    let cls = sel;
    if (phase === 'reveal' || phase === 'distribution') {
      if (ltr === q.correct) cls = 'ok';
      else if (S.myAnswer === ltr) cls = 'bad';
      else cls = '';
    }
    const click = (phase === 'active' && !S.myAnswer && !isHost)
      ? `onclick="submitAnswer('${ltr}')"` : '';
    const dis = (phase !== 'active' || S.myAnswer || isHost) ? 'disabled' : '';
    return `<li class="opt ${cls} ${dis}" ${click}>
      <span class="ltr">${ltr}</span><span>${escapeHtml(opt)}</span>
    </li>`;
  }).join('');

  let timerHtml = '';
  if (phase === 'active') {
    timerHtml = `<div class="timer-bar"><div id="timer-fill" class="timer-fill" style="width:${remain/QUESTION_TIME*100}%"></div></div>
      <div class="muted" style="text-align:right;font-size:12px"><span id="timer-lbl">${Math.ceil(remain)}s</span></div>`;
  }

  // Distribution chart (shown in distribution & reveal phase)
  let distHtml = '';
  if (phase === 'distribution' || phase === 'reveal') {
    distHtml = `<div id="distContent">${renderDistribution(q)}</div>`;
  }

  // Explanation + references (reveal only)
  let explHtml = '';
  if (phase === 'reveal') {
    const refs = (q.references || []).map(r =>
      `<li><a href="${escapeHtml(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.label)}</a></li>`
    ).join('');
    const distractorEntries = q.distractors ? Object.entries(q.distractors) : [];
    const distHtmlBlock = distractorEntries.length ? `
      <div class="distractors">
        <strong class="label">Why the others are wrong</strong>
        <ul>${distractorEntries.map(([ltr, reason]) =>
          `<li><span class="ltr-tag">${ltr}</span>${escapeHtml(reason)}</li>`
        ).join('')}</ul>
      </div>` : '';
    const pearlHtml = q.pearl ? `
      <div class="pearl">
        <span class="pearl-icon">💡</span>
        <span><strong class="label">Pearl</strong>${escapeHtml(q.pearl)}</span>
      </div>` : '';
    explHtml = `<div class="explanation">
        <strong>Answer ${q.correct}</strong>
        ${escapeHtml(q.explanation || '')}
      </div>${distHtmlBlock}${pearlHtml}` +
      (refs ? `<div class="references"><strong>📚 References</strong><ul>${refs}</ul></div>` : '');
  }

  // Distribution countdown badge
  let distCountdown = '';
  if (phase === 'distribution' && rs?.distAt) {
    const dRemain = Math.max(0, DISTRIBUTION_TIME - (Date.now() - rs.distAt) / 1000);
    distCountdown = `<span class="badge b-amber">Reveal in ${Math.ceil(dRemain)}s</span>`;
  }

  return `<div class="card feature">
    <div class="qmeta">
      <div>
        <div class="eyebrow" style="margin-bottom:2px">${escapeHtml(q.specialty || '')}</div>
        <div class="muted" style="font-size:13px">${escapeHtml(q.topic || '')}</div>
      </div>
      ${distCountdown}
    </div>
    ${timerHtml}
    ${q.imageUrl ? `<img class="qimg" src="${escapeHtml(q.imageUrl)}" alt="${escapeHtml(q.imageAlt||'')}" onerror="this.style.display='none'">` : ''}
    <div class="stem">${escapeHtml(q.stem)}</div>
    <ul class="opts">${optsHtml}</ul>
    ${distHtml}
    ${explHtml}
  </div>`;
}

function renderDistribution(q) {
  // Need to fetch latest answers — use cached rs if available; we'll request fresh elsewhere.
  // For now, use most recent S._answerSnap if listening.
  const ans = S._answerSnap || {};
  const counts = [0,0,0,0,0];
  Object.values(ans).forEach(a => {
    const i = 'ABCDE'.indexOf(a.choice);
    if (i >= 0) counts[i]++;
  });
  const total = counts.reduce((a,b)=>a+b, 0) || 1;
  return `<div class="mt12">
    <strong style="font-size:13px;color:var(--muted)">Answer distribution (${total} response${total===1?'':'s'})</strong>
    ${counts.map((c, i) => {
      const ltr = 'ABCDE'[i];
      const pct = Math.round(c / total * 100);
      const isCorrect = ltr === q.correct;
      return `<div class="dist-row ${isCorrect?'right':''}">
        <span class="ltr">${ltr}</span>
        <div class="dist-bar"><div class="dist-bar-fill" style="width:${pct}%"></div></div>
        <span class="dist-count">${c} (${pct}%)</span>
      </div>`;
    }).join('')}
  </div>`;
}

function leaderboardHtml(rs) {
  const players = Object.values(rs?.players || {});
  players.sort((a, b) => (b.score||0) - (a.score||0));
  if (players.length === 0) return '<p class="muted" style="font-size:13px">No players yet</p>';
  return players.slice(0, 12).map((p, i) => {
    const isYou = p.name === S.playerName;
    return `<div class="lb-row ${isYou?'you':''}">
      <span class="lb-rank">${i+1}.</span>
      <span class="lb-name">${escapeHtml(p.name)}${isYou?' (you)':''}</span>
      <span class="lb-score">${p.score||0}</span>
    </div>`;
  }).join('');
}

function soloQuestionView() {
  const q = S.soloQ;
  if (!q) { S.view = 'landing'; return landingView(); }
  const modeLabel = S.soloMode === 'daily' ? `Today's question · day ${dayOfYear(new Date())}`
                  : S.soloMode === 'random-specialty' ? `Practice · ${q.specialty}`
                  : 'Practice · random';

  const optsHtml = (q.options || []).map((opt, i) => {
    const ltr = 'ABCDE'[i];
    const sel = S.soloChoice === ltr ? 'sel' : '';
    return `<li class="opt ${sel}" onclick="pickSoloAnswer('${ltr}')">
      <span class="ltr">${ltr}</span><span>${escapeHtml(opt)}</span>
    </li>`;
  }).join('');

  return brand() + `
  <div class="flex aic gap8 mb12 wrap-flex">
    <button class="btn sm" onclick="exitSolo()">← Back</button>
    <span class="eyebrow">${escapeHtml(modeLabel)}</span>
  </div>
  <div class="card feature">
    <div class="qmeta">
      <div>
        <div class="eyebrow" style="margin-bottom:2px">${escapeHtml(q.specialty || '')}</div>
        <div class="muted" style="font-size:13px">${escapeHtml(q.topic || '')}</div>
      </div>
    </div>
    ${q.imageUrl ? `<img class="qimg" src="${escapeHtml(q.imageUrl)}" alt="${escapeHtml(q.imageAlt||'')}" onerror="this.style.display='none'">` : ''}
    <div class="stem">${escapeHtml(q.stem)}</div>
    <ul class="opts">${optsHtml}</ul>
    <div class="flex gap8 mt12">
      <button class="btn primary lg" onclick="revealSoloAnswer()" ${S.soloChoice ? '' : 'disabled'}>Reveal answer →</button>
      <button class="btn sm" onclick="exitSolo()" style="margin-left:auto">Back to start</button>
    </div>
  </div>`;
}

function soloRevealView() {
  const q = S.soloQ;
  if (!q) { S.view = 'landing'; return landingView(); }
  const correct = q.correct;
  const yours = S.soloChoice;
  const wasCorrect = yours === correct;

  const optsHtml = (q.options || []).map((opt, i) => {
    const ltr = 'ABCDE'[i];
    let cls = '';
    if (ltr === correct) cls = 'ok';
    else if (ltr === yours) cls = 'bad';
    return `<li class="opt ${cls} disabled">
      <span class="ltr">${ltr}</span>
      <span style="flex:1">${escapeHtml(opt)}</span>
      ${ltr === correct ? `<span class="badge b-green" style="margin-left:auto">correct</span>` : ''}
      ${ltr === yours && ltr !== correct ? `<span class="badge" style="background:var(--bad-soft);color:var(--bad);margin-left:auto">your answer</span>` : ''}
    </li>`;
  }).join('');

  const refs = (q.references || []).map(r =>
    `<li><a href="${escapeHtml(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.label)}</a></li>`
  ).join('');

  const verdictBadge = wasCorrect
    ? `<span class="badge b-green" style="font-size:14px;padding:6px 14px">✓ Correct</span>`
    : `<span class="badge" style="background:var(--bad-soft);color:var(--bad);font-size:14px;padding:6px 14px">✗ Incorrect — answer is ${correct}</span>`;

  return brand() + `
  <div class="flex aic gap8 mb12 wrap-flex">
    <button class="btn sm" onclick="exitSolo()">← Back</button>
    <span class="eyebrow">${S.soloMode === 'daily' ? `Today's question · day ${dayOfYear(new Date())}` : 'Practice'}</span>
    <span style="margin-left:auto">${verdictBadge}</span>
  </div>
  <div class="card feature">
    <div class="qmeta">
      <div>
        <div class="eyebrow" style="margin-bottom:2px">${escapeHtml(q.specialty || '')}</div>
        <div class="muted" style="font-size:13px">${escapeHtml(q.topic || '')}</div>
      </div>
    </div>
    ${q.imageUrl ? `<img class="qimg" src="${escapeHtml(q.imageUrl)}" alt="${escapeHtml(q.imageAlt||'')}" onerror="this.style.display='none'">` : ''}
    <div class="stem">${escapeHtml(q.stem)}</div>
    <ul class="opts">${optsHtml}</ul>
    <div class="explanation">
      <strong>Explanation</strong>
      ${escapeHtml(q.explanation || '')}
    </div>
    ${q.distractors && Object.keys(q.distractors).length ? `
    <div class="distractors">
      <strong class="label">Why the others are wrong</strong>
      <ul>${Object.entries(q.distractors).map(([ltr, reason]) =>
        `<li><span class="ltr-tag">${ltr}</span>${escapeHtml(reason)}</li>`
      ).join('')}</ul>
    </div>` : ''}
    ${q.pearl ? `
    <div class="pearl">
      <span class="pearl-icon">💡</span>
      <span><strong class="label">Pearl</strong>${escapeHtml(q.pearl)}</span>
    </div>` : ''}
    ${refs ? `<div class="references"><strong>📚 References</strong><ul>${refs}</ul></div>` : ''}
    <div class="flex gap8 mt12 wrap-flex">
      <button class="btn primary lg" onclick="nextSoloRandom()">Next random question →</button>
      <button class="btn lg" onclick="nextSoloSpecialty()">Another ${escapeHtml(q.specialty)} question →</button>
      <button class="btn sm" onclick="exitSolo()" style="margin-left:auto">Back to start</button>
    </div>
  </div>`;
}

// ─── Solo handlers ───
function startSoloDaily() {
  S.soloQ = soloTodaysQuestion();
  S.soloMode = 'daily';
  S.soloChoice = null;
  S.soloAnswered = false;
  S.view = 'solo-question';
  render();
}
function startSoloRandom(specialty) {
  S.soloQ = randomQuestion(specialty);
  S.soloMode = specialty ? 'random-specialty' : 'random';
  S.soloChoice = null;
  S.soloAnswered = false;
  S.view = 'solo-question';
  render();
}
function pickSoloAnswer(letter) {
  if (S.soloAnswered) return;
  S.soloChoice = letter;
  render();
}
function revealSoloAnswer() {
  if (!S.soloChoice) return;
  S.soloAnswered = true;
  S.view = 'solo-reveal';
  render();
}
function nextSoloRandom() { startSoloRandom(); }
function nextSoloSpecialty() { if (S.soloQ) startSoloRandom(S.soloQ.specialty); }
function exitSolo() {
  S.soloQ = null; S.soloMode = null; S.soloChoice = null; S.soloAnswered = false;
  S.view = 'landing';
  render();
}

const VIEWS = {
  landing: landingView, host: hostView, participant: participantView,
  config: configView, setup: setupView,
  'solo-question': soloQuestionView, 'solo-reveal': soloRevealView
};

function render() {
  const root = $('root');
  if (!root) return;
  if (!window.fb?.ready?.()) { root.innerHTML = setupView(); return; }
  const fn = VIEWS[S.view] || landingView;
  root.innerHTML = fn();
  if (S.view === 'host' && S.rs?.phase === 'waiting') {
    setTimeout(makeQR, 30);
  } else { S.qrShown = false; }
  if (S.rs?.phase === 'active') startTimer();

  // listen to answers when active/distribution/reveal
  if (S.roomId && (S.rs?.phase === 'active' || S.rs?.phase === 'distribution' || S.rs?.phase === 'reveal')) {
    const apath = RP(S.roomId, 'answers');
    if (!S._answerListenPath || S._answerListenPath !== apath) {
      if (S._answerListenPath) window.fb.unlisten(S._answerListenPath);
      S._answerListenPath = apath;
      window.fb.listen(apath, snap => {
        S._answerSnap = snap || {};
        // re-render distribution if visible
        const dc = $('distContent');
        if (dc && S.rs?.cq) dc.innerHTML = renderDistribution(S.rs.cq);
      });
    }
  }
}

window.hostClick = () => {
  const n = $('hn')?.value.trim();
  if (!n) return alert('Please enter a hospital or team name.');
  lsSetStr(KHOSP, n);  // remember for next time
  createRoom(n);
};
window.joinClick = () => {
  const c = $('jc')?.value.trim();
  const n = $('jn')?.value.trim();
  if (!c || !n) return alert('Please fill in both fields.');
  joinRoom(c, n);
};
window.goNav = v => { S.view = v; render(); };
window.toggleSection = key => {
  if (!S.selectedSections) S.selectedSections = Object.keys(BLUEPRINT);
  if (S.selectedSections.includes(key))
    S.selectedSections = S.selectedSections.filter(k => k !== key);
  else S.selectedSections.push(key);
  if (S.selectedSections.length === Object.keys(BLUEPRINT).length) S.selectedSections = null;
  render();
};
window.resetSections = () => { S.selectedSections = null; render(); };
window.saveAzCfg = () => {
  const c = { clientId: $('cfg_client').value.trim(), tenantId: $('cfg_tenant').value.trim() };
  if (!c.clientId) return alert('Client ID required.');
  S.azCfg = c; lsSet(KAZ, c);
  initMsal().then(() => { alert('Saved.'); S.view = 'landing'; render(); });
};
window.clearAzCfg = () => {
  if (!confirm('Clear M365 configuration?')) return;
  localStorage.removeItem(KAZ); S.azCfg = null; S.msalApp = null; S.msalAcc = null;
  render();
};
window.hostStart = hostStart;
window.hostNext = hostNext;
window.hostAdvanceToDistribution = hostAdvanceToDistribution;
window.submitAnswer = submitAnswer;
window.leaveRoom = leaveRoom;
window.importForms = importForms;
window.startSoloDaily = startSoloDaily;
window.startSoloRandom = startSoloRandom;
window.pickSoloAnswer = pickSoloAnswer;
window.revealSoloAnswer = revealSoloAnswer;
window.nextSoloRandom = nextSoloRandom;
window.nextSoloSpecialty = nextSoloSpecialty;
window.exitSolo = exitSolo;

// ─── Boot ───
async function boot() {
  S.azCfg = await loadAzCfg();
  if (S.azCfg?.clientId) await initMsal();
  const pre = new URLSearchParams(window.location.search).get('room');
  if (pre) S.view = 'landing';
  render();
}

window.addEventListener('fb-ready', boot);
if (window.fb) boot();
</script>
