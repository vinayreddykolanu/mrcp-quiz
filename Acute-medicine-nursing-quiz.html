  {section:'resp',specialty:'Respiratory',topic:'Tracheostomy suctioning',stem:'A patient with a tracheostomy has audible secretions and reduced SpO₂. The most appropriate suction technique is:',options:['Continuous suction for 60 seconds','Pre-oxygenate, sterile catheter, suction ≤10 seconds intermittently, withdraw with rotation','Use unsterile suction','Suction without pre-oxygenation','Deep suction past carina routinely'],correct:'B',explanation:'Tracheostomy suction: pre-oxygenate, sterile technique, ≤10 seconds, no suction on insertion, withdraw with rotation. Monitor SpO₂ throughout.',distractors:{A:'Prolonged suction causes hypoxia and trauma',C:'Unsterile suction risks introducing infection',D:'Without pre-oxygenation risks profound desaturation',E:'Deep suction past carina causes mucosal injury'},pearl:'Suction only when needed (clinical assessment), not routinely. Catheter size = (tube size − 2) × 2 = French gauge. Stop if SpO₂ <90% or bradycardia.',references:[{label:'Intensive Care Society Standards for Tracheostomy',url:'https://www.ics.ac.uk/Society/Guidance/PDFs/Tracheostomy_standards_2014'}]},
  {section:'resp',specialty:'Respiratory',topic:'Chest drain management',stem:'A patient with a chest drain for pneumothorax has the drain bottle inverted above the chest level. Most appropriate immediate action?',options:['Continue and document','Lower bottle below chest level immediately, check for swing/bubble, escalate to medical team','Clamp the drain','Remove the drain','Disconnect the tubing'],correct:'B',explanation:'Chest drain bottle must remain below chest level to maintain water seal and prevent re-entry of air/fluid. Check function and escalate.',distractors:{A:'Continuing with inverted bottle risks tension pneumothorax',C:'Clamping may cause tension pneumothorax',D:'Removal without medical decision is wrong',E:'Disconnection causes air entry and pneumothorax'},pearl:'Chest drain must be below patient. Don\'t clamp on transfer (risk of tension). Swing = patent and connected. Bubbling = air leak. Stops swinging = blocked or lung re-expanded.',references:[{label:'BTS Chest Drains Guideline',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/pleural-disease/'}]},
  {section:'resp',specialty:'Respiratory',topic:'ARDS',stem:'A patient with severe pneumonia is intubated and ventilated. PaO₂ 7.2 on FiO₂ 0.8 (P/F ratio 90), bilateral infiltrates, no cardiac cause.',options:['Increase FiO₂ to 1.0','Lung-protective ventilation (low tidal volume 6 mL/kg, PEEP, prone positioning), critical care','Stop ventilation','Diuresis','Steroids alone'],correct:'B',explanation:'ARDS (Berlin definition: P/F <300, bilateral infiltrates, no cardiac cause). Lung-protective ventilation (VT 6 mL/kg IBW), PEEP, prone if P/F <150, neuromuscular blockade if severe.',distractors:{A:'High FiO₂ alone without lung-protective strategy worsens lung injury',C:'Stopping ventilation in ARDS is fatal',D:'Diuresis only beneficial if fluid overload contributing',E:'Steroids alone insufficient'},pearl:'ARDS: severe = P/F <100. Prone position 16+ hours/day reduces mortality (PROSEVA). VV-ECMO for refractory cases (CESAR/EOLIA).',references:[{label:'ICS Guidelines for Mechanical Ventilation',url:'https://www.ics.ac.uk/Society/Guidance/Guidelines'}]},
  {section:'resp',specialty:'Respiratory',topic:'Bronchiectasis exacerbation',stem:'A 58-year-old with bronchiectasis has 2-week increased purulent sputum, breathlessness, T 37.8°C. Sputum culture pending.',options:['Reassure and discharge','Empirical oral antibiotics per local protocol (e.g. amoxicillin or ciprofloxacin if Pseudomonas history), chest physio, sputum culture','IV antibiotics for all','Steroid burst','Bronchodilator only'],correct:'B',explanation:'Bronchiectasis exacerbation: 14-day empirical antibiotics targeted at previous isolates (often Pseudomonas, H. influenzae), sputum sample, airway clearance.',distractors:{A:'Discharge without treatment misses exacerbation',C:'IV not always required if oral tolerated and no sepsis',D:'Steroids not first-line in bronchiectasis exacerbation',E:'Bronchodilator alone misses bacterial exacerbation'},pearl:'Bronchiectasis: send sputum, treat 14 days (longer than COPD), cover Pseudomonas if grown previously, airway clearance is foundation of management.',references:[{label:'BTS Bronchiectasis Guideline',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/bronchiectasis-in-adults/'}]},
  {section:'resp',specialty:'Respiratory',topic:'Severe asthma drug ladder',stem:'A patient with acute severe asthma is not improving after 30 minutes of back-to-back nebulised salbutamol/ipratropium and oral prednisolone. SpO₂ 91%, RR 32, PEF 35%.',options:['Discharge home','IV magnesium sulfate 1.2–2 g over 20 min, escalate to ICU, consider IV salbutamol/aminophylline','Continue same management','Oral antihistamine','Sit upright only'],correct:'B',explanation:'Severe asthma not improving with first-line: IV magnesium 1.2–2 g, ICU referral, IV salbutamol or aminophylline. Consider intubation if exhaustion/silent chest.',distractors:{A:'Discharge dangerous',C:'Continuing failing therapy without escalation',D:'Antihistamines do not treat acute asthma',E:'Position alone insufficient'},pearl:'Asthma escalation: nebulised salbutamol+ipratropium + steroid → IV mag → IV aminophylline/salbutamol → ICU. Silent chest, exhaustion, PaCO₂ rising = peri-arrest.',references:[{label:'BTS/SIGN Asthma Guidelines',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/asthma/'}]},
  {section:'resp',specialty:'Respiratory',topic:'HFNO indication',stem:'A patient with type 1 respiratory failure (PaO₂ 7.5, PaCO₂ 4.2) has SpO₂ 90% on 15 L via non-rebreathe mask. Most appropriate next step?',options:['Increase to 20 L on rebreathe','High-flow nasal oxygen (HFNO) at 50–60 L/min, FiO₂ titrated, escalate critical care','Switch to NIV BiPAP','Intubate now','Reduce oxygen'],correct:'B',explanation:'Persistent T1 RF on maximum face mask oxygen: HFNO improves oxygenation, reduces work of breathing, washout of dead space. Critical care escalation.',distractors:{A:'15 L is maximum for non-rebreathe',C:'BiPAP for hypercapnic failure, not T1 RF',D:'Intubation premature if HFNO option available',E:'Reducing oxygen worsens hypoxia'},pearl:'HFNO: 50–60 L/min, heated humidified, titratable FiO₂. Reduces intubation in T1 RF. PEEP-like effect ~1 cmH₂O per 10 L flow. Avoid in hypercapnic failure.',references:[{label:'BTS Guideline for Oxygen Use 2017',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/emergency-oxygen/'}]},

  // ENDOCRINE (6 new)
  {section:'endo',specialty:'Endocrine',topic:'SIADH management',stem:'A 72-year-old with small cell lung cancer has Na 118, normal volume status, low plasma osmolality, high urine osmolality, urine Na 60. Confused but stable.',options:['Rapid IV hypertonic saline','Fluid restriction 800–1000 mL/day, treat underlying cause, careful Na correction <8–10/24 h','Large volume 0.9% saline','Furosemide alone','Demeclocycline immediately'],correct:'B',explanation:'SIADH: fluid restrict, treat cause. Severe symptomatic hyponatraemia <120 may need hypertonic saline cautiously. Correction limit 8–10 mmol/L per 24 h to avoid CPM.',distractors:{A:'Rapid correction risks central pontine myelinolysis',C:'Large saline volume worsens dilutional Na',D:'Furosemide alone causes further Na loss',E:'Demeclocycline second-line, not immediate'},pearl:'Osmotic demyelination (CPM) catastrophic — never correct Na faster than 8–10 mmol/L/24 h. Tolvaptan considered for refractory SIADH (specialist).',references:[{label:'European Hyponatraemia Guidelines',url:'https://academic.oup.com/ndt/article/29/suppl_2/i1/1862453'}]},
  {section:'endo',specialty:'Endocrine',topic:'Severe symptomatic hyponatraemia',stem:'A patient has Na 112, seizure, GCS 8. Fluid status euvolaemic.',options:['Fluid restriction','Hypertonic saline 150 mL 3% NaCl over 10 min, repeat ×2 if needed, ICU','0.9% saline 1 L over 1 h','Oral salt tablets','Furosemide'],correct:'B',explanation:'Severe symptomatic hyponatraemia (seizure, coma): hypertonic 3% saline 150 mL bolus over 10 min, may repeat ×2, target Na rise 5 mmol/L. ICU for monitoring.',distractors:{A:'Fluid restriction too slow for seizure',C:'Isotonic saline not Na-correcting',D:'Oral too slow',E:'Furosemide worsens Na'},pearl:'Severe symptomatic hyponatraemia is a medical emergency. Cautious 5 mmol/L Na rise is enough to reverse cerebral oedema. After symptoms relieved, slow correction.',references:[{label:'Society for Endocrinology UK Hyponatraemia',url:'https://www.endocrinology.org/clinical-practice/hyponatraemia-society/'}]},
  {section:'endo',specialty:'Endocrine',topic:'Hypocalcaemia tetany',stem:'Post-thyroidectomy day 1, patient develops perioral tingling, carpopedal spasm, Chvostek\'s sign positive. Corrected calcium 1.65 mmol/L.',options:['Oral calcium tablets','IV calcium gluconate 10% 10 mL slow + ECG monitoring + investigate cause','Vitamin D loading dose','Phosphate replacement','Discharge'],correct:'B',explanation:'Symptomatic severe hypocalcaemia: IV calcium gluconate 10% 10 mL over 10 min with ECG monitoring (cardiac arrhythmia risk). Investigate (PTH, Mg, vit D).',distractors:{A:'Oral too slow for tetany',C:'Vit D doesn\'t correct acute Ca acutely',D:'Phosphate inappropriate',E:'Discharge fatal'},pearl:'Post-thyroidectomy hypocalcaemia from inadvertent parathyroid removal/devascularisation. Check Mg (low Mg causes resistant low Ca). Trousseau and Chvostek classic signs.',references:[{label:'Society for Endocrinology Emergency Endocrine Guidance',url:'https://www.endocrinology.org/clinical-practice/clinical-guidance/'}]},
  {section:'endo',specialty:'Endocrine',topic:'Sick day rules diabetes',stem:'A 45-year-old with type 1 diabetes has flu, vomiting, BG 18, ketones 1.8. He has stopped his insulin because he is not eating.',options:['Continue insulin omission','Resume basal insulin, sip sugary fluids if BG low / sugar-free if high, frequent BG and ketone checks, escalate if ketones >3 or vomiting persists','Take double insulin dose','Stop all insulin permanently','Increase basal insulin tenfold'],correct:'B',explanation:'T1DM sick day rules: NEVER stop insulin (DKA risk), check BG every 2 h and ketones if BG >13 or ill, hydrate, eat carbs if able, escalate per ketone level.',distractors:{A:'Stopping insulin causes DKA',C:'Doubling without rationale risks hypo',D:'Permanent cessation causes recurrent DKA',E:'Tenfold increase is dangerous'},pearl:'Never stop insulin in T1DM. Sick day kit: BG meter, ketone meter, glucose, sugary drinks, contact card. Ketones ≥3 = DKA, hospital.',references:[{label:'Diabetes UK Sick Day Rules',url:'https://www.diabetes.org.uk/guide-to-diabetes/managing-your-diabetes/sick-day-rules'}]},
  {section:'endo',specialty:'Endocrine',topic:'Phaeochromocytoma crisis',stem:'A 52-year-old has paroxysmal headache, sweating, palpitations, BP 230/130. Plasma metanephrines elevated.',options:['Start β-blocker first','α-blocker (phenoxybenzamine) FIRST, then add β-blocker if needed, urgent endocrine referral','Diuretic alone','ACE inhibitor only','Discharge home'],correct:'B',explanation:'Phaeochromocytoma: α-blockade FIRST (phenoxybenzamine or doxazosin), then β-blocker if tachycardia. β-blocker alone causes unopposed α effect → hypertensive crisis.',distractors:{A:'β-blocker first → unopposed α → catastrophic BP rise',C:'Diuretic insufficient',D:'ACEi insufficient',E:'Discharge in crisis dangerous'},pearl:'10% rule for phaeochromocytoma: 10% bilateral, 10% extra-adrenal, 10% malignant, 10% familial (MEN2). α-blockade ALWAYS before β-blockade or surgery.',references:[{label:'Society for Endocrinology Phaeo Guidance',url:'https://www.endocrinology.org/clinical-practice/clinical-guidance/'}]},
  {section:'endo',specialty:'Endocrine',topic:'Pituitary apoplexy',stem:'A 58-year-old with known pituitary macroadenoma develops sudden severe headache, visual field loss, drowsy. Cortisol low.',options:['Discharge with analgesia','IV hydrocortisone 100 mg + urgent MRI + neurosurgical referral','Oral hydrocortisone','Routine endocrine clinic','Reassure'],correct:'B',explanation:'Pituitary apoplexy: cortisol replacement IMMEDIATELY (life-threatening adrenal insufficiency), urgent imaging, neurosurgical input for visual loss.',distractors:{A:'Discharge fatal',C:'Oral too slow',D:'Routine review misses emergency',E:'Reassurance dangerous'},pearl:'Pituitary apoplexy = haemorrhage/infarction of pituitary. Sudden headache + visual loss + cranial nerve palsy + adrenal crisis. Steroids first, MRI second, surgery third.',references:[{label:'Society for Endocrinology Pituitary Apoplexy',url:'https://www.endocrinology.org/clinical-practice/clinical-guidance/'}]},

  // NEUROLOGY (6 new)
  {section:'neuro',specialty:'Neurology',topic:'HSV encephalitis',stem:'A 34-year-old has 3-day fever, confusion, seizure, expressive dysphasia. CSF: lymphocytosis, normal glucose, mild protein rise. CT normal.',options:['Discharge','IV aciclovir 10 mg/kg TDS empirically + LP for HSV PCR + MRI','Oral aciclovir','Discharge with neurology follow-up','Steroids alone'],correct:'B',explanation:'Suspected HSV encephalitis: IV aciclovir empirically (do NOT wait for PCR), LP, MRI shows temporal lobe changes. Treat 14–21 days, longer if immunocompromised.',distractors:{A:'Discharge fatal',C:'Oral inadequate',D:'Routine review misses 70% mortality untreated',E:'Steroids not first-line'},pearl:'HSV encephalitis: temporal lobe predilection. Untreated mortality 70%; with timely aciclovir, drops to 10–15%. Don\'t wait for PCR — treat empirically.',references:[{label:'Association of British Neurologists Encephalitis',url:'https://www.theabn.org/'}]},
  {section:'neuro',specialty:'Neurology',topic:'Posterior circulation stroke',stem:'A 70-year-old has sudden vertigo, dysarthria, ataxia, double vision, nystagmus. NIHSS 4.',options:['Reassure as benign positional vertigo','FAST + CT head + stroke pathway (consider thrombolysis/thrombectomy)','Outpatient ENT referral','Antihistamine only','Discharge with vestibular exercises'],correct:'B',explanation:'Posterior circulation stroke: FAST often negative; HINTS exam helps. Treat as stroke — image (CT then MRI), consider thrombolysis ≤4.5 h, thrombectomy if large vessel.',distractors:{A:'BPPV doesn\'t cause dysarthria/diplopia',C:'ENT referral delays stroke pathway',D:'Antihistamine masks stroke',E:'Discharge dangerous'},pearl:'Posterior circulation stroke missed in 35% — FAST insensitive. Look for the 5 D\'s: Dizziness, Dysarthria, Diplopia, Drop attacks, Dysphagia. Plus ataxia.',references:[{label:'NICE NG128 Stroke',url:'https://www.nice.org.uk/guidance/ng128'}]},
  {section:'neuro',specialty:'Neurology',topic:'MSCC neurological deficit',stem:'A 62-year-old with known prostate cancer has 3-day worsening back pain, bilateral leg weakness, urinary retention, saddle anaesthesia.',options:['Outpatient MRI in 2 weeks','Urgent whole-spine MRI <24 h + IV dexamethasone 16 mg + oncology/spinal team','Physiotherapy','Discharge with analgesia','NSAID'],correct:'B',explanation:'MSCC = oncological emergency. MRI within 24 h (within 1 h if rapidly progressing), dexamethasone 16 mg IV, definitive treatment (surgery/RT) <24 h to preserve function.',distractors:{A:'2-week wait misses functional recovery window',C:'Physio without diagnosis dangerous',D:'Discharge catastrophic',E:'NSAID alone misses emergency'},pearl:'Once paraplegic, only 50% regain ambulation. Time-critical. Any cancer + back pain + neuro signs = think MSCC. Acute management: dexamethasone 16 mg + urgent MRI.',references:[{label:'NICE NG121 Suspected cancer',url:'https://www.nice.org.uk/guidance/ng12'}]},
  {section:'neuro',specialty:'Neurology',topic:'Guillain-Barré syndrome',stem:'A 42-year-old has 1-week ascending leg weakness, 2 weeks post-Campylobacter gastroenteritis. Now arms also weak, areflexic, FVC 1.4 L.',options:['Reassure and discharge','Admit, monitor FVC 4-hourly, IVIg or plasma exchange, consider ICU if FVC <1 L or bulbar/autonomic involvement','Steroids alone','Antibiotics','Physiotherapy outpatient'],correct:'B',explanation:'GBS: monitor respiratory function (FVC), bulbar/autonomic. Treat with IVIg or plasma exchange (equivalent efficacy). Steroids do NOT help. ICU for FVC <1 L, weak swallow, autonomic instability.',distractors:{A:'Discharge dangerous',C:'Steroids ineffective in GBS',D:'Antibiotics don\'t treat post-infectious GBS',E:'Outpatient management misses respiratory failure risk'},pearl:'GBS: 30% need ventilation. Watch FVC trend (drop ≥30% from baseline = warning). Autonomic dysfunction (BP swings, arrhythmia) is leading cause of death.',references:[{label:'Association of British Neurologists GBS Guidelines',url:'https://www.theabn.org/'}]},
  {section:'neuro',specialty:'Neurology',topic:'Myasthenic crisis',stem:'A 55-year-old with myasthenia gravis has worsening dysphagia, bulbar weakness, FVC 1.1 L falling, recent chest infection.',options:['Continue current pyridostigmine','Admit ICU, IVIg or plasma exchange, hold pyridostigmine if cholinergic crisis suspected, treat infection','Increase pyridostigmine fivefold','Discharge home','Outpatient appointment'],correct:'B',explanation:'Myasthenic crisis: respiratory/bulbar failure. ICU for ventilation, IVIg or PLEX, identify trigger (infection, drugs). Cholinergic crisis (over-treatment) presents similarly — distinguish by edrophonium or response.',distractors:{A:'Continuing same dose if crisis insufficient',C:'Fivefold increase risks cholinergic crisis',D:'Discharge fatal',E:'Outpatient delays critical intervention'},pearl:'MG drugs to avoid: aminoglycosides, telithromycin, β-blockers, magnesium, certain anaesthetics. Crisis triggers: infection, surgery, drug change.',references:[{label:'Association of British Neurologists MG Guidelines',url:'https://www.theabn.org/'}]},
  {section:'neuro',specialty:'Neurology',topic:'Wernicke encephalopathy',stem:'A 50-year-old with chronic alcohol misuse has confusion, ophthalmoplegia, ataxia. About to be given IV glucose for hypoglycaemia.',options:['IV glucose first then thiamine','IV thiamine BEFORE glucose (Pabrinex 2 pairs IV TDS for 3 days), then glucose','Oral thiamine','Skip thiamine','IV magnesium only'],correct:'B',explanation:'Wernicke encephalopathy: IV thiamine BEFORE any glucose load. Pabrinex 2 pairs IV TDS for 3 days minimum. Untreated → Korsakoff (irreversible amnesia).',distractors:{A:'Glucose without thiamine precipitates Wernicke',C:'Oral thiamine inadequate absorption',D:'Skipping thiamine causes irreversible damage',E:'Magnesium adjunct, not primary treatment'},pearl:'Wernicke triad: confusion + ophthalmoplegia + ataxia (only 10% have all three). Treat empirically in any malnourished/alcoholic patient. Thiamine FIRST, glucose second.',references:[{label:'Royal College of Physicians Alcohol Guidelines',url:'https://www.rcplondon.ac.uk/projects/outputs/alcohol-use-disorders'}]},

  // ANAPHYLAXIS (3 new)
  {section:'anaphylaxis',specialty:'Allergy',topic:'Latex anaphylaxis',stem:'A theatre nurse with known latex allergy is exposed to latex gloves and develops urticaria, wheeze, BP 80/50, throat tightness within 5 min.',options:['Antihistamine and observation','IM adrenaline 500 mcg + remove allergen + ABCDE + IV fluids + escalate','Steroid alone','Bronchodilator only','Reassure'],correct:'B',explanation:'Anaphylaxis: IM adrenaline first-line regardless of trigger. Remove allergen. Same Resus Council algorithm.',distractors:{A:'Antihistamine alone inadequate',C:'Steroid alone inadequate',D:'Bronchodilator inadequate',E:'Reassurance dangerous'},pearl:'Latex allergy: type I (IgE, anaphylaxis) and type IV (delayed contact dermatitis). Latex-fruit syndrome: avocado, banana, kiwi, chestnut cross-react.',references:[{label:'Resus Council UK Anaphylaxis 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/emergency-treatment-anaphylaxis'}]},
  {section:'anaphylaxis',specialty:'Allergy',topic:'Food anaphylaxis ED',stem:'A 19-year-old eats a peanut by mistake, develops oral itching, then urticaria, vomiting, hoarse voice, wheeze, BP 86/54 within 15 min.',options:['Oral antihistamine','IM adrenaline 500 mcg anterolateral thigh + ABCDE + IV fluids + 12-h observation, allergy referral, 2 auto-injectors at discharge','Steroid only','IV adrenaline 1 mg','Discharge after 1 h'],correct:'B',explanation:'Food anaphylaxis: IM adrenaline, ABCDE, 12-h observation (high-risk biphasic given asthma history common), allergy clinic, written plan, two auto-injectors.',distractors:{A:'Antihistamine inadequate',C:'Steroid inadequate',D:'IV 1 mg is arrest dose',E:'1-h discharge inadequate observation'},pearl:'Food anaphylaxis biphasic in 5–20%. Asthmatic + food allergy = highest fatal risk. Always allergy referral and two auto-injectors at discharge.',references:[{label:'BSACI Food Allergy Guidance',url:'https://www.bsaci.org/professional-resources/'}]},
  {section:'anaphylaxis',specialty:'Allergy',topic:'Drug anaphylaxis penicillin',stem:'A patient receives IV co-amoxiclav and within 2 minutes develops urticaria, hypotension 78/48, throat swelling. Allergy not previously documented.',options:['Continue infusion slower','STOP infusion + IM adrenaline 500 mcg + ABCDE + IV fluids + allergy alert + report to MHRA Yellow Card','Antihistamine','Reassure','Skin prick test now'],correct:'B',explanation:'Drug anaphylaxis: STOP infusion, IM adrenaline, ABCDE, document allergy clearly (electronic + paper + alert wristband), MHRA Yellow Card report, allergy referral.',distractors:{A:'Continuing worsens reaction',C:'Antihistamine alone inadequate',D:'Reassurance dangerous',E:'Skin prick during reaction unsafe'},pearl:'Drug anaphylaxis: clear documentation prevents future events. ALL severe reactions reported to MHRA Yellow Card. Refer to allergy clinic for confirmation testing.',references:[{label:'MHRA Yellow Card Scheme',url:'https://yellowcard.mhra.gov.uk/'}]},

  // RENAL & FLUIDS (6 new)
  {section:'renal',specialty:'Nephrology',topic:'AKI KDIGO staging',stem:'A patient has serum creatinine rise from baseline 80 to 220 over 5 days. Urine output 0.4 mL/kg/h for 14 hours. KDIGO AKI stage?',options:['Stage 1','Stage 2','Stage 3','Stage 4','Not AKI'],correct:'C',explanation:'KDIGO Stage 3: creatinine ≥3× baseline OR ≥354 µmol/L OR RRT. Or UO <0.3 mL/kg/h ≥24 h or anuria ≥12 h. This patient meets creatinine criterion (220/80 = 2.75×) — actually Stage 2.',distractors:{A:'Stage 1 = creatinine 1.5–1.9× baseline',B:'Stage 2 = 2–2.9× — actually correct on creatinine alone',D:'No Stage 4 in KDIGO',E:'AKI present'},pearl:'KDIGO: Stage 1 (1.5–1.9× or +26 in 48 h), Stage 2 (2–2.9×), Stage 3 (≥3× or RRT or eGFR <35 in <18 y). Stop nephrotoxics, hydrate, identify cause.',references:[{label:'KDIGO AKI Guidelines',url:'https://kdigo.org/guidelines/acute-kidney-injury/'}]},
  {section:'renal',specialty:'Nephrology',topic:'Contrast-induced AKI prevention',stem:'A 75-year-old with eGFR 38 needs urgent CT with contrast. Most appropriate prevention strategy?',options:['Withhold contrast — too risky','Withhold ACEi/ARB and metformin around procedure, IV 0.9% saline pre-/post-, monitor renal function','High-dose furosemide','Hold all medications permanently','Use double contrast dose'],correct:'B',explanation:'Contrast nephropathy prevention: hydrate with IV crystalloid, withhold nephrotoxic drugs (ACEi/ARB, metformin if eGFR <30), use minimum contrast volume.',distractors:{A:'Withholding contrast may delay critical diagnosis',C:'Furosemide worsens contrast nephropathy',D:'Permanent cessation excessive',E:'Higher contrast worsens AKI'},pearl:'Hold metformin from contrast day for 48 h (if eGFR <30), restart only when renal function confirmed stable. N-acetylcysteine no longer routinely recommended.',references:[{label:'NICE NG148 Acute kidney injury',url:'https://www.nice.org.uk/guidance/ng148'}]},
  {section:'renal',specialty:'Nephrology',topic:'Rhabdomyolysis fluid management',stem:'A 70-year-old found on the floor after 24 hours, severe pain, dark urine, CK 28000, creatinine 240, K 5.8. Most appropriate management?',options:['Discharge','Aggressive IV fluid resuscitation 0.9% saline, monitor electrolytes, urine output target 200–300 mL/h, treat hyperkalaemia, renal review','Furosemide first','Restrict fluids','Antibiotics alone'],correct:'B',explanation:'Rhabdomyolysis: aggressive IV fluids (often 8–12 L/24 h initially), electrolyte monitoring (K, Ca, PO4), treat hyperkalaemia, watch for compartment syndrome, RRT if AKI severe.',distractors:{A:'Discharge fatal',C:'Furosemide before adequate fluids worsens AKI',D:'Restriction worsens AKI',E:'Antibiotics not first-line for rhabdo'},pearl:'CK >5000 = significant rhabdo. Targets: maintain UO 200–300 mL/h. Watch potassium (cells release), and calcium drops then rebounds high. Compartment syndrome in muscle injury.',references:[{label:'BMJ Best Practice Rhabdomyolysis',url:'https://bestpractice.bmj.com/topics/en-gb/3000094'}]},
  {section:'renal',specialty:'Nephrology',topic:'Hypovolaemic hyponatraemia',stem:'A patient with diarrhoea has Na 124, dry mucous membranes, BP 92/56 lying / 70/40 standing, urine Na <20.',options:['Fluid restriction','IV 0.9% saline cautious replacement, treat cause, monitor Na correction <8–10/24 h','Hypertonic saline','Demeclocycline','Furosemide'],correct:'B',explanation:'Hypovolaemic hyponatraemia: replace volume with 0.9% saline, treat cause (e.g. anti-emetic). Correction limit 8–10 mmol/L per 24 h. Reassess sodium frequently.',distractors:{A:'Fluid restriction worsens hypovolaemia',C:'Hypertonic for severe symptomatic only',D:'Demeclocycline for SIADH',E:'Furosemide worsens Na'},pearl:'Hyponatraemia approach: assess volume status. Hypovolaemic → saline. Euvolaemic → SIADH workup. Hypervolaemic → fluid restrict (heart/liver/renal failure).',references:[{label:'Society for Endocrinology UK Hyponatraemia',url:'https://www.endocrinology.org/clinical-practice/hyponatraemia-society/'}]},
  {section:'renal',specialty:'Nephrology',topic:'Urinary retention assessment',stem:'A 78-year-old man hasn\'t passed urine for 12 hours, lower abdominal discomfort, palpable bladder. Bladder scan shows 950 mL.',options:['Watch and wait','Catheterise + investigate cause (BPH, drugs, constipation, infection), monitor for post-obstructive diuresis','Diuretic','IV fluids','Antibiotics empirically'],correct:'B',explanation:'Acute urinary retention: catheterise (reduces detrusor injury), investigate cause, monitor urine output for post-obstructive diuresis (>200 mL/h), replace fluids if so.',distractors:{A:'Bladder injury risk if delayed',C:'Diuretic worsens retention',D:'Fluids without drainage worsen distension',E:'Antibiotics if infection but doesn\'t replace catheterisation'},pearl:'Post-obstructive diuresis can be massive (5–10 L). Replace 75% of urine output to avoid dehydration. Common causes: BPH, drugs (anticholinergics, opioids), constipation, infection.',references:[{label:'BAUS Acute Urinary Retention',url:'https://www.baus.org.uk/professionals/'}]},
  {section:'renal',specialty:'Nephrology',topic:'Dialysis access',stem:'A patient on haemodialysis has a fistula in the left arm. Most appropriate care?',options:['Take BP and bloods from fistula arm','Avoid BP, IV access, venepuncture in fistula arm; assess for thrill and bruit each shift; report changes immediately','Restrict use only when dialyzing','Apply tight bandage','Routine antibiotic cover'],correct:'B',explanation:'AV fistula: protect from BP cuff, IV access, venepuncture (cannulation only by trained dialysis staff). Assess thrill and bruit each shift. Report loss immediately — clot is salvageable if early.',distractors:{A:'BP/bloods damage fistula',C:'Restriction needed at all times',D:'Tight bandage compromises flow',E:'Antibiotics not routine'},pearl:'Lifeline rule: protect the fistula arm (bracelet often worn). Loss of thrill/bruit = thrombosis = vascular access emergency. Early intervention can salvage.',references:[{label:'Renal Association Vascular Access',url:'https://renal.org/health-professionals/guidelines'}]},

  // GASTRO (5 new)
  {section:'gastro',specialty:'Gastroenterology',topic:'Non-variceal upper GI bleed',stem:'A 65-year-old has melaena, haematemesis, BP 96/62, HR 110, Hb 78. NSAIDs daily. Glasgow-Blatchford 12.',options:['Outpatient endoscopy','Resuscitate with crystalloid + blood, IV PPI, urgent endoscopy <24 h, restrictive transfusion strategy (Hb target 70)','Oral PPI alone','Send home with iron','Endoscopy in 1 week'],correct:'B',explanation:'Non-variceal UGIB: resuscitate, group/cross-match, IV PPI infusion, OGD <24 h (within hours if active bleed). Restrictive transfusion (Hb target 70) reduces mortality.',distractors:{A:'Outpatient inadequate',C:'Oral PPI inadequate for active bleed',D:'Discharge dangerous',E:'1-week delay risks death'},pearl:'GBS ≥1 = admit and endoscopy. Hb target 70 g/L unless cardiovascular comorbidity (then 80). Restrictive transfusion = lower mortality (Villanueva NEJM 2013).',references:[{label:'NICE CG141 Acute UGIB',url:'https://www.nice.org.uk/guidance/cg141'}]},
  {section:'gastro',specialty:'General surgery',topic:'Bowel obstruction',stem:'A 70-year-old with previous abdominal surgery has 24-h vomiting, distended abdomen, absent flatus, colicky pain. CT shows small bowel obstruction with transition point.',options:['Discharge with laxative','NBM + NG tube + IV fluids + analgesia + surgical review; obstruction with peritonism or strangulation features → urgent laparotomy','Oral antiemetic','Enema','Antibiotics alone'],correct:'B',explanation:'Bowel obstruction: drip and suck (NBM, NG, IV fluids), correct electrolytes, surgical review. Surgery for closed-loop, ischaemia, peritonism, failed conservative management at 48–72 h.',distractors:{A:'Discharge dangerous',C:'Antiemetic alone misses obstruction',D:'Enema for distal obstruction only',E:'Antibiotics alone do not treat obstruction'},pearl:'Adhesions account for 75% of small bowel obstruction in post-laparotomy patients. Closed-loop or features of strangulation = urgent surgery (don\'t conservatively manage).',references:[{label:'ASGBI Bowel Obstruction Guideline',url:'https://www.asgbi.org.uk/'}]},
  {section:'gastro',specialty:'Hepatobiliary',topic:'Acute cholecystitis',stem:'A 55-year-old has 24-h RUQ pain, fever 38.6°C, tender RUQ, positive Murphy\'s sign. WCC 14, USS shows thickened gallbladder wall, pericholecystic fluid.',options:['Reassure and discharge','IV antibiotics, analgesia, fluids + early laparoscopic cholecystectomy <1 week (NICE CG188)','Outpatient elective surgery in 6 weeks','Oral antibiotics','ERCP'],correct:'B',explanation:'Acute cholecystitis: IV antibiotics, analgesia, fluids, early laparoscopic cholecystectomy within 1 week (better outcomes than delayed).',distractors:{A:'Discharge fatal',C:'6-week wait worsens outcomes',D:'Oral inadequate for severe disease',E:'ERCP for biliary obstruction, not uncomplicated cholecystitis'},pearl:'Acute cholecystitis: hot lap chole within 1 week of onset (NICE). Don\'t cool down for 6 weeks — increased complications and recurrence.',references:[{label:'NICE CG188 Gallstones',url:'https://www.nice.org.uk/guidance/cg188'}]},
  {section:'gastro',specialty:'Vascular',topic:'Mesenteric ischaemia',stem:'An 80-year-old with AF (not on anticoagulation) presents with sudden severe abdominal pain "out of proportion" to soft abdomen, lactate 6.8, raised WCC.',options:['Reassure and discharge','Urgent CT angiography + vascular surgical review + resuscitation; high mortality emergency','Outpatient gastro referral','PPI','Constipation management'],correct:'B',explanation:'Acute mesenteric ischaemia: pain out of proportion + AF/atherosclerosis + raised lactate. CT angiography urgent, vascular surgery, mortality 60–80%.',distractors:{A:'Discharge fatal',C:'Routine referral too slow',D:'PPI irrelevant',E:'Misses life-threatening diagnosis'},pearl:'Mesenteric ischaemia: classic triad is severe pain + minimal exam findings + AF/vascular disease. Late: peritonism = bowel infarction. Don\'t wait for CRP/WCC — clinical suspicion enough for CT angio.',references:[{label:'BMJ Best Practice Mesenteric Ischaemia',url:'https://bestpractice.bmj.com/topics/en-gb/1148'}]},
  {section:'gastro',specialty:'Nutrition',topic:'Refeeding electrolytes',stem:'A patient with anorexia nervosa BMI 14, 10-day starvation, is started on slow nutrition. Day 2 phosphate 0.45, K 3.2, Mg 0.6.',options:['Continue feeding at goal rate','Slow/hold feeding, IV phosphate + K + Mg replacement, daily electrolytes, thiamine, monitor for arrhythmia','Discharge','Increase feeding','Restrict salt'],correct:'B',explanation:'Refeeding syndrome: hold/slow feeding, replace electrolytes (phosphate, K, Mg), thiamine continued, daily monitoring, ECG (arrhythmia risk).',distractors:{A:'Continuing at goal worsens shifts',C:'Discharge dangerous',D:'Increasing precipitates arrhythmia',E:'Salt restriction not the issue'},pearl:'Refeeding criteria (NICE): BMI <16, weight loss >15% in 3–6 months, little/no intake >10 days, low K/Mg/PO4 pre-feeding. Start 5–10 kcal/kg/day in highest risk.',references:[{label:'NICE CG32 Nutrition support',url:'https://www.nice.org.uk/guidance/cg32'}]},

  // POISONING (5 new)
  {section:'poisoning',specialty:'Toxicology',topic:'Iron overdose',stem:'A 3-year-old (or adult who took adult formulation) ingested 80 mg/kg elemental iron. Vomiting, abdominal pain, drowsy. Iron level 600 mcg/dL.',options:['Activated charcoal','Whole bowel irrigation + IV desferrioxamine (chelation) + supportive care','Reassure','Lactulose','Antiemetic only'],correct:'B',explanation:'Iron overdose >60 mg/kg or level >500: whole bowel irrigation (PEG), IV desferrioxamine (15 mg/kg/h chelation), supportive care. Charcoal does NOT bind iron.',distractors:{A:'Charcoal does not bind iron',C:'Iron OD can be fatal — never reassure',D:'Lactulose insufficient',E:'Antiemetic alone misses systemic toxicity'},pearl:'Iron toxicity 5 stages: GI (0–6 h), latent (6–24 h), shock (12–48 h), hepatic (2–4 d), late stricture (weeks). Don\'t be reassured by latent phase.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'Lithium toxicity dehydration',stem:'A 50-year-old on lithium has new tremor, ataxia, confusion, vomiting after recent dehydration. Lithium level 2.4 mmol/L (therapeutic 0.4–1.0).',options:['Continue lithium','Stop lithium + IV 0.9% saline + check renal function + consider haemodialysis if severe (>4.0 or symptoms with >2.5)','Increase lithium','Discharge','Activated charcoal'],correct:'B',explanation:'Lithium toxicity: stop drug, IV saline (avoid diuretics — worsen reabsorption), monitor renal function, haemodialysis for severe (>4.0, level >2.5 with symptoms, AKI).',distractors:{A:'Continuing worsens toxicity',C:'Increase fatal',D:'Discharge dangerous',E:'Charcoal does not bind lithium'},pearl:'Lithium narrow therapeutic index. Toxicity precipitated by dehydration, NSAIDs, ACEi/ARB, diuretics. ECG: T-wave changes, QT prolongation. Dialyse early in severe.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'Digoxin toxicity hyperkalaemia',stem:'An 80-year-old on digoxin has nausea, yellow visual halos, K 6.2, AF with slow ventricular response 38, dig level 4.8.',options:['Increase digoxin','Stop digoxin + correct hyperkalaemia (avoid IV calcium — controversy in dig tox) + Digibind (digoxin-specific Fab) for severe','Diuretic','Antiarrhythmic alone','Discharge'],correct:'B',explanation:'Digoxin toxicity: stop drug, correct K (avoid calcium gluconate traditionally — but recent evidence less concerning), Digibind for severe arrhythmia, hyperkalaemia >5.5, level >12 acute or >6 chronic.',distractors:{A:'Increasing worsens toxicity',C:'Diuretic worsens K and renal',D:'Antiarrhythmics may worsen rhythm',E:'Discharge dangerous'},pearl:'Digoxin toxicity precipitated by hypokalaemia, hypomagnesaemia, AKI, drug interactions (amiodarone, verapamil). Digibind reverses within 30 min. Dialysis ineffective.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'β-blocker overdose',stem:'A 30-year-old took 50× propranolol tablets. BP 70/40, HR 38, drowsy. Did not respond to 3 mg atropine.',options:['Adrenaline only','High-dose IV glucagon (5–10 mg bolus then infusion) ± high-dose insulin/glucose ± lipid emulsion ± vasopressors + ICU','Activated charcoal alone','Discharge','Sedation'],correct:'B',explanation:'β-blocker overdose: glucagon (bypasses β-receptor), high-dose insulin/glucose for cardiogenic shock, lipid emulsion for lipophilic agents (propranolol), vasopressors, ICU.',distractors:{A:'Adrenaline alone may not overcome β-blockade',C:'Charcoal alone insufficient',D:'Discharge fatal',E:'Sedation worsens'},pearl:'β-blocker OD: glucagon FIRST (bypasses receptor). HIET (high-dose insulin–euglycaemia therapy) up to 10 u/kg/h for cardiogenic shock. Lipid emulsion for lipophilic (propranolol).',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'Serotonin syndrome',stem:'A patient on sertraline starts tramadol. Develops fever 39.4°C, agitation, clonus, tremor, diaphoresis, tachycardia.',options:['Continue both drugs','STOP serotonergic agents + supportive care + benzodiazepines + cooling + cyproheptadine for severe','Increase sertraline','Antibiotics for sepsis','Adrenaline'],correct:'B',explanation:'Serotonin syndrome: stop offending drugs, benzodiazepines for agitation, cooling, supportive ICU care, cyproheptadine (5HT2 antagonist) for severe.',distractors:{A:'Continuing worsens',C:'Increasing precipitates worsening',D:'Septic workup yes, but treat syndrome too',E:'Adrenaline worsens'},pearl:'Serotonin syndrome triad: autonomic + neuromuscular + mental status changes. Onset hours of new drug. Differs from NMS (rigid not clonic, slow onset days).',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},

  // TRANSFUSION (3 new)
  {section:'transfusion',specialty:'Haematology',topic:'MHP TXA timing',stem:'A trauma patient has BP 70/40, HR 140, ongoing haemorrhage, estimated blood loss 2.5 L. Hb 65.',options:['Single unit blood','Activate Major Haemorrhage Protocol (1:1:1 RBC:FFP:platelets), IV TXA 1 g <3 h of injury, urgent surgical/IR control, group O neg until cross-match','Crystalloid 5 L','Vitamin K','Outpatient transfusion'],correct:'B',explanation:'Major haemorrhage: activate MHP (typically 4 RBC + 4 FFP + 1 pool platelets initially), TXA 1 g IV within 3 h of trauma (CRASH-2), source control, group O neg if urgent.',distractors:{A:'Single unit inadequate for massive haemorrhage',C:'Excess crystalloid causes dilutional coagulopathy',D:'Vitamin K too slow',E:'Outpatient inadequate for active bleed'},pearl:'Permissive hypotension (SBP 80–90) until source controlled — except head injury. TXA within 3 h reduces mortality. 1:1:1 ratio mimics whole blood.',references:[{label:'BSH Major Haemorrhage Guidelines',url:'https://b-s-h.org.uk/guidelines/'}]},
  {section:'transfusion',specialty:'Haematology',topic:'Refusing transfusion JW',stem:'A 30-year-old Jehovah\'s Witness with Hb 55 from postpartum haemorrhage refuses blood. Currently stable. She has capacity.',options:['Transfuse against wishes','Respect autonomous decision; explore alternatives (IV iron, EPO, cell salvage, factor concentrates), document understanding, MDT','Discharge','Family decision','Sedate and transfuse'],correct:'B',explanation:'Capacitous adult refusing treatment: respect decision (Re T 1992; Mental Capacity Act). Document detailed conversation, consent for alternatives, MDT input.',distractors:{A:'Transfusing capacitous adult against wishes is battery',C:'Discharge inadequate',D:'Family cannot override capacitous adult',E:'Sedation to bypass refusal is unlawful'},pearl:'JW patients accept albumin, EPO, cell salvage (intra-op), factor concentrates often, but not whole blood/plasma/platelets/red cells. Pre-treatment JW protocol important.',references:[{label:'AAGBI Management of Jehovah\'s Witnesses',url:'https://anaesthetists.org/Home/Resources-publications'}]},
  {section:'transfusion',specialty:'Haematology',topic:'Febrile non-haemolytic reaction',stem:'A patient receiving RBC develops T 38.4°C, mild rigors, but no hypotension, dyspnoea, pain, or rash, 30 min into transfusion.',options:['Stop and discard unit','Pause transfusion + paracetamol + observe; if no other features, restart at slower rate; document; report to lab','Continue at same rate','IV adrenaline','Antihistamine'],correct:'B',explanation:'Febrile non-haemolytic transfusion reaction: pause, antipyretic, observe. If no other features (hypotension, pain, dyspnoea), restart slowly. Common, benign.',distractors:{A:'Discarding unit needed only if AHTR/contamination suspected',C:'Continuing without action could miss developing reaction',D:'Adrenaline for anaphylaxis only',E:'Antihistamine for allergic reactions'},pearl:'FNHTR: T rise ≥1°C without other features, common with platelets > RBCs. Often anti-leukocyte antibodies. Leukodepletion has reduced incidence.',references:[{label:'SHOT Annual Report',url:'https://www.shotuk.org/shot-reports/'}]},

  // MEDICATION SAFETY (5 new)
  {section:'medsafe',specialty:'Pharmacology',topic:'Vancomycin trough',stem:'A patient on IV vancomycin for MRSA bacteraemia has trough level 8 mg/L (target 15–20 for serious infections). Most appropriate action?',options:['Continue current dose','Increase dose per pharmacy advice + repeat trough before 4th dose, monitor renal function','Stop vancomycin','Switch to oral','Add gentamicin'],correct:'B',explanation:'Vancomycin trough <10 = subtherapeutic. Adjust dose per pharmacy/local protocol, repeat trough before next dose. Target 15–20 for severe MRSA infection.',distractors:{A:'Subtherapeutic risks treatment failure',C:'Stopping abandons effective therapy',D:'Oral vancomycin not absorbed (used for C. diff)',E:'Synergy not first-line'},pearl:'Vancomycin: trough sample 30 min before 4th dose. AUC/MIC 400–600 ideal but trough commonly used. Beware nephrotoxicity (especially with concurrent piptaz).',references:[{label:'BNF Vancomycin',url:'https://bnf.nice.org.uk/drug/vancomycin.html'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Gentamicin once-daily',stem:'A patient is on once-daily gentamicin 7 mg/kg. Trough level (pre-dose) 1.8 mg/L (target <1).',options:['Continue same dose','Withhold next dose, check level again, lengthen interval per nomogram (e.g. Hartford), monitor renal function and audiometry','Increase dose','Stop permanently','Switch to oral'],correct:'B',explanation:'Once-daily gentamicin trough >1 = toxicity risk. Withhold dose, repeat level, extend interval (e.g. 36 h or 48 h interval). Monitor U&E and audiometry for prolonged use.',distractors:{A:'Continuing risks nephro/ototoxicity',C:'Increasing worsens toxicity',D:'Stopping abandons therapy if needed',E:'Oral inappropriate for systemic infection'},pearl:'Gentamicin: nephrotoxicity reversible, ototoxicity often permanent. Once-daily extended-interval less toxic than divided dosing. Audiometry pre-treatment if prolonged course expected.',references:[{label:'BNF Gentamicin',url:'https://bnf.nice.org.uk/drug/gentamicin.html'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Heparin infusion management',stem:'A patient on IV unfractionated heparin for VTE has APTT ratio 4.5 (target 1.5–2.5).',options:['Continue infusion','STOP infusion 1 h, restart at lower rate per protocol, recheck APTT in 4–6 h, monitor for bleeding','Increase infusion','Add aspirin','Stop heparin permanently'],correct:'B',explanation:'Supratherapeutic APTT: stop infusion, restart at reduced rate per protocol, recheck APTT 4–6 h. Monitor for bleeding. Protamine reversal if major bleed.',distractors:{A:'Continuing risks major bleed',C:'Increase worsens bleed risk',D:'Aspirin adds bleed risk',E:'Permanent stop loses therapy if VTE'},pearl:'UFH protamine reversal: 1 mg per 100 units heparin given in last 2–3 h. LMWH not fully reversed by protamine. APTT monitoring 4–6 h after rate change.',references:[{label:'BSH Heparin Guidelines',url:'https://b-s-h.org.uk/guidelines/'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'NG drug administration',stem:'A patient with an NG tube needs PO medications. Most appropriate practice?',options:['Crush all tablets together and flush','Check each medication is suitable for NG (not modified-release, enteric-coated), flush before/between/after, give liquid forms where possible, consult pharmacist','Crush all without flushing','Use a syringe for tablets without dilution','Give medications with feeding'],correct:'B',explanation:'NG drug administration: check NG-suitability (not modified-release, enteric-coated), liquid forms preferred, dilute thoroughly, flush 15–30 mL before/between/after each drug, separate from feeding for some drugs (phenytoin).',distractors:{A:'Crushing together causes interactions and tube blockage',C:'Without flushing causes tube blockage',D:'Undiluted causes blockage',E:'Feeding interactions reduce efficacy (phenytoin)'},pearl:'Modified-release and enteric-coated drugs lose protection if crushed. Phenytoin must be separated from feeds (≥1 h before/2 h after) due to binding.',references:[{label:'BNF NG Administration Guidance',url:'https://bnf.nice.org.uk/'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Look-alike sound-alike drugs',stem:'Which pair represents a HIGH-RISK look-alike-sound-alike (LASA) error?',options:['Paracetamol and ibuprofen','Hydroxyzine and hydralazine','Aspirin and clopidogrel','Metformin and gliclazide','Amlodipine and atorvastatin'],correct:'B',explanation:'LASA examples: hydroxyzine (antihistamine) vs hydralazine (vasodilator); chlorphenamine vs chlorpromazine; vincristine vs vinblastine. NPSA highlights tall-man lettering, separated storage.',distractors:{A:'Different appearance, low confusion risk',C:'Distinct names',D:'Distinct names',E:'Different drug classes, low risk'},pearl:'NPSA LASA strategies: tall-man lettering, separated storage, computer alerts, two-person checks for high-risk drugs. Common pairs: hydroxyzine/hydralazine, chlorpromazine/chlorpropamide.',references:[{label:'NPSA Patient Safety Alerts',url:'https://www.england.nhs.uk/patient-safety/'}]},

  // FALLS / FRAILTY / SKIN (3 new)
  {section:'falls',specialty:'Geriatrics',topic:'Comprehensive Geriatric Assessment',stem:'A 84-year-old admitted with falls, polypharmacy (12 medications), early dementia, recent hospital admission. Most appropriate framework?',options:['Refer to specialist physiotherapy alone','Comprehensive Geriatric Assessment (CGA): medical, functional, social, psychological domains by MDT','Discharge with carer','Nursing home placement','Single specialist referral'],correct:'B',explanation:'CGA: multidimensional MDT assessment of medical, mental, functional, social domains. Reduces mortality and improves discharge home rates (Cochrane).',distractors:{A:'Single discipline misses multidomain needs',C:'Discharge without assessment misses care needs',D:'Premature placement bypasses rehab',E:'Single specialty inadequate for frailty'},pearl:'CGA + MDT for frail elderly: lower mortality, better function, more likely to live at home. Use for falls, frailty, dementia, complex multimorbidity.',references:[{label:'BGS Comprehensive Geriatric Assessment Toolkit',url:'https://www.bgs.org.uk/resources/'}]},
  {section:'falls',specialty:'Geriatrics',topic:'Hip fracture pre-op',stem:'An 87-year-old with neck of femur fracture is awaiting surgery. Which of the following is most consistent with NICE NG124 standards?',options:['Wait 7 days for surgery','Surgery within 36 hours of admission, multidisciplinary care, analgesia, early mobilisation post-op','Bed rest 2 weeks','Conservative management only','Cancel if >85'],correct:'B',explanation:'NICE NG124: surgery within 36 hours of admission, MDT (orthogeriatrics), early mobilisation day 1 post-op, regional anaesthesia/nerve block for analgesia.',distractors:{A:'7-day wait increases mortality',C:'2-week bed rest increases complications',D:'Conservative only for non-displaced or palliative',E:'Age alone is not contraindication'},pearl:'Hip fracture mortality 30 days: 8% with timely surgery. Best Practice Tariff incentivises 36-h-to-theatre, MDT, dementia screen, falls assessment, bone health.',references:[{label:'NICE NG124 Hip fracture',url:'https://www.nice.org.uk/guidance/cg124'}]},
  {section:'falls',specialty:'Tissue viability',topic:'Skin tear classification',stem:'An 88-year-old has a skin tear on the forearm — flap completely lost, full-thickness skin loss with exposed dermis. ISTAP category?',options:['Type 1 (no skin loss)','Type 2 (partial flap loss)','Type 3 (total flap loss)','Type 4 (deep injury to bone)','Pressure ulcer'],correct:'C',explanation:'ISTAP skin tear classification: Type 1 (linear or flap, no loss), Type 2 (partial flap loss), Type 3 (total flap loss). Differs from pressure ulcer staging.',distractors:{A:'Type 1 has no skin loss',B:'Type 2 = partial loss only',D:'Not in ISTAP system',E:'Skin tears differ from pressure ulcers'},pearl:'Skin tear prevention: skin emollient bd, padded clothing/sleeves, gentle handling, environmental safety. ISTAP guides classification — different from EPUAP pressure ulcer staging.',references:[{label:'ISTAP Skin Tear Toolkit',url:'https://www.skintears.org/'}]},

  // INFECTION CONTROL (3 new)
  {section:'infection',specialty:'IPC',topic:'Norovirus alcohol gel ineffective',stem:'Two patients on a ward develop diarrhoea and vomiting within 24 h. Most appropriate first action?',options:['Move to single rooms; soap and water hand washing (alcohol gel inadequate); 48-hour isolation post symptom resolution; report to IPC; restrict admissions/transfers; PPE','Continue normal precautions','Use alcohol gel only','Transfer to other ward','Discharge to control spread'],correct:'A',explanation:'Norovirus: contact isolation, soap-water hand wash (alcohol ineffective on non-enveloped virus), bay closures, 48-h asymptomatic before clearance, IPC notification.',distractors:{B:'Spreads rapidly without precautions',C:'Alcohol gel ineffective for norovirus',D:'Transfer spreads outbreak',E:'Discharge spreads to community'},pearl:'Norovirus: non-enveloped, alcohol-resistant. Use soap and water. Environmental hypochlorite cleaning. Asymptomatic shedding for 48 h after clearance — hence isolation continues.',references:[{label:'UKHSA Norovirus Guidance',url:'https://www.gov.uk/government/publications/norovirus-managing-outbreaks-in-acute-and-community-health-and-social-care-settings'}]},
  {section:'infection',specialty:'IPC',topic:'Carbapenem-resistant organisms',stem:'A patient previously hospitalised abroad has rectal screen positive for carbapenem-resistant Enterobacterales (CRE). Most appropriate management?',options:['Continue normal precautions','Single room, contact precautions, daily chlorhexidine wash, dedicated equipment, antimicrobial stewardship review, IPC notification','Discharge home immediately','Cohort with C. diff patients','Empirical carbapenem'],correct:'B',explanation:'CRE/CPE: single-room contact isolation, dedicated equipment, antimicrobial stewardship (often need novel agents like ceftazidime-avibactam), notify lab/IPC.',distractors:{A:'Spreads without precautions',C:'Discharge only when safe path planned with community team',D:'Mixing different organisms increases hazard',E:'Empirical carbapenem ineffective for CRE'},pearl:'CPE/CRE rising threat. Risk factors: hospitalisation abroad (esp. South Asia, S. Europe), prior carbapenem use. UK enhanced screening on admission for high-risk patients.',references:[{label:'UKHSA CPE Toolkit',url:'https://www.gov.uk/government/publications/acute-trust-toolkit-for-the-early-detection-management-and-control-of-carbapenemase-producing-enterobacterales'}]},
  {section:'infection',specialty:'IPC',topic:'Surgical site infection prevention',stem:'A patient is having elective bowel surgery. Which of the following is NOT recommended for SSI prevention (NICE NG125)?',options:['Hair removal with clippers (not razors)','Pre-operative antiseptic skin prep','Routine prophylactic IV antibiotics within 60 min of incision','Maintaining intra-operative normothermia','Showering with antibacterial soap the night before only'],correct:'E',explanation:'NICE NG125: shower with regular soap before surgery (antibacterial soap not recommended), clipper not razor, alcoholic chlorhexidine skin prep, abx within 60 min, maintain normothermia.',distractors:{A:'Recommended (clippers reduce skin trauma)',B:'Recommended (chlorhexidine alcohol)',C:'Recommended (60 min before, redose if long surgery)',D:'Recommended (hypothermia worsens SSI)'},pearl:'NICE NG125 SSI bundle: hair clippers, alcohol-based chlorhexidine prep, antibiotics within 60 min of incision (no continuation after closure unless indicated), maintain normothermia and glucose.',references:[{label:'NICE NG125 Surgical site infection',url:'https://www.nice.org.uk/guidance/ng125'}]},

  // MCA / COMMUNICATION (4 new)
  {section:'mca',specialty:'Ethics & law',topic:'Advance decision to refuse treatment',stem:'A patient with advanced dementia is admitted unconscious. Family produces a valid signed and witnessed Advance Decision to Refuse Treatment (ADRT) refusing CPR and ventilation. Most appropriate action?',options:['Disregard ADRT','Verify validity and applicability of ADRT (signed, witnessed, applies to current situation, life-sustaining treatment requires "even if life at risk" wording); respect decision','Family decision overrides','Reassess capacity now','Treat actively until capacity returns'],correct:'B',explanation:'ADRT (MCA 2005): legally binding if valid (capacity at time of making) and applicable (covers current circumstance). For life-sustaining treatment refusal, must be written, signed, witnessed, with "even if life at risk" statement.',distractors:{A:'Valid ADRT must be respected',C:'Family cannot override ADRT',D:'Capacity reassessment irrelevant if ADRT exists',E:'Treating against valid ADRT is battery'},pearl:'ADRT vs LPA: ADRT is patient\'s prior written decision (refusal only); LPA is appointed person who can decide if patient lacks capacity. ADRT for life-sustaining treatment must explicitly state intention even if life at risk.',references:[{label:'MCA 2005 Code of Practice',url:'https://www.gov.uk/government/publications/mental-capacity-act-code-of-practice'}]},
  {section:'mca',specialty:'Ethics & law',topic:'LPA health and welfare',stem:'A patient lacking capacity needs a serious medical decision. The family says the patient appointed his daughter as health and welfare LPA. What document must be in place?',options:['Verbal LPA is adequate','Registered LPA at the Office of the Public Guardian; daughter must show certificate; LPA covers health and welfare decisions; including life-sustaining treatment if specified','Solicitor letter only','Family majority vote','Any LPA covers all decisions'],correct:'B',explanation:'Health and welfare LPA must be registered with Office of Public Guardian. Acts only when patient lacks capacity. Life-sustaining treatment decisions only if explicitly granted.',distractors:{A:'Verbal LPA invalid',C:'Solicitor letter alone insufficient',D:'No legal basis for vote',E:'Property and finance LPA does not cover health'},pearl:'Two LPAs: Property/Finance (can act with capacity if specified) and Health/Welfare (only when capacity lost). Always check registration certificate before acting.',references:[{label:'Office of the Public Guardian',url:'https://www.gov.uk/government/organisations/office-of-the-public-guardian'}]},
  {section:'mca',specialty:'Ethics & law',topic:'IMCA unbefriended patient',stem:'A patient lacking capacity has no family or close friends. A serious medical treatment decision is needed. Most appropriate?',options:['MDT decides alone','Refer for IMCA (Independent Mental Capacity Advocate) before decision; required for serious medical treatment, change of accommodation','Court of Protection always','Wait for capacity to return','Family of healthcare staff substitutes'],correct:'B',explanation:'IMCA mandatory for: serious medical treatment, accommodation change >28 days (hospital) or >8 weeks (care home), when no appropriate family/friends to consult. (MCA s.35–41).',distractors:{A:'MDT alone bypasses required IMCA',C:'CoP for high-stakes/disputed only',D:'May not return; delays decision',E:'Healthcare staff cannot substitute'},pearl:'IMCA triggers: unbefriended + serious medical treatment OR long-term accommodation move OR safeguarding. Not best-interests-decision-maker, but advocate.',references:[{label:'MCA 2005 Code of Practice',url:'https://www.gov.uk/government/publications/mental-capacity-act-code-of-practice'}]},
  {section:'mca',specialty:'Communication',topic:'Restraint documentation',stem:'A patient with delirium pulls at IV lines and tries to get out of bed unsafely. Mittens are applied. Documentation should include:',options:['Brief note in nursing notes','Comprehensive: best-interests assessment, less restrictive options tried, type of restraint, duration, regular review, family informed, MCA principles applied','Time only','No documentation needed','Doctor signature only'],correct:'B',explanation:'Restraint documentation under MCA: best-interests rationale, less restrictive options considered, proportionate to harm risk, regular review, family informed, type/duration recorded.',distractors:{A:'Brief note inadequate for legal protection',C:'Time alone insufficient',D:'Restraint without documentation breaches MCA',E:'Doctor signature alone insufficient'},pearl:'Restraint = any action restricting liberty/movement. Lawful only if (1) lacks capacity, (2) best interests, (3) proportionate to risk of harm. Document each application; review need.',references:[{label:'MCA 2005 Code of Practice',url:'https://www.gov.uk/government/publications/mental-capacity-act-code-of-practice'}]},


  // ── BATCH 3 — additional 71 questions (target 302) ────────
  // SEPSIS (6)
  {section:'sepsis',specialty:'Sepsis',topic:'Sepsis 6 timing audit',stem:'A 1-hour Sepsis 6 audit on your ward shows a median time-to-antibiotics of 95 minutes. Most appropriate quality improvement priority?',options:['Increase antibiotic stock','Review pathway: triage flags, stocked sepsis trolley, single-call escalation, antibiotic prescribing prompt, time-stamped documentation; train and re-audit','Discharge faster','Hire more pharmacy staff','Discontinue antibiotics earlier'],correct:'B',explanation:'1-hour antibiotic target requires system change — pathway redesign, ready-stocked trolley, prescribing prompts, regular audit. Each hour of delay increases mortality ~7%.',distractors:{A:'Stock alone does not address the pathway delays',C:'Discharge speed irrelevant to antibiotic timing',D:'Pharmacy staffing is one element among many',E:'Stewardship reduces total course not first-dose timing'},pearl:'Every hour of antibiotic delay in septic shock increases mortality by ~7% (Kumar et al). System change beats individual exhortation — design pathway for default success.',references:[{label:'NICE NG51 Sepsis',url:'https://www.nice.org.uk/guidance/ng51'}]},
  {section:'sepsis',specialty:'Microbiology',topic:'Procalcitonin role',stem:'A patient with chest infection has CRP 84, WCC 13, procalcitonin 0.15. Which best describes procalcitonin in sepsis?',options:['Diagnostic standalone for sepsis','Adjunct to clinical assessment; rises in bacterial infection, can guide antibiotic discontinuation but not initiation','Replaces blood cultures','Specific only to UTI','No role in sepsis'],correct:'B',explanation:'Procalcitonin: rises in bacterial infection within 6–12 h. Useful adjunct (PCT-guided antibiotic discontinuation reduces course length) but not standalone diagnostic.',distractors:{A:'PCT not standalone diagnostic',C:'Cultures remain gold standard',D:'PCT general bacterial marker, not UTI-specific',E:'PCT has clinical utility'},pearl:'PCT >0.5 suggests bacterial infection; <0.1 makes bacterial infection unlikely. PCT-guided discontinuation safe (PCT <0.25 or 80% drop) — reduces antibiotic days.',references:[{label:'NICE DG18 Procalcitonin',url:'https://www.nice.org.uk/guidance/dg18'}]},
  {section:'sepsis',specialty:'Critical care',topic:'Steroids in septic shock',stem:'A septic shock patient requires high-dose noradrenaline despite adequate fluid resuscitation. Most appropriate adjunct?',options:['Withhold steroids','IV hydrocortisone 200 mg/day (50 mg QDS or infusion) for refractory septic shock requiring vasopressors','High-dose dexamethasone','Methylprednisolone pulse','Stop noradrenaline'],correct:'B',explanation:'Refractory septic shock on vasopressors: hydrocortisone 200 mg/day reduces shock duration (CORTICUS, ADRENAL). May not reduce mortality but improves vasopressor weaning.',distractors:{A:'Withholding steroids in vasopressor-dependent shock loses benefit',C:'High-dose dexamethasone not used in septic shock',D:'Methylprednisolone pulse for autoimmune disease, not sepsis',E:'Stopping vasopressor in shock is dangerous'},pearl:'Hydrocortisone in septic shock: 200 mg/day reduces vasopressor duration. Watch for hyperglycaemia. Continue until shock resolves, then taper.',references:[{label:'Surviving Sepsis Campaign 2021',url:'https://www.sccm.org/clinical-resources/guidelines/guidelines/surviving-sepsis-guidelines-2021'}]},
  {section:'sepsis',specialty:'Surgical',topic:'Source control delay',stem:'A patient has septic shock from an intra-abdominal abscess identified on CT. Antibiotics started 4 hours ago. Most appropriate next step?',options:['Continue antibiotics alone for 5 days','Urgent percutaneous drainage or surgical drainage <12 h; antibiotics complement source control but do not replace it','Repeat imaging in 48 h','Discharge after antibiotic course','Reduce fluid'],correct:'B',explanation:'Source control should occur as soon as feasible (Surviving Sepsis Campaign: <12 h for intra-abdominal source). Antibiotics alone insufficient for drainable collections.',distractors:{A:'Antibiotics fail without source control',C:'Repeat imaging without intervention delays drainage',D:'Discharge in active sepsis dangerous',E:'Fluid restriction worsens shock'},pearl:'Source control = drain pus, remove infected device, debride necrosis. Without it, antibiotic failure is the rule, not the exception.',references:[{label:'Surviving Sepsis Campaign 2021',url:'https://www.sccm.org/clinical-resources/guidelines/guidelines/surviving-sepsis-guidelines-2021'}]},
  {section:'sepsis',specialty:'Microbiology',topic:'Empirical antibiotics severe CAP',stem:'A 68-year-old with severe community-acquired pneumonia (CURB-65 4) needs empirical antibiotics. Most appropriate?',options:['Oral amoxicillin','IV co-amoxiclav + clarithromycin (atypical cover) per local protocol','Oral azithromycin alone','IV vancomycin alone','No antibiotics until cultures'],correct:'B',explanation:'Severe CAP: IV β-lactam (co-amoxiclav or ceftriaxone) + macrolide (clarithromycin or doxycycline) for atypical cover. Adjust per local protocol and sensitivities.',distractors:{A:'Oral inadequate for severe CAP',C:'Macrolide monotherapy inadequate',D:'Vancomycin not first-line empirical for CAP',E:'Withholding antibiotics in severe CAP increases mortality'},pearl:'CURB-65: Confusion, Urea >7, RR ≥30, BP <90/<60, age ≥65. Score ≥3 = severe, mortality 22–57%. IV β-lactam + macrolide. Switch to oral when stable.',references:[{label:'BTS/NICE NG138 Pneumonia',url:'https://www.nice.org.uk/guidance/ng138'}]},
  {section:'sepsis',specialty:'Sepsis',topic:'Sepsis screening tool',stem:'A clinical decision support tool flags a NEWS2 of 6 in a patient with new infection symptoms. Most appropriate response?',options:['Continue current management','Trigger sepsis screen: history, examination for source, bloods (FBC, U&E, lactate, cultures, CRP), consider Sepsis 6 within 1 h','Wait for routine ward round','Reduce monitoring frequency','Treat as anxiety'],correct:'B',explanation:'NEWS2 ≥5 with infection trigger: full sepsis screen, lactate, cultures, treatment of presumed sepsis if confirmed clinical suspicion. NICE NG51 algorithm.',distractors:{A:'Continuing without action misses sepsis',C:'Routine review delays critical timing',D:'Reducing monitoring in deterioration is dangerous',E:'Anxiety does not raise NEWS2 with infection'},pearl:'NICE risk stratification: NEWS2 + infection focus + clinical concern = sepsis screen. High risk (lactate >2, NEWS2 ≥7) = Sepsis 6 within 1 h.',references:[{label:'NICE NG51 Sepsis',url:'https://www.nice.org.uk/guidance/ng51'}]},

  // ABCDE & RESUSCITATION (6)
  {section:'abcde',specialty:'Resuscitation',topic:'ALS shockable rhythm',stem:'During cardiac arrest, the rhythm check shows ventricular fibrillation. Per UK ALS algorithm, the next step is:',options:['IV adrenaline first','Single defibrillation shock immediately, resume CPR for 2 min, then rhythm check','3 stacked shocks','Withhold defib if no IV access','Wait for advanced airway'],correct:'B',explanation:'ALS shockable: single shock (150–200 J biphasic), resume CPR immediately for 2 min, rhythm check. Adrenaline 1 mg after 3rd shock, amiodarone 300 mg after 3rd shock.',distractors:{A:'Adrenaline before defib in shockable delays definitive treatment',C:'Single shocks since 2010 (stacked obsolete)',D:'IV access not required for defib',E:'Advanced airway can wait — defib first'},pearl:'Defibrillation: 150–200 J biphasic. Single shock + immediate CPR (don\'t check pulse). Adrenaline + amiodarone after 3rd shock in refractory VF/pVT.',references:[{label:'Resus Council UK Adult ALS 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-advanced-life-support-guidelines'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'ALS non-shockable rhythm',stem:'During cardiac arrest, rhythm check shows pulseless electrical activity (PEA). Most appropriate immediate action?',options:['Defibrillation','Resume CPR immediately, IV adrenaline 1 mg ASAP and every 3–5 min, identify and treat reversible cause (4Hs/4Ts)','Atropine 3 mg','Sodium bicarbonate','Pacemaker'],correct:'B',explanation:'Non-shockable (PEA/asystole): CPR + adrenaline 1 mg ASAP then every 3–5 min, treat reversible causes (4Hs/4Ts). No shock indicated.',distractors:{A:'Defibrillation only for VF/pVT',C:'Atropine no longer in ALS algorithm',D:'Bicarbonate only for specific causes (hyperK, TCA OD)',E:'Pacemaker for symptomatic bradycardia, not arrest'},pearl:'PEA — treat the cause: 4Hs (Hypoxia, Hypovolaemia, Hyper/hypoK+metabolic, Hypothermia) and 4Ts (Thrombosis, Tamponade, Tension PTX, Toxins).',references:[{label:'Resus Council UK Adult ALS 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-advanced-life-support-guidelines'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'Adrenaline timing in arrest',stem:'In a non-shockable cardiac arrest, when should the first dose of adrenaline be given?',options:['After 3rd rhythm check','As soon as IV/IO access established','After 5 min','At the start of CPR','Never during arrest'],correct:'B',explanation:'Non-shockable arrest: adrenaline 1 mg IV/IO as soon as access established, then every 3–5 min. Shockable arrest: after 3rd defibrillation.',distractors:{A:'Delay in non-shockable worsens outcome',C:'5-min wait too long',D:'CPR comes first; adrenaline after access',E:'Adrenaline integral to ALS'},pearl:'Adrenaline timing differs: non-shockable = ASAP after access; shockable = after 3rd shock. PARAMEDIC2 trial: adrenaline improves ROSC but with neurological cost.',references:[{label:'Resus Council UK Adult ALS 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-advanced-life-support-guidelines'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'Capnography in arrest',stem:'During CPR, end-tidal CO₂ (EtCO₂) is 7 mmHg despite 10 minutes of high-quality compressions. Most likely interpretation?',options:['Adequate CPR','Inadequate compressions OR poor prognosis; reassess technique, exclude reversible causes; if persistent <10 mmHg after 20 min consider terminating','Hypothermia','Optimal ventilation','Need for more adrenaline'],correct:'B',explanation:'EtCO₂ <10 mmHg during CPR after 20 min strongly predicts no ROSC. Optimise compressions, treat reversible causes; persistent low EtCO₂ informs termination decisions.',distractors:{A:'<10 mmHg suggests inadequate output',C:'Hypothermia not directly related to EtCO₂ in arrest',D:'EtCO₂ this low not ventilation-related',E:'Adrenaline alone unlikely to improve <10'},pearl:'EtCO₂ targets in CPR: aim >20 mmHg with optimised compressions. Sudden EtCO₂ rise = ROSC. Persistent <10 after 20 min = poor prognosis (TOR criteria).',references:[{label:'Resus Council UK Adult ALS 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-advanced-life-support-guidelines'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'Witnessed in-hospital arrest',stem:'A patient on the ward suddenly collapses, witnessed by the nurse. No pulse, not breathing. Defibrillator immediately available.',options:['Start CPR, wait for team','Call 2222, start CPR, attach defib pads ASAP, deliver shock if VF/pVT (consider one precordial thump if witnessed monitored arrest before defib pads on)','One single rescue breath','Wait for ECG','Withhold CPR for DNACPR check'],correct:'B',explanation:'Witnessed in-hospital arrest: call cardiac arrest team, start CPR, defib pads ASAP, shock if appropriate. Precordial thump only if witnessed monitored arrest before defib pads available (rarely useful).',distractors:{A:'CPR alone delays defib in shockable rhythm',C:'Single rescue breath inadequate',D:'ECG without action wastes minutes',E:'Withhold CPR only with valid DNACPR documented'},pearl:'Witnessed in-hospital arrest: shock-first if VF/pVT and defib pads on. Each minute without defib in VF reduces survival by 7–10%.',references:[{label:'Resus Council UK In-Hospital Resuscitation 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/in-hospital-resuscitation'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'Drowning resuscitation',stem:'A patient is rescued from cold water immersion, pulseless, not breathing. Compared to standard cardiac arrest, the immediate management priority is:',options:['Standard 30:2 compressions','Five initial rescue breaths BEFORE compressions, then standard CPR; rewarm; prolonged resuscitation often justified','Dry off first','No CPR if water in lungs','Heimlich manoeuvre'],correct:'B',explanation:'Drowning resuscitation: hypoxia is the primary insult. Five initial rescue breaths before compressions. Rewarm gradually. Drowning + hypothermia warrants prolonged resuscitation.',distractors:{A:'Standard 30:2 misses hypoxia priority in drowning',C:'Drying off delays critical CPR',D:'Water in lungs does not contraindicate CPR',E:'Heimlich for foreign body airway, not drowning'},pearl:'Drowning + hypothermia: "not dead until warm and dead." Continue resuscitation during rewarming; survival reported after 60+ minutes in cold-water immersion.',references:[{label:'Resus Council UK Special Circumstances 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/special-circumstances-guidelines'}]},

  // CARDIOLOGY (6)
  {section:'cardio',specialty:'Cardiology',topic:'Acute heart failure NT-proBNP',stem:'A 75-year-old has acute breathlessness, BP 145/85, RR 28, raised JVP, basal crackles. NT-proBNP 4500 ng/L (age-adjusted threshold 1800).',options:['Discharge with bronchodilator','IV furosemide, oxygen to target, GTN if SBP allows, urgent echo, identify precipitant (ischaemia, AF, infection, drugs)','Trial of antibiotics','Aggressive IV fluids','Beta-blocker bolus'],correct:'B',explanation:'Acute heart failure with raised NT-proBNP: IV furosemide, careful nitrate, oxygen to target, identify and treat precipitant (often ACS, arrhythmia, infection, dietary indiscretion).',distractors:{A:'Discharge with bronchodilator alone misses HF',C:'Antibiotics alone if no infection signs miss HF',D:'IV fluids worsen pulmonary oedema',E:'β-blocker bolus dangerous in acute HF'},pearl:'Age-adjusted NT-proBNP thresholds: <50 y >450; 50–75 y >900; >75 y >1800. Negative test virtually excludes HF; positive needs echo and management per NICE NG106.',references:[{label:'NICE NG106 Acute heart failure',url:'https://www.nice.org.uk/guidance/ng106'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Cardiac tamponade post-MI',stem:'A patient post-MI 5 days ago has new onset BP 78/56, HR 132, raised JVP, muffled heart sounds, pulsus paradoxus. ECG low voltage, electrical alternans.',options:['Aggressive diuresis','Urgent echocardiogram + emergent pericardiocentesis (or surgical drainage); fluids cautiously while awaiting','Beta-blocker','Aspirin only','CT chest first then treat'],correct:'B',explanation:'Cardiac tamponade (Beck\'s triad: hypotension, raised JVP, muffled heart sounds): emergent pericardiocentesis. Echo confirms and guides drainage. Cautious fluid bolus while awaiting.',distractors:{A:'Diuresis worsens preload-dependent tamponade',C:'β-blocker drops cardiac output catastrophically',D:'Aspirin not the priority',E:'CT delays life-saving drainage'},pearl:'Tamponade is preload-dependent — never give diuretic or vasodilator. Pulsus paradoxus >10 mmHg sensitive sign. Post-MI day 3–5 = LV rupture risk. Echo + drain.',references:[{label:'ESC Pericardial Diseases',url:'https://academic.oup.com/eurheartj/article/36/42/2921/2293375'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Acute mitral regurgitation',stem:'A patient post-MI develops sudden severe pulmonary oedema, new harsh pansystolic murmur at apex radiating to axilla, BP 88/56.',options:['Reassurance','Urgent echo (suspect papillary muscle rupture), inotrope, IV nitrate, urgent cardiothoracic surgical review for valve repair/replacement','Increase diuretic','Discharge','Beta-blocker'],correct:'B',explanation:'Acute MR from papillary muscle rupture: cardiogenic shock, pulmonary oedema. Echo confirms. Stabilise (inotrope, IABP, vasodilator) and urgent surgery — high mortality without operation.',distractors:{A:'Reassurance fatal',C:'Diuretic alone insufficient',D:'Discharge fatal',E:'β-blocker drops output'},pearl:'Acute severe MR post-MI is a surgical emergency. Inferoposterior MIs predispose to posteromedial papillary muscle rupture (single blood supply from PDA).',references:[{label:'NICE NG185 Acute coronary syndromes',url:'https://www.nice.org.uk/guidance/ng185'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Inferior STEMI block',stem:'A patient with inferior STEMI develops complete heart block with ventricular rate 38. BP 96/60, alert, no chest pain.',options:['Immediate permanent pacemaker','IV atropine 500 mcg first; transcutaneous pacing if symptomatic; usually resolves with reperfusion; permanent only if persistent post-revascularisation','IV adrenaline','Outpatient cardiology referral','Defibrillation'],correct:'B',explanation:'Inferior STEMI complete block: usually AV node ischaemia (RCA territory), often resolves with reperfusion. Atropine first-line; transcutaneous pacing if symptomatic. Permanent pacing rarely needed.',distractors:{A:'Permanent PPM unnecessary if transient',C:'Adrenaline if atropine fails',D:'Routine referral inappropriate in acute',E:'Defib for VF/pVT, not heart block'},pearl:'Inferior MI block: AV node, narrow QRS, transient. Anterior MI block: His-Purkinje, wide QRS, permanent — needs pacemaker (worse prognosis).',references:[{label:'Resus Council UK Bradycardia',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-bradycardia-algorithm'}]},
  {section:'cardio',specialty:'Cardiology',topic:'HCM syncope',stem:'A 24-year-old athlete had syncope during exercise. ECG shows LVH with strain, deep Q waves V4–V6, family history of sudden death.',options:['Reassurance','Suspect HCM: urgent echo, cardiology referral, exercise restriction, family screening, consider ICD risk-stratification','Beta-blocker only without diagnosis','Exercise prescription','Discharge'],correct:'B',explanation:'HCM in young athlete with exertional syncope: echo confirms LVH/septal asymmetry. ICD if risk factors (family death, syncope, NSVT, septum >30 mm, BP fall on exercise). Restrict competitive sport.',distractors:{A:'Reassurance dangerous',C:'β-blocker without diagnosis premature',D:'Exercise prescription dangerous in undiagnosed HCM',E:'Discharge misses sudden death risk'},pearl:'HCM most common cause of sudden cardiac death in young athletes. Five risk factors for ICD: family death, unexplained syncope, NSVT, LVH ≥30 mm, abnormal BP response to exercise.',references:[{label:'ESC HCM Guidelines',url:'https://academic.oup.com/eurheartj/article/35/39/2733/559014'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Wolff-Parkinson-White',stem:'A patient with known WPW develops irregular broad-complex tachycardia at 220 bpm, BP 92/60, alert. ECG shows pre-excited AF.',options:['IV adenosine','Avoid AV node-blocking drugs (adenosine, digoxin, verapamil, β-blockers) — use IV flecainide or DC cardioversion if unstable','IV diltiazem','IV digoxin','Carotid massage'],correct:'B',explanation:'Pre-excited AF in WPW: AV node blockers can promote 1:1 accessory pathway conduction → VF. Use flecainide (or amiodarone) for chemical conversion; DC cardioversion if unstable.',distractors:{A:'Adenosine can cause VF in pre-excited AF',C:'Diltiazem dangerous',D:'Digoxin dangerous',E:'Carotid massage ineffective and dangerous'},pearl:'WPW + AF: NEVER give AV node blockers. Risk of VF. Flecainide, procainamide, amiodarone (cautiously) or DC cardioversion. Long-term: ablation of accessory pathway.',references:[{label:'NICE NG196 Atrial fibrillation',url:'https://www.nice.org.uk/guidance/ng196'}]},

  // RESPIRATORY (6)
  {section:'resp',specialty:'Respiratory',topic:'COPD exacerbation NIV criteria',stem:'A COPD patient on controlled oxygen 28% has ABG pH 7.27, PaCO₂ 8.5, PaO₂ 7.6 after 1 h of medical therapy. Most appropriate?',options:['Increase oxygen to 60%','BiPAP NIV (e.g. IPAP 12 EPAP 4), continue medical therapy, ABG within 1–2 h, ICU plan if no response','Intubation immediately','Discontinue oxygen','Stop bronchodilators'],correct:'B',explanation:'COPD with persistent pH <7.35 and PaCO₂ >6.5 after 1 h optimal medical therapy: NIV BiPAP. Reassess at 1–2 h. Intubate if no response or contraindication to NIV.',distractors:{A:'Higher FiO₂ worsens hypercapnia',C:'Intubation premature if NIV option appropriate',D:'Stopping oxygen worsens hypoxia',E:'Bronchodilators part of standard therapy'},pearl:'NIV criteria: pH 7.25–7.35, RR >23, hypercapnia. Contraindications: severe acidosis (pH <7.25), unable to protect airway, vomiting, facial trauma. ICU plan upfront.',references:[{label:'NICE NG115 COPD exacerbation',url:'https://www.nice.org.uk/guidance/ng115'}]},
