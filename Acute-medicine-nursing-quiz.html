],correct:'B',
explanation:'Severe hyperkalaemia (≥6.5 mmol/L) with ECG changes is an emergency. Stabilise myocardium with IV calcium gluconate (10 mL 10% over 5–10 min, repeatable until ECG improves). Shift K+ intracellularly: insulin (10 units Actrapid) in 25 g glucose IV over 15–30 min, ± nebulised salbutamol 10–20 mg. Remove K+: cation exchanger (patiromer/sodium zirconium), dialysis if refractory. Address cause and stop offending drugs (ACEi, spironolactone, NSAIDs).',

{
section:'renal',specialty:'Renal & Fluids',topic:'AKI urine output',
stem:'A patient\'s urine output has been <0.5 mL/kg/hr for the last 6 hours.',

explanation:'Urine output <0.5 mL/kg/hr for ≥6 hours meets KDIGO criteria for AKI Stage 1. Other AKI criteria: rise in creatinine ≥26 micromol/L within 48 h, or ≥1.5× baseline within 7 days. Action: ABCDE assessment, escalate, fluid status assessment, urgent U&Es and urinalysis, medication review (NSAIDs, ACEi/ARB, gentamicin, contrast), and consider catheterisation only as part of the wider plan to monitor output.',

{
section:'renal',specialty:'Renal & Fluids',topic:'Resuscitation fluid choice',
stem:'A 60-year-old has septic shock, BP 78/40, HR 130, lactate 4.2. Which is the most appropriate resuscitation fluid?',

'Blood transfusion only',
'Oral fluids'
],correct:'B',
explanation:'Surviving Sepsis Campaign and NICE recommend an initial 30 mL/kg of IV crystalloid over the first 3 hours of septic shock, reassessing fluid responsiveness clinically and with dynamic indices. Balanced crystalloids (Hartmann\'s, Plasma-Lyte) may be preferred over saline (which can cause hyperchloraemic acidosis with large volumes). HES (hydroxyethyl starch) is contraindicated in sepsis due to AKI/mortality risk. 5% dextrose distributes mostly intracellularly and is not a resuscitation fluid.',

{label:'NICE NG29 — IV fluid therapy in adults',url:'https://www.nice.org.uk/guidance/cg174'}
]
},
{
section:'renal',specialty:'Renal & Fluids',topic:'Maintenance fluids',
stem:'For a typical adult requiring maintenance IV fluids (no losses, normally hydrated), the NICE recommended daily provision is:',

],correct:'B',
explanation:'NICE CG174 maintenance fluid recommendations: 25–30 mL/kg/day water; ~1 mmol/kg/day each of Na+, K+, Cl-; 50–100 g/day glucose to prevent starvation ketosis. Avoid prolonged 0.9% saline alone (hyperchloraemic acidosis) and avoid hyponatraemic regimens. Reassess daily — patients are often over-prescribed fluids in hospital, contributing to AKI and pulmonary oedema. Daily weight, fluid balance, U&Es should guide adjustment.',

]
},
{

stem:'A patient has a urethral catheter inserted. Which is the most important intervention to reduce CAUTI risk?',

explanation:'CAUTI prevention (epic3 / NICE QS90): catheterise only when essential, daily documented review with prompt removal, aseptic insertion (single-use sterile gloves, sterile gel anaesthetic), closed drainage system kept below bladder level, regular meatal hygiene with soap and water. Routine washouts and prophylactic antibiotics are NOT recommended. Sample collection should be from the sample port, not by disconnection.',

]
},
{
section:'renal',specialty:'Renal & Fluids',topic:'Fluid overload',
stem:'Which combination of findings best suggests acute fluid overload?',
options:[
'Dry mucous membranes, sunken eyes, tachycardia',

'Postural hypotension and reduced capillary refill',

],correct:'C',
explanation:'Fluid overload signs: raised JVP, peripheral oedema, pulmonary crackles, S3 gallop, weight gain (the most sensitive indicator on a daily weight chart), falling SpO2, hypertension. In contrast, dehydration features include dry mucous membranes, low JVP, reduced skin turgor, postural drop, oliguria, and tachycardia. Daily weighing and accurate fluid balance charts are nursing-led essentials in managing fluid status.',

},
{
section:'renal',specialty:'Renal & Fluids',topic:'Potassium replacement IV',
stem:'A patient on AMU has K+ 2.6 mmol/L and is symptomatic with weakness. The IV potassium prescription is being prepared.',
options:[
'IV bolus of 40 mmol KCl over 10 minutes',
'Maximum 10 mmol/hour through a peripheral cannula in a non-monitored area; use centrally-monitored access for higher rates; never give as a fast IV bolus',

'Use 50% dextrose'
],correct:'B',
explanation:'IV potassium administration is high-risk and a frequent never-event. Maximum 10 mmol/hour peripherally in a non-monitored bed, max 20 mmol/hour with cardiac monitoring, max 40 mmol/hour via central line in a critical care environment. Always use a pre-prepared bag (avoid concentrated KCl ampoules at the bedside — never event), check with two qualified nurses/practitioners, and reassess U&Es. Bolus IV potassium causes cardiac arrest.',

{label:'NHS Improvement — Potassium chloride safety alerts',url:'https://www.england.nhs.uk/patient-safety/'}
]
},
{
section:'renal',specialty:'Renal & Fluids',topic:'Refeeding screening',
stem:'A patient who has eaten little in the past week is being commenced on enteral feeding. They have BMI 17, alcohol-dependence, low magnesium and phosphate. What is the priority?',
options:[
'Start full feeds at goal rate immediately',
'High-risk for refeeding syndrome — start at 5–10 kcal/kg/day, give thiamine 200–300 mg PO/IV before and during feeding, replace electrolytes (PO4, K+, Mg2+), monitor cardiac status; build up over 4–7 days',
'Avoid feeding entirely',
'Give IV glucose 50% bolus first',
'No specific precautions needed'
],correct:'B',
explanation:'Refeeding syndrome high-risk per NICE CG32: BMI <16 OR unintentional weight loss >15% in 3–6 months OR little nutritional intake for >10 days OR low pre-feeding K+/PO4/Mg2+; OR ≥2 of: BMI <18.5, weight loss >10% in 3–6 months, little intake for >5 days, alcohol misuse / certain drugs. Start feeds slowly (5–10 kcal/kg/day, max 20 kcal/kg/day initially); thiamine and B-complex BEFORE refeeding (Wernicke prevention); monitor and replace electrolytes; daily ECG/cardiac status (refeeding can cause arrhythmia and heart failure).',
distractors:{

  D:'IV glucose bolus precipitates refeeding without thiamine',

},
pearl:'Refeeding high-risk: start 5–10 kcal/kg/day, give thiamine + B-complex BEFORE feeding (Wernicke prevention), monitor and replace electrolytes.',

]

// ─── GASTROENTEROLOGY (6) ─────────────────────────────────────────
{
section:'gastro',specialty:'Gastroenterology',topic:'Variceal bleed',
stem:'A 55-year-old with cirrhosis presents vomiting fresh red blood. HR 124, BP 88/50, capillary refill 4 seconds, cold peripheries.',
options:[
'Send urgent FBC and wait',
'Two large-bore (14–16 G) IV cannulae, group & save / cross-match, IV crystalloid resuscitation, urgent escalation, activate major haemorrhage protocol',
'Oral omeprazole and observe',
'NG tube to assess bleeding',
'Sit up, give oxygen only'
],correct:'B',
explanation:'Haemodynamically unstable upper GI bleed. ABCDE; two large-bore IV cannulae; FBC, U&E, clotting, group & cross-match, lactate; activate major haemorrhage protocol if SBP <90 or HR >110 with ongoing bleed; resuscitate cautiously (avoid over-transfusion in variceal bleeding). Variceal-specific: terlipressin (or octreotide) and prophylactic IV antibiotics (e.g. ceftriaxone) reduce mortality. Urgent endoscopy within 24 hours (immediate if uncontrolled bleed). Glasgow-Blatchford score helps risk-stratify non-variceal bleeds.',
distractors:{
  A:'Sending FBC and waiting in active haemorrhage delays resuscitation',
  C:'Oral PPI alone misses the urgency of variceal bleeding',
  D:'NG insertion does not stop bleeding and may risk further trauma',
  E:'Sit-up + oxygen alone does not address haemorrhagic shock'
},
pearl:'Variceal bleed: 2 large-bore IV access, group + cross-match, terlipressin, prophylactic IV antibiotics, urgent endoscopy ≤24 h. Avoid over-transfusion.',
references:[
{label:'NICE CG141 — Acute upper GI bleeding',url:'https://www.nice.org.uk/guidance/cg141'},
{label:'BSG — Variceal haemorrhage in cirrhosis',url:'https://www.bsg.org.uk/'}
]
},
{
section:'gastro',specialty:'Gastroenterology',topic:'NG tube confirmation',
stem:'You have just inserted a fine-bore NG tube. Which is the FIRST-LINE method to confirm gastric placement before use?',
options:[
'Listen for bubbling over the epigastrium with air insufflation',
'Aspirate and test pH using CE-marked pH indicator paper — pH 1–5.5 indicates gastric placement',
'Trial a small amount of feed and watch for response',
'X-ray every NG tube',
'Patient verbal confirmation'
],correct:'B',
explanation:'NPSA/MHRA: pH testing of gastric aspirate (CE-marked indicator strip, pH 1–5.5) is the first-line test. Air insufflation/auscultation is unreliable and a never-event check. If no aspirate or pH >5.5, reposition and re-aspirate; if still no aspirate or pH inconclusive, request a CXR — read by a competent practitioner. Misplaced NG tubes (lung) causing feeding-related death are an NHS Never Event. Always document the test and pH before each feed/medication administration.',
distractors:{

  C:'Trial feeding before confirmation risks fatal aspiration',
  D:'Routine X-ray for every NG is unnecessary; pH first, X-ray if pH unclear',

},
pearl:'NG placement: pH 1–5.5 is gastric. Air insufflation is a never-event check. CXR only if pH cannot be obtained — read by competent practitioner.',
references:[
{label:'NPSA — Misplaced NG tubes (Never Event)',url:'https://www.england.nhs.uk/patient-safety/never-events/'}
]
},
{
section:'gastro',specialty:'Gastroenterology',topic:'Acute liver failure',
stem:'A patient is admitted with paracetamol overdose and confusion, ALT 8000, INR 4.2, jaundiced.',
options:[
'Reassure and observe',
'Treat with IV N-acetylcysteine, contact the regional liver/transplant centre urgently using the King\'s College criteria, monitor for cerebral oedema, hypoglycaemia and AKI',
'Stop fluids',
'Give oral charcoal',
'Discharge home'
],correct:'B',
explanation:'Acute liver failure with coagulopathy and encephalopathy is life-threatening. NAC remains useful even late in paracetamol-induced ALF. Early discussion with a regional liver/transplant centre is essential — King\'s College criteria predict mortality without transplant (paracetamol-induced: arterial pH <7.30; OR INR >6.5 + creatinine >300 + grade 3–4 encephalopathy). Active monitoring for cerebral oedema, hypoglycaemia, AKI, sepsis, and bleeding. ICU-level care.',
distractors:{
  A:'Reassurance in evolving ALF misses transplant window',
  C:'Stopping fluids worsens AKI',
  D:'Oral charcoal at this point is far too late',
  E:'Discharge in ALF is inappropriate'
},
pearl:'Paracetamol-induced ALF: NAC + early regional liver/transplant centre referral using King\'s College criteria. Watch for cerebral oedema, hypoglycaemia, AKI.',
references:[
{label:'British Association for the Study of the Liver — ALF',url:'https://www.basl.org.uk/'}
]
},
{
section:'gastro',specialty:'Gastroenterology',topic:'Acute pancreatitis severity',
stem:'A patient with acute pancreatitis has a Glasgow score of 4 within 48 hours.',
options:[
'Mild pancreatitis — discharge',

],correct:'C',
explanation:'Glasgow ≥3 within 48 h or APACHE II ≥8 = severe pancreatitis. HDU/ICU care, aggressive IV fluid resuscitation (Hartmann\'s preferred — Cochrane-supported), good analgesia, NBM only if vomiting (early enteral nutrition reduces complications), treat cause (gallstones → MRCP/ERCP; alcohol → withdrawal management). Watch for ARDS, AKI, organ failure, infected pancreatic necrosis (CT at 5–7 days if deteriorating; surgery only for infected necrosis).',
distractors:{

  B:'Moderate cases warrant inpatient admission, not outpatient',

},
pearl:'Glasgow ≥3 in 48 h or APACHE II ≥8 = severe. Aggressive Hartmann\'s, analgesia, treat cause. Surgery ONLY for infected necrosis.',
references:[
{label:'BSG — Acute pancreatitis guideline',url:'https://www.bsg.org.uk/'}
]
},
{
section:'gastro',specialty:'Gastroenterology',topic:'C diff diarrhoea',
stem:'A patient on cefuroxime develops profuse watery diarrhoea (Bristol type 7) for 48 hours; toxin assay positive for C. difficile.',
options:[
'Continue cefuroxime',
'Side-room isolation, contact precautions (gloves and apron), hand-wash with soap and water (alcohol gel doesn\'t kill spores), sporicidal cleaning; review and stop the precipitating antibiotic where possible; first-line treatment now oral vancomycin or fidaxomicin',
'Move to a bay with other diarrhoea patients',
'Loperamide for symptom control',
'Stop all IV fluids'
],correct:'B',
explanation:'C. difficile spores are not killed by alcohol gel — soap and water hand-washing essential. Side-room isolation with contact precautions, sporicidal (chlorine-based) cleaning. Treatment per NICE NG199: first-line oral vancomycin (or fidaxomicin if at higher risk of recurrence) — metronidazole is now reserved for special cases. SIGHT mnemonic: Suspect / Isolate / Gloves and aprons / Handwash / Test. Loperamide is contraindicated (toxic megacolon risk). Always review and stop the offending antibiotic.',
distractors:{
  A:'Continuing precipitating antibiotic prolongs illness',
  C:'Bay placement risks transmission',

  E:'Stopping fluids worsens dehydration'
},
pearl:'C. diff: SIGHT (Suspect, Isolate, Gloves+aprons, Handwash with soap+water, Test). Vancomycin or fidaxomicin first-line (not metronidazole).',
references:[
{label:'NICE NG199 — Clostridioides difficile infection',url:'https://www.nice.org.uk/guidance/ng199'}
]
},
{
section:'gastro',specialty:'Gastroenterology',topic:'Hepatic encephalopathy',
stem:'A patient with cirrhosis is admitted drowsy and confused, with asterixis on examination.',
options:[
'Discharge home',
'Treat hepatic encephalopathy: identify and address precipitant (infection, GI bleed, constipation, drugs, electrolytes); lactulose to achieve 2–3 soft stools/day; consider rifaximin; supportive care; ABCDE',
'Give haloperidol',
'Restrict fluids only',
'Give protein-restricted diet permanently'
],correct:'B',
explanation:'Hepatic encephalopathy: identify and treat the precipitant (sepsis, GI bleed, constipation, sedatives/opiates, electrolyte disturbance, dehydration, paracentesis without albumin). Lactulose (titrate to 2–3 soft stools/day) reduces ammoniagenic flora. Rifaximin reduces recurrence. Avoid sedatives. Protein restriction is no longer recommended (worsens malnutrition); maintain protein intake. ABCDE with airway protection if reduced GCS — ICU input may be needed.',
distractors:{
  A:'Discharge in encephalopathy risks aspiration and cerebral oedema',
  C:'Haloperidol worsens encephalopathy and lowers seizure threshold',
  D:'Fluid restriction alone misses precipitants',
  E:'Permanent protein restriction worsens malnutrition'
},
pearl:'HE: identify precipitant (sepsis, GI bleed, constipation, drugs, electrolytes). Lactulose to 2–3 soft stools/day, rifaximin to prevent recurrence.',

{label:'BSG/BASL — Cirrhosis decompensation',url:'https://www.bsg.org.uk/'}
]

// ─── POISONING & OVERDOSE (6) ─────────────────────────────────────
{
section:'poisoning',specialty:'Poisoning & Overdose',topic:'Paracetamol overdose',
stem:'A 22-year-old presents 6 hours after taking 30 g of paracetamol. She is asymptomatic, observations normal.',
options:[
'Discharge with safety-netting',
'Wait for symptoms before treating',
'Take paracetamol level at 4 hours post-ingestion (or now if >4 hours), and start IV N-acetylcysteine without delay if presentation is at high risk or staggered — plot level on UK treatment line if single-time ingestion',
'Activated charcoal only',
'Vitamin K'
],correct:'C',
explanation:'UK guidance (TOXBASE/MHRA): take paracetamol level at 4 hours post-ingestion (samples before 4 h unreliable) and plot against the 100 mg/L treatment line. For staggered overdoses, presentations >8 h after potentially toxic dose, or where timing is uncertain, start IV NAC empirically. Activated charcoal only effective if given within ~1 hour. Three-bag NAC regimen: bag 1 (150 mg/kg over 1 h), bag 2 (50 mg/kg over 4 h), bag 3 (100 mg/kg over 16 h). Always assess mental health and consider psychiatric review.',
distractors:{
  A:'Discharge after toxic dose without level/treatment is fatal',
  B:'Waiting for symptoms in fulminant ALF is too late',
  D:'Activated charcoal is only effective within ~1 h of ingestion',
  E:'Vitamin K does not reverse paracetamol toxicity'
},
pearl:'Paracetamol: level at 4 h post-ingestion, plot on UK treatment line. Staggered or late presentation → empirical NAC. 3-bag regime (150/50/100 mg/kg).',
references:[
{label:'TOXBASE',url:'https://www.toxbase.org/'},
{label:'MHRA — Paracetamol overdose',url:'https://www.gov.uk/drug-safety-update/treating-paracetamol-overdose-with-intravenous-acetylcysteine-new-guidance'}
]
},
{
section:'poisoning',specialty:'Poisoning & Overdose',topic:'Opioid toxicity',
stem:'A patient on PCA morphine becomes drowsy with RR 6 and pinpoint pupils after a dose increase.',
options:[
'Stop the PCA, give oxygen, titrate IV naloxone 100–200 micrograms, repeat as needed; remember naloxone half-life is shorter than opioids',

{label:'TOXBASE — Opioid toxicity',url:'https://www.toxbase.org/'}
]
},
{

stem:'A 50-year-old with chronic heavy alcohol use is 12 hours into admission with pneumonia. He is tremulous, sweating, anxious; HR 118, BP 158/95; CIWA-Ar 18.',
options:[

},
pearl:'Alcohol withdrawal: symptom-triggered chlordiazepoxide + Pabrinex 2 pairs IV TDS for 3 days BEFORE glucose. CIWA-Ar ≥15 = severe risk.',

{label:'NICE CG100 — Alcohol-use disorders: physical complications',url:'https://www.nice.org.uk/guidance/cg100'}
]
},
{
section:'poisoning',specialty:'Poisoning & Overdose',topic:'TCA overdose',
stem:'A patient presents 1 hour after ingesting 40 amitriptyline 50 mg tablets. ECG shows QRS 140 ms.',
options:[
'Discharge home',
'Treat with IV sodium bicarbonate (correcting acidosis and narrowing QRS, treating arrhythmia/hypotension); continuous cardiac monitoring; ABCDE; senior input; activated charcoal if presentation within 1 h',
'Give flumazenil',
'Give IV potassium',
'Beta-blocker'
],correct:'B',
explanation:'TCA overdose can cause life-threatening cardiotoxicity (QRS prolongation due to fast-Na+ channel blockade, arrhythmia, hypotension), neurotoxicity (seizures, coma), and anticholinergic toxidrome. IV sodium bicarbonate (1–2 mmol/kg) treats QRS prolongation, hypotension and arrhythmia by both alkalinisation and Na+ loading. Continuous cardiac monitoring; activated charcoal within 1 h of ingestion if airway secure. Avoid Class Ia/Ic/III anti-arrhythmics. Mental health assessment after stabilisation.',
distractors:{
  A:'Discharge in TCA OD risks fatal arrhythmia',
  C:'Flumazenil is for benzodiazepines',
  D:'IV potassium worsens TCA cardiac toxicity',
  E:'β-blocker worsens hypotension in TCA OD'
},
pearl:'TCA OD with QRS >100 ms: IV sodium bicarbonate 1–2 mmol/kg (alkalinisation + Na loading). Avoid Class Ia/Ic/III antiarrhythmics. Charcoal if <1 h.',
references:[
{label:'TOXBASE — Tricyclic antidepressants',url:'https://www.toxbase.org/'}
]
},
{
section:'poisoning',specialty:'Poisoning & Overdose',topic:'Salicylate overdose',
stem:'A patient is admitted 4 hours after ingesting 100 aspirin 300 mg tablets. Tinnitus, hyperventilation, vomiting; ABG shows mixed respiratory alkalosis with metabolic acidosis.',
options:[
'Reassure',
'Activated charcoal if recent ingestion; aggressive IV fluid resuscitation; correct hypokalaemia; alkalinise urine with IV sodium bicarbonate (target urine pH 7.5–8.5); seek toxicology advice; haemodialysis for severe cases',
'Give oral antacid',
'Stop fluids',
'Give vitamin K'
],correct:'B',
explanation:'Salicylate (aspirin) toxicity classically: tinnitus, hyperventilation, mixed acid-base disorder (early respiratory alkalosis, late metabolic acidosis), vomiting, sweating, hyperthermia. Treatment: activated charcoal (within 1 h, or even later for sustained-release), IV resuscitation, correct K+ (urinary alkalinisation requires adequate K+), urinary alkalinisation with IV bicarbonate (urine pH 7.5–8.5) traps ionised salicylate in urine. Severe toxicity (level >700 mg/L acute, AKI, neuro features, refractory acidosis) → haemodialysis. Always discuss with TOXBASE/poisons unit.',
distractors:{
  A:'Reassurance in evolving toxicity is dangerous',
  C:'Oral antacid does not address systemic salicylate',
  D:'Stopping fluids worsens AKI and salicylate retention',
  E:'Vitamin K does not reverse salicylate'
},
pearl:'Salicylate toxicity: tinnitus, mixed acid-base. Resuscitate, correct K⁺, alkalinise urine to pH 7.5–8.5. Severe → haemodialysis. Discuss with TOXBASE.',
references:[
{label:'TOXBASE — Salicylates',url:'https://www.toxbase.org/'}
]
},
{
section:'poisoning',specialty:'Poisoning & Overdose',topic:'CO poisoning',
stem:'Three members of a household present with headache, nausea and dizziness; pulse oximeter reads SpO2 99%, but blood gases show carboxyhaemoglobin 22%.',
options:[
'Discharge — pulse oximeter is normal',
'Carbon monoxide poisoning — high-flow 100% oxygen via non-rebreathe, treat for at least 6 hours; consider hyperbaric oxygen if severe (loss of consciousness, neurological signs, pregnancy, COHb >25%); investigate household source',
'IV sodium bicarbonate',
'Oral aspirin',
'Loperamide'
],correct:'B',
explanation:'Carbon monoxide poisoning: pulse oximeter is unreliable — reads SpO2 falsely normal because COHb absorbs similarly to oxyhaemoglobin. CO-oximetry on a blood gas measures COHb. Treatment: 100% oxygen via non-rebreathe mask (reduces CO half-life from ~5 h to ~75 min) for at least 6 hours, and longer until symptoms resolve. Hyperbaric O2 reduces neuropsychological sequelae, especially in pregnancy, severe symptoms, COHb >25%, persistent neurological signs. Investigate the source (boilers, generators) and inform Public Health.',
distractors:{
  A:'Pulse oximeter is unreliable in CO poisoning — reads falsely normal',
  C:'Bicarbonate does not displace CO from haemoglobin',
  D:'Aspirin does not treat CO toxicity',
  E:'Loperamide is irrelevant'
},
pearl:'CO half-life: ~5 h on air, ~75 min on 100% O₂. Hyperbaric O₂ if severe (LOC, neuro signs, pregnancy, COHb >25%, persistent symptoms). Investigate source.',
references:[
{label:'TOXBASE — Carbon monoxide',url:'https://www.toxbase.org/'},
{label:'BMJ Best Practice — Carbon monoxide poisoning',url:'https://bestpractice.bmj.com/topics/en-gb/337'}
]
},

// ─── TRANSFUSION (4) ──────────────────────────────────────────────
{
section:'transfusion',specialty:'Transfusion',topic:'Acute haemolytic reaction',
stem:'10 minutes into a unit of red cells, a patient develops shaking, fever (rise from 37.0 to 39.4°C), back pain, hypotension and dark urine.',
options:[
'Slow the transfusion',
'STOP the transfusion, maintain IV access with saline, ABCDE, escalate urgently, return the unit and a fresh sample to the lab, follow trust transfusion-reaction policy',
'Give paracetamol and continue',
'Give chlorphenamine and continue',
'Switch to a different unit'
],correct:'B',
explanation:'Acute haemolytic transfusion reaction (typically ABO incompatibility) is a medical emergency. Stop the transfusion immediately; maintain IV access with 0.9% saline; ABCDE; recheck patient identity against the unit; escalate to medical and transfusion lab; return the unit and post-transfusion samples (clotted, EDTA, urine) to lab; manage shock and AKI; report via SHOT/SABRE. Mild allergic and febrile non-haemolytic reactions are managed differently — but ALWAYS stop and assess first.',
distractors:{
  A:'Slowing transfusion in AHTR is dangerous; STOP immediately',
  C:'Paracetamol masks fever without addressing haemolysis',
  D:'Antihistamines are for mild allergic reactions, not AHTR',
  E:'Switching units does not address suspected ABO incompatibility'
},
pearl:'AHTR (usually ABO incompatibility): STOP, maintain access with saline, ABCDE, return unit + samples, treat shock/AKI. Report via SHOT/SABRE.',
references:[
{label:'BSH — Acute transfusion reactions guideline',url:'https://b-s-h.org.uk/guidelines/'},
{label:'SHOT — Annual Reports',url:'https://www.shotuk.org/'}
]
},
{
section:'transfusion',specialty:'Transfusion',topic:'Bedside checks',
stem:'Before commencing any blood component, what is the SAFEST process to verify the right unit for the right patient?',
options:[
'One-nurse check at the bedside is sufficient',
'A two-person, positive-patient-identification bedside check (patient asked to state name and DOB, identification band cross-checked with prescription, compatibility label and unit), with mandatory documentation',
'Rely on the lab\'s pre-issue check',
'Patient confirms unit themselves',
'Bedside check on the unit alone, no patient'
],correct:'B',
explanation:'Wrong-blood-in-patient incidents are catastrophic and largely caused by failure of the final bedside check. Always do a positive patient ID at the bedside (patient verbally confirming name and DOB, cross-checked with their wristband), against the compatibility label, the prescription, and the unit. The check is by two qualified practitioners (in many trusts) at the bedside immediately before commencement. Group-and-component, expiry, integrity, and special requirements (irradiated/CMV-negative) all verified. Document on prescription/transfusion record.',
distractors:{
  A:'Single-nurse check missed bedside positive ID is the commonest cause of wrong-blood-in-patient',
  C:'Lab pre-issue checks do not catch wrong-patient errors at the bedside',
  D:'Patient self-confirmation can miss confused/obtunded patients',
  E:'Checking the unit alone misses the patient identification'
},
pearl:'Bedside positive patient ID (verbal name + DOB + wristband) cross-checked against compatibility label, prescription, unit. Two-person check + documentation.',
references:[
{label:'BSH — Administration of blood components 2017',url:'https://b-s-h.org.uk/guidelines/'}
]
},
{
section:'transfusion',specialty:'Transfusion',topic:'TACO',
stem:'A 78-year-old with heart failure receives 2 units of red cells over 4 hours. After unit 2 she develops breathlessness, raised JVP, and bilateral crackles; SpO2 falls.',
options:[
'Acute haemolytic reaction',
'TACO (transfusion-associated circulatory overload)',
'TRALI (transfusion-related acute lung injury)',
'Bacterial contamination',
'Anaphylaxis'
],correct:'B',
explanation:'TACO presents within 6 h of transfusion: respiratory distress, raised JVP, pulmonary oedema, hypertension, weight gain, often in elderly/cardiac patients. Risk factors: heart failure, age >70, low body weight, fast transfusion rate. Treatment: stop transfusion, sit upright, oxygen, IV diuretic. Prevention: assess weight, slower infusion (over 4 h), pre-emptive diuretic for at-risk patients. TRALI is hypoxaemia ± hypotension within 6 h, due to non-cardiogenic pulmonary oedema (donor antibodies); treatment is supportive O2/ventilation.',
distractors:{
  A:'AHTR features fever, hypotension, back pain — not isolated overload',
  C:'TRALI presents with hypoxia ± hypotension within 6 h, less typically with raised JVP',
  D:'Bacterial contamination causes fever, rigors, shock',
  E:'Anaphylaxis causes urticaria, wheeze, hypotension'
},
pearl:'TACO: respiratory distress + raised JVP + hypertension + weight gain within 6 h. Slow transfusion, pre-emptive diuretic, and assess cardiac risk.',
references:[
{label:'SHOT — TACO definition',url:'https://www.shotuk.org/'}
]
},
{
section:'transfusion',specialty:'Transfusion',topic:'Special requirements',
stem:'A patient has had a stem cell transplant. What special blood-component requirement should be flagged for any transfusion?',
options:[
'No special requirement',
'Irradiated blood components (and CMV-negative if seronegative recipient and seronegative donor required) to prevent transfusion-associated graft-versus-host disease',
'Frozen blood only',
'Only autologous blood',
'Pre-warmed components only'
],correct:'B',
explanation:'Patients at risk of transfusion-associated graft-versus-host disease (TA-GvHD) require irradiated cellular components. Indications include: HSCT recipients/donors, intrauterine and neonatal exchange transfusion, congenital T-cell defects, Hodgkin lymphoma, and patients on certain chemotherapy/immunosuppression (e.g. fludarabine). CMV-negative components are required for intrauterine, neonatal up to 28 days, and seronegative pregnant women — and considered for HSCT. Always check the trust special-requirements record and the transfusion sheet.',
distractors:{
  A:'Failing to flag irradiation in HSCT recipients risks fatal TA-GvHD',
  C:'Frozen blood is not a standard requirement',
  D:'Autologous blood is donor-specific, not the requirement',
  E:'Pre-warming is for rapid transfusion, not GvHD prevention'
},
pearl:'Irradiated for: HSCT, IUT/exchange transfusion, congenital T-cell defects, Hodgkin\'s, fludarabine. CMV-neg for IUT, neonates ≤28 d, seroneg pregnant women.',
references:[
{label:'BSH — Specifications for transfusion irradiation',url:'https://b-s-h.org.uk/guidelines/'}
]
},

// ─── MEDICATION SAFETY (6) ────────────────────────────────────────
{
section:'medsafe',specialty:'Medication Safety',topic:'Allergy status',
stem:'You are about to give an oral medication, but realise the prescription does not have the patient\'s allergy status documented and the chart has been crossed out and rewritten without a clear date.',
options:[
'Give and document afterwards',
'Withhold, contact prescriber to clarify, and document the omission and reason as per trust policy',
'Ask another nurse to administer',
'Photocopy and continue',
'Give half-dose'
],correct:'B',
explanation:'The principles of medicines administration require a legible, valid prescription and a documented allergy status. If either is unclear or missing, the safest action is to withhold and clarify with the prescriber, documenting the omission and the reason. Never administer a medication without confirming allergies — accidental administration of a known allergen is a serious safety event. NMC Code (4.4): you are accountable for your decisions.',
distractors:{
  A:'Giving without allergy status risks fatal anaphylaxis',
  C:'Delegating to another nurse does not resolve the prescription issue',
  D:'Photocopying does not clarify or fix an unclear prescription',
  E:'Giving half-dose with unclear allergy status compounds risk'
},
pearl:'Withhold + clarify with prescriber + document if prescription is unclear or allergy status missing. NMC Code 4.4: you are accountable.',
references:[
{label:'NMC — The Code',url:'https://www.nmc.org.uk/standards/code/'},
{label:'RPS — Professional guidance on the administration of medicines',url:'https://www.rpharms.com/'}
]
},
{
section:'medsafe',specialty:'Medication Safety',topic:'Insulin double-check',
stem:'You are about to administer subcutaneous Humulin S 12 units. Which is the correct nursing action?',
options:[
'Use a TB syringe to draw it up',
'Use only an insulin-specific syringe with markings in units; perform an independent double-check with another qualified practitioner; check prescription, drug, dose, route, time and patient identity',
'Round to the nearest 5 units',
'Give IV instead',
'Mix two insulins without prescription'
],correct:'B',
explanation:'Insulin is a high-risk medication and a leading cause of medication errors and never events. Always use insulin-specific syringes (units, not mL); never use IV/IM equipment for SC insulin. Independent double-check (NPSA) is mandatory in many trusts. Verify prescription, drug, dose, route, time and patient. Use the word "units" in full (never "U"), and check brand and concentration. Wrong-route insulin (IV instead of SC) is a Never Event.',
distractors:{
  A:'TB syringe risks misreading "units" as mL — ten-fold dose error',
  C:'Rounding to nearest 5 alters prescribed dose unsafely',
  D:'IV insulin without prescription is a wrong-route never event',
  E:'Mixing insulins without prescription is unsafe'
},
pearl:'Insulin: always insulin syringe (units, not mL); independent double-check; word "units" in full (never "U" — read as zero); right brand and concentration.',
references:[
{label:'NPSA — Safer use of insulin',url:'https://www.england.nhs.uk/patient-safety/'}
]
},
{
section:'medsafe',specialty:'Medication Safety',topic:'Anticoagulation INR',
stem:'A patient on warfarin has INR 8.5 (target 2.5) and no bleeding.',
options:[
'Continue current dose',
'Stop warfarin, give oral vitamin K (e.g. 1–5 mg), recheck INR daily, restart warfarin at lower dose when INR <5; involve anticoagulation team',
'Continue and recheck in 1 week',
'Give IV adrenaline',
'Give IM vitamin K'
],correct:'B',
explanation:'BSH guidance for warfarin reversal (no bleeding): INR 4.5–10 → withhold warfarin, recheck; oral vitamin K 1–5 mg if INR >8 or other bleeding risks. INR >10 → 5 mg oral vitamin K. Major bleeding (any INR) → 4-factor PCC (e.g. Beriplex/Octaplex) plus IV vitamin K 5 mg. Don\'t use FFP (now displaced by PCC for warfarin reversal). Always identify cause: drug interactions, liver disease, missed dose, dietary change. Stop warfarin and monitor closely; involve anticoagulation team.',
distractors:{
  A:'Continuing warfarin at INR 8.5 risks major bleeding',
  C:'Routine 1-week recheck in INR 8.5 is unsafe',
  D:'IV adrenaline does not reverse warfarin',
  E:'IM vitamin K causes haematoma; oral or IV preferred'
},
pearl:'INR >8 no bleed: stop warfarin + oral vit K 1–5 mg + recheck daily. Major bleed: 4-factor PCC + IV vit K 5 mg. FFP no longer first-line.',
references:[
{label:'BSH — Oral anticoagulation reversal',url:'https://b-s-h.org.uk/guidelines/'}
]
},
{
section:'medsafe',specialty:'Medication Safety',topic:'Controlled drug administration',
stem:'You are administering a controlled drug (CD) — IM morphine 10 mg.',
options:[
'Single nurse can administer',
'Check, draw up and witness administration with a registered nurse; record balance; sign the CD register; document the dose and effect on the prescription/observation chart',
'Take from the trolley without recording',
'Use an unsigned amount',
'Borrow from another patient\'s supply'
],correct:'B',
explanation:'Misuse of Drugs Regulations + NMC standards: CDs must be checked, drawn up and witnessed by two registered practitioners (one being the administering registrant). The CD register must be signed, with running balance, immediately before/at administration. Document the dose, route, time, batch/expiry and effect on the prescription/observation chart. Discard unused portions in the presence of a witness, recorded in the register. Never borrow, share, or pre-prepare CDs.',
distractors:{
  A:'Single-nurse CD administration breaches Misuse of Drugs Regulations',
  C:'Untrolleyed unrecorded CD is a controlled drug offence',
  D:'Unsigned CD use is unaccountable and illegal',
  E:'Borrowing CDs across patients is a serious offence'
},
pearl:'CDs: two registrants check, draw up, witness administration. Sign register with running balance. Document dose, route, time, batch, effect. Witness disposal.',
references:[
{label:'NMC — Standards for medicines management',url:'https://www.nmc.org.uk/'},
{label:'Misuse of Drugs Regulations 2001',url:'https://www.gov.uk/government/publications/controlled-drugs-list--2'}
]
},
{
section:'medsafe',specialty:'Medication Safety',topic:'Methotrexate weekly',
stem:'A patient is prescribed oral methotrexate. Which is the most important safety check?',
options:[
'Methotrexate is daily',
'Methotrexate for non-malignant indications is WEEKLY (not daily) — verify the dose, day, and prescription against discharge and primary care information; co-prescribe folic acid; check FBC, U&E, LFTs',
'Methotrexate is once a month',
'Methotrexate is twice daily',
'No safety check needed'
],correct:'B',
explanation:'Methotrexate is a critical-medicines never-event drug for the wrong-frequency administration. For non-malignant indications (RA, psoriasis, IBD, etc.) it is WEEKLY — accidental daily administration causes fatal myelosuppression. NHS England Never Event: oral methotrexate prescribed/administered daily. Always verify dose, frequency, day, and indication; co-prescribe folic acid (usually weekly, not on the same day); pre-dose monitoring of FBC, U&E, LFTs. Use yellow patient-held monitoring booklet.',
distractors:{
  A:'Daily methotrexate for non-malignant indication is fatal myelosuppression',
  C:'Once-monthly is too infrequent for the prescribed indication',
  D:'Twice daily is fatally wrong frequency',
  E:'No safety check is unacceptable for a high-risk medicine'
},
pearl:'Oral methotrexate weekly for non-malignant disease — daily administration is an NHS Never Event. Co-prescribe folic acid; monitor FBC, U&E, LFTs.',
references:[
{label:'NHS England Never Events policy',url:'https://www.england.nhs.uk/patient-safety/never-events/'}
]
},
{
section:'medsafe',specialty:'Medication Safety',topic:'IV potassium bolus',
stem:'A doctor has prescribed "20 mmol KCl as a slow IV bolus" for a patient with low potassium.',
options:[
'Administer as prescribed',
'Recognise this as an unsafe prescription — IV potassium must NEVER be given as a bolus (cardiac arrest risk); challenge the prescription, contact the prescriber, and use a pre-prepared bag at appropriate rate (max 10 mmol/h peripherally without monitoring)',
'Give half the dose as a bolus',
'Give faster',
'Switch to oral'
],correct:'B',
explanation:'Bolus IV potassium is a Never Event causing cardiac arrest. NPSA mandates: only pre-prepared dilute bags (not concentrated KCl ampoules at the bedside), maximum 10 mmol/h peripherally without cardiac monitoring (20 mmol/h with monitoring; 40 mmol/h via central line in critical care). Always challenge a "bolus" prescription. Two-person check at the bedside. The NMC Code (4.2) requires you to challenge unsafe practice.',
distractors:{
  A:'IV K⁺ bolus is a never event causing cardiac arrest',
  C:'Half-dose bolus still risks arrest',
  D:'Faster bolus worsens cardiac risk',
  E:'Switching to oral may be appropriate but doesn\'t address the unsafe prescription'
},
pearl:'IV potassium NEVER as bolus. Always pre-prepared dilute bag, ≤10 mmol/h peripheral without monitoring. NMC Code 4.2: challenge unsafe practice.',
references:[
{label:'NPSA — Potassium chloride alerts',url:'https://www.england.nhs.uk/patient-safety/'}
]
},

// ─── FALLS, FRAILTY & SKIN (4) ────────────────────────────────────
{
section:'falls',specialty:'Falls, Frailty & Skin',topic:'In-patient fall',
stem:'An 84-year-old admitted with UTI is found on the floor by her bed having tried to mobilise unaided. GCS 15, observations stable, but she has hit her head. She is on apixaban for AF.',
options:[
'Help her back to bed and document in the morning',
'Structured post-fall assessment, neurological observations as per NICE head injury, CT head within 8 hours (anticoagulant), check observations and capillary glucose, complete incident form, escalate',
'Give analgesia and reassess in 4 hours',
'Apply bedrails and mittens',
'CT only if symptoms develop tomorrow'
],correct:'B',
explanation:'NICE NG232: any patient on anticoagulant who has sustained a head injury should have CT head within 8 hours, regardless of other features (apixaban is an anticoagulant). Structured post-fall assessment, neuro obs (every 30 min for 2 h, then hourly etc.), pain and injury assessment, capillary glucose, ECG, observation review for cause (postural drop, sepsis, arrhythmia, drugs). Routine restraints (bedrails as restraint, mittens) require Mental Capacity Act assessment and DoLS — they are not a default response to falls.',
distractors:{
  A:'Helping back to bed without assessment misses head injury and cause',
  C:'Analgesia + 4-h reassessment delays time-critical CT in anticoagulated patient',
  D:'Bedrails as restraint require MCA/DoLS — not a default response',
  E:'Waiting overnight in anticoagulated head injury risks expanding bleed'
},
pearl:'Anticoagulant + head injury → CT within 8 h (NICE NG232). Plus structured post-fall assessment, neuro obs, cause review (drugs, infection, BP).',
references:[
{label:'NICE NG232 — Head injury',url:'https://www.nice.org.uk/guidance/ng232'},
{label:'NICE CG161 — Falls in older people',url:'https://www.nice.org.uk/guidance/cg161'}
]
},
{
section:'falls',specialty:'Falls, Frailty & Skin',topic:'Pressure ulcer risk',
stem:'On admission, you assess a 78-year-old immobile patient using the Waterlow score: 22.',
options:[
'Low risk',
'Moderate risk only',
'Very high risk: pressure-redistributing mattress, individualised repositioning schedule, SSKIN bundle, nutrition assessment, daily skin inspection',
'No specific action',
'Discharge planning without referral'
],correct:'C',
explanation:'Waterlow: 10–14 at risk; 15–19 high; 20+ very high. NICE CG179 / NICE QS89: at-risk patients need a pressure-redistributing surface (foam/dynamic), individualised repositioning schedule (frequency depends on risk and condition; typically 2–6 hourly, with documentation), nutritional assessment (MUST), and the SSKIN bundle: Surface, Skin inspection, Keep moving, Incontinence management, Nutrition. Document daily skin inspections, especially heels and sacrum.',
distractors:{
  A:'Waterlow 22 is very high risk, not low',
  B:'Moderate risk understates the score',
  D:'No specific action ignores high preventable harm risk',
  E:'Discharge without referral misses ongoing risk in community'
},
pearl:'Waterlow ≥20 = very high risk. SSKIN bundle: Surface, Skin inspection, Keep moving, Incontinence, Nutrition. Document daily skin checks (heels, sacrum).',
references:[
{label:'NICE CG179 — Pressure ulcers',url:'https://www.nice.org.uk/guidance/cg179'}
]
},
{
section:'falls',specialty:'Falls, Frailty & Skin',topic:'Pressure ulcer category',
stem:'A patient has an area on the sacrum showing intact skin with non-blanching erythema. What category of pressure ulcer is this (EPUAP)?',
options:[
'Category 1','Category 2','Category 3','Category 4','Suspected deep tissue injury (sDTI)'
],correct:'A',
explanation:'EPUAP / NPIAP categorisation: Cat 1 = intact skin with non-blanchable erythema (with darker pigmented skin, may include changes in colour, temperature, induration); Cat 2 = partial-thickness skin loss with exposed dermis (blister); Cat 3 = full-thickness skin loss with visible fat; Cat 4 = full-thickness loss with visible bone, tendon, muscle; sDTI = persistent non-blanchable purple/maroon discoloration or blood-filled blister; Unstageable = full-thickness loss obscured by slough/eschar.',
distractors:{
  B:'Cat 2 has partial-thickness skin loss with exposed dermis',
  C:'Cat 3 has full-thickness skin loss with visible fat',
  D:'Cat 4 has full-thickness loss with visible bone/tendon/muscle',
  E:'sDTI is persistent purple/maroon discoloration or blood-filled blister'
},
pearl:'EPUAP categories: Cat 1 intact + non-blanchable erythema; Cat 2 partial-thickness; Cat 3 full-thickness + fat; Cat 4 + bone/tendon; sDTI; Unstageable.',
references:[
{label:'EPUAP/NPIAP/PPPIA Classification System',url:'https://www.epuap.org/'}
]
},
{
section:'falls',specialty:'Falls, Frailty & Skin',topic:'Frailty syndromes',
stem:'Which presentation is MOST consistent with the frailty syndrome of "delirium" rather than dementia?',
options:[
'Slow, progressive memory loss over 2 years with stable attention',
'Acute fluctuating disorientation, inattention, altered level of consciousness developing over 1 day in the context of UTI',
'Sudden mood disturbance with no cognitive change',
'Stable lifelong learning disability',
'Chronic depression of 5 years\' duration'
],correct:'B',
explanation:'Frailty syndromes (the "geriatric giants"): falls, immobility, delirium, incontinence, susceptibility to side effects of medication. Delirium is acute, fluctuating, with inattention and altered level of consciousness, often triggered by an illness, drug, or environmental change. Dementia is a chronic, progressive cognitive impairment. They can co-exist, and delirium superimposed on dementia is common. The 4AT and CAM tools rapidly screen for delirium. Always look for and treat underlying causes (sepsis, drugs, retention, constipation, electrolyte disturbance, hypoxia, pain).',
distractors:{
  A:'Slow progressive memory loss with stable attention is dementia',
  C:'Mood disturbance without cognitive change suggests depression',
  D:'Lifelong learning disability is stable, not acute',
  E:'Chronic depression of 5 years is not acute fluctuating'
},
pearl:'Delirium = acute, fluctuating, inattention, altered level of consciousness, identifiable cause. Treat the trigger (sepsis, drugs, retention, electrolytes).',
references:[
{label:'British Geriatrics Society — Frailty Toolkit',url:'https://www.bgs.org.uk/'}
]
},

// ─── INFECTION CONTROL (4) ────────────────────────────────────────
{
section:'infection',specialty:'Infection Control',topic:'Hand hygiene 5 moments',
stem:'According to the WHO "Five Moments for Hand Hygiene", which is NOT one of the five moments?',
options:[
'Before patient contact',
'Before an aseptic procedure',
'After body fluid exposure risk',
'After patient contact',
'Before drinking your coffee'
],correct:'E',
explanation:'WHO Five Moments: (1) Before patient contact; (2) Before aseptic task; (3) After body fluid exposure risk; (4) After patient contact; (5) After contact with patient surroundings. Use alcohol-based hand rub for visibly clean hands; soap and water if visibly soiled or after contact with C. difficile, norovirus, or spore-forming organisms. Hand hygiene is the single most effective intervention to reduce HCAI.',
distractors:{
  A:'Before patient contact IS one of the five',
  B:'Before aseptic procedure IS one of the five',
  C:'After body fluid exposure IS one of the five',
  D:'After patient contact IS one of the five'
},
pearl:'WHO 5 Moments: before contact, before aseptic task, after body fluid risk, after contact, after surroundings. Soap+water for C. diff/norovirus.',
references:[
{label:'WHO Five Moments for Hand Hygiene',url:'https://www.who.int/teams/integrated-health-services/infection-prevention-control/hand-hygiene'},
{label:'NICE QS61 — Infection prevention and control',url:'https://www.nice.org.uk/guidance/qs61'}
]
},
{
section:'infection',specialty:'Infection Control',topic:'PPE COVID/respiratory',
stem:'You are caring for a patient with confirmed pulmonary tuberculosis (smear-positive) requiring AGPs. Which PPE is required?',
options:[
'Standard surgical mask only',
'No PPE',
'FFP3 respirator (fit-tested), eye protection, long-sleeved fluid-repellent gown, gloves; negative-pressure side-room',
'Apron and gloves only',
'Surgical mask + apron'
],correct:'C',
explanation:'Pulmonary TB (smear-positive or AGPs in suspected/confirmed TB): airborne precautions — fit-tested FFP3 respirator, eye protection, long-sleeved fluid-repellent gown, gloves; negative-pressure side-room (or single side-room if not available); minimise AGPs; staff and visitor restrictions and contact tracing. Smear-positive patients are typically infectious for ~2 weeks of effective treatment.',
distractors:{
  A:'Surgical masks do not protect against airborne TB',
  B:'No PPE risks staff and other-patient transmission',
  D:'Apron+gloves alone miss respiratory protection',
  E:'Surgical mask + apron is inadequate for AGPs in pulmonary TB'
},
pearl:'Pulmonary TB / AGPs: fit-tested FFP3 + eye protection + long-sleeved fluid-repellent gown + gloves; negative-pressure side room.',
references:[
{label:'NICE NG33 — Tuberculosis',url:'https://www.nice.org.uk/guidance/ng33'},
{label:'UKHSA — Respiratory protective equipment',url:'https://www.gov.uk/government/publications/wuhan-novel-coronavirus-infection-prevention-and-control'}
]
},
{
section:'infection',specialty:'Infection Control',topic:'MRSA decolonisation',
stem:'A patient is admitted to AMU and the swab returns MRSA-positive in the nose and groin. They have no clinical infection.',
options:[
'No action needed',
'Standard precautions, decolonisation per trust policy (e.g. mupirocin nasal ointment 5 days + chlorhexidine body wash); isolate per local policy; alert IPC; review prophylactic/therapeutic antibiotics if undergoing surgery',
'Discharge home',
'Use only nystatin',
'Bed-bound restriction with no movement at all'
],correct:'B',
explanation:'MRSA colonisation is asymptomatic carriage. Treatment is decolonisation per trust policy — typically mupirocin 2% nasal ointment TDS for 5 days plus chlorhexidine 4% body wash daily for 5 days, with environmental cleaning and patient/family education. Isolate per local policy (often single-room for high-risk areas). Inform IPC and update flag in records. Pre-operative decolonisation reduces SSI in elective surgery. Active infection (e.g. cellulitis, line-related sepsis) requires systemic antibiotics (e.g. IV vancomycin or teicoplanin).',
distractors:{
  A:'No action allows transmission and missed pre-op decolonisation',
  C:'Discharge without decolonisation misses elective surgery preparation',
  D:'Nystatin treats Candida, not MRSA',
  E:'Bed-bound restriction without movement is excessive and harmful'
},
pearl:'MRSA colonisation: mupirocin 2% nasal TDS 5 days + chlorhexidine 4% body wash 5 days. Pre-op decolonisation reduces SSI. Active infection → IV vancomycin/teicoplanin.',
references:[
{label:'epic3 National Evidence-based Guidelines',url:'https://www.journalofhospitalinfection.com/article/S0195-6701(13)60012-2/fulltext'}
]
},
{
section:'infection',specialty:'Infection Control',topic:'Sharps injury',
stem:'A nurse sustains a needlestick injury from a hollow-bore needle used on a patient with known HIV (on suppressive ART, viral load undetectable). What is the immediate action?',
options:[
'Ignore it',
'Encourage bleeding, wash with soap and water, do NOT scrub; report immediately; attend OH/ED for risk assessment; PEP discussion (HIV PEP not usually indicated for undetectable VL but assess case-by-case); test source (with consent) and recipient; complete incident form; document',
'Apply iodine and continue working',
'Take antibiotics',
'Suture the wound'
],correct:'B',
explanation:'Needlestick injury management: encourage bleeding (don\'t suck), wash with soap and water (don\'t scrub or use disinfectants like alcohol on wounds), cover, report IMMEDIATELY to OH or ED. Risk assessment: source HIV/HBV/HCV status, exposure type (hollow-bore high risk; superficial low risk). HIV PEP within 1 hour ideal (start within 72 h), 28-day course; HBV vaccine/HBIG depending on immunity; HCV: monitor, no PEP. UK PEP guidance: source on suppressive ART with sustained undetectable VL — PEP not generally required, but case-by-case decision. Always complete incident form and follow-up testing.',
distractors:{
  A:'Ignoring needlestick injury risks BBV transmission',
  C:'Iodine + continuing work delays risk assessment',
  D:'Empirical antibiotics do not protect against viruses',
  E:'Suturing the wound impairs healing and is unnecessary'
},
pearl:'Needlestick: encourage bleeding, soap+water (no scrub/alcohol), report immediately. PEP within 1 h ideal; up to 72 h. UK: source on suppressive ART = case-by-case.',
references:[
{label:'UKHSA — Eye of the Needle / occupational exposure',url:'https://www.gov.uk/government/publications/bloodborne-viruses-occupational-transmission'}
]
},

// ─── MENTAL CAPACITY & COMMUNICATION (4) ──────────────────────────
{
section:'mca',specialty:'Mental Capacity & Communication',topic:'Capacity & best interests',
stem:'A 72-year-old man with delirium secondary to a UTI is refusing IV antibiotics. He cannot retain or weigh up information about his treatment.',
options:[
'Force him to have antibiotics',
'Document an MCA capacity assessment showing he lacks capacity for this specific decision; make a best-interests decision involving family/IMCA where appropriate; use the least restrictive option',
'Discharge as he is refusing',
'Restrain without documentation',
'Wait until he agrees, even if he becomes septic'
],correct:'B',
explanation:'MCA 2005: capacity is decision- and time-specific. The two-stage test: (1) is there an impairment of mind/brain? (2) does it affect ability to: understand, retain, weigh up, and communicate the decision? If a patient lacks capacity for THIS decision NOW, treatment can proceed in their best interests, with consultation of family/carers/IMCA, using the least restrictive option, and documentation. Five principles: presumption of capacity, support to make decisions, unwise decisions, best interests, least restriction.',
distractors:{
  A:'Forcing treatment without MCA assessment is unlawful',
  C:'Discharging a patient lacking capacity who needs treatment is unsafe and unlawful',
  D:'Restraint without documentation breaches MCA principles',
  E:'Waiting for agreement when capacity is absent allows preventable deterioration'
},
pearl:'MCA two-stage test: impairment of mind/brain → ability to understand, retain, weigh, communicate. Best interests + least restrictive option.',
references:[
{label:'Mental Capacity Act 2005',url:'https://www.legislation.gov.uk/ukpga/2005/9/contents'},
{label:'NICE NG108 — Decision-making and mental capacity',url:'https://www.nice.org.uk/guidance/ng108'}
]
},
{
section:'mca',specialty:'Mental Capacity & Communication',topic:'SBAR escalation',
stem:'You are escalating a deteriorating patient to the on-call doctor by phone. Which framework is recommended for clear, structured handover?',
options:[
'ABCDE','SBAR (Situation, Background, Assessment, Recommendation)','FAST','DRABC','TICLS'
],correct:'B',
explanation:'SBAR is the recommended structured communication tool for safety-critical clinical conversations: Situation (who you are, who/where the patient is, the problem in 1 sentence), Background (relevant history), Assessment (NEWS2, observations, what you think is going on, your concern), Recommendation (what you want — review, treatment, when). It reduces miscommunication and is required in many trusts for escalation calls and hand-offs.',
distractors:{
  A:'ABCDE is for clinical assessment, not handover',
  C:'FAST is for stroke recognition',
  D:'DRABC is the historic CPR sequence',
  E:'TICLS is a paediatric assessment tool'
},
pearl:'SBAR: Situation (who/where/problem), Background (relevant Hx), Assessment (NEWS2, your concern), Recommendation (what + when). Reduces miscommunication.',
references:[
{label:'NHS Improvement — SBAR communication tool',url:'https://www.england.nhs.uk/patient-safety/'}
]
},
{
section:'mca',specialty:'Mental Capacity & Communication',topic:'DoLS',
stem:'A patient who lacks capacity is being kept in hospital using continuous supervision and is not free to leave. Which legal framework applies?',
options:[
'Mental Health Act section 2',
'Mental Health Act section 3',
'Deprivation of Liberty Safeguards (DoLS) — until replaced by Liberty Protection Safeguards in due course; required when a person who lacks capacity is being deprived of liberty in a hospital or care home',
'Common law',
'No legal framework needed'
],correct:'C',
explanation:'When a person lacks capacity AND is being deprived of liberty (continuous supervision and control + not free to leave — the "acid test" from Cheshire West) in a hospital or registered care home, an authorisation under DoLS is required. (Liberty Protection Safeguards, LPS, will replace DoLS, with implementation pending.) Standard authorisations last up to 12 months; urgent authorisations (granted by the managing authority) up to 7 days. The Mental Health Act covers detention for treatment of mental disorder, not physical illness alone.',
distractors:{
  A:'MHA s.2 is for assessment of mental disorder, not physical illness restraint',
  B:'MHA s.3 is for treatment of mental disorder',
  D:'Common law applies to emergencies, not sustained deprivation',
  E:'A legal framework is required for any deprivation of liberty'
},
pearl:'"Acid test" (Cheshire West): continuous supervision/control + not free to leave + lacks capacity → DoLS authorisation required. LPS will replace DoLS.',
references:[
{label:'Mental Capacity Act 2005 / DoLS',url:'https://www.legislation.gov.uk/ukpga/2005/9/contents'}
]
},
{
section:'mca',specialty:'Mental Capacity & Communication',topic:'Breaking bad news',
stem:'You are supporting a doctor who is about to share serious news (terminal diagnosis) with a patient. Which model is most widely used to structure the conversation?',
options:[
'SBAR','SPIKES (Setting, Perception, Invitation, Knowledge, Emotion, Strategy/Summary)','ABCDE','PQRST','SOCRATES'
],correct:'B',
explanation:'SPIKES is a six-step model widely taught and used for breaking bad news: Setting (private place, sit down, no interruptions), Perception (what does the patient already know/understand?), Invitation (how much do they want to know?), Knowledge (warning shot, then clear simple language; pause), Emotions (acknowledge and respond empathically), Strategy/Summary (next steps, support, written information). Nursing role: be present, allow silence, support the patient and family, avoid medical jargon, document, follow up.',
distractors:{
  A:'SBAR is for clinical handover, not patient communication',
  C:'ABCDE is the resuscitation framework',
  D:'PQRST assesses pain',
  E:'SOCRATES is also a pain history tool'
},
pearl:'SPIKES: Setting, Perception, Invitation, Knowledge (warning shot first), Emotions (acknowledge), Strategy/Summary. Nursing: presence, silence, support.',
references:[
{label:'Baile et al. SPIKES protocol (Oncologist 2000)',url:'https://theoncologist.onlinelibrary.wiley.com/doi/full/10.1634/theoncologist.5-4-302'}
]
},
  {section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Hour-1 bundle',stem:'A 68-year-old man with suspected hospital-acquired pneumonia is hypotensive (BP 84/50) and tachycardic at 14:00. The team has just recognised septic shock. According to the Surviving Sepsis Campaign 2021 Hour-1 bundle, all of the following should be initiated by 15:00 EXCEPT:',options:['Measure serum lactate','Take blood cultures before antibiotics if it does not delay them','Administer broad-spectrum antibiotics','Begin 30 mL/kg crystalloid for hypotension or lactate ≥4','Insert a tunnelled central line for vasopressor administration'],correct:'E',explanation:'The Hour-1 bundle includes lactate, cultures (if no delay), antibiotics, fluids and starting vasopressors during/after fluids if MAP <65. Tunnelled lines take time and are not part of Hour-1 — vasopressors can be started peripherally for short durations through a large-bore PVC while definitive access is secured.',distractors:{A:'Lactate IS in the Hour-1 bundle as a perfusion marker',B:'Cultures before antibiotics ARE in the bundle if they do not delay therapy',C:'Broad-spectrum antibiotics within 1 hour ARE the time-critical priority',D:'30 mL/kg crystalloid for hypotension or lactate ≥4 IS in the bundle'},pearl:'Hour-1 bundle = lactate · cultures · antibiotics · fluids · vasopressors. Central access is desirable but not mandatory in the first hour.',references:[{label:'Surviving Sepsis Campaign 2021',url:'https://www.sccm.org/SurvivingSepsisCampaign/Guidelines/Adult-Patients'},{label:'NICE NG51 — Sepsis',url:'https://www.nice.org.uk/guidance/ng51'}]},
  {section:'sepsis',specialty:'Sepsis & Deterioration',topic:'MAP target septic shock',stem:'A 56-year-old woman with septic shock from urosepsis is being titrated on a noradrenaline infusion in HDU. After fluid resuscitation, her BP is 92/45 (MAP 60). What is the recommended initial mean arterial pressure target?',options:['MAP ≥50 mmHg','MAP ≥55 mmHg','MAP ≥65 mmHg','MAP ≥80 mmHg','MAP equal to her usual baseline'],correct:'C',explanation:'The Surviving Sepsis Campaign and NICE NG51 recommend an initial MAP target of ≥65 mmHg in septic shock. A higher target (e.g. 80–85) does not improve mortality and increases atrial fibrillation. Patients with chronic hypertension may need individualised higher targets after specialist input.',distractors:{A:'A MAP of 50 is associated with under-perfusion of vital organs',B:'A MAP of 55 is below the recommended sepsis target',D:'A MAP of 80 has not shown mortality benefit and increases AF risk',E:'Aiming for baseline BP risks excessive vasopressor exposure'},pearl:'Initial MAP target in septic shock = 65 mmHg. Individualise upward only with specialist input in chronic hypertension.',references:[{label:'Surviving Sepsis Campaign 2021',url:'https://www.sccm.org/SurvivingSepsisCampaign/Guidelines/Adult-Patients'},{label:'NICE NG51 — Sepsis',url:'https://www.nice.org.uk/guidance/ng51'}]},
  {section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Necrotising fasciitis',stem:'A 62-year-old man with diabetes presents with severe pain in his left lower leg. Examination shows a small area of erythema but pain that is grossly out of proportion to the skin findings. He is febrile, tachycardic and hypotensive. Bloods show CRP 280, WCC 22, creatinine 180, sodium 132, glucose 14. What is the most appropriate immediate action?',options:['Topical antibiotic and outpatient review','Oral flucloxacillin and discharge','Compute LRINEC score, escalate urgently to surgery for emergency debridement','Apply compression bandaging','Send a wound swab and await results before treating'],correct:'C',explanation:'Pain disproportionate to skin findings + sepsis + raised inflammatory markers suggests necrotising fasciitis. The LRINEC score uses CRP, WCC, Hb, sodium, creatinine and glucose; a score ≥6 is concerning, ≥8 high risk. Treatment is emergency surgical debridement plus broad-spectrum antibiotics (including clindamycin for toxin suppression).',distractors:{A:'Topical agents and outpatient review miss a surgical emergency',B:'Oral antibiotics alone are inadequate; this needs IV broad-spectrum cover and surgery',D:'Compression bandaging worsens tissue ischaemia and infection',E:'Wound swabs delay surgery; deep tissue samples taken intraoperatively are diagnostic'},pearl:'Pain out of proportion to skin findings + systemic toxicity = nec fasc. LRINEC ≥6 is high risk. Surgery saves life — cultures take time.',references:[{label:'NICE NG51 — Sepsis',url:'https://www.nice.org.uk/guidance/ng51'},{label:'BMJ Best Practice — Necrotising fasciitis',url:'https://bestpractice.bmj.com/'}]},
  {section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Pyelonephritis admission',stem:'A 40-year-old woman presents with right loin pain, rigors, vomiting and a temperature of 38.9°C. Urinalysis shows leucocytes and nitrites. Her HR is 118, BP 102/68, RR 22, SpO2 96%. She has been unable to keep down oral fluids or her usual medications. Which is the most appropriate management?',options:['Oral nitrofurantoin and discharge','Oral co-amoxiclav and outpatient follow-up','Admit for IV antibiotics, IV fluids and observation','Send urine culture and review in 48 hours','Bladder washout'],correct:'C',explanation:'Pyelonephritis with systemic features (rigors, vomiting, inability to take oral fluids/medication) requires hospital admission for IV antibiotics (per local guidance, often co-amoxiclav or piperacillin-tazobactam), IV fluids and monitoring. Nitrofurantoin does NOT achieve adequate tissue concentrations in the kidney and is contraindicated in pyelonephritis.',distractors:{A:'Nitrofurantoin does not penetrate renal tissue and is contraindicated in pyelonephritis',B:'Oral co-amoxiclav alone in a vomiting septic patient risks under-treatment',D:'Outpatient review in a systemically unwell patient is unsafe',E:'Bladder washout has no role in upper urinary tract infection'},pearl:'Pyelonephritis with sepsis features = admit for IV antibiotics. Nitrofurantoin treats lower UTI only — not kidneys.',references:[{label:'NICE NG109 — Pyelonephritis',url:'https://www.nice.org.uk/guidance/ng109'},{label:'NICE NG51 — Sepsis',url:'https://www.nice.org.uk/guidance/ng51'}]},
  {section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Catheter-related bloodstream infection',stem:'A 72-year-old man on chemotherapy has a tunnelled central line in situ for 8 weeks. He develops rigors and a fever (38.6°C) within 30 minutes of his line being flushed. Blood cultures from the line and a peripheral vein both grow Staphylococcus aureus. What is the most appropriate management?',options:['Continue using the line and treat with oral antibiotics','Lock the line with antibiotic solution and continue use','Remove the line urgently and start IV anti-staphylococcal antibiotics','Replace the line over a guidewire','Observe and reculture'],correct:'C',explanation:'Catheter-related bloodstream infection (CRBSI) with S. aureus mandates urgent line removal — the organism forms biofilm, has a high complication rate (endocarditis, osteomyelitis, septic emboli) and cannot be reliably cleared with antibiotics alone. Replace at a different site only when blood cultures are clear.',distractors:{A:'Continued use of an infected line propagates bacteraemia and biofilm',B:'Antibiotic locks may be considered for low-virulence organisms but NOT S. aureus',D:'Wire exchange perpetuates infection in the new line',E:'Observation in active S. aureus bacteraemia risks endocarditis and septic emboli'},pearl:'S. aureus CRBSI = remove line + IV anti-staph antibiotics + screen for endocarditis (TTE/TOE).',references:[{label:'epic3 (Healthcare-associated infections, 2014)',url:'https://www.journalofhospitalinfection.com/article/S0195-6701(13)60012-2/fulltext'},{label:'NICE NG51 — Sepsis',url:'https://www.nice.org.uk/guidance/ng51'}]},
  {section:'sepsis',specialty:'Sepsis & Deterioration',topic:'Toxic shock syndrome',stem:'A 28-year-old woman presents with high fever, profuse vomiting and diarrhoea, severe myalgia and a diffuse macular erythematous rash. She is hypotensive (BP 78/40) and tachycardic. She mentions having had a tampon in for over 24 hours. Which is the most appropriate immediate action?',options:['Reassurance and oral rehydration','Remove the tampon, IV fluids, broad-spectrum antibiotics including clindamycin, escalate to ICU','Topical hydrocortisone for the rash','Antiemetics and discharge with oral antibiotics','Repeat observations in 4 hours'],correct:'B',explanation:'Staphylococcal toxic shock syndrome (TSS) is mediated by superantigens. Management: remove the source (tampon, packing, infected wound), aggressive fluid resuscitation, broad-spectrum antibiotics WITH clindamycin to suppress toxin production. ICU admission is usually needed.',distractors:{A:'TSS is rapidly fatal without intervention; reassurance is dangerous',C:'Topical steroids do not address systemic toxin-mediated shock',D:'Discharge in haemodynamic instability is unsafe',E:'Delaying treatment by 4 hours risks decompensation and death'},pearl:'TSS: Remove source · IV fluids · Antibiotics WITH clindamycin (toxin suppression) · ICU.',references:[{label:'NICE NG51 — Sepsis',url:'https://www.nice.org.uk/guidance/ng51'},{label:'UK Health Security Agency — TSS guidance',url:'https://www.gov.uk/government/publications'}]},
  {section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Airway adjunct sizing',stem:'You are caring for an unconscious patient (GCS 7) without spontaneous airway maintenance. The team asks you to insert an oropharyngeal (Guedel) airway. Which technique correctly sizes the airway?',options:['Tip of nose to angle of jaw','Centre of incisors to angle of mandible','Centre of incisors to earlobe','Centre of mouth to mid-clavicle','One size fits all adult patients'],correct:'B',explanation:'Sized from the centre of the incisors (or angle of the mouth) to the angle of the mandible. Too short — does not bypass the tongue. Too long — risk of laryngospasm or oesophageal placement. Insert upside-down then rotate, or directly with a tongue depressor.',distractors:{A:'Nose-to-jaw measurement is for nasopharyngeal airways',C:'Mouth-to-earlobe is for nasopharyngeal sizing',D:'There is no clinical sizing measurement using mid-clavicle',E:'Adult OPAs come in multiple sizes — wrong size causes harm'},pearl:'Guedel = incisors → mandibular angle. NPA = nostril → tragus. Wrong size = wrong airway.',references:[{label:'Resus Council UK 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'},{label:'Difficult Airway Society',url:'https://das.uk.com/'}]},
  {section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Hypothermic cardiac arrest',stem:'A 32-year-old hill walker is found in cardiac arrest after prolonged exposure. Core temperature is 26°C. CPR has been ongoing for 15 minutes with rhythm of VF that has not responded to two shocks. According to Resuscitation Council UK guidance, which is the next correct action?',options:['Stop resuscitation; survival is impossible','Continue CPR but withhold further shocks and adrenaline until core temperature is >30°C','Continue CPR with shocks and standard adrenaline doses every 3–5 minutes','Active external rewarming only','Single dose of bicarbonate'],correct:'B',explanation:'In severe hypothermia (<30°C), drugs are metabolised slowly and may accumulate. RCUK guidance: withhold further defibrillation attempts after 3 shocks and withhold adrenaline until core temperature is >30°C. CPR is continued through rewarming. ECMO/cardiopulmonary bypass is the gold standard.',distractors:{A:'Hypothermic patients with prolonged arrest can survive neurologically intact — "not dead until warm and dead"',C:'Standard drug intervals risk toxic accumulation in severe hypothermia',D:'Active external rewarming alone is inadequate in hypothermic arrest — invasive rewarming is needed',E:'Routine bicarbonate is not recommended'},pearl:'Hypothermic arrest <30°C: 3 shocks max, no adrenaline until >30°C, refer for extracorporeal rewarming. Not dead until warm and dead.',references:[{label:'Resus Council UK 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'}]},
  {section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Capnography in resuscitation',stem:'During cardiac arrest CPR with an advanced airway, the end-tidal CO2 (EtCO2) trace shows a sudden sustained rise from 1.5 kPa to 5 kPa. Which is the most likely interpretation?',options:['Equipment malfunction','Tube displacement','Return of spontaneous circulation (ROSC)','Hyperventilation','Severe hypercarbia from CPR'],correct:'C',explanation:'A sudden sustained rise in EtCO2 during high-quality CPR indicates restoration of pulmonary blood flow — usually ROSC. Check for a pulse. Persistently low EtCO2 (<1.3 kPa / <10 mmHg) after 20 minutes of CPR predicts very poor outcome.',distractors:{A:'Sudden rises do not typically reflect equipment fault',B:'Tube displacement causes sudden FALL in EtCO2 (often to zero), not rise',D:'Hyperventilation causes EtCO2 to fall',E:'Hypercarbia would build gradually, not as a step change'},pearl:'EtCO2 in cardiac arrest: sudden rise = ROSC. Persistent <1.3 kPa after 20 min = very poor outcome. Sudden fall to zero = tube out.',references:[{label:'Resus Council UK 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'}]},
  {section:'abcde',specialty:'ABCDE & Resuscitation',topic:'Pregnant cardiac arrest',stem:'A 35-week pregnant woman collapses on the postnatal ward. She is pulseless with agonal breathing. Compressions are started. Which additional immediate action is essential?',options:['Place her in left lateral decubitus position','Manually displace the uterus to the patient\'s left while keeping her supine','Wait for an obstetrician before starting compressions','Place a wedge under the right hip and continue normal CPR','Defibrillation is contraindicated in pregnancy'],correct:'B',explanation:'Manual left uterine displacement (pulling the uterus up and to the left) relieves aortocaval compression while allowing effective compressions on a supine patient. If ROSC is not achieved within 4 minutes, perimortem caesarean section should be performed within 5 minutes (regardless of foetal viability).',distractors:{A:'Lateral decubitus reduces compression effectiveness; manual displacement is preferred',C:'CPR must not be delayed',D:'Wedging is inferior to manual displacement; the angle must be ≥27° to be effective',E:'Defibrillation is safe and indicated in pregnancy'},pearl:'Pregnant arrest: supine + manual left uterine displacement + standard CPR + perimortem CS within 5 min if no ROSC by 4 min.',references:[{label:'Resus Council UK 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'},{label:'MBRRACE-UK',url:'https://www.npeu.ox.ac.uk/mbrrace-uk'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Aortic dissection',stem:'A 64-year-old man with hypertension presents with sudden severe "tearing" chest pain radiating to the back. BP is 196/110 in the right arm and 142/82 in the left arm. CXR shows a widened mediastinum. Which is the most appropriate immediate management?',options:['Aspirin 300 mg and ticagrelor','Thrombolysis','IV labetalol to target HR <60 and SBP 100–120, urgent CT aortogram, cardiothoracic referral','Reassurance and oral analgesia','Furosemide IV'],correct:'C',explanation:'Acute aortic dissection: control HR and BP first (β-blocker before vasodilator to avoid reflex tachycardia), urgent CT aortogram, immediate cardiothoracic referral. Type A (ascending) is surgical; Type B (descending) is usually medical. Anticoagulation/antiplatelets are CONTRAINDICATED.',distractors:{A:'Antiplatelets in dissection cause catastrophic bleeding',B:'Thrombolysis in dissection is rapidly fatal',D:'A SBP of 196 with end-organ pain mandates urgent intervention',E:'Furosemide is for pulmonary oedema, not dissection'},pearl:'Tearing chest/back pain + BP differential + widened mediastinum = dissection. β-blocker FIRST, then CT aortogram, then surgery. Never thrombolyse.',references:[{label:'ESC 2014 Aortic Diseases',url:'https://academic.oup.com/eurheartj/article/35/41/2873/407693'},{label:'NICE CG95 — Chest pain',url:'https://www.nice.org.uk/guidance/cg95'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Massive PE',stem:'A 56-year-old woman with metastatic cancer collapses in clinic. She is conscious but profoundly hypotensive (BP 70/40), tachycardic (HR 130), tachypnoeic (RR 36) and hypoxic (SpO2 84% on room air). Bedside echo shows a dilated, hypokinetic right ventricle. Which is the most appropriate next step?',options:['CTPA followed by treatment dose LMWH','Systemic thrombolysis (e.g. alteplase) without delay','Aspirin 300 mg orally','Sit upright and observe','Wait for D-dimer result'],correct:'B',explanation:'Massive (high-risk) PE = haemodynamic instability with confirmed/suspected PE. Bedside echo showing RV strain in this clinical context is sufficient — systemic thrombolysis (alteplase 50–100 mg) is life-saving. Surgical embolectomy or catheter-directed therapy are alternatives where available. Don\'t wait for CTPA in a peri-arrest patient.',distractors:{A:'In peri-arrest PE, waiting for CTPA delays life-saving thrombolysis',C:'Aspirin has no role in acute massive PE',D:'Observation in shock is fatal',E:'D-dimer adds nothing to a clinically obvious case'},pearl:'Massive PE = shock + RV strain. Thrombolysis can wait neither for CTPA nor for D-dimer. 50 mg bolus alteplase if peri-arrest.',references:[{label:'NICE NG158 — Venous thromboembolic diseases',url:'https://www.nice.org.uk/guidance/ng158'},{label:'ESC 2019 PE Guidelines',url:'https://academic.oup.com/eurheartj/article/41/4/543/5556136'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Cardiac tamponade',stem:'A 70-year-old man with metastatic lung cancer presents with progressive breathlessness. Examination reveals BP 85/65 with paradoxus 18 mmHg, raised JVP, muffled heart sounds and clear lungs. Which is the diagnosis and immediate priority?',options:['Pulmonary embolism — give heparin','Cardiac tamponade — urgent pericardiocentesis','Tension pneumothorax — needle decompression','Cardiogenic shock — start dobutamine','STEMI — primary PCI'],correct:'B',explanation:'Beck\'s triad (hypotension, raised JVP, muffled heart sounds) plus pulsus paradoxus >10 mmHg is cardiac tamponade. Urgent pericardiocentesis is life-saving — bedside echo-guided is the standard. Anticoagulation and IV fluids are temporising at best; give cautious fluids while preparing.',distractors:{A:'Heparin in tamponade can worsen haemorrhagic effusion',C:'Tension pneumothorax has hyper-resonance and absent breath sounds, not muffled heart sounds',D:'Inotropes do not address mechanical obstruction',E:'STEMI does not present with this constellation'},pearl:'Beck\'s triad + pulsus paradoxus = tamponade. Pericardiocentesis is the cure — drugs only buy time.',references:[{label:'ESC 2015 Pericardial Diseases',url:'https://academic.oup.com/eurheartj/article/36/42/2921/2293375'},{label:'Resus Council UK 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Long QT torsades',stem:'A 58-year-old woman is admitted with diarrhoea and electrolyte derangement (K 2.8, Mg 0.45). She has been started on ondansetron and metoclopramide. ECG shows QTc 540 ms with frequent ventricular ectopics in a "twisting" pattern. She suddenly becomes pulseless. Which is the most appropriate intervention?',options:['Amiodarone 300 mg IV','IV magnesium sulphate 2 g over 10 minutes plus defibrillation if pulseless','Lidocaine 100 mg IV','Adenosine 6 mg IV','Atropine 500 mcg IV'],correct:'B',explanation:'Torsades de pointes (polymorphic VT in long QT) responds to IV magnesium sulphate 2 g, even if magnesium is normal. Defibrillate if pulseless. Identify and remove QT-prolonging drugs (ondansetron, metoclopramide, antibiotics, antipsychotics). Correct hypokalaemia and hypomagnesaemia.',distractors:{A:'Amiodarone PROLONGS QT and worsens torsades',C:'Lidocaine has no role in torsades',D:'Adenosine is for stable supraventricular tachycardias',E:'Atropine is for bradycardia, not VT'},pearl:'Torsades = magnesium 2 g IV (even if normal). Defibrillate if pulseless. Stop QT-prolonging drugs. Correct K and Mg.',references:[{label:'Resus Council UK 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'},{label:'BNF — Torsades de pointes',url:'https://bnf.nice.org.uk/'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Pericarditis',stem:'A 30-year-old man with a recent viral illness presents with sharp central chest pain that is worse on lying flat and inspiration, eased by sitting forward. ECG shows widespread concave ST elevation and PR depression. Troponin is mildly raised. Which is the most appropriate management?',options:['Primary PCI for STEMI','Thrombolysis','High-dose ibuprofen and colchicine, observation','Aspirin 300 mg and ticagrelor as for ACS','GTN infusion'],correct:'C',explanation:'Acute pericarditis: pleuritic positional pain, widespread concave ST elevation with PR depression (without reciprocal changes), often raised troponin (myo-pericarditis). First-line: NSAIDs (ibuprofen 600 mg TDS) PLUS colchicine 500 mcg BD for 3 months reduces recurrence. Echo to exclude effusion.',distractors:{A:'Concave widespread ST elevation is pericarditis, not STEMI',B:'Thrombolysis in pericarditis can cause haemopericardium and tamponade',D:'Antiplatelets are not indicated in pericarditis',E:'GTN does not treat pericardial inflammation'},pearl:'Pericarditis ECG: concave widespread ST elevation + PR depression. Treatment: NSAID + colchicine 3 months. Echo to exclude effusion.',references:[{label:'ESC 2015 Pericardial Diseases',url:'https://academic.oup.com/eurheartj/article/36/42/2921/2293375'},{label:'NICE CG95 — Chest pain',url:'https://www.nice.org.uk/guidance/cg95'}]},
