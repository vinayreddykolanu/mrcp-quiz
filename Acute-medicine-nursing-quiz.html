  {section:'resp',specialty:'Respiratory',topic:'Spontaneous pneumothorax management',stem:'A 25-year-old tall thin male with primary spontaneous pneumothorax, breathless, 2.5 cm rim on CXR. Most appropriate management per BTS?',options:['Observation alone','Aspiration first (16–18G cannula 2nd ICS midclavicular line); chest drain only if aspiration fails or bilateral','Immediate chest drain for all','Surgery only','Pleurodesis'],correct:'B',explanation:'Primary spontaneous pneumothorax with breathlessness or >2 cm rim: aspiration first per BTS. If aspiration fails or recurs, chest drain. Recurrent = surgical pleurodesis.',distractors:{A:'Observation only for small (<2 cm) asymptomatic',C:'Drain not first-line for primary',D:'Surgery for recurrence/persistent leak',E:'Pleurodesis for recurrent only'},pearl:'BTS algorithm: primary <2 cm + asymptomatic = observe; >2 cm or breathless = aspirate. Secondary (lung disease) more aggressive: drain >1 cm or any breathlessness.',references:[{label:'BTS Pleural Disease Guideline',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/pleural-disease/'}]},
  {section:'resp',specialty:'Respiratory',topic:'Pleural effusion drainage',stem:'A patient has a large pleural effusion. Diagnostic and therapeutic drainage planned. Most appropriate practice?',options:['Drain >1.5 L at once','Drain ≤1.5 L initially, clamp 1 hour, then continue if no re-expansion pulmonary oedema; ultrasound guidance reduces complications','Drain to dry without ultrasound','Bilateral simultaneous drainage','Aspirate without consent'],correct:'B',explanation:'Pleural drainage: ≤1.5 L initial drainage to avoid re-expansion pulmonary oedema. Ultrasound guidance reduces pneumothorax/visceral injury (NICE NPSA Sign-off Sheet recommends).',distractors:{A:'>1.5 L risks re-expansion pulmonary oedema',C:'Ultrasound is best practice for safety',D:'Bilateral drainage rarely indicated simultaneously',E:'Consent essential'},pearl:'Re-expansion pulmonary oedema: drain slowly, ≤1.5 L initially. NPSA: ultrasound mandatory for thoracentesis (NPSA/2008/RRR003). WHO surgical safety checklist applies.',references:[{label:'BTS Pleural Disease Guideline',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/pleural-disease/'}]},
  {section:'resp',specialty:'Respiratory',topic:'Cor pulmonale recognition',stem:'A 70-year-old with severe COPD has worsening leg swelling, raised JVP, parasternal heave, loud P2, FBC shows polycythaemia.',options:['Discharge with diuretic','Diagnose cor pulmonale: optimise COPD therapy, target SpO₂ 88–92%, assess for LTOT (PaO₂ ≤7.3, or ≤8 with cor pulmonale/polycythaemia), specialist referral','Aggressive diuresis alone','Stop bronchodilators','Heart transplant referral'],correct:'B',explanation:'Cor pulmonale (right heart failure from chronic lung disease): treat lung disease, LTOT for chronic hypoxia (PaO₂ ≤7.3, or ≤8 with secondary indications). Cautious diuretics, address polycythaemia.',distractors:{A:'Discharge without comprehensive plan misses LTOT need',C:'Aggressive diuresis worsens preload-dependent RV',D:'Stopping bronchodilators worsens lung disease',E:'Transplant rare in COPD-related cor pulmonale'},pearl:'LTOT criteria (NICE): PaO₂ ≤7.3 stable on air; or 7.3–8 with peripheral oedema, polycythaemia (Hct >55%), or pulmonary hypertension. ≥15 hours/day for benefit.',references:[{label:'NICE NG115 COPD',url:'https://www.nice.org.uk/guidance/ng115'}]},
  {section:'resp',specialty:'Respiratory',topic:'Anaphylactic bronchospasm',stem:'A patient in anaphylaxis has been given IM adrenaline. Wheeze persists despite reversal of hypotension. Most appropriate next step?',options:['Stop oxygen','Nebulised salbutamol (β2 agonist) for bronchospasm; consider IV magnesium for refractory; adrenaline already given for anaphylaxis','Stop adrenaline','IV antihistamine alone','Repeat IM adrenaline immediately if BP normal'],correct:'B',explanation:'Persistent bronchospasm in anaphylaxis after BP correction: nebulised salbutamol. IV magnesium 2 g for refractory bronchospasm. Continue oxygen and monitoring.',distractors:{A:'Stopping oxygen worsens hypoxia',C:'Adrenaline given for anaphylaxis stays in plan',D:'Antihistamine alone insufficient',E:'Repeat adrenaline only if BP/airway again compromised'},pearl:'Anaphylaxis management layered: IM adrenaline first; bronchospasm + nebs salbutamol/ipratropium; refractory + IV magnesium; refractory shock + IV adrenaline infusion ICU.',references:[{label:'Resus Council UK Anaphylaxis 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/emergency-treatment-anaphylaxis'}]},
  {section:'resp',specialty:'Respiratory',topic:'VAP prevention bundle',stem:'A ventilated patient on ICU. Which is part of the ventilator-associated pneumonia (VAP) prevention bundle?',options:['Supine position','Head-of-bed elevation 30–45°, daily sedation hold and SBT, oral chlorhexidine, subglottic suction, cuff pressure 20–30 cmH₂O, VTE prophylaxis, ulcer prophylaxis','Higher tidal volumes','Continuous deep sedation','Routine antibiotics'],correct:'B',explanation:'VAP prevention bundle: HOB 30–45°, daily sedation hold + SBT, oral care chlorhexidine, subglottic suctioning, cuff pressure, VTE/PUD prophylaxis. Reduces VAP incidence ~40%.',distractors:{A:'Supine increases aspiration risk',C:'High Vt causes lung injury',D:'Continuous sedation prolongs ventilation',E:'Prophylactic antibiotics drive resistance'},pearl:'IHI VAP bundle compliance reduces VAP. Sedation holds and spontaneous breathing trials together = ABCDE bundle (Awakening, Breathing, Coordination, Delirium, Early mobility).',references:[{label:'ICS UK Guidelines',url:'https://www.ics.ac.uk/Society/Guidance/Guidelines'}]},

  // ENDOCRINE (6)
  {section:'endo',specialty:'Endocrine',topic:'Hyperkalaemic adrenal crisis',stem:'A patient on long-term steroids stopped abruptly presents with hypotension, fatigue, hyponatraemia, hyperkalaemia, hypoglycaemia.',options:['Continue without steroids','IV hydrocortisone 100 mg + IV fluids + IV glucose if hypoglycaemic + investigate; resume oral hydrocortisone with sick day rules','Oral steroids only','Insulin','Discharge'],correct:'B',explanation:'Adrenal crisis from steroid withdrawal: IV hydrocortisone 100 mg, IV fluids, glucose. Investigate cause (compliance, intercurrent illness). Restart with steroid card and sick day rules.',distractors:{A:'Crisis without steroids fatal',C:'Oral too slow',D:'Insulin worsens',E:'Discharge fatal'},pearl:'Adrenal crisis precipitants: missed doses, infection, surgery, trauma. Always carry NHS Steroid Emergency Card. Sick day rules: double oral dose; IV if vomiting/severe.',references:[{label:'Society for Endocrinology Adrenal Crisis',url:'https://www.endocrinology.org/clinical-practice/clinical-guidance/'}]},
  {section:'endo',specialty:'Endocrine',topic:'Hypopituitarism',stem:'A patient with previous pituitary surgery presents with fatigue, weight loss, hypotension, hyponatraemia. Cortisol low, ACTH low, TSH low, T4 low.',options:['Replace T4 first','Replace hydrocortisone FIRST then add levothyroxine (or untreated cortisol deficiency causes adrenal crisis when T4 added)','Both at once','Insulin','GH alone'],correct:'B',explanation:'Hypopituitarism: replace cortisol BEFORE thyroxine. Adding T4 to untreated cortisol deficiency increases metabolism and precipitates adrenal crisis.',distractors:{A:'T4 first risks adrenal crisis',C:'Both at once still risks crisis if not staggered',D:'Insulin not needed unless DI',E:'GH later, not first'},pearl:'Hypopituitarism replacement order: hydrocortisone FIRST (cover stress), then T4 (after 24–48 h of cortisol). Sex steroids and GH later. Educate on stress dose steroids.',references:[{label:'Society for Endocrinology Hypopituitarism',url:'https://www.endocrinology.org/clinical-practice/clinical-guidance/'}]},
  {section:'endo',specialty:'Endocrine',topic:'Diabetes insipidus',stem:'A patient post-pituitary surgery has urine output 600 mL/h, urine SG 1.001, plasma Na 152, urine osmolality 110, plasma osmolality 308.',options:['Restrict fluids','IV/SC desmopressin (DDAVP), match input to urine output, monitor electrolytes carefully (avoid water intoxication if DDAVP overshoots)','Furosemide','Hypertonic saline','Increase oral fluid only'],correct:'B',explanation:'Cranial DI: low urine osmolality, high plasma Na. Treat with desmopressin (DDAVP), match losses with hypotonic IV fluids, careful electrolyte monitoring.',distractors:{A:'Restriction worsens hypernatraemia',C:'Furosemide worsens DI',D:'Hypertonic saline worsens hypernatraemia',E:'Oral often inadequate for huge losses'},pearl:'Cranial DI vs nephrogenic: DDAVP test (cranial responds, nephrogenic does not). Triphasic response post-pituitary surgery: DI → SIADH → DI again at 7–10 days.',references:[{label:'Society for Endocrinology DI',url:'https://www.endocrinology.org/clinical-practice/clinical-guidance/'}]},
  {section:'endo',specialty:'Endocrine',topic:'Hypoglycaemic unawareness',stem:'A T1DM patient on basal-bolus insulin has had 3 unwarned severe hypos in last month. Most appropriate intervention?',options:['Increase insulin','Diabetes specialist nurse review: relax HbA1c target, optimise basal:bolus ratio, consider CGM, structured education (DAFNE), screen for adrenal/coeliac','Stop insulin','Eat sugary snacks all day','Discharge with no follow-up'],correct:'B',explanation:'Hypo unawareness: relax HbA1c targets temporarily (40 mmol/mol→48–53), CGM helps detect, structured education, screen for hypoadrenalism, gastroparesis, alcohol, β-blocker.',distractors:{A:'Increasing insulin worsens hypos',C:'Stopping insulin causes DKA',D:'Constant carb intake causes hyperglycaemia',E:'No follow-up dangerous'},pearl:'Hypo unawareness reverses with strict avoidance of hypos for several weeks (regenerates counter-regulatory response). CGM transformative. Driving: must regain awareness before resuming.',references:[{label:'NICE NG17 T1DM',url:'https://www.nice.org.uk/guidance/ng17'}]},
  {section:'endo',specialty:'Endocrine',topic:'Steroid sick day rules',stem:'A patient on prednisolone 7.5 mg daily for 3 years develops gastroenteritis with vomiting. Most appropriate immediate advice?',options:['Continue same dose','Double oral dose; if vomiting, switch to IM hydrocortisone 100 mg and seek medical help; carry NHS Steroid Emergency Card','Stop steroids','Halve dose','Take only when symptomatic'],correct:'B',explanation:'Steroid sick day rules: double oral dose for fever or vomiting; if unable to tolerate orally → IM hydrocortisone and admit. NHS Steroid Card mandatory.',distractors:{A:'Same dose insufficient cover for stress',C:'Stopping causes adrenal crisis',D:'Halving worsens',E:'PRN dosing inadequate'},pearl:'NHS Steroid Emergency Card: red, carried by all patients on >5 mg pred for >4 weeks (or equivalent). Educate on sick day rules. Vomiting + steroid dependence = treat as crisis.',references:[{label:'Society for Endocrinology Steroid Card',url:'https://www.endocrinology.org/clinical-practice/clinical-guidance/'}]},
  {section:'endo',specialty:'Endocrine',topic:'Myxoedema coma',stem:'A 75-year-old hypothyroid patient stopped levothyroxine 6 weeks ago. Now has T 33.4°C, BP 92/60, drowsy GCS 11, hyponatraemia, hypoglycaemia, bradycardia.',options:['Oral levothyroxine','IV levothyroxine 200–500 mcg loading + IV hydrocortisone 100 mg + ICU + slow rewarming + cautious electrolyte correction','Hot bath rewarming','Insulin for glucose','Discharge'],correct:'B',explanation:'Myxoedema coma: hypothermia, altered mentation, multisystem failure. IV T4 (with possible T3), IV steroids (concurrent adrenal insufficiency), ICU, slow rewarming, electrolyte correction.',distractors:{A:'Oral inadequate in coma',C:'Active rewarming worsens hypotension',D:'Glucose treats low BG; insulin worsens',E:'Discharge fatal'},pearl:'Myxoedema coma mortality 20–60%. Always cover with hydrocortisone (autoimmune polyendocrine overlap). Slow rewarming (passive). Look for precipitant: infection, drugs, cold.',references:[{label:'British Thyroid Foundation',url:'https://www.btf-thyroid.org/'}]},

  // NEUROLOGY (6)
  {section:'neuro',specialty:'Neurology',topic:'Idiopathic intracranial hypertension',stem:'A 28-year-old obese woman has weeks of headache, transient visual loss on standing, papilloedema. CT normal. LP opening pressure 32 cmH₂O.',options:['Urgent neurosurgery','Refer ophthalmology + neurology + start acetazolamide + weight management; therapeutic LP may help acutely','Steroids','Antibiotics','Discharge'],correct:'B',explanation:'IIH: obesity + headache + papilloedema + raised CSF pressure with normal imaging. Treat with acetazolamide, weight loss, ophthalmology for visual fields, surgical (shunt or ONSF) for refractory.',distractors:{A:'Surgery for visual decline only',C:'Steroids inferior to acetazolamide',D:'Antibiotics inappropriate',E:'Visual loss possible if untreated'},pearl:'IIH: visual loss is the threat. Monitor visual fields. Risk factors: obesity, certain drugs (tetracyclines, retinoids, OCP), pregnancy. Weight loss is most effective long-term.',references:[{label:'ABN IIH Consensus Guidelines',url:'https://jnnp.bmj.com/content/89/10/1088'}]},
  {section:'neuro',specialty:'Neurology',topic:'First seizure ED management',stem:'A 35-year-old has first ever seizure (witnessed tonic-clonic). Now post-ictal, slowly improving GCS 13. Observations stable.',options:['Routine discharge','Investigate: bloods (glucose, electrolytes, alcohol, toxicology), 12-lead ECG, CT head if focal signs/deficits/persisting alteration, neurology follow-up; do NOT start AED for first unprovoked seizure typically','Start phenytoin loading immediately','Start lifelong AED','Driving allowed'],correct:'B',explanation:'First unprovoked seizure: investigate for cause (electrolytes, infection, drugs, structural). AED not routinely started after first seizure unless high recurrence risk (focal signs, abnormal EEG, abnormal scan). Driving banned for 6 months.',distractors:{A:'Investigation needed',C:'AED loading not for first uncomplicated seizure',D:'Lifelong AED requires neurology decision',E:'Driving banned 6 months minimum after first'},pearl:'First seizure rules: 6 months driving ban (DVLA). Document witness account. Investigate provoking factors. Refer to first seizure clinic. AED only if recurrence risk high.',references:[{label:'NICE NG217 Epilepsies',url:'https://www.nice.org.uk/guidance/ng217'}]},
  {section:'neuro',specialty:'Neurology',topic:'Cauda equina red flags',stem:'A patient with back pain has new urinary retention, saddle anaesthesia, bilateral leg weakness, faecal incontinence.',options:['NSAID and review in 1 week','Urgent MRI lumbar spine WITHIN HOURS + surgical referral; cauda equina syndrome is a surgical emergency for prompt decompression','Physiotherapy','Discharge with analgesia','Outpatient MRI in 4 weeks'],correct:'B',explanation:'Cauda equina syndrome (CES): saddle anaesthesia, bladder/bowel dysfunction, bilateral neuro signs. Emergent MRI + decompression to preserve function (ideally <24 h, sooner if possible).',distractors:{A:'Delay irreversible function loss',C:'Physio harmful before diagnosis',D:'Discharge catastrophic',E:'4-week wait too long'},pearl:'CES surgery within 24 h gives best chance of bladder recovery. Once urinary retention established, decompression less likely to restore. Don\'t miss it — medico-legal high-risk.',references:[{label:'NICE NG59 Low back pain',url:'https://www.nice.org.uk/guidance/ng59'}]},
  {section:'neuro',specialty:'Neurology',topic:'Intracerebral haemorrhage BP',stem:'A patient has acute ICH on CT, GCS 13, BP 200/115. NICE/INTERACT2-derived target SBP?',options:['Aim SBP <100 rapidly','Reduce SBP to ≤140 mmHg within 1 h with IV labetalol or GTN; avoid drops >60 mmHg or below 110 SBP','Allow permissive hypertension','Aim SBP 180','Reduce only if symptomatic'],correct:'B',explanation:'ICH BP target: aim SBP ≤140 mmHg within 1 hour (NICE/INTERACT2). Excess BP drop risks ischaemia. IV labetalol or GTN. Reverse anticoagulation, neurosurgical input, ICU.',distractors:{A:'Too low risks ischaemia',C:'Permissive HTN risks haematoma expansion',D:'180 too high',E:'Reduce regardless of symptoms'},pearl:'ICH management: rapid BP control to ≤140 (within 1 h), reverse anticoagulants (warfarin: PCC + vit K; DOAC: andexanet/idarucizumab/PCC), neurosurgical opinion, head-up 30°.',references:[{label:'NICE NG128 Stroke',url:'https://www.nice.org.uk/guidance/ng128'}]},
  {section:'neuro',specialty:'Neurology',topic:'Trigeminal neuralgia',stem:'A 65-year-old has paroxysmal lancinating right facial pain triggered by chewing/cold air. No sensory deficit. MRI shows vascular loop abutting trigeminal nerve.',options:['Strong opioids','Carbamazepine first-line; refer to neurology; surgical option (microvascular decompression) for refractory','Paracetamol','Antidepressant alone','Antibiotics'],correct:'B',explanation:'Trigeminal neuralgia: carbamazepine first-line (start 100 mg BD, titrate). Specialist input for medication failure. MVD/RFA for refractory cases.',distractors:{A:'Opioids ineffective for neuralgic pain',C:'Paracetamol ineffective',D:'Antidepressants help neuropathic pain but not first for TN',E:'Antibiotics irrelevant'},pearl:'Trigeminal neuralgia: lancinating, trigger zones, no sensory deficit (if deficit, suspect secondary cause — MS, tumour). Carbamazepine 100 mg BD start; monitor FBC, U&E, LFT, sodium.',references:[{label:'NICE CKS Trigeminal Neuralgia',url:'https://cks.nice.org.uk/topics/trigeminal-neuralgia/'}]},
  {section:'neuro',specialty:'Neurology',topic:'Osmotic demyelination prevention',stem:'A patient has Na 110 with seizures. After 6 hours of treatment Na is 122. Most appropriate next step?',options:['Continue rapid correction','Stop active correction; aim NOT to exceed 8–10 mmol/L rise in 24 h to prevent osmotic demyelination; if exceeded, consider lowering Na with DDAVP/free water','Aggressive saline','Diuresis','Stop all fluids'],correct:'B',explanation:'Osmotic demyelination prevention: max rise 8–10 mmol/L in 24 h, 18 in 48 h. If overcorrection, can lower Na with DDAVP and 5% glucose to within target. Avoid CPM.',distractors:{A:'Rapid correction → osmotic demyelination',C:'Saline overcorrects',D:'Diuresis worsens',E:'Cessation may not undo overcorrection'},pearl:'Osmotic demyelination peak risk 2–6 days after Na correction: dysarthria, dysphagia, paraparesis, locked-in syndrome. Prevention is critical — slow correction.',references:[{label:'Society for Endocrinology Hyponatraemia',url:'https://www.endocrinology.org/clinical-practice/hyponatraemia-society/'}]},

  // ANAPHYLAXIS (3)
  {section:'anaphylaxis',specialty:'Allergy',topic:'Adrenaline contraindications',stem:'A 78-year-old has anaphylaxis. The nurse hesitates over giving IM adrenaline because of the patient\'s ischaemic heart disease history.',options:['Withhold adrenaline','Give IM adrenaline 500 mcg — there are NO absolute contraindications in anaphylaxis. Risk of withholding > risk of cardiac side effect','Give half dose','Use IV bolus instead','Antihistamine alone'],correct:'B',explanation:'Anaphylaxis: no absolute contraindication to IM adrenaline. Risk-benefit always favours giving. Cardiac patients still receive standard dose. IV adrenaline only by experienced clinicians.',distractors:{A:'Withholding kills',C:'Half dose may be inadequate',D:'IV bolus is arrest dose',E:'Antihistamine inadequate'},pearl:'Anaphylaxis fatalities are usually due to delayed or omitted adrenaline. The drug is safe IM at 500 mcg. Cardiac history is NOT a reason to withhold or reduce dose.',references:[{label:'Resus Council UK Anaphylaxis 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/emergency-treatment-anaphylaxis'}]},
  {section:'anaphylaxis',specialty:'Allergy',topic:'Anaphylaxis observation period',stem:'After treating anaphylaxis with single dose IM adrenaline, the patient is well. They have no asthma, no β-blocker, no prior biphasic, presented promptly. Most appropriate observation?',options:['Discharge immediately','Observe for ≥2 hours from last dose adrenaline before considering discharge with allergy plan and 2 auto-injectors','24 h admission','12 h observation','Reassessment in 1 week'],correct:'B',explanation:'Resus Council 2021: low-risk anaphylaxis (single adrenaline dose, complete resolution, no risk factors) — observe ≥2 h. Moderate risk ≥6 h. High risk ≥12 h. Always allergy clinic referral.',distractors:{A:'Immediate discharge risks biphasic',C:'24 h excessive for low risk',D:'12 h for high risk only',E:'1-week review insufficient'},pearl:'Risk-stratified observation (Resus UK 2021): 2 h low-risk, 6 h moderate, 12 h high (severe reaction, β-blocker, asthma, late presentation, prior biphasic, repeat doses). All get allergy referral and auto-injectors.',references:[{label:'Resus Council UK Anaphylaxis 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/emergency-treatment-anaphylaxis'}]},
  {section:'anaphylaxis',specialty:'Allergy',topic:'Pre-medication anaphylaxis',stem:'A patient has had previous mild allergic reaction to IV contrast. Now needs urgent CT with contrast for trauma.',options:['Cancel imaging','Discuss with radiology — pre-medication (steroid + antihistamine) may be considered for previous mild reaction; pre-medication does NOT prevent severe anaphylaxis but can reduce mild reactions; weigh urgency','Pre-medicate then proceed at any time','Avoid contrast permanently','Test dose first'],correct:'B',explanation:'Previous mild contrast reaction: pre-medication (e.g. prednisolone 50 mg PO 13/7/1 h pre + antihistamine 1 h pre) may reduce mild reactions but does not prevent severe anaphylaxis. Discuss risk-benefit with radiologist.',distractors:{A:'Cancellation may be inappropriate if urgent',C:'Pre-medication does not guarantee safety',D:'Avoidance not always possible',E:'Test doses unreliable for contrast'},pearl:'Severe contrast anaphylaxis is rare (<0.04%) but premedication has limited evidence base. Document allergy clearly. Use lowest osmolar agent. Have anaphylaxis treatment ready.',references:[{label:'Royal College of Radiologists Contrast Reactions',url:'https://www.rcr.ac.uk/clinical-radiology/'}]},

  // RENAL & FLUIDS (6)
  {section:'renal',specialty:'Nephrology',topic:'RRT indications AEIOU',stem:'A patient with AKI has K 7.2 unresponsive to medical therapy, urea 42, severe metabolic acidosis pH 7.10, fluid overload with pulmonary oedema. Most appropriate?',options:['Continue medical therapy','Urgent renal replacement therapy (haemodialysis or CVVH per ICU); meets multiple AEIOU criteria','Diuresis alone','Bicarbonate alone','Discharge'],correct:'B',explanation:'RRT indications (AEIOU): Acidosis (severe refractory), Electrolytes (refractory hyperK), Intoxication (dialyzable), Overload (refractory), Uraemia (encephalopathy, pericarditis, bleeding).',distractors:{A:'Failed medical therapy needs RRT',C:'Diuresis fails in oliguric AKI',D:'Bicarbonate alone insufficient',E:'Discharge fatal'},pearl:'RRT modalities: intermittent HD (rapid clearance), CVVH (slower, haemodynamically tolerated), peritoneal (community/specialist). ICU input for haemodynamically unstable patients.',references:[{label:'KDIGO AKI Guidelines',url:'https://kdigo.org/guidelines/acute-kidney-injury/'}]},
  {section:'renal',specialty:'Nephrology',topic:'Volume assessment elderly',stem:'An 85-year-old has acute confusion, JVP not visible, dry mucous membranes, BP 110/65 supine / 88/55 standing, urine output 20 mL/h, U/Cr ratio 130:1.',options:['Diuresis','IV crystalloid 250 mL bolus, reassess; treat hypovolaemic AKI; identify cause (vomiting, diuretic, poor intake)','Fluid restrict','Hyponatraemia treatment','No intervention'],correct:'B',explanation:'Hypovolaemia in elderly: bolus 250 mL crystalloid, reassess (BP, HR, urine output, JVP, lactate), repeat. Pre-renal AKI typically reverses with volume repletion.',distractors:{A:'Diuresis worsens',C:'Restriction worsens',D:'Hyponatraemia treatment may not be the issue',E:'No action allows AKI progression'},pearl:'Pre-renal AKI: U/Cr ratio >100, FENa <1%, urine osmolality >500. Reverses with volume. Postural BP drop > 20 systolic = hypovolaemia in elderly.',references:[{label:'NICE NG148 AKI',url:'https://www.nice.org.uk/guidance/ng148'}]},
  {section:'renal',specialty:'Nephrology',topic:'Hypernatraemia management',stem:'A confused elderly patient has Na 162, low fluid intake at home for days. Free water deficit calculated 5 L.',options:['Rapid IV 5% glucose 5 L over 1 h','Oral water if able + IV 5% glucose / hypotonic saline; correct Na ≤10 mmol/L per 24 h to avoid cerebral oedema','Hypertonic saline','Diuresis','Fluid restrict'],correct:'B',explanation:'Hypernatraemia correction: oral water preferred if possible, otherwise hypotonic IV (5% glucose or 0.45% saline). Rate ≤10 mmol/L per 24 h to avoid cerebral oedema.',distractors:{A:'Rapid correction risks cerebral oedema',C:'Hypertonic worsens',D:'Diuresis worsens',E:'Restriction worsens'},pearl:'Hypernatraemia: usually water deficit (elderly, dementia, hypodipsia, DI). Slow correction prevents cerebral oedema. Water deficit = TBW × ((Na/140) − 1).',references:[{label:'BMJ Best Practice Hypernatraemia',url:'https://bestpractice.bmj.com/topics/en-gb/57'}]},
  {section:'renal',specialty:'Nephrology',topic:'Metabolic acidosis ABG',stem:'A patient has pH 7.21, HCO₃⁻ 14, PaCO₂ 4.0, anion gap 24. Lactate 1.2, glucose 32, ketones 4.2.',options:['Respiratory acidosis','High anion gap metabolic acidosis (DKA: ketones + glucose); resuscitate per JBDS DKA protocol','Metabolic alkalosis','Mixed alkalosis','Normal'],correct:'B',explanation:'High anion gap metabolic acidosis (gap >12). DKA from ketones + glucose. Treat per JBDS DKA: fluids, insulin, K replacement.',distractors:{A:'Low PaCO₂ is compensation, not respiratory acidosis',C:'Low pH excludes alkalosis',D:'pH below normal',E:'Markedly abnormal'},pearl:'High anion gap acidosis mnemonic GOLDMARK: Glycols, Oxoproline, L-lactate, D-lactate, Methanol, Aspirin, Renal failure, Ketones. Calculate gap = Na − (Cl + HCO₃).',references:[{label:'JBDS DKA Guidelines',url:'https://abcd.care/jbds'}]},
  {section:'renal',specialty:'Nephrology',topic:'Diabetic nephropathy ACEi',stem:'A T2DM patient with CKD stage 3 (eGFR 45) has urine ACR 35 (raised). BP 145/85.',options:['No specific intervention','Start ACEi (or ARB if intolerant) regardless of BP for renal protection — slows CKD progression in albuminuric DM','Start statin only','Start metformin','Stop all medications'],correct:'B',explanation:'Diabetic nephropathy with albuminuria: ACEi/ARB regardless of BP (renoprotective). Monitor U&E within 1–2 weeks (acceptable creatinine rise <30%). Add SGLT2i for additional renal benefit.',distractors:{A:'Inaction allows CKD progression',C:'Statin part of CV risk but not renal',D:'Metformin may be continued, but ACEi is renal priority',E:'Stopping inappropriate'},pearl:'SGLT2 inhibitors (dapa/empagliflozin) reduce CKD progression in DM and non-DM CKD (DAPA-CKD, EMPA-KIDNEY). Standard care now alongside ACEi/ARB.',references:[{label:'NICE NG203 Chronic kidney disease',url:'https://www.nice.org.uk/guidance/ng203'}]},
  {section:'renal',specialty:'Urology',topic:'Post-renal anuria',stem:'A 70-year-old with metastatic prostate cancer has anuria for 24 h, palpable bladder. Catheterised — only 30 mL urine drained.',options:['Increase IV fluids','Suspect ureteric obstruction (bilateral) — urgent renal ultrasound; if hydronephrosis, urology for nephrostomy or retrograde stent','Diuresis','Discharge','Fluid restrict'],correct:'B',explanation:'Post-renal anuria with empty bladder after catheterisation = bilateral ureteric obstruction. Urgent USS, urology for relief (nephrostomy/stent). Common in malignant pelvic disease.',distractors:{A:'Fluid worsens overload without addressing obstruction',C:'Diuresis fails in obstructed kidney',D:'Discharge dangerous',E:'Restriction worsens AKI'},pearl:'Anuric AKI: think obstruction. Renal USS >90% sensitive for obstruction. Bedside bladder scan rules out retention. Bilateral hydronephrosis = urgent decompression.',references:[{label:'NICE NG148 AKI',url:'https://www.nice.org.uk/guidance/ng148'}]},

  // GASTRO (4)
  {section:'gastro',specialty:'Hepatology',topic:'ALF ammonia',stem:'A patient with ALF has ammonia 180 µmol/L, GCS 11, pupils equal but sluggish. Most appropriate?',options:['Reassure','Lactulose, head-up 30°, sedation if agitated, intubation if GCS ≤8 or worsening; mannitol/hypertonic saline for raised ICP; transfer to liver/transplant unit','Diuresis','Discharge','Antibiotics alone'],correct:'B',explanation:'ALF with cerebral oedema risk (ammonia >150–200): head-up positioning, intubate if GCS deteriorating, mannitol or hypertonic saline for raised ICP, urgent transfer to specialist liver unit.',distractors:{A:'Reassurance fatal',C:'Diuresis worsens',D:'Discharge fatal',E:'Antibiotics if SBP suspected, but not alone'},pearl:'ALF cerebral oedema: ammonia >150–200, ICP monitoring in transplant centre, hypertonic saline (Na 145–155), normothermia/avoid hyperthermia, manage hypoglycaemia.',references:[{label:'EASL Acute Liver Failure',url:'https://easl.eu/publication/clinical-practice-guidelines/'}]},
  {section:'gastro',specialty:'Stoma care',topic:'Stoma assessment',stem:'A patient post-ileostomy has high stoma output 2.5 L/day, dehydration, low Na, low K, deteriorating renal function.',options:['Continue normal diet','Monitor input/output, oral rehydration solution (with adequate Na), consider loperamide and codeine to slow transit, dietetic input','High-fibre diet','Restrict salt','IV fluids only'],correct:'B',explanation:'High-output stoma (>1.5 L/day): oral rehydration with WHO ORS (sufficient Na), antimotility (loperamide ± codeine), PPI to reduce gastric secretions. Monitor electrolytes, renal function.',distractors:{A:'Normal diet inadequate',C:'High-fibre worsens output',D:'Salt restriction worsens depletion',E:'IV without dietary measures incomplete'},pearl:'High-output stoma: target <1500 mL/day. Oral rehydration solution > water (which can worsen Na loss). High output = high renal failure risk; admit if ill.',references:[{label:'BAPEN High Output Stoma',url:'https://www.bapen.org.uk/'}]},
  {section:'gastro',specialty:'Gastroenterology',topic:'Severe ulcerative colitis',stem:'A patient with UC has 8 bloody stools/day, T 38.4°C, HR 105, Hb 95, ESR 60. Most appropriate?',options:['Outpatient mesalazine','Admit + IV steroids (hydrocortisone 100 mg QDS or methylprednisolone) + DVT prophylaxis + assess at day 3 (Travis criteria) for rescue therapy (infliximab/ciclosporin) or surgery','Antibiotics alone','NSAID','Discharge'],correct:'B',explanation:'Acute severe UC (Truelove-Witts): admit, IV steroids, DVT prophylaxis (high VTE risk despite bleeding), daily review, day 3 Travis criteria for escalation (CRP/stool freq) → infliximab/ciclosporin or colectomy.',distractors:{A:'Outpatient inadequate for severe',C:'Antibiotics secondary unless C diff/sepsis',D:'NSAID worsens UC',E:'Discharge dangerous'},pearl:'Travis criteria day 3: CRP >45 + stool >8/day = 85% colectomy at this admission. Rescue therapy (infliximab or ciclosporin) or surgery. Don\'t delay decision.',references:[{label:'BSG IBD Guidelines',url:'https://www.bsg.org.uk/'}]},
  {section:'gastro',specialty:'Pancreatitis',topic:'Pancreatitis fluid resuscitation',stem:'A patient with severe acute pancreatitis (Glasgow 4) needs fluid resuscitation. Most appropriate first 24-h target?',options:['1 L total','Goal-directed Hartmann\'s, ~5–10 mL/kg/h initially, reassess hourly to avoid both under- and over-resuscitation; targets UO 0.5 mL/kg/h, MAP ≥65','Restrict fluids','5 L 5% glucose','15 L NaCl'],correct:'B',explanation:'Severe pancreatitis: aggressive but goal-directed fluid resuscitation (Hartmann\'s preferred over saline). Avoid both under-resuscitation (necrosis) and over-resuscitation (ARDS, abdominal compartment).',distractors:{A:'1 L grossly inadequate',C:'Restriction causes necrosis',D:'5% glucose not resuscitation',E:'15 L excessive, ARDS risk'},pearl:'Pancreatitis: Hartmann\'s reduces SIRS vs 0.9% saline (WATERFALL). Goal-directed > aggressive blanket volumes. Reassess every 6 hours: clinical, lactate, urine output.',references:[{label:'BSG Pancreatitis Guidelines',url:'https://www.bsg.org.uk/'}]},

  // POISONING (4)
  {section:'poisoning',specialty:'Toxicology',topic:'Methanol/ethylene glycol',stem:'A patient drank an unknown alcohol substitute. Now has high anion gap metabolic acidosis, blurred vision, confusion.',options:['Reassure','Fomepizole (or ethanol if unavailable) blocks alcohol dehydrogenase; haemodialysis for severe; treat acidosis; folinic acid (methanol) or thiamine/pyridoxine (ethylene glycol)','Naloxone','Activated charcoal','Antibiotics'],correct:'B',explanation:'Methanol/ethylene glycol toxicity: fomepizole (preferred) or ethanol blocks ADH, preventing toxic metabolites. Haemodialysis removes parent drug + metabolites.',distractors:{A:'Reassurance fatal — irreversible blindness/death',C:'Naloxone for opioids',D:'Charcoal does not bind alcohols well',E:'Antibiotics irrelevant'},pearl:'Methanol → formaldehyde → formic acid (blindness). Ethylene glycol → glycolate, oxalate (renal failure, calcium oxalate crystals in urine). Treat early, dialyse if severe.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'Cyanide poisoning',stem:'A firefighter from a smoke inhalation incident has confusion, bitter almond smell, severe lactic acidosis (lactate 12), high SpO₂ but cherry-red skin.',options:['100% oxygen alone','Hydroxocobalamin (Cyanokit) 5 g IV + 100% oxygen + supportive care; sodium thiosulfate adjunct','Methylene blue','Naloxone','Discharge'],correct:'B',explanation:'Cyanide poisoning (smoke inhalation, industrial): hydroxocobalamin 5 g IV (Cyanokit) is first-line antidote (binds cyanide → cyanocobalamin). Plus 100% oxygen, sodium thiosulfate adjunct.',distractors:{A:'Oxygen alone insufficient',C:'Methylene blue for methaemoglobinaemia',D:'Naloxone for opioids',E:'Discharge fatal'},pearl:'Cyanide in fire smoke: high lactate + normal SpO₂ + neurological/cardiac signs. Cyanide blocks aerobic metabolism. Hydroxocobalamin safer than older nitrites/thiosulfate.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'Organophosphate poisoning',stem:'A farm worker presents with miosis, salivation, lacrimation, urination, defecation, vomiting, bronchospasm, bradycardia. Suspected organophosphate exposure.',options:['Wait and observe','PPE for staff (avoid contamination), remove patient\'s clothes, IV atropine until secretions dry, IV pralidoxime for nicotinic effects, supportive care, ICU','Increase atropine until tachycardia','Antihistamine','Naloxone'],correct:'B',explanation:'Organophosphate poisoning (cholinergic crisis): decontaminate (PPE for staff), IV atropine titrated to drying secretions/HR ≥80, pralidoxime for nicotinic features and to reactivate AChE.',distractors:{A:'Inaction fatal',C:'Tachycardia is over-target',D:'Antihistamine wrong receptor',E:'Naloxone for opioid'},pearl:'OP poisoning: SLUDGE (Salivation, Lacrimation, Urination, Defecation, GI, Emesis) + DUMBELS. Atropine titrated to drying. Pralidoxime works better if given early before AChE "ageing."',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},
  {section:'poisoning',specialty:'Toxicology',topic:'Cocaine cardiotoxicity',stem:'A 28-year-old presents with chest pain, hypertension 195/110, HR 130, agitation. Confirms cocaine use 1 hour ago. ECG: ST changes anterior leads.',options:['IV β-blocker','IV benzodiazepine (diazepam) for agitation/HTN; aspirin; nitrates; phentolamine for severe HTN; AVOID β-blockers (unopposed α effect)','IV propranolol','Discharge','Antiplatelet alone'],correct:'B',explanation:'Cocaine-related ACS/HTN: benzodiazepine first (reduces sympathetic drive), nitrates, aspirin, phentolamine. AVOID β-blockers (theoretical unopposed α-vasoconstriction; controversial).',distractors:{A:'β-blocker classically avoided',C:'Propranolol same concern',D:'Discharge dangerous',E:'Antiplatelet alone insufficient'},pearl:'Cocaine ACS: benzodiazepine is first-line — reduces BP, HR, agitation, anxiety. Many would now permit selective β-1 cautiously, but UK practice avoids. Vasodilators (GTN, phentolamine) for ongoing HTN.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'}]},

  // TRANSFUSION (3)
  {section:'transfusion',specialty:'Haematology',topic:'Anti-D administration',stem:'A RhD negative pregnant woman has a sensitising event at 28 weeks. Most appropriate management?',options:['No action needed','Anti-D immunoglobulin within 72 h of sensitising event (also routine antenatal 28 weeks); Kleihauer test if delivery >12 weeks to determine dose','Test the baby','Wait until delivery','Anti-D only if previous miscarriage'],correct:'B',explanation:'RhD negative pregnancy: routine anti-D at 28 weeks (and 34 if 2-dose regimen), AND for sensitising events (>12 weeks gestation), within 72 hours of event. Kleihauer at delivery determines dose.',distractors:{A:'Untreated leads to alloimmunisation, future haemolytic disease',C:'Baby testing comes later',D:'Delay > 72 h reduces efficacy',E:'Anti-D applies to all RhD-negative women, not just previous miscarriage'},pearl:'Anti-D prevents Rh alloimmunisation. Sensitising events: APH, abdominal trauma, ECV, amniocentesis, >12 weeks gestation. Failure causes haemolytic disease of fetus/newborn in next pregnancy.',references:[{label:'BSH Anti-D Guidelines',url:'https://b-s-h.org.uk/guidelines/'}]},
  {section:'transfusion',specialty:'Haematology',topic:'Delayed haemolytic reaction',stem:'A patient transfused 8 days ago presents with mild jaundice, dropping Hb (transfused 95, now 78), positive direct antiglobulin test, raised bilirubin/LDH.',options:['Acute haemolytic reaction','Delayed haemolytic transfusion reaction (alloimmunisation to minor antigens, e.g. Kidd, Duffy); supportive care; report SHOT; flag for future cross-match','TACO','Anaphylaxis','Bacterial contamination'],correct:'B',explanation:'Delayed haemolytic reaction: 5–14 days post-transfusion. Anamnestic response to minor antigens (Kidd, Duffy, Kell). Supportive care, identify alloantibody, flag patient for future cross-matches.',distractors:{A:'AHTR within hours, severe',C:'TACO within 6 h, fluid overload',D:'Anaphylaxis acute',E:'Bacterial contamination acute fever/shock'},pearl:'Delayed HTR alloantibody often undetectable at cross-match (titre too low) but rises after re-exposure. Patient flagged: future units must be antigen-negative.',references:[{label:'SHOT Annual Report',url:'https://www.shotuk.org/shot-reports/'}]},
  {section:'transfusion',specialty:'Haematology',topic:'TRALI recognition',stem:'A patient receiving FFP develops acute respiratory distress within 4 hours, SpO₂ 84%, bilateral CXR infiltrates, normal JVP, normal CVP.',options:['TACO','Transfusion-related acute lung injury (TRALI): stop transfusion, supportive ventilation/oxygen, ICU; report SHOT; lab investigation','Anaphylaxis','Pneumonia','Pulmonary embolus'],correct:'B',explanation:'TRALI: ARDS within 6 h of transfusion, no cardiac cause. Mainly from donor anti-leukocyte antibodies (often female donors with prior pregnancy). Stop, support, report. FFP/platelet predominance.',distractors:{A:'TACO has fluid overload features',C:'Anaphylaxis with hypotension/urticaria',D:'Pneumonia not transfusion-acute',E:'PE less commonly bilateral diffuse'},pearl:'TRALI: clinical diagnosis, exclude TACO. Predominantly male-only plasma reduces TRALI (UK practice). Mortality 5–25%. Some develop chronic lung issues.',references:[{label:'SHOT Annual Report',url:'https://www.shotuk.org/shot-reports/'}]},

  // MEDICATION SAFETY (5)
  {section:'medsafe',specialty:'Pharmacology',topic:'Warfarin major bleed reversal',stem:'A patient on warfarin has major intracranial haemorrhage. INR 3.2.',options:['Stop warfarin only','Stop warfarin + IV vitamin K 5 mg + 4-factor PCC (e.g. Beriplex/Octaplex) per protocol; FFP only if PCC unavailable','Vitamin K alone','FFP alone','Tranexamic acid alone'],correct:'B',explanation:'Major bleed on warfarin: 4-factor PCC (rapid INR correction <30 min) + IV vitamin K (sustains effect 6–12 h). FFP slower, larger volumes, no longer first-line.',distractors:{A:'Stopping alone too slow for major bleed',C:'Vit K takes hours to work',D:'FFP slower and not first-line per BSH',E:'TXA adjunct, not single therapy'},pearl:'Warfarin major bleed: PCC (Beriplex 25–50 IU/kg) + IV vitamin K 5 mg. INR check 30 min and 4 h post-PCC. Avoid IM (haematoma risk). Discuss restarting at appropriate time.',references:[{label:'BSH Warfarin Reversal',url:'https://b-s-h.org.uk/guidelines/'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Patient-controlled analgesia',stem:'A patient on morphine PCA post-operatively has RR 8, sedation 3 (sleeping, difficult to rouse), SpO₂ 89%.',options:['Continue PCA','STOP PCA, IV naloxone titrated 100–200 mcg until RR ≥10, oxygen, monitor closely (naloxone half-life shorter than morphine), reassess analgesia regime','Increase PCA dose','Add fentanyl','Discharge'],correct:'B',explanation:'PCA-related opioid toxicity: stop PCA, naloxone titrated, monitor (naloxone shorter than morphine — anticipate need for repeat or infusion), reassess pain plan with safer regime.',distractors:{A:'Continuing worsens',C:'Increasing dose worsens',D:'Adding more opioid worsens',E:'Discharge unsafe'},pearl:'PCA safety: only the patient pushes button (not nurse, family). Safe lockout interval. Routine RR/sedation monitoring. Naloxone available. Avoid background infusion in opioid-naive.',references:[{label:'NPSA Patient Safety',url:'https://www.england.nhs.uk/patient-safety/'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Five rights of medication administration',stem:'Which represents the standard "five rights" of medication administration?',options:['Right patient, right drug, right dose, right route, right time','Right patient, right ward, right drug, right time, right cost','Right patient, right drug, right dose, right doctor, right shift','Right patient, right family, right drug, right dose, right time','Right ID, right drug, right pharmacist, right ward, right time'],correct:'A',explanation:'Five rights of medication administration: right patient, right drug, right dose, right route, right time. Some add right documentation, right reason as additional safety checks.',distractors:{B:'Cost not a "right"',C:'Doctor/shift not core safety check',D:'Family not standard',E:'Pharmacist not in 5 rights'},pearl:'Five rights are a starting point — modern safety practice adds: right documentation, right reason, right response. Always check expiry, allergies, contraindications, double-check high-risk drugs.',references:[{label:'NMC Code',url:'https://www.nmc.org.uk/standards/code/'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Reporting medication errors',stem:'A nurse realises she gave a patient the wrong dose of insulin. Patient is currently asymptomatic. Most appropriate action?',options:['Hide the error','Honestly disclose to patient/family (duty of candour), inform medical team, monitor patient (BG checks), document, report via Datix/incident system','Document only if patient harmed','Tell only the colleague','Leave for next shift'],correct:'B',explanation:'Medication error: duty of candour requires honest disclosure. Inform team, monitor patient closely, document factually, complete incident report. Learning, not blame, culture.',distractors:{A:'Hiding error is misconduct',C:'Reporting required regardless of harm',D:'Reporting via system, not just colleague',E:'Delay risks patient deterioration'},pearl:'Duty of Candour (CQC, NMC): be open and honest with patient/family when something goes wrong. Apologise, explain, document. Reporting drives learning.',references:[{label:'NMC Code 2018',url:'https://www.nmc.org.uk/standards/code/'}]},
  {section:'medsafe',specialty:'Pharmacology',topic:'Independent prescribing scope',stem:'An NMC-registered nurse non-medical prescriber wants to prescribe a controlled drug for cancer pain. Which is correct?',options:['Cannot prescribe any CDs','Can prescribe Schedule 2–5 CDs within their competence except diamorphine, dipipanone, cocaine for treating addiction; can prescribe these for cancer pain','Can prescribe any drug for any indication','Cannot prescribe at all','Only Schedule 5'],correct:'B',explanation:'Independent NMP nurses can prescribe most CDs (Schedule 2–5) within competence. Restriction: cannot prescribe diamorphine, dipipanone, cocaine for addiction (only consultants with Home Office licence). Can prescribe these for non-addiction indications (cancer pain).',distractors:{A:'NMP can prescribe CDs within competence',C:'Limited to competence and specific indications',D:'NMP have prescribing rights',E:'Schedule 5 alone too restrictive'},pearl:'Non-medical prescriber: prescribing must be within scope of competence and patient group. Document clearly. CD register entries: include batch and stock running balance.',references:[{label:'NMC Standards for Prescribers',url:'https://www.nmc.org.uk/standards-for-education-and-training/standards-for-prescribers/'}]},

  // FALLS / FRAILTY / SKIN (3)
  {section:'falls',specialty:'Geriatrics',topic:'Falls prevention bundle',stem:'A frail elderly inpatient is at high falls risk. Which combination is most evidence-based for prevention?',options:['Bed rails alone','Multifactorial assessment: review medications (especially BZDs, opioids, anticholinergics), environment (call bell, light, footwear), vision/hearing, vitamin D, exercise, continence; intentional rounding','Restrain at night','Discharge home','Single intervention'],correct:'B',explanation:'NICE CG161: multifactorial falls intervention (medication review, vision, BP, gait, environment, footwear, lighting, vitamin D, strength/balance training) reduces falls 25–30%.',distractors:{A:'Bed rails increase climb-over fall injury',C:'Restraint not first-line',D:'Discharge without plan unsafe',E:'Single intervention less effective'},pearl:'Falls medication review (STOPP/START): benzodiazepines, anticholinergics, opioids, antihypertensives, hypoglycaemics. Each contributes incrementally to fall risk.',references:[{label:'NICE CG161 Falls in older people',url:'https://www.nice.org.uk/guidance/cg161'}]},
  {section:'falls',specialty:'Geriatrics',topic:'Bone protection osteoporosis',stem:'A 78-year-old woman has just had a hip fracture (low trauma fall). Most appropriate bone health management?',options:['No specific intervention','Calcium + vitamin D + bisphosphonate (e.g. alendronate weekly or zoledronate annually); DXA scan; review fracture risk; falls prevention','DXA scan only without treatment','Stop all medications','Bone graft'],correct:'B',explanation:'Fragility hip fracture: presumed osteoporosis, treat with calcium + vitamin D + bisphosphonate without waiting for DXA (NICE TA464). Fracture liaison service to prevent recurrent fractures.',distractors:{A:'Inaction allows further fragility fractures',C:'Treatment shouldn\'t wait for DXA in confirmed fragility fracture',D:'Stopping unrelated medications inappropriate',E:'Bone graft for surgical use, not prevention'},pearl:'After fragility fracture: 50% will have another within 5 years. Fracture Liaison Service reduces this. IV zoledronate one annual dose has best adherence (oral 50% adherence at 1 year).',references:[{label:'NICE TA464 Bisphosphonates',url:'https://www.nice.org.uk/guidance/ta464'}]},
  {section:'falls',specialty:'Geriatrics',topic:'Sarcopenia frailty',stem:'An 82-year-old man has unintentional 10% weight loss, slow gait, exhaustion, low grip strength, low physical activity. He meets criteria for:',options:['Healthy ageing','Frailty (Fried phenotype: ≥3 of weight loss, exhaustion, low activity, slow gait, weak grip); also assess for sarcopenia (low muscle mass + strength)','Acute illness only','Depression','Cancer cachexia only'],correct:'B',explanation:'Fried frailty phenotype: ≥3 of 5 (weight loss ≥5%, exhaustion, low activity, slow gait, weak grip). Sarcopenia: low muscle mass + strength. Both predict falls, hospitalisation, mortality.',distractors:{A:'Multiple criteria abnormal',C:'Chronic accumulating',D:'Depression overlaps but distinct',E:'Cachexia is one cause'},pearl:'Frailty interventions: resistance exercise (most effective), protein intake 1.0–1.2 g/kg/day, vitamin D, social engagement. Reverse early frailty; manage advanced frailty with CGA.',references:[{label:'BGS Frailty Toolkit',url:'https://www.bgs.org.uk/resources/'}]},

  // INFECTION CONTROL (3)
  {section:'infection',specialty:'IPC',topic:'TB precautions',stem:'A patient with cough and weight loss has CXR showing upper-lobe cavitation, AFB-positive sputum. Most appropriate isolation?',options:['Standard precautions only','Negative-pressure side room, FFP3 + eye protection for staff entering, until 2 weeks of effective therapy AND clinical improvement; notify Public Health','Cohort with respiratory ward','Discharge home','Surgical mask alone for staff'],correct:'B',explanation:'Smear-positive pulmonary TB: airborne precautions, negative-pressure isolation, FFP3 mask. Continue until ≥2 weeks effective therapy + clinical improvement + sputum smear conversion.',distractors:{A:'Standard precautions miss airborne risk',C:'Cohort risks transmission',D:'Discharge after 2-week treatment if appropriate, but with public health support',E:'Surgical mask inadequate for airborne'},pearl:'TB infection control: AFB-positive = highly contagious. Multidrug-resistant TB (MDR-TB) requires longer isolation. Notify Public Health (statutory). Contact tracing via TB nurse.',references:[{label:'NICE NG33 TB',url:'https://www.nice.org.uk/guidance/ng33'}]},
  {section:'infection',specialty:'IPC',topic:'COVID-19 isolation',stem:'A patient newly admitted with respiratory symptoms tests positive for SARS-CoV-2. Most appropriate?',options:['Standard precautions','Side room, droplet/contact precautions, FFP3 + eye protection for AGPs, surgical mask + apron + gloves for non-AGPs (current UK guidance varies — follow local IPC); duration per local protocol typically until afebrile + improving + per testing protocol','Negative-pressure room only for AGP','Cohort with all respiratory patients regardless of cause','Discharge'],correct:'B',explanation:'COVID-19 IPC: isolation, PPE per UKHSA (FFP3 for AGPs; surgical mask for routine care, evolving guidance). Cohort confirmed cases together if no side room. Duration per local protocol.',distractors:{A:'Standard inadequate',C:'AGPs need negative pressure if available, but isolation needed for all',D:'Cohort by confirmed status, not by symptom alone',E:'Discharge appropriate only with criteria met'},pearl:'AGPs: intubation, suctioning, NIV, HFNO, bronchoscopy, manual ventilation, CPR. UK PPE guidance changes — always check current UKHSA standard for COVID and other airborne pathogens.',references:[{label:'UKHSA COVID-19 IPC',url:'https://www.gov.uk/government/publications/wuhan-novel-coronavirus-infection-prevention-and-control'}]},
  {section:'infection',specialty:'IPC',topic:'Aseptic non-touch technique',stem:'When inserting a peripheral IV cannula, the most important component of Aseptic Non-Touch Technique (ANTT) is:',options:['Sterile gloves only','Hand hygiene + 2% chlorhexidine 70% alcohol skin prep (allow to dry 30 s) + identify and protect key sites/parts (don\'t touch with non-sterile surfaces) + safe disposal','Antibiotic prophylaxis','Wear gown','Single-use mask'],correct:'B',explanation:'ANTT key principles: hand hygiene + skin antisepsis (CHG/alcohol, allow to dry) + key part/site protection (don\'t touch what enters the body or skin) + safe disposal. Reduces line-related infection.',distractors:{A:'Sterile gloves alone insufficient if touching key parts with non-sterile surface',C:'Antibiotics for prophylaxis irrelevant for cannulation',D:'Gown not standard for cannulation',E:'Mask not routine for cannulation'},pearl:'Key part = directly enters patient (cannula tip, syringe nozzle). Key site = patient access point (skin entry). ANTT applies to all aseptic procedures (cannulation, dressings, drug prep).',references:[{label:'ANTT Clinical Practice Framework',url:'https://www.antt.org/'}]},

  // MCA / COMMUNICATION (4)
  {section:'mca',specialty:'Ethics & law',topic:'Best interests checklist',stem:'A patient lacking capacity needs a treatment decision. Family disagrees with the medical team. Most appropriate framework?',options:['Doctor decides alone','MCA s.4 best-interests checklist: past wishes/values, current views, beliefs, consult close family/IMCA, least restrictive option; if disagreement persists, second medical opinion or Court of Protection','Family majority decides','Reassess capacity','Wait for capacity'],correct:'B',explanation:'MCA s.4 best-interests decision: consider past wishes, current views (even if lacking capacity), beliefs/values, all relevant circumstances, consult close family/carers/IMCA. Least restrictive option. Disagreement → CoP if cannot resolve.',distractors:{A:'Doctor alone fails s.4 consultation requirement',C:'Family disagreement does not override s.4 process',D:'Capacity already lost',E:'Indefinite wait inappropriate'},pearl:'Best interests is NOT a medical-only decision — wider than clinical. Family/carers/IMCA contribute views. Document the s.4 process; decision-maker has accountability.',references:[{label:'MCA 2005 Code of Practice',url:'https://www.gov.uk/government/publications/mental-capacity-act-code-of-practice'}]},
  {section:'mca',specialty:'Ethics & law',topic:'Court of Protection referral',stem:'Persistent dispute over whether to continue clinically assisted nutrition and hydration in a patient in prolonged disorder of consciousness, no advance decision. Most appropriate?',options:['Withdraw without legal review','Court of Protection application — serious medical treatment decisions in dispute, especially withdrawal of life-sustaining treatment in prolonged disorder of consciousness','Family decision overrides','MDT alone proceeds','Indefinite continuation regardless'],correct:'B',explanation:'Disputed serious medical treatment in lacking-capacity patient — Court of Protection application. Particularly relevant for prolonged disorder of consciousness (post-Re Y 2018, no longer mandatory but recommended in dispute).',distractors:{A:'Withdrawal without legal review unsafe in dispute',C:'Family cannot override CoP',D:'MDT decision in dispute requires CoP',E:'Indefinite continuation may not be best interests'},pearl:'Re Y (2018): CoP no longer mandatory for CANH withdrawal in PDOC if all parties agree, but mandatory if dispute. Always involve clinical ethics, second opinion, family liaison early.',references:[{label:'BMA RCP CANH Guidance 2018',url:'https://www.bma.org.uk/'}]},
  {section:'mca',specialty:'Ethics & law',topic:'Mental Health Act Section 5(2)',stem:'A patient with severe depression on a medical ward is voluntarily admitted, now wishes to leave, expressing suicidal intent, awaiting psychiatric review. Most appropriate?',options:['Allow to leave','Doctor in charge can use Mental Health Act Section 5(2) — doctor\'s holding power (up to 72 h) pending Mental Health Act assessment; nurse equivalent is Section 5(4) (up to 6 h)','Restraint indefinitely','Section 2 immediately','Section 3 immediately'],correct:'B',explanation:'MHA Section 5(2): doctor in charge holds patient already admitted (informally) up to 72 h pending assessment. Section 5(4): registered MH nurse can hold up to 6 h. Both are emergency holding powers, not admission sections.',distractors:{A:'Allowing exit during acute suicidal crisis breaches duty of care',C:'Indefinite restraint without legal basis unlawful',D:'Section 2 needs full assessment',E:'Section 3 needs full assessment'},pearl:'MHA holding powers: 5(2) doctor 72 h, 5(4) nurse 6 h. For inpatients only. NOT for treatment compulsion — admission for assessment requires Section 2 (28d) or 3 (treatment, 6m).',references:[{label:'Mental Health Act 1983 Code of Practice',url:'https://www.gov.uk/government/publications/code-of-practice-mental-health-act-1983'}]},
  {section:'mca',specialty:'Ethics & law',topic:'Confidentiality breach exceptions',stem:'A patient tells the nurse he plans to harm a named third party. Otherwise, the patient has capacity and refuses any disclosure.',options:['Maintain absolute confidentiality','Public interest disclosure to police is justifiable when serious harm to identifiable third party is threatened; document rationale, inform patient where possible, seek senior advice','Tell family without consent','Disclose to anyone','Notify employer'],correct:'B',explanation:'Confidentiality is not absolute — public interest disclosure permissible when failure to disclose risks serious harm. Inform patient where possible, document rationale, seek senior/Caldicott guardian advice.',distractors:{A:'Absolute confidentiality fails duty to third parties',C:'Family disclosure not appropriate without specific reason',D:'Disclosure must be proportionate, to right authority',E:'Employer not appropriate party'},pearl:'GMC Confidentiality: disclose without consent only when (1) public interest justifies, (2) law requires, (3) court order. Document rationale. Caldicott Guardian and senior support help.',references:[{label:'GMC Confidentiality',url:'https://www.gmc-uk.org/professional-standards/professional-standards-for-doctors/confidentiality'}]},


  // ── BATCH 4 — final 63 questions (target 366) ─────────────
  // SEPSIS (6)
  {section:'sepsis',specialty:'Microbiology',topic:'Blood culture interpretation',stem:'A patient with central line bacteraemia has line cultures positive at 6 h but peripheral cultures positive at 22 h. Both grow Staph aureus. Most accurate interpretation?',options:['Peripheral contamination','Differential time to positivity (DTP) ≥2 h longer in peripheral suggests catheter-related bloodstream infection — line is the source','Lab error','Both equally likely sources','Skin contamination only'],correct:'B',explanation:'DTP ≥2 h favours line as source (catheter cultures positive significantly earlier than peripheral). Useful when line removal not immediately feasible. S. aureus mandates line removal regardless.',distractors:{A:'Same organism in both reduces contamination likelihood',C:'Reproducible result, not error',D:'DTP differential indicates source',E:'S. aureus is rarely simple skin contamination'},pearl:'DTP for CRBSI: ≥120 min difference suggests catheter source. Sensitivity ~85%, specificity ~90%. Doesn\'t change the rule that S. aureus, Candida, Pseudomonas mandate line removal.',references:[{label:'epic3 Loveday H, J Hosp Infect',url:'https://www.journalofhospitalinfection.com/article/S0195-6701(13)60012-2/fulltext'}]},
  {section:'sepsis',specialty:'Respiratory',topic:'Hospital-acquired pneumonia',stem:'A ventilated patient develops fever, raised inflammatory markers, new infiltrate after 5 days of admission. Most appropriate empirical antibiotic?',options:['Oral amoxicillin','IV piperacillin–tazobactam (or per local protocol covering Pseudomonas, MRSA risk per local prevalence); send tracheal aspirate; review at 48–72 h','Single oral macrolide','No antibiotic','Co-trimoxazole'],correct:'B',explanation:'HAP/VAP empirical: broad-spectrum covering Pseudomonas (and MRSA per local prevalence), per local antibiogram. Send respiratory sample, review at 48–72 h, narrow when sensitivities available.',distractors:{A:'Oral inadequate for HAP',C:'Macrolide alone misses Gram negatives',D:'Withholding in HAP increases mortality',E:'Co-trimoxazole not first-line empirical'},pearl:'HAP onset >48 h after admission. Pseudomonas common >5 days admission, prior antibiotics, immunocompromise. UK practice: piperacillin–tazobactam + glycopeptide if MRSA risk.',references:[{label:'NICE NG139 Hospital-acquired pneumonia',url:'https://www.nice.org.uk/guidance/ng139'}]},
  {section:'sepsis',specialty:'Spine',topic:'Spinal epidural abscess',stem:'A 65-year-old IVDU has 1 week of severe back pain, fever, leg weakness, urinary retention. WCC 18, CRP 285. Most appropriate?',options:['Reassure','Urgent MRI whole spine + IV antibiotics (covering Staph aureus including MRSA) + neurosurgical/spinal review for decompression','Lumbar puncture only','Discharge with analgesia','Physiotherapy'],correct:'B',explanation:'Spinal epidural abscess: triad of back pain + fever + neurological signs. Urgent MRI, IV antibiotics empirically (vancomycin + cefotaxime or per local), urgent surgical decompression to preserve neurological function.',distractors:{A:'Reassurance fatal — neurological deterioration',C:'LP risks introducing infection',D:'Discharge fatal',E:'Physio inappropriate before diagnosis'},pearl:'Spinal epidural abscess: surgical emergency. Neurological recovery related to time to decompression. Risk factors: IVDU, diabetes, recent procedure, immunosuppression. S. aureus most common.',references:[{label:'British Infection Association',url:'https://www.britishinfection.org/'}]},
  {section:'sepsis',specialty:'Orthopaedics',topic:'Septic arthritis',stem:'An 85-year-old has acute hot swollen left knee, T 38.6°C, unable to weight-bear, joint aspirate cell count 65000 with neutrophil predominance.',options:['Outpatient NSAID','Joint aspirate to micro before antibiotics, IV flucloxacillin (or vancomycin if MRSA risk), urgent orthopaedic review for washout, immobilise initially','Oral antibiotic','Steroid injection','Discharge'],correct:'B',explanation:'Septic arthritis: aspirate first for culture (pre-antibiotic if possible), then IV anti-Staph antibiotics. Surgical washout. Cartilage damage rapid — time-critical.',distractors:{A:'Outpatient NSAID misses joint destruction',C:'Oral inadequate for native joint',D:'Steroid in undiagnosed septic arthritis catastrophic',E:'Discharge fatal'},pearl:'Joint aspirate first, antibiotics second (within 1 hour of aspirate). Most common organism S. aureus; gonococcus in young sexually active. WCC >50000 PMN highly suggestive.',references:[{label:'BSR Septic Arthritis Guidelines',url:'https://academic.oup.com/rheumatology/article/45/8/1039/1788445'}]},
  {section:'sepsis',specialty:'Soft tissue',topic:'Cellulitis Eron classification',stem:'A 70-year-old with cellulitis of the leg has Eron Class III (significant systemic upset, T 38.5°C, HR 105, RR 22). Most appropriate management?',options:['Oral flucloxacillin discharge','Admit for IV flucloxacillin (or per local protocol), elevation, mark margin, review at 48 h, switch to oral when stable','Topical antibiotics','Compression bandaging only','Antifungal cream'],correct:'B',explanation:'Eron Class III/IV (systemically unwell or unstable comorbidity): IV antibiotics, admit. Mark advancing margin to monitor. IV-to-oral switch when afebrile/improving.',distractors:{A:'Oral inadequate for systemically unwell',C:'Topical inadequate for cellulitis',D:'Compression alone insufficient',E:'Wrong diagnosis'},pearl:'Eron classification: I (no systemic illness), II (unwell, stable comorbidity), III (significantly unwell), IV (sepsis or unstable comorbidity). III/IV needs IV antibiotics and admission.',references:[{label:'NICE NG141 Cellulitis',url:'https://www.nice.org.uk/guidance/ng141'}]},
  {section:'sepsis',specialty:'Infectious disease',topic:'Toxic shock retained tampon',stem:'A 22-year-old has fever 39.5°C, hypotension 88/50, diffuse erythroderma, vomiting, recent menstruation with retained tampon. Most appropriate?',options:['Reassure','Remove source (tampon), IV antibiotics (e.g. clindamycin to inhibit toxin production + flucloxacillin), aggressive fluid resuscitation, ICU; consider IVIG','Oral antibiotics','Discharge','Antihistamine'],correct:'B',explanation:'Staphylococcal toxic shock syndrome: source removal, IV antibiotics including clindamycin (toxin inhibition), aggressive resuscitation, organ support, IVIG considered for severe.',distractors:{A:'Reassurance fatal',C:'Oral inadequate for shock',D:'Discharge fatal',E:'Antihistamine wrong receptor'},pearl:'TSS criteria (CDC): fever, hypotension, rash with desquamation, multi-organ involvement. Staphylococcal (toxin TSST-1) and streptococcal (Group A) varieties. Clindamycin reduces toxin production.',references:[{label:'BMJ Best Practice TSS',url:'https://bestpractice.bmj.com/topics/en-gb/889'}]},

  // ABCDE & RESUSCITATION (5)
  {section:'abcde',specialty:'Resuscitation',topic:'Hypothermic arrest',stem:'A patient retrieved from cold water with core temperature 26°C is in cardiac arrest. Most appropriate ALS modification?',options:['Standard ALS','Continue CPR — "not dead until warm and dead"; defib limited if T <30°C (limit to 3 attempts then withhold until rewarmed); minimise drug doses; transport for active rewarming (ECMO if available)','Stop after 20 min','Standard drug doses','Avoid CPR if cold'],correct:'B',explanation:'Hypothermic arrest: prolonged CPR justified. Defib up to 3 attempts if T <30°C, then withhold until rewarmed. Pharmacokinetics altered — minimise/withhold drugs until T >30°C. ECMO rewarming if available.',distractors:{A:'Standard ALS misses hypothermia modifications',C:'Hypothermia cerebroprotective — extended resuscitation',D:'Drug clearance impaired in hypothermia',E:'CPR essential, hypothermia is no contraindication'},pearl:'Hypothermic arrest survival reported with prolonged CPR (>4 hours). HOPE score helps decide ECMO candidacy. Active core rewarming via ECMO/cardiopulmonary bypass dramatically improves outcomes.',references:[{label:'Resus Council UK Special Circumstances 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/special-circumstances-guidelines'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'Pulse check duration',stem:'During cardiac arrest rhythm check, the maximum time recommended for pulse and rhythm assessment combined is:',options:['30 seconds','≤10 seconds','60 seconds','Until pulse felt confidently','As long as needed'],correct:'B',explanation:'ALS: rhythm and pulse check ≤10 seconds. Prolonged checks delay CPR resumption and reduce coronary perfusion pressure. If unsure of pulse, treat as cardiac arrest.',distractors:{A:'30 s too long, drops perfusion',C:'60 s catastrophic',D:'Long pulse-checks unreliable; "if unsure, compress"',E:'Each second of delay reduces ROSC chance'},pearl:'Pulse check unreliable even for trained clinicians. Stop compressions ≤10 s. If any doubt, restart CPR. Capnography and arterial line provide alternative perfusion confirmation.',references:[{label:'Resus Council UK Adult ALS 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-advanced-life-support-guidelines'}]},
  {section:'abcde',specialty:'Manual handling',topic:'Manual handling collapsed patient',stem:'A patient has collapsed onto the floor in a confined toilet space, pulseless. Most appropriate first action?',options:['Move patient to a wide flat surface before starting','Start CPR immediately on the floor in the confined space; call for help; manage logistics for transfer to wider space when assistance arrives','Wait for hoist','Sit patient up','Move to nearest bed before starting'],correct:'B',explanation:'Cardiac arrest priority is immediate CPR — start on the floor. Call for help. Transfer can occur with assistance; in confined spaces, modify technique (e.g. slide board) but never delay CPR.',distractors:{A:'Movement before CPR delays compressions',C:'Hoist takes minutes — fatal delay',D:'Compressions need supine position',E:'Movement delays CPR'},pearl:'Resus first, logistics second. Use floor for compressions; place hard backboard if rescue trolley unavailable. Confined spaces: 2 rescuers may not fit — adapt as best possible without delay.',references:[{label:'Resus Council UK In-Hospital Resuscitation 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/in-hospital-resuscitation'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'Family-witnessed resuscitation',stem:'A family member asks to be present during their relative\'s CPR. Most appropriate response?',options:['Refuse for clinical reasons','Support family-witnessed resuscitation if family wish — designate a staff member to support family, brief them, allow attendance unless space/safety constraints; evidence shows benefit for grief processing','Allow if family insists','Only if patient survives','Only after CPR ends'],correct:'B',explanation:'Family-witnessed resuscitation is supported by Resus Council UK. Designate a non-resuscitation team member to support and explain to family. Reduces anxiety and complicated grief.',distractors:{A:'Blanket refusal not evidence-based',C:'Should be supported, not just permitted',D:'Always offered regardless of outcome',E:'During CPR is the relevant point'},pearl:'Resus UK supports family-witnessed resuscitation when feasible. Designated staff member explains process, supports family, removes them if needed. Better grief outcomes (Jabre 2013 NEJM).',references:[{label:'Resus Council UK Family Witnessed Resuscitation',url:'https://www.resus.org.uk/library/'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'Adult choking unconscious',stem:'A choking adult deteriorates and becomes unresponsive. They have no pulse and are not breathing. Most appropriate action?',options:['Continue back blows','Lower to floor, call 2222, start CPR (chest compressions can dislodge obstruction; check mouth for visible obstruction with each ventilation attempt — do NOT do blind finger sweeps)','Reach into airway with finger','Heimlich on the floor','Reassure'],correct:'B',explanation:'Unresponsive choking: lay flat, call arrest team, CPR (compressions generate enough pressure to dislodge obstruction). Look in mouth before each rescue breath; remove visible foreign body but no blind finger sweeps.',distractors:{A:'Back blows for conscious choking',C:'Blind finger sweeps cause aspiration',D:'Heimlich for conscious choking',E:'Reassurance fatal'},pearl:'Adult choking algorithm: cough → conscious back blows + abdominal thrusts → unconscious CPR. Compressions generate higher airway pressures than abdominal thrusts.',references:[{label:'Resus Council UK BLS 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-basic-life-support-guidelines'}]},

  // CARDIOLOGY (6)
  {section:'cardio',specialty:'Cardiology',topic:'Posterior STEMI',stem:'A patient with chest pain has ECG showing tall R waves and ST depression V1–V3 with upright T waves. Inferior leads show 1 mm ST elevation. Most likely diagnosis?',options:['Lateral STEMI','Posterior STEMI (mirror image — V1–V3 changes represent posterior wall) often with inferior involvement; treat as STEMI for primary PCI','Pericarditis','Anterior NSTEMI','Stable angina'],correct:'B',explanation:'Posterior STEMI: ST depression with tall R waves V1–V3 (mirror of posterior infarct). Confirm with posterior leads V7–V9 (≥0.5 mm elevation). Treat as STEMI for PCI.',distractors:{A:'Lateral has lateral ST elevation',C:'Pericarditis widespread',D:'NSTEMI without acute occlusion',E:'Angina has transient changes'},pearl:'Always do posterior leads (V7–V9) when V1–V3 ST depression seen with tall R waves. ~5% of STEMIs are posterior — easily missed without recognition. Equivalent to anterior STEMI in PCI urgency.',references:[{label:'NICE NG185 ACS',url:'https://www.nice.org.uk/guidance/ng185'}]},
  {section:'cardio',specialty:'Cardiology',topic:'GRACE risk score',stem:'A patient with NSTEMI has a GRACE score of 152 (high risk). Per NICE, most appropriate management?',options:['Discharge with outpatient angiography','Inpatient angiography within 72 h (if stable), DAPT, statin, β-blocker, ACEi','No invasive strategy','Cardiac rehab only','Lifestyle advice'],correct:'B',explanation:'NSTEMI with GRACE >140 (high risk): inpatient coronary angiography ≤72 h. Lower-risk (GRACE <140): selective angiography. All get DAPT, statin, β-blocker, ACEi, cardiac rehab.',distractors:{A:'Outpatient delay inappropriate for high-risk',C:'High-risk benefits from invasive strategy',D:'Rehab is post-discharge',E:'Lifestyle alone insufficient'},pearl:'GRACE score: age, HR, BP, creatinine, Killip class, ECG changes, troponin, cardiac arrest. Score ≥140 high risk → urgent invasive. ≤108 low risk → selective approach.',references:[{label:'NICE NG185 ACS',url:'https://www.nice.org.uk/guidance/ng185'}]},
  {section:'cardio',specialty:'Cardiology',topic:'DAPT post-PCI',stem:'A patient post-drug-eluting stent placement asks about antiplatelet duration. NICE/ESC standard for stable coronary disease (non-ACS)?',options:['Indefinite DAPT','Aspirin + P2Y12 inhibitor (clopidogrel) for 6 months post-PCI for stable disease, then aspirin alone; 12 months if ACS context (stratify by ischaemic vs bleeding risk)','3 days','30 days','5 years'],correct:'B',explanation:'DAPT duration: 6 months for stable CAD post-PCI, 12 months for ACS context. Bleeding risk (PRECISE-DAPT) and ischaemic risk modulate duration. Aspirin lifelong unless contraindicated.',distractors:{A:'Indefinite increases bleeding without further benefit',C:'3 days inadequate stent endothelialisation',D:'30 days inadequate',E:'Lifelong DAPT not standard'},pearl:'DAPT duration weighed: shorter (3 months) for high bleed risk, standard 6/12, longer (>12 m) if continued ischaemic risk. P2Y12 inhibitor: ticagrelor or prasugrel preferred over clopidogrel in ACS.',references:[{label:'NICE NG185 ACS',url:'https://www.nice.org.uk/guidance/ng185'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Vasopressor septic-cardiogenic shock',stem:'A patient with septic shock develops new ischaemic ECG changes and EF 30% on echo (mixed septic + cardiogenic shock). Most appropriate vasopressor strategy?',options:['Noradrenaline alone','Noradrenaline first-line, add inotropic support (dobutamine) for low cardiac output, central venous access, ICU; assess fluid responsiveness carefully','High-volume fluids','Vasopressin alone','Adrenaline only'],correct:'B',explanation:'Mixed shock: noradrenaline first for vasopressor support, dobutamine added for inotropic deficit (low CO with adequate filling). Avoid excess fluids in cardiogenic component. ICU mandatory.',distractors:{A:'Pure vasoconstrictor inadequate when low CO',C:'Excess fluids worsen cardiogenic component',D:'Vasopressin secondary, not first-line',E:'Adrenaline can cause hyperlactataemia, arrhythmia'},pearl:'Mixed shock: dobutamine adds inotropy. Echo guides — check IVC, LV function, RV. Lactate trend helps distinguish hypoperfusion (rising) from systemic adrenergic effect (often dobutamine-related).',references:[{label:'Surviving Sepsis Campaign 2021',url:'https://www.sccm.org/clinical-resources/guidelines/guidelines/surviving-sepsis-guidelines-2021'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Acute decompensated HF on β-blocker',stem:'A patient with chronic HFrEF on bisoprolol presents with acute decompensation, BP 105/65, no shock, mild fluid overload.',options:['Stop β-blocker','Continue β-blocker if not in cardiogenic shock; reduce only if hypotension/shock; treat overload with IV diuretic; patients on long-term β-blocker do better when continued through decompensation if haemodynamically tolerated','Increase β-blocker','Add another β-blocker','Discharge'],correct:'B',explanation:'Decompensated HF on β-blocker: continue if no shock (better mortality outcomes — B-CONVINCED trial). Reduce or pause only if hypotensive/shocked. Treat overload with diuretic.',distractors:{A:'Stopping worsens long-term mortality',C:'Increasing during decompensation risks shock',D:'Adding inappropriate',E:'Discharge inappropriate during decompensation'},pearl:'B-CONVINCED: continuing β-blocker through HF decompensation reduces post-discharge mortality vs stopping. Stop only if cardiogenic shock or symptomatic bradycardia.',references:[{label:'NICE NG106 Acute heart failure',url:'https://www.nice.org.uk/guidance/ng106'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Statin intolerance',stem:'A patient post-MI develops muscle pain on atorvastatin 80 mg. CK 4× normal, no rhabdomyolysis. Most appropriate?',options:['Continue same dose','Stop statin; recheck CK after 2 weeks; restart at lower dose or alternative statin (e.g. rosuvastatin); if true intolerance, ezetimibe or PCSK9 inhibitor','Discontinue all lipid therapy','Add fibrate','Increase statin'],correct:'B',explanation:'Statin myalgia with CK rise: stop, recheck after symptoms resolve, restart at lower dose or alternative statin. If true intolerance to all statins, alternative agents (ezetimibe, bempedoic acid, PCSK9 inhibitor).',distractors:{A:'Continuing risks rhabdomyolysis',C:'Lipid lowering still indicated',D:'Fibrate alone insufficient post-MI',E:'Increase exacerbates'},pearl:'Real statin intolerance is rare — try lower dose, alternate-day, switch agents. CK >10× normal or rhabdomyolysis = stop and don\'t rechallenge same agent. PCSK9 inhibitors for high-risk intolerant.',references:[{label:'NICE CG181 Cardiovascular disease',url:'https://www.nice.org.uk/guidance/cg181'}]},

  // RESPIRATORY (6)
  {section:'resp',specialty:'Respiratory',topic:'Asthma discharge criteria',stem:'A patient admitted with severe asthma is improving. Which combination meets safe discharge criteria per BTS?',options:['SpO₂ 92% on air','PEF ≥75% best/predicted, no nebs ≥4 h, on discharge inhalers, written PAAP, follow-up <2 working days, GP letter, technique check, smoking advice','Symptom-free for 2 hours','Single nebuliser response','Patient feels ready'],correct:'B',explanation:'BTS asthma discharge: PEF ≥75%, no nebs ≥4 h, on discharge meds, written personalised asthma action plan (PAAP), inhaler technique check, follow-up arranged, smoking cessation if relevant.',distractors:{A:'SpO₂ alone insufficient',C:'2 h period inadequate',D:'Single response not durable',E:'Patient readiness alone insufficient'},pearl:'Premature asthma discharge predicts re-admission and mortality. PAAP halves re-admission. Personal best PEF >personal predicted PEF. Always check technique before discharge.',references:[{label:'BTS/SIGN Asthma Guidelines',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/asthma/'}]},
  {section:'resp',specialty:'Trauma',topic:'Rib fracture pain management',stem:'An elderly patient with multiple rib fractures has poorly controlled pain limiting deep breathing. SpO₂ falling, atelectasis on CXR.',options:['NSAID alone','Multimodal analgesia: regular paracetamol + NSAID (if not contraindicated) + opioid; consider regional block (ICN block, paravertebral, epidural) — vital to prevent pneumonia and respiratory failure','Bed rest','Cough suppressant','Discharge'],correct:'B',explanation:'Rib fracture pain control prevents pneumonia and respiratory failure. Multimodal analgesia ± regional anaesthesia (intercostal nerve blocks, paravertebral block, epidural) for severe.',distractors:{A:'NSAID alone insufficient',C:'Bed rest worsens atelectasis',D:'Suppressing cough increases retained secretions',E:'Inadequate analgesia leads to deterioration'},pearl:'Elderly rib fracture mortality 10–20%. Driver is hypoventilation → pneumonia. Aggressive analgesia + chest physio + early mobilisation. Erector spinae block emerging option.',references:[{label:'AAGBI Regional Anaesthesia Guidelines',url:'https://anaesthetists.org/Home/Resources-publications'}]},
