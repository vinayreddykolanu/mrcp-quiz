  {section:'cardio',specialty:'Cardiology',topic:'Post-arrest TTM',stem:'A 64-year-old man achieves ROSC after VF arrest. He is intubated and remains unresponsive. Following Resuscitation Council UK 2021 guidance, what is the appropriate temperature target?',options:['Aim for 32–34°C for 24 hours','Active warming to 38°C','Active fever prevention with target ≤37.5°C for at least 72 hours','Cooling to 28°C for cerebral protection','Body temperature management is not recommended'],correct:'C',explanation:'After the TTM2 trial, RCUK 2021 changed guidance from active hypothermia (32–34°C) to "targeted temperature management" focused on AVOIDING fever, with target ≤37.5°C for at least 72 hours post-arrest. Hyperthermia worsens neurological injury.',distractors:{A:'TTM 32–34°C is no longer the standard recommendation in adults',B:'Active warming worsens outcome',D:'Severe cooling causes coagulopathy and arrhythmia',E:'Temperature management is essential — fever worsens outcome'},pearl:'Post-arrest TTM: avoid fever (target ≤37.5°C for ≥72 h). The era of routine hypothermia 32–34°C is over.',references:[{label:'Resus Council UK 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'}]},
  {section:'resp',specialty:'Respiratory',topic:'Massive haemoptysis',stem:'A 58-year-old man with bronchiectasis suddenly coughs up approximately 600 mL of fresh red blood. He is hypoxic (SpO2 88% on room air) and tachycardic (HR 122). The bleeding lung is known to be the right. Which is the most appropriate immediate nursing action?',options:['Sit the patient upright and give nebulised adrenaline','Lay the patient on their LEFT side (good lung up), high-flow oxygen and call critical care urgently','Lay the patient flat and give a large oral crystalloid drink','Administer GTN spray sublingually','Discharge home with antibiotics'],correct:'B',explanation:'Massive haemoptysis (>500 mL/24 h or causing impaired gas exchange): position with the BLEEDING LUNG DOWN (good lung up) to protect the unaffected lung from soiling. High-flow oxygen, IV access, group + cross-match, urgent bronchoscopy/IR for bronchial artery embolisation. Tranexamic acid IV may help temporise.',distractors:{A:'Sitting upright in massive haemoptysis allows blood to flow into both lungs',C:'Oral fluids risk aspiration; supine position worsens contamination',D:'GTN does not help haemoptysis and may worsen hypotension',E:'This is a life-threatening emergency'},pearl:'Massive haemoptysis: bleeding side DOWN, good lung UP. Then urgent bronchoscopy ± bronchial artery embolisation.',references:[{label:'BTS — Bronchiectasis',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/'},{label:'BTS Pleural Disease',url:'https://www.brit-thoracic.org.uk/'}]},
  {section:'resp',specialty:'Respiratory',topic:'IV magnesium asthma',stem:'A 24-year-old woman with severe asthma has not responded to back-to-back nebulised salbutamol and ipratropium plus IV hydrocortisone. PEF is 30% predicted. The medical team request IV magnesium sulphate. What is the standard dose?',options:['1 g over 1 minute','1.2–2 g over 20 minutes','5 g over 5 minutes','100 mg/kg over 2 hours','40 mg/kg over 1 hour'],correct:'B',explanation:'BTS/SIGN: single IV dose of magnesium sulphate 1.2–2 g over 20 minutes for acute severe asthma not responding to inhaled bronchodilators. Faster administration risks hypotension, flushing and respiratory depression. Monitor BP, RR, deep tendon reflexes.',distractors:{A:'Rapid IV magnesium causes hypotension and respiratory depression',C:'5 g IV over 5 minutes is excessive and dangerous',D:'100 mg/kg over 2 hours is excessive duration; not the standard dose',E:'40 mg/kg over 1 hour is incorrect for asthma'},pearl:'IV magnesium for asthma: 1.2–2 g over 20 min. Monitor BP and reflexes.',references:[{label:'BTS — Asthma',url:'https://www.brit-thoracic.org.uk/quality-improvement/guidelines/'},{label:'BNF — Magnesium sulphate',url:'https://bnf.nice.org.uk/'}]},
  {section:'resp',specialty:'Respiratory',topic:'Tracheostomy emergency',stem:'A patient on the surgical ward with a 3-week-old surgical tracheostomy desaturates suddenly. The patient is in respiratory distress, the inner cannula has just been suctioned, and there is no air movement on auscultation through the tracheostomy. Which is the correct first action per the National Tracheostomy Safety Project (NTSP) green algorithm?',options:['Cover the tracheostomy and ventilate via the mouth','Look, listen and feel at both the mouth and stoma; apply oxygen to both; if competent, remove the inner cannula','Reinsert a fresh tracheostomy tube blindly','Begin chest compressions','Wait for the surgical team without intervention'],correct:'B',explanation:'NTSP green algorithm (patent upper airway): assess the patient (call for help, oxygen to face AND stoma), then remove the inner cannula and assess patency. If still no improvement, deflate the cuff and pass a suction catheter — if the catheter passes, the tube is patent; if blocked, remove the tracheostomy and ventilate via mouth + cover stoma.',distractors:{A:'Always assess patency BEFORE removing the tube; covering the stoma comes later if needed',C:'Blind reinsertion of tracheostomy can create false passage',D:'Compressions do not address airway obstruction',E:'Waiting in airway emergency is fatal'},pearl:'Tracheostomy emergency: green algorithm = look/listen/feel BOTH face & stoma · O2 to BOTH · remove inner cannula · pass suction catheter · escalate.',references:[{label:'National Tracheostomy Safety Project',url:'https://www.tracheostomy.org.uk/'}]},
  {section:'resp',specialty:'Respiratory',topic:'Prone positioning',stem:'A patient with severe COVID-19 ARDS in ICU is being prone-positioned. Which is the strongest indication for prone ventilation in moderate-to-severe ARDS based on the PROSEVA trial?',options:['PaO2/FiO2 <40 kPa','PaO2/FiO2 <26.6 kPa (200 mmHg) despite optimal ventilation','PaCO2 >8 kPa','Heart rate >100','Bilateral infiltrates only'],correct:'B',explanation:'PROSEVA trial: prone positioning for ≥16 h/day in moderate-to-severe ARDS (PaO2/FiO2 <150 mmHg / 20 kPa, often quoted up to 200 mmHg / 26.6 kPa) reduces mortality. Nursing considerations: pressure injury prevention (face, chest, knees), tube/line security, eye protection, careful monitoring of haemodynamics during turn.',distractors:{A:'PaO2/FiO2 <40 kPa is mild and does not necessitate proning',C:'Hypercapnia alone is not the criterion',D:'Tachycardia is non-specific',E:'Imaging alone does not select for proning'},pearl:'Prone for ARDS when P/F <150 mmHg (20 kPa); ≥16 h/day. Beware pressure injuries — face, chest, knees.',references:[{label:'PROSEVA trial (NEJM 2013)',url:'https://www.nejm.org/doi/full/10.1056/NEJMoa1214103'}]},
  {section:'resp',specialty:'Respiratory',topic:'ABG metabolic alkalosis',stem:'An ABG shows: pH 7.52, PaCO2 6.0 kPa, HCO3 32 mmol/L, BE +9, PaO2 11 kPa. The patient has been vomiting for 3 days with hypokalaemia. Which acid–base disturbance is present?',options:['Respiratory acidosis with metabolic compensation','Metabolic alkalosis with respiratory compensation','Respiratory alkalosis','Mixed metabolic acidosis and respiratory alkalosis','Normal acid–base'],correct:'B',explanation:'High pH + raised HCO3 + raised BE = primary metabolic alkalosis. The slightly raised PaCO2 (6.0 kPa) reflects compensatory hypoventilation. Causes: vomiting (loss of gastric H+), diuretics, hypokalaemia, hyperaldosteronism. Treatment: replace K+, correct cause; severe cases may need acetazolamide.',distractors:{A:'Acidosis would have low pH',C:'Respiratory alkalosis = low PaCO2; this patient\'s PaCO2 is HIGH',D:'A mixed picture would not show this clean compensatory pattern',E:'pH 7.52 is alkalotic'},pearl:'Metabolic alkalosis: high pH · high HCO3 · high PaCO2 (compensation). Vomiting + hypokalaemia is the classic cause.',references:[{label:'BNF — Acid-base',url:'https://bnf.nice.org.uk/'},{label:'BMJ Best Practice — Metabolic alkalosis',url:'https://bestpractice.bmj.com/'}]},
  {section:'resp',specialty:'Respiratory',topic:'ARDS recognition',stem:'A patient with severe pneumonia develops worsening hypoxia. CXR shows bilateral infiltrates. PaO2 6.8 kPa on FiO2 0.6 (51 mmHg / 0.6 = 85 mmHg ≈ 11.3 kPa P/F). Echo shows normal LV function. Onset was within 1 week of the initial insult. Per Berlin definition, this patient has:',options:['Mild ARDS','Moderate ARDS','Severe ARDS','Cardiogenic pulmonary oedema','Pneumonia without ARDS'],correct:'B',explanation:'Berlin ARDS criteria: acute onset (within 7 days), bilateral infiltrates not explained by cardiac failure, PaO2/FiO2 ≤300 mmHg with PEEP ≥5. Severity: Mild 200–300, Moderate 100–200, Severe ≤100 mmHg. P/F = 51/0.6 = 85 mmHg = moderate ARDS.',distractors:{A:'Mild ARDS = P/F 200–300 mmHg',C:'Severe ARDS = P/F ≤100 mmHg',D:'Normal LV excludes cardiogenic oedema',E:'Bilateral infiltrates + hypoxia = ARDS'},pearl:'Berlin ARDS: acute · bilateral infiltrates · not cardiac · P/F ≤300 mmHg. Mild 200–300 · Moderate 100–200 · Severe ≤100.',references:[{label:'Berlin Definition (JAMA 2012)',url:'https://jamanetwork.com/journals/jama/fullarticle/1160659'}]},
  {section:'endo',specialty:'Endocrine',topic:'Insulin pump on admission',stem:'A 34-year-old man with T1DM on a continuous subcutaneous insulin infusion (CSII) is admitted with appendicitis and is fasted for theatre. He has not eaten for 8 hours. CBG is 8.4. Which is the most appropriate management of his pump?',options:['Disconnect the pump immediately and start IV variable-rate insulin (VRIII) and 5% glucose','Continue the pump on the patient\'s usual basal rate, monitor CBG hourly, escalate if persistently outside 6–10','Stop the pump completely and give long-acting subcutaneous insulin','Increase the pump rate by 50% to prevent DKA','Disconnect and give nothing until after surgery'],correct:'B',explanation:'JBDS recommendations: where the patient is competent and CBG is in target, continue the CSII pump on its usual basal rate during short procedures, monitor CBG hourly. Switch to VRIII for prolonged fasting, perioperative complications, DKA or if the patient cannot self-manage.',distractors:{A:'Routine disconnection of a working pump in a competent patient is unnecessary and risks DKA',C:'Conversion to long-acting insulin is for prolonged inability to self-manage',D:'Increasing rate without indication causes hypoglycaemia',E:'Stopping all insulin in T1DM precipitates DKA within hours'},pearl:'CSII pumps in hospital: keep them running with the patient\'s usual basal rate where possible. Switch to VRIII only when self-management fails.',references:[{label:'JBDS — Surgery and procedures in T1DM',url:'https://abcd.care/joint-british-diabetes-societies-jbds-inpatient-care-group'},{label:'NICE NG17 — Type 1 diabetes',url:'https://www.nice.org.uk/guidance/ng17'}]},
  {section:'endo',specialty:'Endocrine',topic:'T1DM sick day rules',stem:'A 22-year-old man with T1DM phones the diabetes nurse line. He has had vomiting and diarrhoea for 12 hours, his CBG is 16.5, and his ketone meter reads 2.8 mmol/L. He has not taken any insulin because he "is not eating". Which is the most appropriate advice?',options:['Stop all insulin until eating returns to normal','Continue usual basal insulin, take additional rapid-acting insulin, sip sugary fluids, recheck ketones in 2 hours, attend hospital if ketones >3 or rising','Take double the usual dose immediately','Drink water only until ketones clear','Wait 24 hours and recheck'],correct:'B',explanation:'Sick day rules T1DM: NEVER stop insulin (even if not eating). Check ketones if CBG >13. Ketones 1.5–3 = correction insulin + sugary fluids + recheck in 2 h. Ketones >3 with persistent vomiting = same-day hospital review for likely DKA.',distractors:{A:'Stopping insulin in T1DM precipitates DKA',C:'Doubling the dose causes hypoglycaemia',D:'Water alone without sugar provides no substrate during illness',E:'Delay risks DKA in a deteriorating patient'},pearl:'T1DM sick days: NEVER stop insulin. Test ketones if CBG >13. Ketones >3 or vomiting = hospital. SADMANS drugs may need review.',references:[{label:'JBDS — The use of variable rate intravenous insulin infusion',url:'https://abcd.care/joint-british-diabetes-societies-jbds-inpatient-care-group'},{label:'NICE NG17 — Type 1 diabetes',url:'https://www.nice.org.uk/guidance/ng17'}]},
  {section:'endo',specialty:'Endocrine',topic:'SGLT2 euglycaemic DKA',stem:'A 60-year-old man with T2DM on dapagliflozin is admitted for elective surgery. Two days postoperatively he develops nausea, vomiting and rapid breathing. CBG is 11.4 (near-normal). Venous gas: pH 7.18, HCO3 12, ketones 4.2. Which diagnosis must be considered?',options:['Diabetic gastroparesis','Surgical site infection','Euglycaemic DKA secondary to SGLT2 inhibitor','Hyperosmolar state','Lactic acidosis from metformin'],correct:'C',explanation:'SGLT2 inhibitors (gliflozins) can precipitate euglycaemic DKA — particularly perioperatively, with reduced calorie intake or intercurrent illness. The CBG can be deceptively normal but ketosis and acidosis are present. Always measure ketones in unwell patients on SGLT2is, even if CBG is normal. MHRA advises stopping SGLT2is 3 days before elective surgery.',distractors:{A:'Gastroparesis would not cause severe acidosis',B:'Acidosis severity exceeds typical postoperative infection alone',D:'HHS has CBG >30 and high osmolality',E:'Metformin lactic acidosis has high lactate, not high ketones'},pearl:'SGLT2i + unwell patient + ketones + near-normal CBG = euglycaemic DKA. Stop SGLT2i 3 days before elective surgery.',references:[{label:'MHRA Drug Safety Update — SGLT2 inhibitors and euglycaemic DKA',url:'https://www.gov.uk/drug-safety-update'},{label:'JBDS — DKA',url:'https://abcd.care/joint-british-diabetes-societies-jbds-inpatient-care-group'}]},
  {section:'endo',specialty:'Endocrine',topic:'Tumour lysis syndrome',stem:'A patient with high-grade lymphoma has just started chemotherapy. Bloods 12 hours later show K 6.2, urate 720 µmol/L, phosphate 2.5, calcium 1.8, creatinine 200 (baseline 80). What is the most appropriate management?',options:['Reassurance — these changes are expected and self-limiting','IV fluids, rasburicase, treat hyperkalaemia, monitor in HDU/ICU; nephrology referral','Stop chemotherapy permanently','Start oral allopurinol only','Give calcium replacement to correct hypocalcaemia'],correct:'B',explanation:'Tumour lysis syndrome (TLS): hyperuricaemia, hyperkalaemia, hyperphosphataemia, hypocalcaemia (secondary to phosphate), AKI. Treatment: aggressive IV fluids, rasburicase (urate oxidase) for established TLS, manage hyperkalaemia, dialyse if AKI severe. DO NOT routinely correct hypocalcaemia (precipitates calcium phosphate in tubules) unless symptomatic.',distractors:{A:'TLS can be rapidly fatal without intervention',C:'Stopping chemo prematurely loses disease control',D:'Allopurinol alone is for prophylaxis, not established severe TLS',E:'Routine calcium replacement worsens phosphate-calcium product and AKI'},pearl:'TLS = high K · high urate · high phosphate · low Ca · AKI. Treat with fluids + rasburicase. Don\'t correct asymptomatic hypocalcaemia.',references:[{label:'BSH — Tumour Lysis',url:'https://b-s-h.org.uk/guidelines/'},{label:'NICE NG144 — Suspected cancer',url:'https://www.nice.org.uk/guidance/ng144'}]},
  {section:'endo',specialty:'Endocrine',topic:'Hypocalcaemia ECG',stem:'A 70-year-old woman one day post total thyroidectomy develops circumoral and finger paraesthesia. Trousseau and Chvostek signs are positive. ECG shows a prolonged QT interval. Calcium is 1.62 mmol/L (corrected). Which is the most appropriate management?',options:['Oral calcium carbonate alone','IV calcium gluconate 10 mL 10% over 10 minutes, repeat as needed, then infusion','Wait and recheck in 24 hours','Diuretics to lower calcium-PTH ratio','Vitamin D loading dose only'],correct:'B',explanation:'Symptomatic hypocalcaemia (paraesthesia, Trousseau, Chvostek, prolonged QT, tetany, seizures): IV calcium gluconate 10 mL 10% over 10 minutes, repeat to a maximum of 30 mL, then continuous infusion. Identify cause (post-thyroidectomy, vitamin D deficiency, magnesium deficiency, sepsis). Replace magnesium if low.',distractors:{A:'Oral calcium is too slow for symptomatic hypocalcaemia',C:'Symptomatic hypocalcaemia with prolonged QT risks torsades — needs urgent treatment',D:'Diuretics worsen calcium loss',E:'Vitamin D alone is too slow for acute symptomatic hypocalcaemia'},pearl:'Symptomatic hypocalcaemia: IV calcium gluconate 10 mL 10% over 10 min. Then identify cause. Don\'t forget magnesium.',references:[{label:'BNF — Calcium gluconate',url:'https://bnf.nice.org.uk/'},{label:'Society for Endocrinology — Hypocalcaemia',url:'https://www.endocrinology.org/'}]},
  {section:'neuro',specialty:'Neurology',topic:'Thrombectomy window',stem:'A 68-year-old man develops sudden right hemiplegia and aphasia at 06:00. He arrives at the stroke unit at 09:00. CT shows no haemorrhage. CTA confirms a proximal left MCA occlusion. He is not eligible for thrombolysis because of recent GI bleeding. Per current guidance, what is the latest timeframe in which he could potentially benefit from mechanical thrombectomy with imaging selection?',options:['3 hours from onset','4.5 hours from onset','6 hours from onset','24 hours from onset with appropriate imaging selection','No window — he must have thrombolysis or nothing'],correct:'D',explanation:'NICE NG128 (updated): mechanical thrombectomy should be offered up to 6 hours from onset to all eligible patients with proximal anterior circulation occlusion, AND between 6–24 hours where there is salvageable tissue on advanced imaging (CT perfusion or MRI). DAWN and DEFUSE-3 extended this window.',distractors:{A:'3 hours is below the standard time window for thrombectomy',B:'4.5 hours is the IV thrombolysis window — thrombectomy extends further',C:'6 hours is the conservative window; recent trials extend it to 24 h with imaging',E:'Thrombectomy is independent of thrombolysis eligibility'},pearl:'Thrombectomy window: 6 h routinely · up to 24 h with advanced imaging (DAWN/DEFUSE-3). Independent of thrombolysis eligibility.',references:[{label:'NICE NG128 — Stroke and TIA',url:'https://www.nice.org.uk/guidance/ng128'}]},
  {section:'neuro',specialty:'Neurology',topic:'Spinal cord compression',stem:'A 65-year-old man with known prostate cancer presents with 2 weeks of progressive lower back pain that is now severe at night, with new bilateral leg weakness, urinary retention and saddle anaesthesia. Which is the most appropriate IMMEDIATE management?',options:['Outpatient MRI within 2 weeks','Bed rest, analgesia, refer to spinal team next working day','Lie flat, oral dexamethasone 16 mg, urgent whole-spine MRI within 24 h, immediate oncology and spinal team referral','Physiotherapy referral','Discharge with simple analgesia'],correct:'C',explanation:'Metastatic spinal cord compression (MSCC): NICE NG75/CG75 — flat bed rest until spinal stability assessed, dexamethasone 16 mg PO/IV (and PPI), MRI of WHOLE spine within 24 h, urgent oncology + spinal surgery referral. Time-critical: paraplegia at presentation rarely reverses; ambulant patients often retain function with prompt treatment.',distractors:{A:'Outpatient MRI delay results in irreversible paraplegia',B:'Next-day referral risks loss of ambulation',D:'Physiotherapy is not the first step in suspected MSCC',E:'Discharge in suspected MSCC is negligent'},pearl:'MSCC red flags: progressive back pain + weakness/sensory level/sphincter loss. Flat bed rest · dex 16 mg · MRI whole spine <24 h.',references:[{label:'NICE NG75 — Spinal metastases',url:'https://www.nice.org.uk/guidance/ng75'},{label:'BMJ Best Practice — MSCC',url:'https://bestpractice.bmj.com/'}]},
  {section:'neuro',specialty:'Neurology',topic:'Cauda equina',stem:'A 42-year-old man presents with 4 days of severe lower back pain with new bilateral leg pain, urinary retention (residual 800 mL), saddle anaesthesia and reduced anal tone. Which is the next investigation?',options:['Outpatient MRI within 2 weeks','Plain lumbar X-ray','Emergency MRI of the lumbar spine within hours','CT abdomen/pelvis','Discharge home with analgesia and physiotherapy'],correct:'C',explanation:'Cauda equina syndrome red flags: bilateral sciatica, saddle anaesthesia, urinary retention with overflow, faecal incontinence/reduced anal tone, sexual dysfunction. Emergency MRI within hours and emergency neurosurgical decompression within 48 h to prevent permanent sphincter dysfunction.',distractors:{A:'Outpatient delay risks irreversible bladder/bowel/sexual dysfunction',B:'X-rays do not show neural compression',D:'CT abdomen/pelvis is not the imaging of choice',E:'Discharge is negligent in suspected cauda equina'},pearl:'Cauda equina: bilateral sciatica + saddle anaesthesia + retention/incontinence = MRI within hours · decompress within 48 h.',references:[{label:'NICE NG59 — Low back pain and sciatica',url:'https://www.nice.org.uk/guidance/ng59'},{label:'British Association of Spine Surgeons',url:'https://www.spinesurgeons.ac.uk/'}]},
  {section:'neuro',specialty:'Neurology',topic:'Guillain-Barré',stem:'A 48-year-old man presents with 5 days of progressive bilateral leg weakness ascending to involve his arms. He had gastroenteritis 2 weeks ago. Reflexes are absent. FVC has fallen from 4.2 L to 1.8 L. Which is the most appropriate IMMEDIATE concern and action?',options:['Reassurance, recheck in clinic','Refer for MRI lumbar spine','Imminent respiratory failure — admit to a monitored bed, urgent ICU review, IVIG/plasma exchange','Treat as functional','Antibiotics for residual gastroenteritis'],correct:'C',explanation:'Guillain-Barré syndrome typically follows Campylobacter or viral infection by 1–3 weeks. Ascending paralysis with areflexia. Vital capacity (VC) <20 mL/kg, falling rapidly, or <1 L = impending respiratory failure → ICU. Treat with IVIG OR plasma exchange (not both). Steroids do NOT work.',distractors:{A:'Reassurance misses progressive respiratory failure',B:'GBS is not radiologically diagnosed',D:'Bilateral ascending paralysis with areflexia and falling VC is not functional',E:'Antibiotics do not treat GBS'},pearl:'GBS: ascending paralysis · areflexia · post-infectious. Falling VC <20 mL/kg or <1 L → ICU. IVIG OR PEX (steroids don\'t work).',references:[{label:'NHS England — GBS',url:'https://www.england.nhs.uk/'},{label:'BNF — Immunoglobulin',url:'https://bnf.nice.org.uk/'}]},
  {section:'neuro',specialty:'Neurology',topic:'Neuroleptic malignant syndrome',stem:'A patient on the psychiatric ward, recently started on haloperidol, becomes confused with rigid muscles, hyperthermia (39.8°C), tachycardia (132), and labile BP. CK is 4500. Which is the diagnosis and management?',options:['Serotonin syndrome — cyproheptadine','Neuroleptic malignant syndrome — stop haloperidol, aggressive cooling, IV fluids, dantrolene/bromocriptine, ICU','Sepsis — antibiotics only','Drug-induced parkinsonism — anticholinergic','Thyrotoxic crisis — beta-blockade'],correct:'B',explanation:'NMS: tetrad of hyperthermia, rigidity ("lead-pipe"), autonomic instability, altered mentation. Often within days of starting/increasing antipsychotic. Mortality 10%. Treatment: stop offending drug, supportive care (cooling, fluids, electrolytes), dantrolene or bromocriptine in severe cases, ICU.',distractors:{A:'Serotonin syndrome features clonus, hyperreflexia, agitation; NMS has rigidity and hyporeflexia',C:'Sepsis does not explain the rigidity and recent neuroleptic exposure',D:'Drug-induced parkinsonism does not cause hyperthermia or massive CK rise',E:'Thyrotoxic crisis has thyroid signs and history'},pearl:'NMS tetrad: fever · rigidity · autonomic instability · altered mentation. Stop antipsychotic. Cool. Fluids. Dantrolene. ICU.',references:[{label:'BNF — Antipsychotic drugs',url:'https://bnf.nice.org.uk/'},{label:'BMJ Best Practice — NMS',url:'https://bestpractice.bmj.com/'}]},
  {section:'anaphylaxis',specialty:'Anaphylaxis & Allergy',topic:'Mast cell tryptase timing',stem:'A patient has had a suspected anaphylactic reaction during anaesthesia. The team plans to take serial mast cell tryptase samples for diagnosis. According to Resuscitation Council UK guidance, when should the samples be taken?',options:['Immediately, then daily for 1 week','As soon as feasible after resuscitation, at 1–2 hours, and at 24 hours','Single sample at 24 hours only','Before any treatment is given','Tryptase is not measured in the UK'],correct:'B',explanation:'Three samples: as soon as feasible after the reaction (do not delay treatment), at 1–2 hours, and at 24 hours (or convalescent baseline). Tryptase peaks 1–2 hours and falls to baseline by 24 hours; a transient rise of >20% above baseline supports anaphylaxis. Refer to specialist allergy clinic regardless of result.',distractors:{A:'Daily samples for a week add no additional diagnostic value',C:'A single sample misses the peak',D:'Treatment must NOT be delayed for sampling',E:'UK practice routinely measures serial tryptase'},pearl:'Tryptase: 3 samples — ASAP after reaction · 1–2 h · 24 h baseline. Treatment first, samples next. Always refer to allergy clinic.',references:[{label:'Resus Council UK 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'},{label:'BSACI Anaphylaxis Guidance',url:'https://www.bsaci.org/'}]},
  {section:'anaphylaxis',specialty:'Anaphylaxis & Allergy',topic:'Idiopathic anaphylaxis',stem:'A 35-year-old woman has had three episodes of confirmed anaphylaxis over 18 months. Allergy testing including skin prick, specific IgE and elevated baseline tryptase has been negative. Investigations have excluded mastocytosis. Which is the most appropriate management plan?',options:['Reassure that no further episodes will occur','Provide two adrenaline auto-injectors, written emergency plan, refer to specialist allergy clinic, consider daily H1 antihistamine and corticosteroid prophylaxis','Restrict from all foods preventatively','Discharge without follow-up','IV adrenaline infusion daily prophylactically'],correct:'B',explanation:'Idiopathic anaphylaxis is a diagnosis of exclusion when triggers cannot be identified. Management: TWO auto-injectors, written emergency plan, allergy clinic specialist follow-up, regular H1 antihistamine, sometimes oral corticosteroid prophylaxis. Recurrence is unpredictable — preparedness is essential.',distractors:{A:'Recurrence is the rule, not the exception',C:'Blanket restriction without identified trigger is unhelpful',D:'Discharge without follow-up risks fatal recurrence',E:'IV adrenaline is acute treatment, not prophylaxis'},pearl:'Idiopathic anaphylaxis: 2 auto-injectors, plan, daily antihistamine, allergy clinic. Recurrence is unpredictable — be prepared.',references:[{label:'Resus Council UK 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines'},{label:'BSACI — Anaphylaxis',url:'https://www.bsaci.org/'}]},
  {section:'renal',specialty:'Renal & Fluids',topic:'Rhabdomyolysis',stem:'A 58-year-old man with multiple medical problems is found on the floor at home after an unwitnessed fall, having been there for an estimated 18 hours. He is alert. Bloods: K 6.4, creatinine 280 (baseline 95), CK 48,000, urine dipstick blood +++. Which is the most appropriate management?',options:['Restrict IV fluids — kidneys are already injured','Aggressive IV crystalloid to maintain urine output 200–300 mL/h, treat hyperkalaemia, urinary alkalinisation if severe, monitor for compartment syndrome','Diuretics to flush out myoglobin','Bicarbonate alone','Discharge with oral fluids'],correct:'B',explanation:'Rhabdomyolysis: muscle breakdown → myoglobin → AKI. Treatment: aggressive IV fluids (often 1 L/h initially, then targeted to urine output 200–300 mL/h), treat hyperkalaemia, urinary alkalinisation in severe cases (controversial), assess for compartment syndrome (especially after prolonged immobility), watch for hypocalcaemia.',distractors:{A:'Fluid restriction worsens AKI in rhabdomyolysis',C:'Diuretics may be used cautiously but only after volume repletion',D:'Bicarbonate alone without volume is inadequate',E:'Oral fluids are inadequate for severe rhabdomyolysis'},pearl:'Rhabdomyolysis: aggressive IV fluids · target urine output 200–300 mL/h · check K · watch for compartment syndrome.',references:[{label:'KDIGO AKI guideline',url:'https://kdigo.org/guidelines/acute-kidney-injury/'},{label:'BMJ Best Practice — Rhabdomyolysis',url:'https://bestpractice.bmj.com/'}]},
  {section:'renal',specialty:'Renal & Fluids',topic:'Contrast nephropathy',stem:'A 75-year-old woman with chronic kidney disease (eGFR 28) is scheduled for contrast-enhanced CT. Which intervention has the strongest evidence for preventing contrast-induced nephropathy?',options:['IV N-acetylcysteine','IV 0.9% saline pre and post procedure','Oral hydration alone','Bicarbonate infusion','Furosemide pre-procedure'],correct:'B',explanation:'Volume expansion with IV 0.9% saline (typically 1 mL/kg/h for 6–12 hours pre and post) is the only intervention with consistent evidence for preventing contrast-induced AKI. NAC and bicarbonate showed early promise but recent large trials (PRESERVE 2018) failed to confirm benefit. Stop ACEi/ARB/NSAIDs/metformin where appropriate.',distractors:{A:'PRESERVE trial showed no benefit of NAC',C:'Oral hydration is less effective than IV in moderate-severe CKD',D:'PRESERVE showed no benefit of bicarbonate over saline',E:'Furosemide may worsen volume status'},pearl:'Contrast nephropathy prevention: IV 0.9% saline 1 mL/kg/h pre and post (PRESERVE 2018). NAC and bicarbonate add nothing.',references:[{label:'NICE NG148 — Acute kidney injury',url:'https://www.nice.org.uk/guidance/ng148'},{label:'PRESERVE trial (NEJM 2018)',url:'https://www.nejm.org/doi/full/10.1056/NEJMoa1710933'}]},
  {section:'renal',specialty:'Renal & Fluids',topic:'RRT indications',stem:'A patient with AKI Stage 3 has the following: K 7.4 unresponsive to medical management, pH 7.05 with HCO3 8, fluid overload with pulmonary oedema unresponsive to diuretics, urea 38 with confusion, urine output 50 mL in 12 hours. Which is the indication for urgent renal replacement therapy?',options:['Only one of the above features','Two of the above features','Any single one of these features in isolation can be an indication','None — RRT is purely chronic','Wait until creatinine doubles'],correct:'C',explanation:'AEIOU mnemonic — any single one of these is an indication for urgent RRT: Acidosis (refractory metabolic), Electrolytes (especially refractory hyperkalaemia), Intoxications (lithium, salicylate, methanol etc.), Overload (refractory pulmonary oedema), Uraemia (encephalopathy, pericarditis).',distractors:{A:'No single feature is mandatory; any AEIOU is sufficient',B:'No threshold of multiple features required',D:'RRT is a major acute therapy in AKI',E:'Waiting for arbitrary creatinine doubling delays life-saving treatment'},pearl:'RRT in AKI = AEIOU: Acidosis · Electrolytes (K) · Intoxications · Overload · Uraemia. ANY ONE refractory to medical Rx = indication.',references:[{label:'NICE NG148 — Acute kidney injury',url:'https://www.nice.org.uk/guidance/ng148'},{label:'KDIGO AKI guideline',url:'https://kdigo.org/guidelines/acute-kidney-injury/'}]},
  {section:'renal',specialty:'Renal & Fluids',topic:'Acute urinary retention',stem:'A 78-year-old man presents with 12 hours of inability to pass urine, lower abdominal pain and a palpable bladder. Bladder scan shows 1100 mL. Which is the most appropriate management?',options:['Encourage oral fluids and reassess in 4 hours','Catheterise immediately, monitor urine output, watch for post-obstructive diuresis, treat cause','Insert a suprapubic catheter','Diuretic to encourage flow','Discharge with alpha-blocker only'],correct:'B',explanation:'Acute urinary retention with painful palpable bladder: urgent urethral catheterisation. After release, monitor for post-obstructive diuresis (>200 mL/h) requiring fluid replacement to prevent shock. Identify cause (BPH, drugs, faecal impaction, UTI, neurological). Trial without catheter (TWOC) after 1–3 days, often with alpha-blocker.',distractors:{A:'Painful retention with a 1.1 L bladder needs immediate decompression',C:'Suprapubic is reserved for failed urethral or contraindicated catheterisation',D:'Diuretics worsen retention if outflow obstruction is the cause',E:'Discharge in painful retention is inappropriate'},pearl:'Acute retention: catheterise · watch for post-obstructive diuresis · find cause · TWOC after 1–3 days with α-blocker.',references:[{label:'BAUS Guidelines — Urinary retention',url:'https://www.baus.org.uk/'},{label:'NICE CG97 — LUTS in men',url:'https://www.nice.org.uk/guidance/cg97'}]},
  {section:'gastro',specialty:'Gastroenterology',topic:'Glasgow-Blatchford',stem:'A 45-year-old man presents with melaena. Hb 78, urea 28, BP 88/55, HR 110, presenting with syncope, no liver/cardiac comorbidity, no melaena on rectal but reported at home. The Glasgow-Blatchford score is calculated. What is the score\'s primary use?',options:['To predict mortality','To identify low-risk patients (score 0–1) suitable for outpatient management; higher scores need admission and endoscopy','To replace endoscopy','To guide antibiotic choice','To assess capacity to consent'],correct:'B',explanation:'Glasgow-Blatchford score (urea, Hb, SBP, HR, melaena, syncope, hepatic disease, cardiac failure) is used at admission to identify LOW-risk upper GI bleed patients (score 0–1) who can safely have outpatient endoscopy. Score ≥6 has high need for intervention. Differs from Rockall, which uses age, comorbidities, shock and endoscopy findings to predict rebleeding/mortality post-endoscopy.',distractors:{A:'GBS predicts need for intervention, not mortality (Rockall does mortality)',C:'GBS does not replace endoscopy',D:'GBS is not for antibiotics',E:'GBS does not assess capacity'},pearl:'Glasgow-Blatchford: pre-endoscopy. Score 0–1 = outpatient. Rockall: post-endoscopy. Predicts rebleeding/mortality.',references:[{label:'NICE CG141 — Acute upper GI bleeding',url:'https://www.nice.org.uk/guidance/cg141'},{label:'BSG Guidelines — UGIB',url:'https://www.bsg.org.uk/'}]},
  {section:'gastro',specialty:'Gastroenterology',topic:'Toxic megacolon',stem:'A patient with a flare of ulcerative colitis becomes more unwell. AXR shows colonic dilatation 8 cm with mucosal islands. The patient is febrile, tachycardic and hypotensive. Which is the most appropriate management?',options:['Continue oral steroids and observe','Stop antimotility agents, IV hydrocortisone, IV antibiotics, NG decompression, urgent surgical review','Loperamide to reduce stool frequency','High-dose oral mesalazine','Discharge with steroid taper'],correct:'B',explanation:'Toxic megacolon: colonic dilatation >6 cm + systemic toxicity. Stop antimotility/anticholinergic/opioid agents (precipitate it), IV hydrocortisone 100 mg QDS, IV antibiotics, NG decompression, daily AXR, daily clinical and stool chart review, urgent surgical (colorectal) review for potential colectomy if no improvement at 72 h or signs of perforation.',distractors:{A:'Oral steroids are insufficient in fulminant colitis with megacolon',C:'Antimotility agents PRECIPITATE megacolon',D:'Oral mesalazine alone is inadequate',E:'Discharge in toxic megacolon is unsafe'},pearl:'Toxic megacolon = colon >6 cm + systemic toxicity. STOP antimotility · IV steroids · antibiotics · NG · surgical review.',references:[{label:'BSG IBD Guidelines',url:'https://www.bsg.org.uk/'},{label:'NICE NG130 — UC',url:'https://www.nice.org.uk/guidance/ng130'}]},
  {section:'gastro',specialty:'Gastroenterology',topic:'Cholangitis Charcot',stem:'A 70-year-old woman with gallstones presents with fever (39.1°C), right upper quadrant pain and jaundice (bilirubin 78). Bloods: WCC 18, CRP 240, ALP 380. She is hypotensive (BP 88/52) and confused. Which is the diagnosis and immediate priority?',options:['Hepatitis A — supportive care','Acute cholecystitis — laparoscopic cholecystectomy in 5 days','Ascending cholangitis with Reynolds\' pentad — sepsis bundle, IV antibiotics, urgent ERCP for biliary decompression','Pancreatitis — analgesia and observation','Liver abscess — percutaneous drainage'],correct:'C',explanation:'Charcot\'s triad (fever + RUQ pain + jaundice) = cholangitis. Reynolds\' pentad adds hypotension + confusion = severe/suppurative cholangitis. Treatment: sepsis bundle, broad-spectrum antibiotics covering Gram negatives + anaerobes, urgent ERCP (or PTC if ERCP fails) for biliary decompression. Mortality is 5–10% in severe disease without prompt drainage.',distractors:{A:'Hepatitis A is not associated with Charcot\'s triad and obstructive picture',B:'Cholecystitis lacks systemic obstructive signs and confusion',D:'Pancreatitis usually has lipase rise and different pain pattern',E:'Liver abscess does not typically present with this acute biliary picture'},pearl:'Charcot triad (fever + RUQ + jaundice) = cholangitis. Reynolds pentad (+ shock + confusion) = severe. Source control = ERCP.',references:[{label:'Tokyo Guidelines 2018 — Cholangitis',url:'https://onlinelibrary.wiley.com/doi/10.1002/jhbp.512'},{label:'NICE NG51 — Sepsis',url:'https://www.nice.org.uk/guidance/ng51'}]},
  {section:'poisoning',specialty:'Poisoning & Overdose',topic:'Beta-blocker overdose',stem:'A 30-year-old man has taken an unknown quantity of bisoprolol. He is bradycardic (HR 38), hypotensive (BP 76/40), and atropine has not reversed his bradycardia. CBG is 4.2. According to TOXBASE/UK guidance, which agent is most likely to help?',options:['IV adrenaline 1 mg','High-dose glucagon (5–10 mg IV) ± infusion','Naloxone','Calcium gluconate','Sodium bicarbonate'],correct:'B',explanation:'Beta-blocker overdose causing refractory bradycardia/hypotension: high-dose glucagon (5–10 mg IV bolus, may repeat, followed by infusion) bypasses the beta-receptor by activating cardiac adenylate cyclase. Atropine often fails. High-dose insulin–dextrose may also be used. Catecholamine infusions (adrenaline, isoprenaline) and pacing are alternatives.',distractors:{A:'IV adrenaline 1 mg is the cardiac arrest dose; lower titrated doses may be needed if glucagon fails',C:'Naloxone is for opioid reversal',D:'Calcium is more useful in calcium channel blocker overdose',E:'Bicarbonate is for TCA and salicylate overdose'},pearl:'Beta-blocker OD with refractory bradycardia: glucagon 5–10 mg IV. Then infusion, catecholamines, pacing. Discuss with TOXBASE.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'},{label:'BNF — Beta-blockers',url:'https://bnf.nice.org.uk/'}]},
  {section:'poisoning',specialty:'Poisoning & Overdose',topic:'Lithium toxicity',stem:'A 55-year-old woman on long-term lithium for bipolar disorder has been increasingly confused over 3 days. She has had recent diarrhoea and started ramipril last month. Examination: tremor, ataxia, hyperreflexia, drowsiness. Lithium level 2.4 mmol/L. eGFR 35. What is the most appropriate management?',options:['Increase lithium dose to override resistance','Stop lithium, IV 0.9% saline rehydration, monitor renal function, refer for haemodialysis given level + neuro features + renal impairment','Activated charcoal (lithium binds well to charcoal)','Antipyretic and discharge','Oral potassium supplementation'],correct:'B',explanation:'Lithium toxicity ≥2.0 mmol/L with neurological features OR renal impairment is severe. Charcoal does NOT bind lithium. Treatment: stop lithium, identify precipitants (NSAIDs, ACEi/ARB, diuretics, dehydration), IV saline rehydration, haemodialysis for level >4 or >2.5 with severe symptoms, renal failure, or failure to fall.',distractors:{A:'Increasing the dose is dangerous',C:'Activated charcoal does not bind lithium',D:'Discharge in toxicity is unsafe',E:'Potassium does not address lithium toxicity'},pearl:'Lithium toxicity: stop drug · saline rehydration · dialyse if level >4, or >2.5 with neuro/renal features. Charcoal doesn\'t work.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'},{label:'MHRA Drug Safety Update — Lithium monitoring',url:'https://www.gov.uk/drug-safety-update'}]},
  {section:'poisoning',specialty:'Poisoning & Overdose',topic:'Digoxin toxicity',stem:'A 78-year-old man on digoxin for AF presents with nausea, "yellow-green vision" and bradycardia (HR 38). Digoxin level 4.5 nmol/L (target 0.5–2). K 6.2. ECG shows VT. Which is the definitive treatment?',options:['Calcium gluconate IV','Digoxin-specific antibody fragments (DigiFab/DigiBind)','Magnesium sulphate IV','IV potassium','Atropine alone'],correct:'B',explanation:'Severe digoxin toxicity with arrhythmia, hyperkalaemia >5, or significant ingestion: digoxin-specific Fab fragments (DigiFab) are the antidote. They reverse cardiac and electrolyte effects within minutes. AVOID IV calcium in digoxin toxicity ("stone heart" risk). Manage hyperkalaemia (without calcium) and arrhythmias supportively until Fab takes effect.',distractors:{A:'IV calcium can cause refractory cardiac arrest in digoxin toxicity ("stone heart")',C:'Magnesium may help refractory torsades but is not definitive',D:'IV potassium WORSENS hyperkalaemia',E:'Atropine alone is inadequate for severe toxicity'},pearl:'Severe digoxin toxicity = DigiFab. NEVER give IV calcium in digoxin toxicity (stone heart). Manage K without calcium.',references:[{label:'TOXBASE',url:'https://www.toxbase.org/'},{label:'BNF — Digoxin',url:'https://bnf.nice.org.uk/'}]},
  {section:'transfusion',specialty:'Transfusion',topic:'Major haemorrhage protocol',stem:'A polytrauma patient is shocked, with estimated 2 litre blood loss and ongoing bleeding. The major haemorrhage protocol (MHP) is activated. Which initial product ratio reflects current UK practice for trauma?',options:['Crystalloid only until bleeding stops','RBC : FFP ratio approximately 1 : 1, with platelets and cryoprecipitate as guided by ratios/POC tests, plus tranexamic acid 1 g IV within 3 hours','RBC alone','5% albumin','Whole blood is the only acceptable product'],correct:'B',explanation:'UK MHP (Hospital Major Haemorrhage Pathway): early balanced resuscitation with RBC : FFP ≈ 1:1 (PROPPR trial), platelets and cryoprecipitate per local pack. TXA 1 g IV bolus within 3 hours of trauma (CRASH-2/CRASH-3) reduces mortality. Avoid excessive crystalloid (worsens dilutional coagulopathy and hypothermia).',distractors:{A:'Crystalloid-only resuscitation worsens coagulopathy',C:'RBC alone causes dilutional coagulopathy',D:'Albumin is not the resuscitation fluid in trauma',E:'Whole blood is not standard UK practice'},pearl:'Major haemorrhage: RBC:FFP ≈ 1:1 + early TXA 1 g IV (within 3 h). Avoid crystalloid bolus stacking.',references:[{label:'Royal College of Pathologists — MHP',url:'https://www.rcpath.org/'},{label:'CRASH-2 trial',url:'https://www.thelancet.com/'}]},
  {section:'transfusion',specialty:'Transfusion',topic:'Jehovah\'s Witness',stem:'A 28-year-old Jehovah\'s Witness with capacity is admitted with severe anaemia (Hb 52) requiring elective surgery. She has signed an Advance Decision refusing any blood products including red cells, platelets and plasma. She accepts cell salvage and erythropoietin. Which is the most appropriate management?',options:['Override her refusal as her life is at risk','Respect her decision; optimise medically with IV iron, EPO, tranexamic acid, cell salvage; document carefully','Transfuse covertly','Refer to court for an order to transfuse','Refuse to operate'],correct:'B',explanation:'A capacitous adult\'s informed refusal of blood products is legally and ethically binding (MCA 2005, Re T 1992). Optimisation: IV iron, EPO, oral B12/folate, tranexamic acid, cell salvage (some accept this), meticulous haemostasis, hypotensive anaesthesia. Document carefully, including any acceptable products. Liaison Committee for Hospital Information (Watch Tower) can assist.',distractors:{A:'Overriding a capacitous adult\'s informed refusal is unlawful',C:'Covert transfusion is assault and a serious criminal/professional offence',D:'Court has no power to override a capacitous refusal in adults',E:'Refusing to operate may be appropriate in some cases but is not the management approach'},pearl:'Capacitous JW refusal of blood is legally binding. Optimise: iron · EPO · TXA · cell salvage. Document scrupulously. Never transfuse covertly.',references:[{label:'NMC The Code',url:'https://www.nmc.org.uk/standards/code/'},{label:'AAGBI — Anaesthesia for Jehovah\'s Witnesses',url:'https://anaesthetists.org/'}]},
  {section:'medsafe',specialty:'Medication Safety',topic:'LASA medications',stem:'You are about to administer a "lookalike-soundalike" (LASA) medication. Which pair is a recognised UK LASA error pair requiring extra vigilance?',options:['Paracetamol and ibuprofen','Hydroxyzine and hydralazine','Aspirin and paracetamol','Ramipril and lisinopril','Cefalexin and ciprofloxacin'],correct:'B',explanation:'LASA pairs are drugs whose names look or sound alike and have caused administration errors. Hydroxyzine (sedating antihistamine) vs hydralazine (vasodilator) is a classic UK example with very different effects. Other examples: cisplatin/carboplatin, vinblastine/vincristine, captopril/carvedilol, prednisone/prednisolone (in the US).',distractors:{A:'Paracetamol and ibuprofen names are clearly different',C:'Aspirin and paracetamol names differ phonetically',D:'Ramipril and lisinopril are similar but not classified as a high-risk LASA pair',E:'Cefalexin and ciprofloxacin are different drug classes with distinct names'},pearl:'LASA = look-alike sound-alike. Tall-Man lettering (e.g. hydrOXYzine vs hydrALAzine) and double-checking are NPSA-recommended safeguards.',references:[{label:'NPSA LASA Alert',url:'https://www.england.nhs.uk/patient-safety/'},{label:'NMC The Code',url:'https://www.nmc.org.uk/standards/code/'}]},
  {section:'medsafe',specialty:'Medication Safety',topic:'Vancomycin TDM',stem:'A patient on IV vancomycin for MRSA bacteraemia has just had her third dose. The team asks you to send a trough level. When should the sample be taken?',options:['Any time, randomly','Just before the next dose (within 30 min)','30 minutes after the dose ends','At the end of the infusion','24 hours after the dose'],correct:'B',explanation:'Vancomycin trough level = pre-dose, taken within 30 minutes BEFORE the next dose. Target trough: 15–20 mg/L for serious MRSA infections (per UK practice). Levels too low → underdosing and treatment failure; too high → nephrotoxicity and ototoxicity. Newer practice uses AUC-based dosing where available.',distractors:{A:'Random levels cannot be interpreted accurately',C:'30 min post-dose is a peak level — not used to dose adjust',D:'End of infusion sampling is non-standard',E:'24 h post-dose is too far from steady state'},pearl:'Vancomycin trough = within 30 min BEFORE the next dose. Target 15–20 mg/L for serious MRSA. Pre-dose timing is critical.',references:[{label:'BNF — Vancomycin',url:'https://bnf.nice.org.uk/'},{label:'BSAC TDM guidelines',url:'https://www.bsac.org.uk/'}]},
  {section:'falls',specialty:'Falls, Frailty & Skin',topic:'Lying-standing BP',stem:'You are screening an older patient for orthostatic hypotension as part of a falls assessment. Which is the correct technique per NICE guidance?',options:['Stand-only BP, single reading','Lying for 5 min then BP, then standing for 1 min and 3 min with repeat BP measurements; positive if SBP fall ≥20 or DBP fall ≥10, or if SBP <90','Sitting BP is sufficient','Lying then standing immediately (no waiting)','Standing BP twice on different days'],correct:'B',explanation:'Orthostatic hypotension assessment (NICE, BGS): rest supine 5 min, measure BP. Then stand and measure BP at 1 minute AND at 3 minutes. Positive if SBP falls ≥20 mmHg, DBP falls ≥10 mmHg, or SBP <90 standing. Note any symptoms (dizziness, light-headedness, palpitations).',distractors:{A:'A single standing BP misses the orthostatic change',C:'Sitting BP does not assess orthostasis',D:'Immediate standing reads transient changes; 1 and 3 min capture sustained drop',E:'Standing BP twice without lying baseline misses orthostatic drop'},pearl:'Orthostatic BP: lie 5 min · stand · BP at 1 min and 3 min. Drop ≥20 SBP, ≥10 DBP, or SBP <90 = positive.',references:[{label:'NICE CG161 — Falls in older people',url:'https://www.nice.org.uk/guidance/cg161'},{label:'BGS — Falls',url:'https://www.bgs.org.uk/'}]},
  {section:'infection',specialty:'Infection Control',topic:'Norovirus outbreak',stem:'Three patients on a 30-bed care of older persons ward have developed acute vomiting and diarrhoea over 24 hours. Norovirus is suspected. Which is the most appropriate immediate infection control action?',options:['Discharge the patients home to control the outbreak','Close the bay/ward to admissions and transfers, isolate symptomatic patients, enforce hand hygiene with SOAP AND WATER (alcohol gel ineffective), notify IPC team','Use alcohol gel as the sole hand-hygiene measure','Cohort symptomatic and asymptomatic patients together','Continue normal admissions but mask all staff'],correct:'B',explanation:'Norovirus is highly transmissible (low infectious dose, environmental persistence). Outbreak control: close to admissions and transfers, isolate or cohort symptomatic patients (NOT mixed with well), use SOAP AND WATER (alcohol gel does not kill norovirus), enhanced cleaning with chlorine-based agents, exclude staff for 48 h after symptoms resolve, notify IPC and Public Health.',distractors:{A:'Discharging without IPC measures spreads the virus to community/care settings',C:'Alcohol gel is INEFFECTIVE against norovirus',D:'Cohorting symptomatic with well patients spreads the outbreak',E:'Continuing admissions defeats outbreak control'},pearl:'Norovirus: close to admissions · soap and water (alcohol gel doesn\'t work) · chlorine cleaning · 48 h symptom-free before staff return.',references:[{label:'PHE Norovirus Guidance',url:'https://www.gov.uk/government/publications/norovirus-managing-outbreaks-in-acute-and-community-health-and-social-care-settings'},{label:'NICE NG51 — Sepsis',url:'https://www.nice.org.uk/guidance/ng51'}]},
  {section:'mca',specialty:'Mental Capacity & Communication',topic:'IMCA referral',stem:'A 78-year-old man with advanced dementia, no family or friends, and lacking capacity to consent, is being considered for serious medical treatment (cardiac surgery). Per Mental Capacity Act 2005, who must be involved in the best-interests decision?',options:['No-one — the consultant alone decides','An Independent Mental Capacity Advocate (IMCA)','The hospital chaplain','A neighbour from his street','The police'],correct:'B',explanation:'Under MCA 2005, an IMCA MUST be appointed when serious medical treatment, change of accommodation (long-term move), care reviews, or adult safeguarding decisions are made for a person lacking capacity who has no-one else to consult (no family, friends, advocate, attorney or deputy). The IMCA represents and supports the person\'s interests in the best-interests decision.',distractors:{A:'Lone consultant decision-making for "unbefriended" patient breaches MCA',C:'Chaplains can offer support but lack the statutory role',D:'Neighbours have no formal role',E:'Police are not relevant to medical capacity decisions'},pearl:'MCA serious medical treatment + no-one to consult = IMCA referral is mandatory. Statutory role since 2007.',references:[{label:'MCA Code of Practice 2007',url:'https://www.gov.uk/government/publications/mental-capacity-act-code-of-practice'},{label:'NMC The Code',url:'https://www.nmc.org.uk/standards/code/'}]},

  // ── BATCH 2 — additional 80 questions ───────────────────
  // SEPSIS & DETERIORATION (8 new)
  {section:'sepsis',specialty:'Urology',topic:'Urosepsis elderly',stem:'An 82-year-old woman from a care home presents with new confusion, T 38.4°C, HR 118, BP 92/58, RR 24, SpO₂ 95%. Urinalysis: leuk+++ nit++. NEWS2 is 8.',options:['Send urine and observe for 4 h','Start oral trimethoprim and admit','IV fluid bolus + IV co-amoxiclav within 1 h, blood cultures','Catheterise and start IV fluids','Withhold antibiotics until culture'],correct:'C',explanation:'Urosepsis with NEWS2 ≥7: Sepsis 6 within 1 h. IV broad-spectrum antibiotics per local protocol after cultures, IV crystalloid, target MAP ≥65.',distractors:{A:'Observation in NEWS2 8 misses the 1-h antibiotic window',B:'Oral antibiotics inadequate for septic shock',D:'Catheter alone does not address sepsis',E:'Withholding antibiotics until culture is dangerous in suspected sepsis'},pearl:'Atypical presentation in elderly — confusion may be the only feature of urosepsis. Urinalysis confirms but does not delay treatment.',references:[{label:'NICE NG51 Sepsis (2024 update)',url:'https://www.nice.org.uk/guidance/ng51'}]},
  {section:'sepsis',specialty:'Microbiology',topic:'CRBSI line removal indication',stem:'A 64-year-old on day 8 of a tunnelled central line for chemotherapy spikes T 39.1°C with rigors during line flush. BP 96/62, HR 122. Cultures from line and peripheral show Staph aureus.',options:['Continue line and oral flucloxacillin','Remove line + IV flucloxacillin + cultures from new site','Replace dressings only','Lock the line with gentamicin','Withhold antibiotics pending sensitivities'],correct:'B',explanation:'CRBSI with Staph aureus is a line-removal indication. Empirical IV anti-staph cover (flucloxacillin or vancomycin if MRSA risk) + repeat blood cultures at 48–72 h.',distractors:{A:'Continuing infected line risks endocarditis and metastatic infection',C:'Dressing change alone misses bloodstream source',D:'Antibiotic lock is for selected coag-neg staph cases, not S. aureus',E:'Withholding antibiotics in CRBSI bacteraemia is dangerous'},pearl:'S. aureus, Pseudomonas, Candida from a central line = remove the line. Coag-neg staph may sometimes be salvaged with antibiotic lock.',references:[{label:'epic3 Guidelines / Loveday H, Journal of Hospital Infection',url:'https://www.journalofhospitalinfection.com/article/S0195-6701(13)60012-2/fulltext'}]},
  {section:'sepsis',specialty:'Soft tissue',topic:'Necrotising fasciitis red flags',stem:'A 56-year-old diabetic man has rapidly progressive leg cellulitis, severe pain "out of proportion" to skin findings, dusky discoloration, crepitus, T 38.7°C, NEWS2 9.',options:['Oral flucloxacillin and review tomorrow','IV flucloxacillin and observe','Sepsis 6 + urgent surgical review for debridement','Elevate leg and analgesia','Fluid restriction'],correct:'C',explanation:'Necrotising fasciitis is a surgical emergency. Sepsis 6 + immediate surgical debridement + broad-spectrum antibiotics (piperacillin–tazobactam + clindamycin).',distractors:{A:'Outpatient management in nec fasc has 100% mortality',B:'IV flucloxacillin alone misses anaerobes and Group A strep',D:'Elevation alone does not treat life-threatening infection',E:'Fluid restriction worsens shock'},pearl:'Pain out of proportion + crepitus + skin discoloration + rapid progression = necrotising fasciitis until proven otherwise. LRINEC score supports diagnosis.',references:[{label:'NICE CG74 Surgical site infection',url:'https://www.nice.org.uk/guidance/cg74'}]},
  {section:'sepsis',specialty:'Obstetrics',topic:'Sepsis in pregnancy',stem:'A 28-year-old at 32 weeks gestation has T 39.0°C, RR 26, HR 128, BP 88/56, lower abdominal pain. NEWS2 7 (note: pregnancy makes NEWS2 less sensitive).',options:['Standard NEWS2 + 4-hourly observation','Maternal early warning score + Sepsis 6 + obstetric review','Tocolytics and analgesia','Outpatient with oral antibiotics','Steroids alone for fetal lung maturity'],correct:'B',explanation:'Pregnancy alters physiology — use MEOWS or maternal-specific scores. Sepsis 6 within 1 h plus immediate obstetric and neonatal team involvement.',distractors:{A:'Standard NEWS2 thresholds are insensitive in pregnancy',C:'Tocolytics in maternal sepsis can worsen outcomes',D:'Outpatient management of pregnant sepsis is unsafe',E:'Steroids alone do not treat sepsis'},pearl:'Sepsis is a leading cause of maternal death in the UK. Use MEOWS, lower threshold to escalate, involve obstetrics + neonatology + critical care early.',references:[{label:'RCOG Green-top Guideline 64a Bacterial Sepsis in Pregnancy',url:'https://www.rcog.org.uk/guidance/browse-all-guidance/green-top-guidelines/'}]},
  {section:'sepsis',specialty:'Surgical',topic:'Post-operative sepsis day 4',stem:'A 71-year-old man is day 4 post-laparotomy. T 38.6°C, HR 110, BP 100/60, lactate 3.2. Wound erythematous, abdomen tender. NEWS2 7.',options:['Continue current antibiotics','Sepsis 6 + urgent surgical review for source control + abdominal imaging','Discharge home','Increase analgesia','Stop antibiotics to obtain culture'],correct:'B',explanation:'Post-op sepsis often needs source control (collection, anastomotic leak, infected wound). CT abdomen + surgical review + escalate antibiotics.',distractors:{A:'Continuing failing therapy without re-evaluation misses source',C:'Discharge in active sepsis is unsafe',D:'Analgesia alone does not address infection source',E:'Stopping antibiotics in active sepsis worsens shock'},pearl:'Post-op fever ladder: day 1–2 atelectasis/wound; day 3–5 UTI/pneumonia/wound; day 5+ collection/leak/DVT. Always think source control.',references:[{label:'Surviving Sepsis Campaign Guidelines',url:'https://www.sccm.org/clinical-resources/guidelines/guidelines/surviving-sepsis-guidelines-2021'}]},
  {section:'sepsis',specialty:'Microbiology',topic:'Antimicrobial stewardship',stem:'A patient with sepsis from urosepsis was started on piperacillin–tazobactam empirically 72 hours ago. Cultures now show E. coli sensitive to co-amoxiclav and trimethoprim. Patient clinically improving.',options:['Continue piperacillin–tazobactam for 7 days','Stop antibiotics now','De-escalate to oral co-amoxiclav per sensitivities','Add gentamicin for synergy','Switch to meropenem'],correct:'C',explanation:'Antimicrobial stewardship: review at 48–72 h, narrow to sensitivities, switch IV-to-oral when criteria met (clinically stable, GI absorption intact, oral option available).',distractors:{A:'Continuing broad-spectrum cover when narrow is available drives resistance',B:'Stopping prematurely risks recurrence',D:'Synergy not needed for sensitive organism',E:'Escalation when narrowing is appropriate increases resistance'},pearl:'Start Smart Then Focus: 48–72 h review for every antibiotic. Document review and reason. IV-to-oral switch reduces line complications and length of stay.',references:[{label:'UKHSA Start Smart Then Focus toolkit',url:'https://www.gov.uk/government/publications/antimicrobial-stewardship-start-smart-then-focus'}]},
  {section:'sepsis',specialty:'Critical care',topic:'Fluid responsiveness',stem:'A patient in septic shock has received 30 mL/kg crystalloid. BP remains 88/52, lactate static at 3.5, CRT 4 s. JVP not raised, lung bases clear.',options:['Continue large-volume fluids','Stop fluids and start oral intake','Start vasopressor (noradrenaline) via central access','Furosemide for presumed overload','Discharge to ward'],correct:'C',explanation:'After 30 mL/kg without response, persistent shock requires vasopressor (noradrenaline first-line). Aim MAP ≥65. Critical care escalation.',distractors:{A:'Further large fluids without response cause overload and harm',B:'Stopping fluids in shock is incorrect',D:'No evidence of overload — diuresis worsens shock',E:'Refractory shock needs ICU not ward'},pearl:'Fluid responsiveness ends at 30 mL/kg in most adults. Then noradrenaline. Don\'t flog with more crystalloid — give vasopressor and reassess.',references:[{label:'Surviving Sepsis Campaign 2021',url:'https://www.sccm.org/clinical-resources/guidelines/guidelines/surviving-sepsis-guidelines-2021'}]},
  {section:'sepsis',specialty:'Geriatrics',topic:'Atypical sepsis elderly',stem:'An 88-year-old man presents with new confusion and one fall. T 36.2°C, HR 96, BP 108/64, RR 22, SpO₂ 94%. CRP 218, WCC 14.5, lactate 2.4.',options:['Discharge with carer','Treat as delirium with haloperidol only','Investigate for sepsis: cultures, CXR, urine, treat empirically','Admit for falls assessment alone','Reassure family'],correct:'C',explanation:'Elderly may not mount fever or tachycardia. New confusion + falls + raised inflammatory markers in elderly = sepsis until proven otherwise.',distractors:{A:'Discharge in undifferentiated elderly sepsis is dangerous',B:'Treating delirium without finding cause misses sepsis',D:'Falls alone misses underlying sepsis driver',E:'Reassurance does not investigate the cause'},pearl:'Elderly sepsis triad: confusion, falls, off-feet. Often afebrile and normo-tensive. CRP and lactate raised — investigate broadly.',references:[{label:'BGS Silver Book — Frailty Recognition',url:'https://www.bgs.org.uk/resources/silver-book-ii'}]},

  // ABCDE & RESUSCITATION (7 new)
  {section:'abcde',specialty:'Airway',topic:'Airway adjunct selection',stem:'An unconscious patient is breathing but tongue is occluding the airway. Gag reflex absent, no facial trauma, no nasal trauma. Which adjunct is most appropriate?',options:['Endotracheal tube — only the nurse can place','Oropharyngeal (Guedel) airway','Nasopharyngeal airway only','i-gel placement','Face mask alone'],correct:'B',explanation:'Oropharyngeal airway is appropriate when gag absent and no oral trauma. Nasopharyngeal is alternative if jaw clenched or trismus present.',distractors:{A:'ET intubation requires advanced airway skills not held by ward nurses',C:'NPA is alternative; OPA preferred when gag absent',D:'i-gel requires specific training',E:'Face mask alone does not relieve obstruction'},pearl:'Size OPA from incisors to angle of jaw. NPA from nostril to tragus. Insert OPA upside-down then rotate (adults). Never force NPA against resistance.',references:[{label:'Resus Council UK Adult ALS Guidelines 2021',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-advanced-life-support-guidelines'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'Bag-valve-mask technique',stem:'You are bag-mask-ventilating an unconscious adult during cardiac arrest. Chest does not rise. Most likely first remedial step?',options:['Faster compressions','Reposition airway with head tilt–chin lift / jaw thrust','Increase BVM rate to 30/min','Stop BVM and continue compressions only','Higher oxygen flow'],correct:'B',explanation:'Inadequate chest rise with BVM = airway position. Reposition (head tilt–chin lift, or jaw thrust if cervical concern), check seal, two-person technique.',distractors:{A:'Faster compressions do not address ventilation failure',C:'Hyperventilation reduces venous return',D:'Compressions only are appropriate before BVM available, not when ventilation fails',E:'Higher flow does not fix inadequate seal/airway'},pearl:'Two-person BVM with E-C grip and squeeze improves tidal volume. 1 breath per 6 seconds during arrest with advanced airway. Avoid hyperventilation.',references:[{label:'Resus Council UK BLS Guidelines',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-basic-life-support-guidelines'}]},
  {section:'abcde',specialty:'Pre-arrest',topic:'Pre-arrest signs',stem:'A patient deteriorating on the ward shows: RR 32, SpO₂ 89% on 15 L, BP 78/40, drowsy (V on AVPU). Most appropriate immediate action?',options:['Continue current management and review in 30 min','Activate emergency call (2222), peri-arrest team, prepare for arrest','Administer oral fluids','Discharge to side room','Take ABG and wait for results'],correct:'B',explanation:'These are pre-arrest signs (gross physiological derangement + drowsy). Activate critical care/peri-arrest team immediately, do not wait for cardiac arrest.',distractors:{A:'Continuing management in pre-arrest is fatal',C:'Oral fluids inappropriate in drowsy hypotensive patient',D:'Side room without intervention does not treat pre-arrest',E:'Waiting for ABG delays critical interventions'},pearl:'80% of cardiac arrests on wards have pre-arrest deterioration in the preceding 8 hours. NEWS2 trends and clinical concern justify escalation.',references:[{label:'NCEPOD Time to Intervene 2012',url:'https://www.ncepod.org.uk/2012cap.html'}]},
  {section:'abcde',specialty:'Tracheostomy',topic:'Blocked tracheostomy emergency',stem:'A patient with a tracheostomy becomes acutely breathless, SpO₂ falling, audible whistle from tube. Inner cannula already removed and reinserted without improvement.',options:['Reassure and observe','Suction via tracheostomy; if no improvement remove tracheostomy + apply face mask O₂; emergency call','Continue current management','Insert NG tube','Increase humidification'],correct:'B',explanation:'Blocked tracheostomy emergency follows the National Tracheostomy Safety Project algorithm: deflate cuff, remove inner tube, suction, remove tube if no improvement, BVM via face/stoma.',distractors:{A:'Observation in blocked tracheo is fatal',C:'Continuing management without action allows hypoxic arrest',D:'NG insertion does not address tracheal obstruction',E:'Humidification is preventative, not emergency'},pearl:'Green algorithm = patent upper airway (laryngectomy is RED). Always know if your patient has a laryngectomy — air goes through stoma only.',references:[{label:'National Tracheostomy Safety Project',url:'https://www.tracheostomy.org.uk/healthcare-staff/emergency-care'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'CPR in pregnancy',stem:'A 32-year-old at 36 weeks gestation collapses on the ward. Pulseless, not breathing.',options:['Standard CPR supine','Standard CPR with manual left uterine displacement','Wait for obstetrics before starting CPR','Place head down','Chest compressions only without breaths'],correct:'B',explanation:'CPR in pregnancy >20 weeks: manual left uterine displacement (or 30° left tilt) to relieve aortocaval compression. Perimortem section by 4 minutes if no ROSC.',distractors:{A:'Supine pregnant CPR is ineffective due to aortocaval compression',C:'Waiting for obstetrics delays life-saving CPR',D:'Head down does not relieve aortocaval compression',E:'Compressions only inadequate for prolonged arrest'},pearl:'In pregnancy >20 weeks: 4-minute rule for perimortem caesarean. Improves both maternal and fetal survival. Hands-higher (slightly cephalad) for compressions.',references:[{label:'Resus Council UK Cardiac Arrest in Pregnancy',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/special-circumstances-guidelines'}]},
  {section:'abcde',specialty:'Trauma',topic:'C-spine immobilisation',stem:'A 24-year-old fell from height. GCS 13, complaining of neck pain, weak grip bilaterally. Most appropriate immediate management?',options:['Sit up to assess','Manual in-line stabilisation, cervical collar, blocks, log-roll for assessment','Encourage movement to localise pain','Send for CT alone first','NSAID and reassess'],correct:'B',explanation:'Suspected C-spine injury with neuro signs requires triple immobilisation (collar + blocks + tape) or manual in-line stabilisation. Log-roll only with trained team.',distractors:{A:'Sitting up risks cord injury',C:'Active movement risks cord injury',D:'CT before stabilisation risks cord injury during transfer',E:'NSAID does not address mechanical risk'},pearl:'NEXUS criteria: no midline tenderness, no intoxication, normal alertness, no focal neuro deficit, no painful distracting injury → no imaging needed. Otherwise immobilise.',references:[{label:'NICE NG41 Spinal injury',url:'https://www.nice.org.uk/guidance/ng41'}]},
  {section:'abcde',specialty:'Resuscitation',topic:'DNACPR documentation',stem:'A patient with metastatic cancer arrests on the ward. The DNACPR form was not completed but the team had documented "for ceiling of care discussion" 2 days earlier. Most appropriate action?',options:['Withhold CPR based on documentation','Start CPR immediately while seeking clarification','Wait for consultant before any action','Brief CPR then stop','Comfort measures only'],correct:'B',explanation:'In absence of valid DNACPR, default is to attempt resuscitation. Documentation of intent to discuss is not a DNACPR. Continue CPR while seeking senior review.',distractors:{A:'Withholding CPR without valid DNACPR is unlawful',C:'Waiting causes irreversible neurological injury',D:'Brief CPR then stopping without medical decision is unsafe',E:'Comfort measures only require valid decision'},pearl:'DNACPR must be completed by senior decision-maker, signed, and on the appropriate form (e.g., ReSPECT). Discussion documentation alone is not legally equivalent.',references:[{label:'GMC Treatment and Care Towards the End of Life',url:'https://www.gmc-uk.org/professional-standards/professional-standards-for-doctors/treatment-and-care-towards-the-end-of-life'}]},

  // CARDIOLOGY (8 new)
  {section:'cardio',specialty:'Cardiology',topic:'Right ventricular infarction',stem:'A 62-year-old has chest pain and inferior ST elevation. BP 88/52, JVP raised, lungs clear. ECG with right-sided leads shows V4R ST elevation.',options:['IV GTN','Cautious IV fluid bolus + urgent PCI','IV furosemide','IV β-blocker','Sit fully upright'],correct:'B',explanation:'Right ventricular infarct: preload-dependent. Avoid GTN, diuretics, β-blockers (worsen hypotension). Cautious fluid + reperfusion.',distractors:{A:'GTN drops preload — catastrophic in RV infarct',C:'Diuretics drop preload',D:'β-blockers worsen RV failure',E:'Sitting upright reduces venous return'},pearl:'Inferior STEMI: always do right-sided leads (V3R/V4R). RV involvement = preload-dependent — give fluids, avoid GTN/diuretics/β-blockers.',references:[{label:'NICE NG185 Acute coronary syndromes',url:'https://www.nice.org.uk/guidance/ng185'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Atrial flutter rate control',stem:'A 70-year-old has atrial flutter at 150 bpm (2:1 block), BP 124/72, no chest pain or pulmonary oedema. Stable.',options:['DC cardioversion immediately','Adenosine 6 mg','IV β-blocker (metoprolol) for rate control','IV amiodarone bolus','Vagal manoeuvres only'],correct:'C',explanation:'Stable atrial flutter: rate control first (β-blocker or rate-limiting CCB), anticoagulation per CHA₂DS₂-VASc, consider rhythm control electively.',distractors:{A:'DC cardioversion reserved for unstable',B:'Adenosine briefly unmasks flutter waves but does not treat',D:'IV amiodarone is rhythm control, not rate; needs anticoagulation first',E:'Vagal manoeuvres unhelpful in flutter'},pearl:'Atrial flutter rate of 150 = 2:1 block from atrial rate of 300. Rate control first if stable; consider TOE-guided cardioversion for >48 h duration.',references:[{label:'NICE NG196 Atrial fibrillation',url:'https://www.nice.org.uk/guidance/ng196'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Complete heart block',stem:'A 78-year-old has syncope. ECG shows complete (3°) AV block, ventricular rate 32, BP 84/50, drowsy.',options:['Oral atenolol','IV atropine 500 mcg, repeat to 3 mg, prepare transcutaneous pacing','IV adenosine','Discharge with cardiology follow-up','Observation only'],correct:'B',explanation:'Symptomatic complete heart block with adverse features: IV atropine, then transcutaneous pacing if no response. Refer for permanent pacemaker.',distractors:{A:'β-blocker worsens block',C:'Adenosine worsens block',D:'Discharge in 3° block with adverse features is dangerous',E:'Observation alone misses haemodynamic compromise'},pearl:'Adverse features in bradycardia: shock (SBP <90), syncope, MI, heart failure. Pacing is definitive. Adrenaline infusion bridge if pacing delayed.',references:[{label:'Resus Council UK Bradycardia Algorithm',url:'https://www.resus.org.uk/library/2021-resuscitation-guidelines/adult-bradycardia-algorithm'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Cardiogenic shock',stem:'A patient post-MI has BP 78/50, mottled skin, oliguria 10 mL/h, lactate 4.5, raised JVP, basal crackles. Likely cardiogenic shock.',options:['Large-volume IV fluids','Inotrope (dobutamine) + ICU + urgent revascularisation','Oral metoprolol','Discharge to ward','Furosemide alone'],correct:'B',explanation:'Cardiogenic shock: inotropic support, urgent revascularisation if MI, ICU. Avoid large fluid loads which worsen pulmonary oedema.',distractors:{A:'Large fluids worsen pulmonary oedema',C:'β-blocker worsens shock',D:'Discharge in shock is dangerous',E:'Furosemide alone misses inotropic need'},pearl:'Cardiogenic shock mortality remains 40–50%. Early revascularisation (CULPRIT-SHOCK) improves outcomes. Mechanical support (IABP, Impella, ECMO) for refractory cases.',references:[{label:'ESC ACS Guidelines 2023',url:'https://academic.oup.com/eurheartj/article/44/38/3720/7243210'}]},
  {section:'cardio',specialty:'Vascular',topic:'Aortic dissection BP control',stem:'A 65-year-old hypertensive presents with sudden tearing chest pain radiating to back. BP 184/104 R arm, 142/88 L arm. Diastolic murmur. ECG normal.',options:['Aspirin 300 mg + admit for observation','Treat as STEMI: PCI','Urgent CT aortogram + IV β-blocker (labetalol) for SBP 100–120','Anticoagulate empirically','Reassure and discharge'],correct:'C',explanation:'Aortic dissection: BP control with IV β-blocker (target SBP 100–120, HR <60), urgent CT aortogram, urgent vascular/cardiothoracic surgery review.',distractors:{A:'Aspirin in dissection worsens haemorrhage',B:'PCI inappropriate; needs surgery if Type A',D:'Anticoagulation worsens dissection bleeding',E:'Discharge fatal'},pearl:'Tearing pain + BP differential >20 mmHg + new diastolic murmur = aortic dissection. β-blocker FIRST (reduce dP/dt), then vasodilator if BP still high.',references:[{label:'ESC Aortic Diseases Guidelines',url:'https://academic.oup.com/eurheartj/article/35/41/2873/407693'}]},
  {section:'cardio',specialty:'Cardiology',topic:'ICD shock',stem:'A 58-year-old with an ICD has just received a single shock. Currently feels well, asymptomatic, no chest pain, observations normal.',options:['Disable the ICD','Reassure and discharge','12-lead ECG, cardiac monitor, urgent EP/cardiology review for device interrogation','Continuous ICD shocks immediately','IV amiodarone'],correct:'C',explanation:'Single ICD shock asymptomatic patient: ECG, monitor, device interrogation. Multiple shocks (electrical storm) needs admission, antiarrhythmic, sedation if distressing.',distractors:{A:'Disabling ICD removes life-saving therapy',B:'Discharge without interrogation misses appropriate vs inappropriate diagnosis',D:'Multiple shocks already happening = electrical storm — different management',E:'Amiodarone without diagnosis premature'},pearl:'Single ICD shock: review and discharge often appropriate. ≥3 shocks in 24 h = electrical storm — admit, sedate, consider amiodarone, reverse triggers (electrolytes, ischaemia).',references:[{label:'NICE TA314 Implantable cardioverter defibrillators',url:'https://www.nice.org.uk/guidance/ta314'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Endocarditis IVDU',stem:'A 32-year-old IV drug user has 2-week fever, weight loss, new pansystolic murmur, splinter haemorrhages, microscopic haematuria. T 38.4°C.',options:['Single blood culture and discharge','3 sets of blood cultures from different sites + IV antibiotics + urgent echocardiogram','IM penicillin','Oral antibiotics for cellulitis','Reassure'],correct:'B',explanation:'Suspected endocarditis: 3 sets of blood cultures from separate sites before antibiotics, urgent echo (TTE then TOE), IV antibiotics per Duke criteria.',distractors:{A:'Single culture inadequate; discharge dangerous',C:'IM penicillin alone inadequate',D:'Oral antibiotics inadequate for endocarditis',E:'Reassurance misses life-threatening diagnosis'},pearl:'IVDU + fever = endocarditis until proven otherwise. Right-sided (tricuspid) endocarditis in IVDU — Staph aureus most common. Look for septic pulmonary emboli on CT.',references:[{label:'BSAC Endocarditis Guidelines',url:'https://academic.oup.com/jac/article/67/2/269/784625'}]},
  {section:'cardio',specialty:'Cardiology',topic:'Pericarditis ECG',stem:'A 28-year-old has sharp central chest pain, worse lying flat, better leaning forward. ECG shows widespread saddle-shaped ST elevation. Troponin slightly raised.',options:['Treat as STEMI with PCI','NSAID + colchicine + outpatient echo + cardiology follow-up','Anticoagulation','Steroids first-line','Discharge without follow-up'],correct:'B',explanation:'Acute pericarditis: NSAID (ibuprofen) + colchicine first-line, echo to exclude effusion, monitor for tamponade. Cardiac MRI if myocarditis suspected.',distractors:{A:'STEMI changes are localised; pericarditis is widespread saddle ST',C:'Anticoagulation can cause haemorrhagic pericarditis',D:'Steroids second-line; risk of recurrence',E:'Discharge without follow-up misses progression to constriction'},pearl:'Pericarditis ECG: PR depression and widespread saddle-shaped ST elevation. Troponin rise = myopericarditis (worse prognosis). Watch for tamponade triad (Beck\'s).',references:[{label:'ESC Pericardial Diseases',url:'https://academic.oup.com/eurheartj/article/36/42/2921/2293375'}]},

  // RESPIRATORY (8 new)
  {section:'resp',specialty:'Respiratory',topic:'Massive pulmonary embolism',stem:'A 64-year-old day 5 post-hip replacement collapses with severe breathlessness. BP 78/48, HR 132, RR 36, SpO₂ 84% on 15 L. CTPA confirms saddle PE.',options:['Anticoagulate with LMWH only','Systemic thrombolysis (alteplase) + IV access + critical care','Bed rest and reassess','Diuresis','Aspirin'],correct:'B',explanation:'Massive PE with haemodynamic instability: thrombolysis (alteplase 100 mg over 2 h, or 50 mg bolus), critical care, consider catheter thrombectomy if thrombolysis contraindicated.',distractors:{A:'LMWH alone inadequate for haemodynamically unstable PE',C:'Bed rest fatal in massive PE',D:'Diuresis worsens hypotension',E:'Aspirin not standard PE therapy'},pearl:'Massive PE = haemodynamic instability (SBP <90 or drop ≥40 for 15 min not from arrhythmia/sepsis). Thrombolysis. Sub-massive (RV strain only) = consider thrombolysis case-by-case.',references:[{label:'NICE NG158 VTE diagnosis and management',url:'https://www.nice.org.uk/guidance/ng158'}]},
  {section:'resp',specialty:'Respiratory',topic:'Aspiration pneumonia',stem:'A patient with a stroke is fed orally despite failing swallow screen. Develops fever, productive cough, RLL crackles, SpO₂ 88%.',options:['Continue oral feeding','NBM + speech and language therapy review + IV antibiotics covering anaerobes (e.g. co-amoxiclav)','Oral antibiotics','Discharge','Lactulose'],correct:'B',explanation:'Aspiration pneumonia: NBM, alternative feeding (NG/NJ), antibiotics covering anaerobes per local protocol, SLT swallow assessment.',distractors:{A:'Continuing oral feeding worsens aspiration',C:'Oral antibiotics inadequate for severe pneumonia',D:'Discharge fatal',E:'Lactulose unrelated to aspiration treatment'},pearl:'Stroke patients: never feed orally before SLT swallow assessment. Aspiration pneumonia mortality 20–30%. Position upright for feeding once cleared.',references:[{label:'NICE QS61 Stroke',url:'https://www.nice.org.uk/guidance/qs2'}]},
